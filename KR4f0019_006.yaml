遥相憶魏闕江湖共此心八節灘髙晴亦雨三花樹古晝長隂陵陽歸去名僧社卻聽微鐘憶少林聞林茂之先生已葬鍾山萬古鍾山下今成有道阡龍蟠髙士宅貍首故人憐老尚歌朱鳥魂應拜杜鵑何時磨鏡具一問秣陵船送張簣山學士歸廬陵廻首􅒀稜別𬗋宸孤舟遥下富川濱誰令江外漁樵侶爭識先皇侍從臣上殿似聞辛慶忌行吟休擬椘靈均千秋公議存青史應爲朝廷惜此人送董樵㱕成山兼寄宋澄嵐先生林寺孝廉漢家祠日主遺跡成山中吾子千秋意棲遲滄海東凉天朝放鶴雪隖夜聞鐘問訊河汾叟東歸道未窮送孫古喤赴南靖萬里無諸國孤帆直向東盤餐登馬甲井邑枕鮫宫禁舶人烟少懸針職貢同孫郎還嫵媚真有𬗋髥風盧師山盧師昔日經行地惆悵蒼崖古木風㝡憶深秋飛瀑下四山寒葉亂流中皇姑寺皇姑寺前人日晴畏吾村畔草痕生山桃堤栁自春色粥鼓鐘魚非世情鐡劵南宫憐將相黄沙北狩誤公卿獨慙扣馬輸巾幗天市星文㡬夜明退谷見朱錫鬯李武曾潘次耕蔡竹濤題名時朱在廣陵李在黔南潘蔡在太原故人消息比何如萬里江湖嵗又除山寺到來先一笑春風石壁見君書曉起至五華寺尋水盡頭作退翁亭子蒼崖前五華古寺當其顛殘僧夜雪煨芋火童子開門尋澗泉石壁空青散雲錦金沙照曜浮清漣他時把酒蘿隂下風堕巖花烏㡌偏裂帛湖雜詠六首裂帛湖光碧玉環人家終日映潺湲分明一幅蔡侯𥿄冩出湖南千萬山淋池十里芰荷風太液西來一派通應有恩波下黄鵠年年流入建章宮水軒面面似船窻沙燕鵁鶄盡作雙忽憶夢廻聞柁鼓一枝柔艣破烟江宣宗玉殿空山裏簫鼓樓船事已非何似茂陵汾水上秋風南䧹淚沾衣石甕山頭歸片雲望湖亭上倚斜曛𥿄錢社酒棠梨道不到湖邉耶律墳萬樹垂楊掃緑苔桃花深映槿籬開逰人盡説西隄好須及清明上已來贈謝方山舍人二首歷落嶔嵜可笑人朝衫猶自染京塵深憐謝客吟詩好莫訝王郎斫地頻三月鶯花連下杜廿年車庫感平津青絲挈酒髙梁水取次東風解褉辰舎人簾閣晝凝香下直清齋似太常昨日同尋烟際寺題詩多在賛公房晴溪氷雪寒逾好風磴莓苔滑不妨騎馬城南春又暮㡬廻西笑憶滄浪題新樂縣驛壁寄宋荔裳當年霧夕詠芙蕖促席傳觴樂未疎名忝應劉七才子座傾沈范兩尚書龔芝麓梁蒼巖二宗伯飛星過漢無留影萍葉随潮少㝎居猶有前期不相負秋來同釣錦江魚雨中度故關危棧飛流萬仞山戍樓遥指暮雲間西風忽送瀟瀟雨滿路槐花出故關冷泉關道中南徑雀鼠谷﨑嶇殊未休路随千嶂轉峽束一川流灘急長疑雨蟬嘶畏及秋雲峰將落日立馬迥含愁國士橋國士橋邉水千年恨未窮如聞柱厲叔死報莒敖公猗氏徃蒲州道中有感令狐城畔雨霏霏遥指中條積翠稀西接新秦三輔迥東鄰故絳兩川圍空聞魏國山河美久識唐家節度非愁絶無心更懐古清秋風景亦沾衣望中條山今朝美風日望見中條山青嶂有時隠白雲随意還泉飛幽谷裏鳥囀竹林間欲訪韓終去菖蒲駐好顔河中感懐寄諸兄何䖏依依動客愁蒲津雲物迥髙秋河聲近挾中條雨關勢遥分太華旒人代茫茫雙去鳥夕陽渺渺獨㱕舟京華故國俱千里心折西風鸛雀樓中條山下作中條初日上嵐彩變朝昬芳樹重重隖流泉曲曲村河流趨厎柱山勢鎖關門借問王官谷貽溪跡尚存望見華山蒲坂南來問釣船風陵塠上隔風烟黄河一曲流千里太華居然落眼前潼關潼津直上勢嵯峨天險初從百二過兩戒中分蟠太華孤城北折走黄河復隍㡬見熊羆守棄甲空傳犀兕多漢闕唐陵盡禾黍雁門司馬恨如何華隂道中平田漠漠稻花香百道清泉間緑楊二十八潭天上落無人知是帝臺漿華州道中地古弘農郡雲峰去不窮泉飛名岳雨稻熟野塘風漕輓通河渭雄關界華嵩唐家傳七世何事失山東華州齊雲樓唐昭宗望京䖏齊雲樓上望京師渭水東流無盡時父老尚傳行幸日教坊曾譜㫁腸詞城空只見雙飛燕刼敗猶爭一局棊莫問寒烟十六宅土花凝碧至今悲遇仙橋即事浮雲收渭北初日照終南馳道連秋水官橋度曉驂人烟生浦樹鳥語入晴嵐欲訪漁川隱蘆中有釣菴漁川華州山水勝處渭南道中秦川秋色迥四望極風烟樹隠金椎宻花開玉井鮮水光浮蓮音輦勺山翠入藍田徃昔長安道孤城近日邉豐原豐原髙不極原上行人度秋晴渭川望遥見藍田樹渭南望瀑園寄南鼎甫僉事湭曲風煙好新秋望瀑園池通清渭水花暖𬗋蘭村西蜀天邉節南宫雪夜樽十年鴻爪意愁絶詎堪論驪山懐古八首鸚鵡何年問上皇野棠風折繚垣長銷魂此日朝元閣親試蕐清第二湯滿路香塵拾墜鈿諸姨五隊夾城邉花開繡嶺看調馬雪下離宫有賜錢舞罷驚鴻歲月徂長門深閉長青蕪君王自愛霓裳序不記樓東一斛珠内殿傳呼菊部頭梨園弟子按梁州善才零落龜年老渭水猶明羯鼓樓蜀王音信渺天涯青鳥西飛日又斜㫁粉殘香誰得見承恩只有玉蓮花鳯凰原下􅎷槽㫄虢國夫人有賜莊無數青山學眉黛當年誰入合歡堂不復黄衫舞馬牀更無片段荔支筐祗餘今古青山色留與詩人弔夕陽空城㡬曲水潺潺松柏凄凉滿舊山輦道無人秋草合年年嗚咽到人間灞橋寄内二首長樂坡前雨似塵少陵原上淚霑巾灞橋兩岸千條柳送盡東西渡水人太華終南萬里遥西來無處不魂銷閨中若問金錢卜秋雨秋風過灞橋晚渡澧渭清川生暝色鼓楫溯中流返照紅將歛終南𬗋翠稠遥看雲際寺欲放渼陂舟故國東溟上茫茫清渭樓望終南雲氣終南雲物一千里逺横嶓冡包商顔不雨不晴最窈窕一東一西時徃還何日髙棲尋𬗋閣來朝驛騎繞黄山無心羡汝能舒卷慙負秋來水石閑古詩逢逢白雲一東一西一南一北漢武帝通天臺址通天㙜畔望咸京秋入秦川雨半晴御宿不來仙掌散宮車已徃露盤傾神光遥指虚無影渭水長流日夜聲此去西風茂陵路祗應腸㫁沈初明咸陽早發日照長陵小市東依然蹤跡逐飛蓬未央宫闕悲歌裏鄠杜鶯花淚眼中巳見銅人辭漢月空㽞石馬卧秋風多情㝡有咸陽草和雨和烟嵗嵗同茂陵武帝乘龍久上昇集靈㙜古㡬人登晴川淼淼通槐里秋草萋萋入茂陵天馬歌成愁出塞泉鳩事去涕沾膺誰知一代孫弘閣唯有東方諌獵能馬嵬懐古二首何處長生殿裏秋無情清渭日東流香魂不及黄旛綽猶占驪山土一丘巴山夜雨卻歸秦金粟堆邉草不春一種傾城好顔色茂陵終傍李夫人飛龍務此地臨汧渭秦嬴有舊封飛龍何日去凡馬至今空落落驊騮氣蕭蕭首蓿叢黄雲秋草裏悵望古城東武功道中武功回首望金城古跡蕭條感乍生秃節尚憐蘇屬國黨人終賴竇逰平白頭鬱鬱身前事青史悠悠世上名千里終南山色好一枝笻竹萬緣䡖武功懷古唐家慈聖寺后稷有邰封二水流沮漆千秋擬沛豐髙原山色裏小邑夕陽中樂府康王好何時訪沜東扶風道中北望廻龍薄西行過馬嵬俠逰無柳市史筆闕蘭臺老鬢愁中改秋風隴上催田園情話好何事不歸來馬伏波祠冥冥炎海伏波祠肅肅靈旗故國思萬里功名銅馬式五谿淫潦跕鳶時隗嚻詎識真王異朱勃終慙地下知空憶平生少㳺語㱕來欵叚悔教遲織錦巷慧絶璇璣手當如棄置何憐他蘇蕙子枉嫁竇連波鳳翔府城邉汧渭兩交流隴蜀中分第一州西雍横當斜谷路南山髙接杜陵秋雌鳴尚憶秦人霸星隕難銷漢相愁形勢依然身萬里扶風歌罷拂吴鈎寳雞道中時序颯已變征蓬何處休逺天吴岳影斜日渭川流雲棧餘髙鳥磻溪有釣鉤龍鍾三十九白盡老夫頭寳雞縣險絶古陳倉停車落日黄霸圗今寂莫陳寳亦銷亡城郭秋雲裏人家清渭㫄廻看三輔逺秦樹但蒼蒼石鼓山遥憶岐陽狩來過石鼓山韓蘓今地下星斗尚人間谿谷㱕飛少川原獵騎還寄情汧渭水千折過潼關益門鎮天險當秦鳳提封界雍梁棧雲髙不落隴樹曉還蒼古􅕤催征騎秋風弔戰埸山南明日路漸入武都羌煎茶坪大壑沉雲霧冥冥萬仞梯孤峯分隴漢兩水劃東西坪東水北流西水南流遥直金牛峽㫄臨白馬氐當年誰設險不用一丸泥自長橋至草凉樓西下嘉陵水瀰瀰緑滿灘緣崖紅叱撥縈棧曲䦨干九折行人少千峰落日寒不知投宿處樵響隔雲端鳳縣險絶岐南路岧嶢蜀北門千峰圍邸閣一線望中原城下嘉陵水林間謝豹村衰遲慙鳳德愁向接輿論寄家人京洛分襟七夕前南岐驛路五更烟故園刀尺齊紈素逺道風花蜀國絃㫁續鸚飛深隖裏横斜雁度夕陽邉棧雲隴樹重重隔閨夢何由向左綿雨度柴關嶺棧中新漲未㱕槽百丈柴關水怒號鳥語不聞深箐黒馬蹄直上亂雲髙天垂洞壑蛟龍蟄秋老牙鬚虎豹豪誰識熏香東省客戎衣斜􅐦赫連刀南星雨發驟雨南星道秋隂草木風澗寒傷馬骨雲亂失𧖟叢僣憶公孫帝危知大禹功中原何處所萝落散關東雨趨留壩急雨下烏櫳千峰一線通路遥洋水北天盡武關東峽偪風雷氣人穿虎豹叢誰知星使節今夜託牛宮畫睂關南渡野羊水四山封􅌄窱一水急波瀾巨壑蛟潛穏飛流馬渡難隂崖終古閟白日㡬時看惡竹縦横甚還須斫萬竿武關寄家書驛騎千山裏平安兩字書髙堂衰白早兒女死生餘聽雨思兄弟臨風問𧺫居白頭吟更苦莫負錦江魚閏七夕抵褒城縣褒斜十日路白髪怱侵尋紅葉下江水始知秋氣深馬驚初出谷城閉不聞砧何處天河影浮雲只自隂漁洋山人精華録卷六門人監察御史崑山盛符升國子祭酒江隂曹禾同訂候官門人林佶恭謄寫男啟汸恭閱
