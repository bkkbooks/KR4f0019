front:
  text: 漁洋山人精華録卷六門人候官林佶編
  hash: sha256:eacffa26ae336ecdee35ffb166a4e9edf6d6df27049c73855808c6d1ecf9a438
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_006-1a}
body:
  text: 今體詩送孫無言歸黄山四首昨萝黄山碧溪月白雲三十六峯深朝來卻送滄洲逸興發還為吴㑹吟未能采藥入青城且傍浮丘畢此生知君西渡松明水已有羣仙抗手迎硃砂湯口三千頃石筍凌空一萬株更問黄山竒絶處天都瀑布勝匡廬廣陵市上賈人子衮袞錢刀劇可憐恠爾山中𬗋芝客閉門髙枕夢逰仙送彭十羡門逰粤二首大姑彎彎睂黛長小姑窈窕宫亭粧三日潯陽風信到雙姑早晚嫁彭郎萬里南荒弔尉佗芭蕉林裏越禽多好將延露新翻曲乞與珠娘蹋臂歌真州懐家兄西樵依然山郭與江樓長夏蕭條只似秋十里香生芰荷水亂蟬聲送木蘭舟試尋戰壘連京口無數雲山指石頭曾與坡公吟賞地對牀風雨戀真州秦淮泛月宿青溪有寄二首移船就明月鼓楫泝淮流明月雲中出流光水上浮三更吹玉笛銀漢㵼凉秋長板橋頭栁誰家尚倚樓一宿青溪栅還悲張麗華黒頭江令宅亦作叚侯家壘號韓擒虎商歌玉樹花都將東郭筆寫恨寄天涯故中山西園上公邸第舊西園水石蕭然絶世喧無復秋蘭被長坂祗餘修竹映朱門蕭曹事業終歸盡江孔文章莫更論日暮風煙愁客思冶城南是謝公墩臺城懐古二首覆舟山畔古㙜城故壘參差觸目驚蔓草縈烟野蕭瑟寒禽將子水縦横𬗋雲黄鵠符終驗白馬青絲䜟又成千載華林宫館路清明時節野棠生傳檄風生南雍州蕭郎三十冠諸侯蘭陵家國偏多故荆椘干戈且未休遺老空聞龍瀆語荒原都作雉媒秋可憐代景行師日水到青塘咽不流登雞鳴寺雞籠山上雞鳴寺紺宇凌霞鳥路長古埭尚傳齊武帝風流空憶竟陵王白門栁色殘秋雨元武湖波澹夕陽下界銷沉陵谷異楓林十廟晚蒼蒼雞鳴寺眺後湖二首禁地傳清􅋀依依白下城恩波連太液別苑𧺫昆明湖亦號昆明野水鳬鷗逺斜陽菡萏生不須揺落日陵谷已含情魚鳥華林路渟泓復此湖三秋人易怨八代感何殊蕭寺寒聲急鍾陵返照孤塘蒲今已晚憔悴庾肩吾題秦淮水榭氷簟胡牀水上頭𧺫看纎月映淮流三更入破誰家笛子夜聞歌何處樓澹澹星河耿斜照姢姢風露作新秋謝郎今夕思千里獨對金波詠四愁題靈谷廢寺為愛蔣山山色好筍輿終日不逢人杖藜入寺花扶屐巖谷迎秋雨墊巾王舎城中荒草徧樂逰原上野麋春誌公衣履今還在苑外悲風卧石麟尋半山堂遺址舒王歸卧後卜築蔣山邉騎驢衣掃塔来徃㝎林前空山無舊業欹澗但懐烟太息元豐事江城聞杜鵑蕭思話彈琴石宋代蕭常侍彈琴于此山清徽汎松石逸響碧雲間我欲尋遺跡風流不可攀惟餘逺江水朝夕送潺湲瓦官寺江色斜陽下來過古瓦官勇如驃騎少阮思曠戲何驃騎卿勇邁終古乃圗作佛癡似虎頭難梵響流空寂松聲覆殿寒逍遥能解否試問道林看荅朱錫鬯過廣陵見懐之作時謁曹侍郎于雲中桃葉渡頭秋雨繁喜君書札到黄昏銀濤白馬來胥口破㡌疲驢出雁門江左清華惟汝在文章流別㡬人存曹公横槊懸相待共醉飛狐雪夜樽夜登觀音巖弘濟寺贈終南融道人登臨建業暮鐘時椘客慿髙一寄思淼淼寒潮孤鳥去冥冥微雨數帆遲逺江人語驚山鬼方丈燈明叩導師借問龎睂老尊宿空山雨雪是前期懐陳伯璣二首當代陳無已棲棲竟白頭三洲歸作客五字逺工愁湓浦風潮滿匡山木葉秋經年㫁消息何事只淹㽞公子秦川貴飄零感盛時田園非阮曲別業寄鳩兹擲拂名僧對吟詩小婦知秦淮舊風月衰栁㡬行垂將徃金陵冐辟疆㩦歌兒見過同方坦菴先生杜于皇方邵村崔不雕小集天涯倦客此宵同銀燭湘簾五夜風殘月空堂絃拉襍早潮江岸唱玲瓏鶯花上日連秋社絲竹中年感謝公明發白沙洲上棹橘林楓葉雨𪷟𪷟夜泊江口聞笛寄家兄西樵四首雲水正寥落笛聲何處生颯然秋思滿不覺有離情凉月閣邉水西風江上城何須武溪曲辛苦怨南征揚子江頭月流光千里餘羙人臨水別隔嵗㡬行書霜落吹羌笛烟深聞夜漁調髙風籟寂流怨滿空虗半夜蒼龍吟能傷椘客心離人歌水調清怨激楓林估舶不能發江波此夕深夜寒沙雁𧺫縹緲竟難尋李謩天寳伎裂竹老龍驚此夜瓜洲渡風髙白浪生精靈泣相語雲月皓将盈入破那能寐依依隴水清題弘濟寺方融道人壁曾挈軍持伴領軍五年重訪􅎷麋羣天花尚散空江雨龍氣仍蒸下界雲缾拂不辭衝虎過旃檀常是逆風聞聽鐘又逐驚蓬去山木蒼蒼落日曛渡江中流作撃汰金陵㟁溶溶曉氣分潮廻落沙嶼帆逺入江雲霽景中流見秋風天外聞時清餘戰壘重弔水犀軍皇厰河道中二首繋䌫臨江滸沿洄復㡬重沙鷗荷港雨水㹀栁塘風潮汐時皆應烟波態不窮欲從詹尹卜來作祝雞翁雲影稻畦浮清泉更曲流江郷宜晚照水草入凉秋沙鳥飛還歇菱絲散復留漸臨瓜步岸花外㡬漁舟憶明湖一曲明湖照眼明越羅吴縠剪裁䡖烟巒濃澹山千疉荷芰扶疎水半城歷下亭中坐懐古水西橋畔卧吹笙鵲山寒食年年負那得樵風引棹行題孫豹人小像絶磵長松不世情科頭箕踞一先生胷中磊塊無人語落落琴聲大蟹行錦秋湖竹枝三首鵞鴨城邉望不稀汀洲水長荻芽肥慕容事逺傷春目斜日金鵝接翅飛錦湖水色勝湘湖雉尾􅐜羹玉不如持謝江南陸内史酪漿還得似渠無不論烟櫂與霜􅏃帆力真禁八面風北豸南鱸誰辨得慿君博物注魚蟲白沙江上雪卻寄家兄揚州停舟揚子縣支枕夜寒侵人語烟初暝雞鳴雪漸深江天多曠望漁浦極楓林不見梅花閣烟波愁暮心真州北郭即目同雲壓江城曉出真州郭郭外斑竹林風吹殘雪落魏文帝賦詩臺在儀真北三里城子山邉欲雪時賦詩臺畔𧺫愁思五官只自臨江歎笑殺孫郎帳下兒盱眙懐常尉建昔賢矜拄笏偶寄一微官小邑如山隖髙名薄建安夕鐘千澗靜春雪九峯寒一勺玻瓈水懐人向夜䦨奉酬西樵先生閣夜聞鶴之作椘江烟鶴鳴風雪蕭蕭夜十載別離心相對寒燈下人日登真州天寧寺浮圗懐李退菴侍郎蹋閣攀林到上方振衣千仞俯蒼蒼江臯騁望傷春目人日登臨憶侍郎枚叔才情傳七發椘臣清怨極三湘李有憶洞庭詩㝡工何時問疾來方丈乞取天花作道埸讀費宻詩成都跛道士萬里下峨岷虎口身曾㧞𧖟叢句有神大江流漢水孤艇接殘春二句密詩十字須千古何為失此人送家兄西樵逰黄鶴山抱琴向黄鶴言訪戴公家山路霽春雨逺江明落霞風吹石楠樹露泫櫻桃花明日西津渡從君問釣查金陵道上乍疎乍密秧針雨時去時來舶趠風五月行人秣陵去一江風雨晝𪷟𪷟一鐙樓與方爾止夜坐懐施愚山臨江牛頭髙處宿初夏似􅋽秋蕭颯青林外西風月滿樓故人皖山隠髙詠繼前修共憶蕭江客清猿𧺫夜愁雨夜宿德雲菴精舎千峰上禪關掩白雲下方羣動息風雨夜深聞瀑布遥争落松聲溼不分卻愁屐齒滑絶頂閉氤氲徳雲菴曉𧺫宿鳥驚寒解報更夜聞林雨逹天明迢迢絶澗千重瀑寂寂中峰一磬聲雨中將徃華山同爾止坐𬗋峰閣寂歷山中雨僧房晝掩門還來𬗋峰閣解帶共清言危溜千巖落中峯一澗喧誰知江令宅今是給孤園花山道中即事萬山堆裏看雲松曲崦幽溪復㡬重爲愛泉聲過林去不知烟寺逺聞鐘尋舊院遺址同方爾止香艶消沉盡空尋舊板橋人稀春寂寂事去雨瀟瀟黄蝶飄寒圃青溪咽暮潮鷲峰寺前栁揺落亦魂銷淳化闗道中望茅山解組初辭郡離羣欲上浮懐仙來句曲采藥到茅州東望朱陽館常思許逺逰何當餌南燭頽景駐千秋雨宿山家二首鬱岡山下雨瀟瀟山店寒更㫁麗譙遥憶青溪楊栁岸一篙新緑漲江潮方諸玉具碧雲間也擬逰仙駕鶴還一夜潺湲秣陵雨白羊門外失茅山金陵輓陳士業先生兼寄伯璣三首昨朝揚子縣逺寄豫章書五字詩殊妙三都序不如士業序子論詩絶句便為絶筆人來青溪曲葉下白門初再有西江信真成腹痛餘板蕩崇禎末先生宰晉州中山翻得謗孟博竟同收歸隱康王谷讀書章貢樓君所居曰章貢讀書樓悲㦲耆舊盡流水咽三洲蔬枰圖詩為宋射陵作相逢射陵叟獨見古人心解作一生事蕭然三徑深忘機成老圃抱甕偃空林銅輦他年夢依依直到今花朝道中有感寄陳其年三首漁陽三月無芳草客思離情不奈何此日淮南好天氣青驄尾蘸鴨頭波三月嬉春射雉城鉢池新水縠紋生𬗋雲低唱靈雛拍愛忍春寒坐到明風俗淮南古禁烟紅橋解禊雨晴天酒徒散盡楊枝別説着花朝一惘然鄒衣白畫雲嵐半幅落人間衣白山人去不還卻憶題詩東澗老夕陽粉夲出闗山末七字虞山翁題白衣畫句胡元潤畫白波青嶂非人境憶住江南過五年今日長征老鞍馬菰蒲春雨夢江天八冊小景八冊西風曉鏡鋪家家網得四腮鱸水郷風味江南思何日扁舟鶯脰湖樊圻畫曾經草鞵夾望見清凉山秋雨暗江浦數帆烟際還披圖思建業欲徃路間闗因送江南客題詩慰別顔趙澄畫江南春意到寒梅曲崦廻汀㡬樹開銅井銅坑風雪裏曾欹烏帽跨驢來石谿畫慈竹林中一徑微曾尋石窟叩禪扉雲山舊衲渾忘卻欲借僧雛壞色衣趙北口見秋栁感成二首順治乙未予上公車與家兄吏部傳肜臣御史賦栁枝詞扵此怱怱十餘年矣隄栁婆娑無復曩時不勝攀枝折條之感因賦是詩十二年前乍到時板橋一曲栁千絲而今滿目金城感不見柔條踠地垂六載隋堤送客驂樹猶如此我何堪銷魂橋上重相見一樹依依似漢南子舊賦栁枝有句云銷䰟橋上銷䰟樹不到飛花魂亦銷周量近躭奕以詩調之并示湘北畫省垂鞭薄暮廻文楸方罫鎮常開知公欲厭承明直徑賭宣城太守來送隱巖道人之五臺繹堂周量苕文湘北同作二首道人江左秀十載住菰蘆獨向清凉去随身智杖扶峰峯餘積雪了了見文殊亦欲㳺方外從師問苾蒭曼殊行道處猶現海螺城摩詰無文字豐干識姓名綻衣寒事早咒鉢毒龍驚殺活從渠㑹依然草一莖荅梅淵公贈畫兼寄唐祖命二首鳥哢屏風明鏡開青溪水色碧瀠洄琴髙三月登春綱一日谿頭醉一囘年來八詠憶休文耕隖先生袂又分好是謝家團扇上相思為畫敬亭雲送吴天章歸中條二首二月春蕪緑紛紛蝴蝶飛花朝逢暮雨寒食減征衣道路誰知已登臨不當歸中條多水竹此去掩荆扉愛汝王官谷他年擬借居三峯當户牖五姓足樵漁田舍堪懐古茅茨宜讀書獨憐好身手歸去注蟲魚中條山下有五姓湖題胡玉昆宋梅圖為程翼蒼風雨厓山事杳然故宫疎影自年年何人寄恨丹青裏留伴冬青哭杜鵑送耿承哲赴髙州推官二首見說髙凉郡遥遥八桂鄰駱田潮上下蠻弩瘴冬春蚌暈連珠浦氷綃獻海人酌泉君有意知不厭清貧何代名藩地軍城徧草萊轅門飛鳥落行殿野棠開感激碙州蹕悲凉冼氏才撫時思將略巾幗亦雄㦲瓶中荷花開偶成二首載酒紅橋日扁舟蓮葉東蕭蕭沙鳥白漠漠渚花紅明鏡生瀟照清流澹惠風別來一千日相見膽瓶中魯連陂上路十里白蓮花遥夜孤舟泊無人山月斜㫁橋三汊水籬落㡬漁家江市垂楊岸何人繫釣查宗梅岑畫紅橋小景見寄賦懐二首辛夷花照明寒食一醉紅橋便六年好景匆匆逐流水江城幾度沈郎錢紅橋秋栁㝡多情露葉烟條逺恨生好在東原舊居士雨窓著意畫蕪城荷蘭刀劍大小凡八枚憶戰金門島王師大合圍寒芒生海外真見著狃飛荷蘭四馬二青二赤鳯膺鶴脛日可千里龍種來西極蘭筋怒不羣鼓車應待汝不用籋浮雲西洋四白小牛白質斑文長二尺髙一尺七寸項有肉峯豈是流沙種還疑果下駒寄言熊虎質不敢恃牙鬚過草橋橋西二水清濁劃然至橋東乃合流土人云清者自西山來濁者渾河也垂楊匝地板橋横沙路青驢得得行偶坐濠梁忘日暮可憐泉水在山清朱錫鬯自代州至京奉柬短後曲將代馬騎談