西指褒斜路凄然送逺心千峰盤雪棧數騎出雲林蜀道連天起秦關入望深今宵畫圖裏如聽暝猿吟二月五日淮隂作二月五日春巳半淮南風物劇駸駸麥苗亂茁垂楊岸蝴蝶交飛花樹林白羽徴兵吳會逺黃巾掠地海堧深何時戍罷狼煙淨擊壤長從田父吟環溪觀玉蘭同朱秋崖陳氷壑淮南二月好天氣八寶城中春鳥鳴溪閣客來尋舊約辛夷花發值新晴回風雪霰當杯落遲日雲霞拂檻生杏葉栁枝俱髣佛驚心祓禊逼清明送苕文之京二首渺渺江湖春水生淮南風景過清明故人恰向愁中至感激真從難後平竹外寒煙瓜步鎮花時細雨廣陵城謝公埭下通宵語酒冷香殘十載情潦倒徒成未拂衣疏狂真與世相違南徐載鶴橫江去西磧看花壓帽歸此去故人京雒少莫教逺道尺書稀嶺南程五如相問為道維摩減帶圍載鶴探梅皆余與苕文近事絶句波繞雷塘一帶流至今水調怨揚州年來慣聽吳娘曲暮雨瀟瀟水閣頭寄陳伯璣金陵東風作意吹楊栁緑到蕪城第幾橋欲折一枝寄相憶隔江殘笛雨瀟瀟贈蔣虎臣先生盧橘已垂實楊梅初滿林仙人一相訪樽酒話同心天台煙霧逺華陽丘壑深平生山水意兹夕寄瑶琴紅橋二首舟入紅橋路垂楊面面風銷魂一曲水終古傍隋宫水榭迎新秋素舸自孤往漠漠栁綿飛時時落波上真州絶句五首揚州西去是真州河水清清江水流斜日估帆相次泊笛聲遙起暮江樓白沙江頭春日時江花江草望參差行人記得曾逰地長板橋南舊酒旗曉上江樓最上層去帆婀娜意難勝白沙亭下潮千尺直送離心到秣陵江干多是釣人居栁陌菱塘一帶疏好是日斜風㝎後半江紅樹賣鱸魚江鄉春事最堪憐寒食清明欲禁煙殘月曉風仙掌路何人為弔栁屯田栁耆卿墓在城西仙人掌和李退菴侍郎讀水經注懷洞庭之作椘望經時入窅冥嶽陽樓上數峰青曾臨南極浮湘水坐對西風憶洞庭斑竹想從春後長落梅猶向笛中聽新詩吟罷愁多少腸斷當年帝子靈江東江東人物舊難儔遺老飄零半白頭斑管題詩吳祭酒梅村紅顔顧曲袁荆州蘀菴太常縑素雲煙落煙客宗伯文章江漢流牧齋徑欲相從破蕭瑟片帆髙挂五湖秋吳公臺大業那堪問長城怨有餘回頭成一笑三十六封書青暘道中二首黛色橫天際蒼蒼秦望山東巡殊不返流恨此山間修竹被晴川淪漣映空曲日夕雪初消人家在寒緑江隂何明府邀登君山椘相何年邑凄涼此獨經棘門成宿草浮逺祗空亭上有亭名浮逺半壁收吳椘空江入杳冥卻思洞庭上一十二峰青鄧玉書簡討招飲梅園暨陽城外路倚棹數寒鴉何處吹橫笛江南雪後槎故人碧山隱招我問梅花更上花間閣香山數點斜數前上聲後去聲髙橋曉望惠山寄修逺留仙心甫流綺清盥披衣起開簾見九峯煙深微辨樹潮落緩聞鐘秦塢望中近髙流何處逢那能品泉水與爾趺長松潤州曉渡用皇甫冉萬歲樓韻練湖分艇悵何依北渡回看雲樹微白下西來潮正落丹陽南去雁還飛笛殘逺步新愁集酒醒江關旅夢稀鐡甕城邉重懷古當年萬馬蹴重圍蓉江寄牧翁先生芙蓉江上雨廉纎東望心知拂水巖共識文章千古事直教仙佛一身兼夜聞寒雪推􅏃笠春惜濃花側帽簷兩到江南不相見少微空向老人占題趙澄畫為周櫟園侍郎題煙栁南朝寺風花建業城年年春盡日玉笛喚愁生鑾江舟中雪霽月出即事題鄒哲畫拂曉春寒重揚帆急霰侵月明生水際積雪滿空林岸火推􅏃近漁菴閉户深平生剡溪興兹夕是山隂葛一龍枇杷洞庭詩人葛震父畫成盧橘亦清蒼想他縹眇峰頭坐快寫西林五月黃亡名氏畫蘆荻蕭蕭山氣隂橫笛吹作蒼龍吟一聲入破鐡皆裂舉丗無人知我心惲向千巖競秀圖萬壑千巖雲霧生曹娥江外幾峰晴分明乞與樵風便身向山隂道上行馬士英畫秦淮往事已如斯斷素流傳自阿誰比似南朝諸狎客何如江令擘箋時葉欣離宫秋曉翠華寂寂罷宸逰苑樹聲凄碧水流一片敗荷千點葉靈波宮外不勝秋送葉子吉編修入都憔悴江潭客先皇侍從臣宫車一朝出三別帝城春自灑蒼梧淚行吟椘澤濱重來清切地憶奉屬車塵送家兄禮吉歸濟南二首龍山晴雪馬蹄長山翠湖雲罨畫香好到旗亭寒貰酒雙鬟低按小秦王錦秋湖邉稻花涼錦秋亭下鱸魚香垂虹秋色一千里秋到吳淞思故鄉戲倣元遺山論詩絶句三十二首巾角彈碁妙五官搔頭傳粉對邯鄲風流濁世佳公子復有才名壓建安五字清晨登隴首羌無故實使人思㝎知妙不關文字已是千秋幼婦詞青蓮才筆九州橫六代淫哇總廢聲白紵青山魂魄在一生低首謝宣城挂席名山都未逢潯陽喜見香罏峰髙情合受維摩詰浣筆為圖寫孟公杜家箋傳太紛拏虞趙諸賢盡守株苦為南華求向郭前惟山谷後錢盧漫郎生及開元日與世聱牙古性情誰嗣篋中氷雪句谷音一卷獨錚錚風懷澄淡推韋栁佳處多從五字求解識無聲絃指妙栁州那得並蘇州中興髙步屬錢郎拈得維摩一瓣香不解雌黃髙仲武長城何意貶文房草堂樂府擅驚竒杜老哀時託興微元白張王皆古意不曾辛苦學妃豨廣大居然太傳宜沙中金屑苦難披詩名流播雞林逺獨愧文章替左司獺祭曾驚博奧殫一篇錦瑟解人難千年毛鄭功臣在猶有彌天䆁道安涪翁掉臂自清新未許傳衣躡後塵卻笑兒孫媚初祖強將配饗杜陵人詩人一字苦冥搜論古應從象罔求不是臨川王介甫誰知暝色赴春愁苦學昌黎未賞音偶思螺蛤見公心平生自負廬山作才盡禪房花木深林際春申語太顛園林半樹景幽偏豫章孤詣誰能解不是曉人休浪傳鐡崖樂府氣淋漓淵頴歌行格儘竒耳食紛紛説開寶幾人眼見宋元詩藐姑神人何大復致兼南雅更王風論交獨直江西獄不獨文場角兩雄三代而還盡好名文人從古善相輕君看少谷山人死獨有平生王子衡正德何如天寶年寇侵三輔血成川鄭公變雅非關杜聽直應須辨古賢十載鈐山氷雪情青詞自媚可憐生彥回不作中書死更遣匆匆唱渭城接迹風人明月篇何郎妙悟本從天王楊盧駱當時體莫逐刀圭誤後賢翩翩安㝎四瓊枝司直司勳絶妙詞底事濟南髙月旦僅存水部數篇詩中州何李並登壇弘治文流􅔡比肩詎識蘇門髙吏部嘯臺鸞鳯獨逌然文章煙月語原卑一見空同逈自竒天馬行空脫羈靮更憐談藝是吾師濟南文獻百年稀白雪樓空宿草菲未及尚書有邉習猶傳林雨忽沾衣楓落吳江妙入神思君流水是天真何因點竄澄江練笑殺談詩謝茂秦來禽夫子本神清香茗才華未讓兄徐庾文章建安作悔教書法掩詩名海雪畸人死抱琴朱絃疏越有遺音九疑淚竹娥皇廟字字離騷屈宋心淡雲微雨小姑祠菊秀蘭衰八月時記得朝鮮使臣語果然東國解聲詩溪水碧于前渡日桃花紅是去年時江南腸斷何人會只有崔郎七字詩太倉崔華字不雕曾聽巴渝里社詞三閭哀怨此中遺詩情合在空舲峽冷雁哀猿和竹枝九歲詩名銅雀臺三年留滯椘江隈不如解唱黃麞者新自王戎墓下來夢與唐祖命逰黃山昨宵山中駕咫尺窮黃海夢裏軒轅臺迢迢復何在至日懷申鳬盟兼寄張覆輿晚雪融長至春風到廣羊有書來逺道知汝卧清漳久客諳吳語行歌憶椘狂如聞巖壑裏慢世得琴張太液兄家舊藏倪元鎮畫自題云蕭蕭風雨麥秋寒把筆臨摹強自寬賴有君相慰藉松肪筍脯勸加餐此詩甚佳而雲林集不載今年偶得松圎老人畫愛其風格不減雲林因用前韻題于左方輕螺如髻秀堪餐新栁微黃晚漲寬應有扁舟天上坐􅚝魚吹雪一江寒方山道中前山白雲外繚繞一江橫漁舍參差見風帆自在行煙花憐故國湖海寄浮生洗盞船頭坐一聲沙鳥鳴瓜步晚望西日低銜瓜步鎮亂鴉飛去石帆山支頥獨眺江南岸龍虎銷沉悵等間癸卯除夕得林翁茂之金陵書適讀虞山先生列朝詩載新安吳非熊萬曆甲辰同翁逰武夷山詩計至今甲辰六十年感成一首附書為答文獻今誰在先生古道存髙眠數人代只似閲朝昏約我秦淮水新詩共討論幔亭追往迹下界已曾孫望雞籠山雪寄杜于皇天半雞籠雪遙遙逸興偏春隂寒未散雲壑更相鮮不辨谷中樹應添巖下泉因懷杜陵叟拾橡此中眠秦郵雜詩六首夾岸人家短竹籬鴨頭新緑雨如絲幾年寒食秦郵路拂面楊花被酒時國士無雙秦少遊堂堂坡老醉黃州髙臺幾廢文章在果是江河萬古流子方修文遊臺成露斤祠前水拍村平湖水暖生蘭蓀靈風斜日畫旗捲時有神鴉歸廟門濤聲東走海陵倉蛾子紛紛割據場三百年來陵谷變居人猶是説張王張士誠元末據此三十六湖如玦環青蘋風起白銀灣紅橋四百姑蘇郡徑合移來著此間小桃初紅栁垂隂甓社湖中花水深鴉頭十五竹枝曲不聽歌聲何處尋茅山進香曲四首揚俗舟人嵗以三月進香茅山戲為作此家住茱萸灣復灣年年三月上茅山白沙江邉吹笛去赤山湖上賽神還遙指三峰次第青五雲深處擁雲軿猿啼日暮神靈雨知是茅君欲現形雷平峯前雲氣開池中隱約起風雷何人戲取華陽劍真割乖龍左耳來江淮兒女愛孤篷水宿煙餐西復東但祝茅君賜安穩年年不怕石尤風冶春絶句十二首同林茂之前輩杜于皇孫豹人張祖望程穆倩孫無言許力臣師六修稧紅橋酒間賦冶春詩今年東風太狡獪弄晴作雨遣春來江梅一夜落紅雪便有夭桃無數開野外桃花紅近人穠華簇簇照青春一株低亞隋皇墓且可當杯酒入脣紅橋飛跨水當中一字闌干九曲紅日午畫船橋下過衣香人影太匆匆三月韶光畫不成尋春步屧可憐生青蕪不見隋宫殿一種垂楊萬古情髯公三過平山下白髮門生感故知欲覔醉翁呼不起碧虛樓閣草離離東風花事到江城早有人家喚賣餳他日相思忘不得平山堂下五清明坐上同矜作逹名留犂風動酒鱗生江南無限青山好便與諸君荷鍤行海棠一樹淡胭脂開時不讓錦城姿花前痛飲情難盡歸卧屏山看折枝卭竹方袍老謫仙威儀猶復見前賢蓬萊三度揚塵後坐閲春光九十年謂林翁當年鐡炮壓城開折戟沉沙長野苔梅花嶺畔青青草間送逰人騎馬回彭澤豪華久黃土梁溪歌舞散寒煙張御史逹泉彭澤人鄒副使愚谷梁溪人林翁酒間述二家聲伎豪侈之樂今俱衰歇矣生前行樂猶如此何處看春不可憐故國風光在眼前鵲山寒食泰和年元遺山濟南詩句𨝍溝未似明湖好名士軒頭碧漲天時祖望談吾郡山水之勝名士軒在明湖曾子固守郡時所作漁洋山人精華録卷五門人監察御史崑山盛符升國子祭酒江隂曹禾同訂候官門人林佶恭謄寫男啓涑恭閲
