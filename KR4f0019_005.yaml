front:
  text: 漁洋山人精華録卷五門人候官林佶編
  hash: sha256:59e9347a23cc98fe2ad828f2ec5f3538940488862202fd6a32da3a0aea4c30a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_005-1a}
body:
  text: 今體詩清明後三日鄒平西郭賦詩雨歇西原上鶯花事事妍青山環縣郭白鳥破溪煙墟落明流外園林霽景前永懷蘭渚客行悵暮春天𧖟詞四首青青桑葉映回塘三月紅𧖟欲暖房相約明朝南陌去背人先祭馬頭娘戴勝初來水染藍女桑濃葉滿江南誰家少婦青絲籠知向香閨飼女𧖟玉蛾飛飛金繭酥𧖟時幾日閉門樞白葦與儂作璘藉黃金與儂作踟躇鳩鳴屋角桑葉低三眠四眠𧖟始齊小姑嬌小好間事簇𧖟學罷學添梯山𧖟詞四首清溪槲葉始𪷟𪷟樹底春𧖟葉葉通曾説𧖟叢蜀道險誰知齊道亦𧖟叢那問𧖟奩更火箱春山到處是𧖟房槲林正緑椒園碧間却猗猗陌上桑春繭秋絲各自諳一年三熟勝江南柘𧖟成後寒𧖟續不道吳王八繭𧖟尺五竿頭絡色絲龍梭玉鑷動妍姿紅閨小女生來慣中婦流黃㝎未知雨止碧漢歇微雨美人橫素琴窗前明月影洞口緑蘿隂丘壑結遙想茅茨清道心稍聞西澗水寂歷響空林阮亭秋霽有懷西山寄徐五孤亭新霽後藤竹夜涼生忽憶西峰寺曾經采藥行夕陽雲木秀秋雨石泉清不見煙霞侶相思空復情南唐宫詞六首細雪霏霏落院門金鋪鴛甃早黃昏宫中玉女隨君側搏得春氷帶爪䀶曾邀醉舞媚君王鬢朵珠翹別樣妝紅燭當筵新破就更將金屑譜霓裳簟錦鸞綾萬卷殊澄心堂裏皂羅厨保儀玉貌空傾國妙選深宫但掌書御溝桃葉水潺潺姊妹承恩并玉顔花底自成金葉格宫中齊唱念家山花下投籖漏滴壺秦淮宫殿浸虛無從兹明月無顔色御閣新懸照夜珠重午龍舟嵗嵗陳輕鳬飛燕各如雲瓦官閣下黃花漲別有凌波水上軍聞雁縹眇涼天數鷹鳴幾家砧杵起秋聲懷人江上楓初落卧病空堂雨易成尺素經時常北望暮雲無際且南征沅湘一帶多兵甲莫動髙樓少婦情蠡勺亭觀海二首和家兄西樵春浪護魚龍驚濤與漢通石華秋散雪海扇夜乘風徐市荒唐後秦臺滅沒中扶桑試晞髮朝日萬山紅吾廬臨少海及此更空蒼飛觀圖雲氣靈槎著日傍十洲真浩渺六博足翺翔乘蹻何年去重來覽下方秋暮與家兄禮吉叔子小飲有懷蕭瑟秋為氣凋蘦始欲愁酒人方落魄名士半離憂桂樹猶招隱雲旗未逺逰吾曹如野鶴偃蹇待浮丘秋栁四首秋來何處最消魂殘照西風白下門他日差池春燕影祗今憔悴晚煙痕愁生陌上黃驄曲夢逺江南烏夜村莫聽臨風三弄笛玉關哀怨總難論姢娟涼露欲為霜萬縷千條拂玉塘浦裏青荷中婦鏡江干黃竹女兒箱空憐板渚隋堤水不見琅琊大道王若過洛陽風景地含情重問永豐坊東風作絮糝春衣太息蕭條景物非扶荔宫中花事盡靈和殿裏昔人稀相逢南雁皆愁侣好語西烏莫夜飛往日風流問枚叔梁園回首素心違桃根桃葉鎮相憐眺盡平蕪欲化煙秋色向人猶旖旎春閨曾與致纏綿新愁帝子悲今日舊事公孫憶往年記否青門珠絡鼓松枝相映夕陽邉息齋夜宿即事懷故園夜來微雨歇河漢在西堂螢火出深碧池荷聞暗香開窗鄰竹樹髙枕憶滄浪此夕南枝鳥無因到故鄉采􅐜曲四首湘湖雉尾蓴郅支馬肝石采蓴作蓴羹底用作方伯不食上湖荇但采下湖蓴緣流棹歌去西風愁殺人采蓴臨淺流采蓮在深渚歡似蓴心滑那識蓮心苦蓴絲何纏綿柔白勝玉臂持作千里羹朝朝下鹽豉即事作二首草堂殘雪後不出系南村暮鳥常穿屋寒家少候門讀書慕終古養疾樂丘園顧巳慚通隱浮沉莫更論二十偶通籍三年歸舊林聊知返初服豈敢謝朝簪遁迹思壺口忘機憶漢隂終當與嘯父天路試相尋讀史雜感八首王謝烏衣六代同名家龍虎盛江東可憐東邸鑾輿出僕射終當愧侍中過江名義共推袁宋室孤臣念愍孫千古消魂石城曲司徒家世本陽源鑿地蓮花映雉頭卻忘鼙鼓下荆州白門一決須臾事枉向宫中拜蔣侯結髮從戎老戰爭揮鞭立就十三城涼風堂側桃枝戲絶勝平陽九道兵江陵士馬控西疆坐使吹脣沸建康湘土尋戈同氣盡卻教韋粲死青塘殿中擁槊唱無愁江左重開南豫州十萬敵軍齊北哭至今淝水不曾流汾上軍書夜刺閨天池較獵未言歸不愁粉鏡匆匆去更語官家殺一圍芳華苑裏奏名倡積翠池邉舍利裝衍得魚龍新散樂大家恩賜學曹王雪後答東癡見憶之作昨夜東皋雪慿誰問隱居不知髙卧者歲杪意何如井邑頻憂稅溪山早著書因垂椘蘭咏吟望一愁豫雪後懷家兄西樵竹林上斜照陋巷無車轍千里暮相思獨對空庭雪別萬大屏楊勝林別鶴念湖海離羣秋夜心風聲鄖口暮江色禦亭深去路分吳椘相思各滯淫關門今夕雨蕭颯動寒砧法慶寺閣上望雲門山祗園有珠閣髙出碧林端落日眺平椘青山生暮寒歸雲天際去逺樹坐中看今夕雲門月無人照戒壇即目蒼蒼逺煙起槭槭疏林響落日隱西山人耕古原上滸山道中斷靄望沉沉關河歲暮心蒼山連凍浦雪屋入寒林鳬鷹荒陂晚雞豚古社深墨王亭畔路載酒憶登臨南園池上清言不覺暑纎月生西林苔徑少塵色夜猿清道心漁樵晚多侣風壑靜同音會學涓髙術隂潭鳴玉琴阻雨望醴泉寺用徐昌榖韻志公飛錫處巖壑至今深渺渺青山路蒼蒼修竹林法雲懸瀑影幽鳥亂泉音自歎塵中駕空勞出世心題迪功集昭代嬋娟子徐卿雅好文稱詩如典午談藝似參軍濩落雲霞質飄搖鸞鶴羣祗應禹洞裏靈迹待夫君寄董樵聞卜崑嵛宅棲遲嵗幾更人煙分蜃影海嶠出秋晴島屋間垂釣山田晚罷耕多君離亂日白社獨逃名題公勇蘇門圖卷曾學如鸞旨心懷汲縣逰秋清嘯臺月竹映百泉流小隱何年卜名山一卷收聊當共嵇阮把臂向林丘紀事天夀蒼涼石獸陳荒原驚見翠華春君王淚灑思陵樹玉碗金鳬感侍臣髙郵雨泊寒雨秦郵夜泊船南湖新漲水連天風流不見秦淮海寂寞人間五百年淮安新城有感二首澤國隂多暑氣微一城煙靄晝霏霏春風逺岸江蘺長暮雨空堤燕子飛四鎮蟲沙成底事五王龍種竟無歸行人淚墮官橋栁披拂長條已十圍開府當年據上遊建牙賜爵冠通侯即看別院連雲起更引長淮作帶流荒徑人稀鼪鼬嘯野塘風急荻蘆秋永嘉南渡須臾事忍向新亭問椘囚江上寄程崑崙二首白浪金山寺主山鐡甕城故人今不見楊栁作秋聲江北望江南祗隔江津水日暮寒潮生愁心滿揚子余淡心寄金陵詠懷古迹詩卻寄二首千古秦淮水東流繞舊京江南戎馬後愁殺庾蘭成鍾阜蔣侯祠青溪江令宅傳得石城詩腸斷蕪城客再過露筋祠翠羽明璫尚儼然湖雲祠樹碧于煙行人繫纜月初墮門外野風開白蓮青山晨雨過青山漠漠寒煙織不見秣陵城坐愛秋江色江上吳頭椘尾路如何煙雨秋深暗白波晚趁寒潮渡江去滿林黃葉雁聲多即目蕭條秋雨夕蒼茫椘江晦時見一舟行𪷟𪷟水雲外皇厰河鳬雁被沙洲沿洄一徑幽萍花紛曲岸竹色壓廽流晚鼓滄江戍人家白板樓好乘瓜蔓水溪上問漁舟雨後觀音門渡江飽挂輕帆趁暮晴寒江依約落潮平吳山帶雨參差沒椘火沿流次第生名士尚傳揮扇渡踏歌終怨石頭城南朝無限傷心史惆悵秦淮玉笛聲曉雨復登燕子磯絶頂岷濤萬里望中收振䇿危磯最上頭吳椘青蒼分極浦江山平逺入新秋永嘉南渡人皆盡建業西風水自流灑酒重悲天塹險浴鳬飛鷺滿汀洲寄一靈道人即翁山聞師江海去幾日剡中還昨朝逢越客知下沃洲山題徐半山山居圖先生竟學道自製水田衣獨卧寒林靜故人相見稀晚涼松鼠落曉日竹雞飛亂葉千峯裏行歌何處歸登金山二首振衣直上江天閣懷古仍登海嶽樓三椘風濤杯底合九江雲物坐中收石簰落照翻孤影玉帶山門訪舊逰我醉吟詩最髙頂蛟龍驚起暮潮秋三山縹渺望如何有客褰裳俯逝波絶頂髙秋盤鸛鶴大江白日踏黿鼉泠泠鐘梵雲間出歷歷帆檣檻外過京口由來開府地不堪東望尚干戈丹陽二首夜火丹陽郭移舟暫解維川塗紛雨雪彌望逺凄其戌鼓蘭陵鎮荒煙葛令祠五湖行漸近杳杳欲何之曲阿後湖路百里望南徐解纜從漁父臨風誦卜居庱亭朝射虎練水暮觀魚如此堪終老窮愁悔著書潤州懷古二首椘雲直下大江流鐡甕城髙落木秋宋帝南徐猶作鎮蕭公北顧更名樓江山勝迹留三國海道烽煙動五州見説孫盧西犯日青磷白浪使人愁興亡六代已銷沉對此茫茫思不禁黃鵠山頭寒雨暝佛貍帳外暮濤深兵聞北府千年徑雲入西津一片隂興劇且傾京口酒三山披豁足開襟焦山曉送崑崙還京口山堂振法鼓江月挂寒樹遙送江南人雞鳴峭帆去海嶽菴拜蘇米二公像前輩風流地為菴易研山淨名猶故迹磨衲識清顔江月長如此髙人去不還惟應餘翰墨終古照人間瓜洲渡江二首昨上京江北固樓微茫風日見瓜洲層層逺樹浮青薺葉葉輕帆起白鷗揚子橋頭雞未鳴瓜洲城外日東生風波不憚西津渡一見金焦雙眼明吕城雪霽二首雞鳴吕城鎮日出市橋東雪屋回汀口煙檣野竹中鳥飛皆貼水舟泛若乘空古迹成荒壘行行慨阿蒙午夜雲陽道扁舟狎老漁神亭雪幾許直瀆路何如煙水懷前侶江湖未㝎居斷橋叢樹裏何處卜吾廬舟暮向晚金牛道林寒響宿禽雪晴煙樹小日夕竹園深川路通蕭港扁舟動越吟蘭陵今夜酒無那故鄉心滸墅舟中眺陽山殘雪日出陽山外參差見幾峰依稀露煙靄窈窕明雲松忽憶梅花發清溪深萬重扁舟欲乘興杳杳暮天鐘虎丘闔廬霸業夕陽沉鐘梵空山自古今劍去虎丘青嶂在水枯鶴澗碧苔侵吳宫歌散聲猶苦越絶書成怨不任惟有生公臺畔石年年白月照禪心闔廬墓劍池春日水清虛石壁臨風弔􅛶廬於越行成誰狡獪夫椒往事重欷歔飄零王氣傳金虎寂寞空山葬玉魚太息恩讐竟何在荒臺青草認姑胥姑蘇懷古三首爭長黃池未濟師餘皇舟已徙熊夷山川終古迷商魯花草千年怨種蠡故國魂銷吳苑水行人腸斷越溪絲竹枝聲裏春將盡破椘門東暮雨時斜日停橈喚奈何橫塘聲散采蓮歌青山古道通閶􅛶緑黛春風憶苧蘿廢苑愔愔花欲暮長洲渺渺水空波千金枉鑄鴟夷像鳥自髙飛避網羅山徑何時葬玉鳬興亡轉瞬日西徂越人已自籌三䇿秋祭當年竟五湖雨過麋城空碧草春深鶴市半青蕪傷心更有南陽宰不獨寒潮泣子胥文種歎曰南陽之宰而為越王之禽夜雨題寒山寺寄西樵禮吉二首日暮東塘正落潮孤篷泊處雨瀟瀟疏鐘夜火寒山寺記過吳楓第幾橋楓葉蕭條水驛空離居千里悵難同十年舊約江南夢獨聽寒山半夜鐘虎山擅勝閣眺光福以雨阻不得往虎山橋畔盡層松掩映寒流古寺紅卻上重樓看鄧尉太湖西去雨𪷟𪷟雨夜宿聖恩寺還元閣梅樹初花石澗流滿山香雪送行舟三更蕭瑟湖邉雨百尺髙寒水上樓師子窟中嵐翠合法華山外暝煙收霜天欲曉鯨音起萬壑聲從何處求山中寄叔子時阻雨滸墅平生兄弟逺逰心世外玄棲約共尋澗道名花任開落湖天春水半晴隂何山往事思求點五嶽前期負向禽遙憶孤篷宿煙雨青芝南望白雲深鄧尉竹枝詞六首二月梅花爛熳開逰人多自虎山來新安塢畔重重樹畫舫青油日幾回鄧尉山頭片雨晴司徒廟下晚潮生卻登七十二峰閣玉柱銀房相向明西施洞望米堆山夕翠朝煙擁髻鬟不道鴟夷曾載去至今人在五湖間西來銅井又銅坑山勢髙低有二名試上龜峯光福塔白波翠巘兩邉生楓橋估客入山來艓子多從木瀆開瑪瑙氷盤堆萬顆西林五月熟楊梅緑黛遙浮玉鏡間峰巒千疊水彎環居人卻厭真山好袁墓南頭看假山題春申澗桃夏遺宫廢章華蔓草深但餘流水意如聽女環琴春申澗上望澗亭邉野望新明流秀嶂碧粼粼青山終古連秦塢珠履何年問椘人氷雪倒懸三峽水風煙遙接五湖濱李園已事成荒草太息空祠一愴神惠山下鄒流綺過訪雨後明