front:
  text: 漁洋山人精華録卷四門人候官林佶編
  hash: sha256:302643fb3a26e8ba4a4da770200ece7e7606e946d8a38769ca1ea8e41ca34d29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_004-1a}
body:
  text: 古體詩其年簡討見和緑雪之作復遺岕茶一器索賦敬亭如靜女姽嫿有餘態洞山如道流吐納成沆瀣陽羡連故鄣尻脽相負戴地靈草木異雲霧凝靉靆尤重羅嶰名超軼絶流輩山氣夕陽佳岕中茶夕陽勝朝陽風露非灌溉昨賦緑雪詩莾鹵乏清裁名流逓𢋫唱粲若珠百琲髥也實致師㧞㦸成一隊白甀題紅籖細君自蒸焙朝來肯送似秀色染睂黛下簾候魚目芳瓷露蟾背雖復遭水厄頗亦澆壘塊茶聲正瑽琤竹影交瑣碎詩成遣長鬚聊作三舍退君當賈餘勇吾衰鼓已再送邵子湘之登州我聞大九州香海環其外禆海内絡之萬川勢交滙禹貢周職方中央浮芥蔕鄒衍不可作疇與辨茫昧昔者始皇帝東廵極海岱海神駕橋梁大魚射澎湃號為秦東門刻石表朐界三山在水下其事頗竒恠邵生列仙儒逺逰信所屇遥飛阜郷舄徃撫天吳背龍蹻陵丹崕九點烟凝黛嶄絶日主祠夐與之罘對曰月影動揺島嶼光破碎朝潮激天輪夕汐裂地肺臣鯨若連山奮鬛雲晝晦時見新羅船墨點空青内廣乘渺何所㱕墟誰負戴木張悉文雄髥才更十倍歸來述滄溟始信九州大讀馮圃芝餘事集因題天章還山詩卷木脫石氣青吟君古調詩落日髙鳥去碧空澹涼颸一吟扣一絃一吟傾一巵嘈嘈立部伎孑孑寡女絲巧笑倚市門漆室聲苦悲猿鳴上峽夜雁警團沙時遥憶中條山雲物秋正竒吳生家山南拾橡恒苦饑朝吟看雲出暮吟逐雲㱕河聲與嶽色中有太古詞誰為昭與聾獨有馮生知天章在燕市得古銅章文曰河聲嶽色所居正河嶽之間也和田綸霞郎中移居田郎詩格如雪車昨來新句傳移家夢向漪亭坐秋水蒼筤萬个眼麚冬官事少蹋壁卧日未卓午先放衙殘書滿前自穿穴紛如䧹字風中斜未要沈范相賞識風亭月觀吟梅花廬如瓜牛足揺膝畢逋愛伴城頭鴉鷙鳥累百詎比數蝶𨄌聊試終參撾牽蘿補屋絶代子慎莫無匹悲㚿媧風氏園老松城南風氏園徑僻無車馬野色暮蒼然徘徊古松下松花自開落松籟何蕭灑落日望烟㱕時逢負苓者徐健菴宫賛送金陵伊氏扇舊京扇貴李昭骨二百年來名滅沒近來後出仰與伊細砑剡藤如笏滑骨取湘江斑竹枝黄楊烏角光參差妙手須煩畫蟬雀名流底許矜蒲葵蘋末微風散髙栁八尺琉璃當户牖持贈難忘東冶亭題詩逺媿東陽守盆魚井泉初汲寒射鮒䓑衢界水花紛敷草堂咫尺見濠濮碧羅扇底紅鱗魚丹砂瑇瑁非一狀亦有玉雪瑩氷壺中庭兩樹正交䕃日夕蟬鳥相鳴呼朱門㝎無此輩客但聞擊鼓吹笙竽匡牀視景移枕簟風來蘋末看跳珠夜凉月白河漢轉𧺫聽喣沫疑江湖托身幸得逺鯨鱷一一尾鬛乘清虚出入荇藻絶籪滬笑渠殘鱠矜王餘誰爲恵施解吾樂牀頭尚有蒙莊書東丹王射􅎷圗人馬勢逸不可當開圖素練生風霜竒㢤落筆如挽強誰其作者東丹王東樓西樓二千里乗秋出獵凌窮荒番部紅靴鐡裲襠左射右射必疊雙鑿蹄驕馬如風檣三花翦鬛紛怒張俊鶻初變為正鶬蒼鷹塌翅随馬韁雄狐狡兔皆遁藏射麋麗龜走且僵東丹昔日稱人皇扶餘開國鄰扶桑秋冬射獵海東磧頭鵞燕罷傳漿跨海南歸大梁苑時時萝憶穹廬郷徃徃丹青自逰戲寸縑尺素如琳琅宣和壓架六千軸東丹九幅千金裝艮岳灰飛玉匣散此圖豈不闗興亡蠟炬如椽照空廊雄談劇飲累百觴東丹丹青逺擅埸蹊田奪牛語堂堂令人千載悲同光李渭清簡討以龍鬚二莖見贈来書云有風鬟霧鬢之態非火鬛朱鱗比也戲報長句阿誰抜此蒼龍鬚白如珂雪光驪珠風鬟霧鬢憶髣髴汜人愁態瀟湘姝鮫室織絲氷萬縷博山龍涎午方䰞龍皮之扇驅殘暑𬗋拂龍髯勝揮麈萝入瀟湘洞庭渚貝闕金堂見龍女樂奏還宫迎貴主錢唐破陣交風雨覺來一笑望秋空依舊癡龍卧相語劉子端舎人恵琴魚琴溪水泱泱鯉魚三尺長琴髙騎鯉撇波去至今溪水桃花香桃花香時臨上已琴魚忽徧琴溪水半寸難求鱗與鬐况從丙乙分腸尾由來風俗當園蔬水郷風味無時無居然逺致同茶筍不用門生議蟹䱉故人家傍琴溪渡渡口桃花㡬千樹花時魚美酒正熟好共琴溪結茆住送彭古晉二首玉露塗蘭階明河耿遥夕昨別宛陵人耦長復送華亭客渺渺九峰青茫茫五湖白秋風佳景時菰蓴正堪摘故園隱君子夙抗嘉遯跡吳六益沈友聖既丘園董生蒼水亦山澤問訊今何如予懐在三益聞君逰蓬池訪阮公嘯臺臺上多悲風㙜下生蒿萊渌水揚洪波東逝不復廽南有三亭岡寒蕪望崔嵬一言奪相印應侯亦竒才當其置厠時何異諸輿儓君行大梁道覽古紛徘徊埋照實至慎睚眦終禍胎且呼竹林人啜醨盡餘盃瞿山畫松歌寄梅淵公誰能畫龍兼畫松鱗而爪鬛行虚空誰能畫松如畫石石骨犖确松䝉茸韋鑾董羽兩竒絶眼中突兀瞿山翁瞿山翁所居乃在柏梘深山中此山上與黄山通軒轅鼎成上天去遺薪徃徃成虬龍翁時散髻坐顚頂興酣潑墨浮空𪷟孤根裂石不三尺倒飲萬丈疑雄虹瞰臨崢嶸下無地盤拏雲霧廻長風世人少見多所恠絶技豈必昭羣聾兩峰對𧺫何巃嵸瀑流直下當其衝輥雷噴雪不知數下與松勢相撞舂撫松看瀑者誰子得非偓佺之屬青羊公何時與翁結廬天都雲海東松肪煮罷方兩瞳更千萬世無終窮獒圖為牧仲郎中賦何人畫此四尺獒目光䁑睒生寒毛重鋂繫頸氣何驁望之非獫非歇驕美鬈碧眼手自撡番部君長身帶刀豪豬作鞾獸錦袍西旅底貢來周郊畫師得非顧與曹趙盾徃事悲彛皐君􅋙臣􅋙適相遭躇階而走赱且號逆踆絶頷搏以鏖彌明鬬死靈輙逃一􅋙世變心忉忉丹青妙手良可褒題詩齷齪非人豪為君一石傾春醪張茂先宅當年張壯武此地留空宅平生無髣髴何䖏尋遺跡流恨金墉城傷心洛陽陌風流陸浚儀曾容笑鬚帛賈浪仙墓遥望大房山蒼蒼但烟霧下有千年墳微茫辨封樹照夜少魚燈凌寒赱狐兎落日青楓林是君獨吟䖏王若水古水鳴禽圖為宋子昭郎中作古木幽篁亂疎蘀下有棘枝聚寒雀枝頭顆顆紅珊瑚石畔菲菲芳杜若一雀振羽如欲飛一雀掉尾矜毛衣復有兩雀目相瞲號作竊丹知是非鷓鴣臨流宛相竝戢翼囘頭復交頸黄陵廟裏花落時啼罷鈎輈照雙影髙堂置酒相徘徊眼中不數濠梁崔天清雪霽北風作多少蒼鷹欲下來傅青主徴君寫荷竹見寄奉荅兼懐戴楓仲眼中突見篔簹谷露壓烟啼萬竿竹下有亭亭菡萏花大似凌波倦膏沐烟墨淋漓元氣足老筆縦横破邉幅卧逰真對兩詩翁晉祠水流如碧玉初拜國子祭酒釋菜太學作雍雍禮樂地肅肅堂廡深皚皚素雪零鬱鬱青松隂堂上鐘簴懸壁中絲竹音末學愧承師撫躬實難任文學盛鄒魯流風感至今早入矍相圃夙侍緇帷林未能習禮器遂以玷華簪聖朝敷文徳憬彼胥獻琛岧嶤白虎觀諸儒粲璆琳議郎悉承制更老多横襟低徊宫牆下如聴師襄琴何處故郷思二首北齊房君豹有山池在齊州自製詩云風淪歷城水月倚華山樹時人以比康樂予在京師有故郷之思因取其語為詩云爾何處故郷思風淪歷城水處處清瑶流時時白鷗𧺫日暮浣紗人臨流獨徙倚何處故郷思月倚華山樹清輝河漢外散入平湖去不見謫仙人空山下風露繪川書院詩二首為湯荆峴侍講賦大道滙鄒魯洙泗何洋洋邈矣二千載伊洛為巨防江漢有遺民卓為姚許倡至今百泉上源流深且長曖曖夏峰村鬱鬱通徳郷湯公𧺫梁宋攝衣早升堂側聞睢渙間五色多文章黼黻與華蟲宗廟繪衣裳汝南多先賢鄒魯實頡頏中原昔戎馬講肆爲鞠埸𧺫衰賴通人屹兹數仞牆樂軄僃中和諸生歌􅎷鳴六籍列經緯諸史成宫商不才忝成均臯比坐傍徨倚席久不講士氣何由昌愧彼巫醫師糜粟空一囊先生昔挂冠棲遲樂巖谷睠彼二三子望古企髙躅逶迤清川上搆此數椽屋三年侍承明夢想在林麓大道不終晦天中盛耆宿轘轅有耿介上蔡有張沐著書各滿家衆流滙川瀆耿公實廉吏齋㕑甘𣏌菊張公赴徴車萬里向巴蜀㝠冥子䂓啼𧖟叢凍雲木何日成徳鄰絃誦譬家塾予亦步屧來歲晚共饘粥題徐電發檢討畫蟹仄行與外骨幷入考工記何如紈扇上善冩招潮勢草泥擁郭索兩鉗亦何利便欲左手持未勞門下議湘水行送良輔宰零陵陽朔二水湘與灕源同派別分條支湘水東來入南楚曲抱衡山經九疑九疑之山蒼梧野斑斑淚竹英皇祠零陵郡古枕湘水瀟江曲折來赴之自古騷人憔悴地九歌哀怨留其詞亦有元和舊司馬八愚感激傳歌詩其文徃徃擬山海坐使荒徼增傀竒子今年少去爲吏况有詩筆人所知黄溪山水勝鄠杜何必慨歎窮荒爲此去浯溪止百里磨崕洗剔中興碑元公作頌魯公筆長與日月相昭垂經術縁飾固良可勿随流俗矜繭絲衣租食稅盡赤子誰云南人鬼且禨捕蛇有說更三復軍輸尚急西南陲贈許生精篆籀我來太學巳八月長日坐卧石鼓㫄松風灑然送蟬語一庭碧草生新凉嗟㢤趩􅞚不可辨如箝在口誰能詳安得邀君坐東序共窮史籀𢋫宣王送湯荆峴侍講使浙江我愛西子湖夙昔夢見之湖光與山緑樂事輸吴兒譬客談江瑶未免思朶頥聞君徃東南𧺫舞掀兩睂緑蒲十幅帆西風美滿吹初下南徐州三山已麗﨑行行過震澤萬頃青玻瓈夜航到臨安髙枕殊未知新笋晚花過橘緑橙黄時湖水雄鴨頭緑淨相差差掩映湖上山影娥照清池錢塘八月潮詭異天下竒疾雷震百里蛟龍競躨跜潮頭坐靈胥重水汩後随三千彀強弩射潮勝雄師至今擊西陵鐡幢髙以危釃酒臨樟亭江海爲東馳壮觀今古無寄之於聲詩歌送潞河船郵籖催畫旗吳江顧樵水寫予平山舊詩摘星樓閣浮雲裏一傍危欄望椘江之句爲圖相寄雨中偶成一詩奉荅兼寄茂倫㝎九哦詩三十年徃徃在人口旗亭與樂府流傳亦時有江淮好事多圖畫煩好手詎敢擬右丞家風映先後廿載赱京塵頗已忘敝帚君復爲此圖母乃太駢拇平山髙矗矗椘江清瀏瀏雁齒紅欄橋鵝黄水楊栁風景故依然問是淮南否俛仰慨今昔少壯成皓首他時鱸郷亭相過索盃酒息壤猶在彼寄語雪灘叟遂安毛貞女詩同年祥符令㑹矦女新安水清泚水清石見底黄河水瀰瀰一石五斗泥水清復水濁女心空自知三日爲君婦未識君容儀一月侍君疾不聞君履綦秋風響庭樹夜夜哀羈雌髙樓切浮雲直下忽若遺昭昭白日光奄與黄泉期手斲女貞木絃以寡女絲彈作處女吟千載有餘悲十一月十八日紀事招揺方指子七日後長至五星如連珠貞符協天瑞詄蕩天門開日射觚稜次公卿儼行列百寮咸僃位雲中露布下琅琅動天地十月曰在未軍府秉諮議雷動傳滇城十萬連步騎貝子坐武帳諸道師總萃將軍拜祓社偏禆怒裂眥搜穴翦狐鼠然犀照魑魅天上舞鈎梯地中鳴鼓吹不遑濡馬褐况敢執象燧膽落鐘詎聞約長髮競繫半年築長圍屏息門晝閉樵採路久絶啖食到殘骴鼫技悔已窮蟻援復何冀孺子一匕殊偽相五刑僃自然天助順豈曰吾得歲昆明水清泠金馬山屭贔妖氛一朝洗磨崖勒文字釐圭命召虎乘軒寵邴意六詔歌且舞給復置官吏皇㢤聖人徳涵育及動植手提三尺劍削平諸僭偽何以硎曰仁何以淬曰義所以八年中次第芟醜類師行不驛騷民居不憔悴自兹萬斯年櫜弓兵不試敢告載筆臣著之大事記戴氏鼎為楓仲作昔在京師賦方鼎年少筆力囘千鈞焦山鼎圖歲在已江海𧺫立魚龍奔邇來衰謝二十載雖有意氣無由振戴氏此鼎何處得勢如恠獸獰以蹲平頭負戴到蓬户四座動色誰敢捫雲雷盤旋間饕餮斑斑古色疑周秦凹中尾鬛狀天馬縁尻鼫鼠拱且馴或云子午紀年月或如癸甲兼􅏤申或云乾上艮在下天山為遯理則均著馬履鼠古所訓義云隂屈而陽伸制器尚象有深戒寡聞尠見徒紛紜大巧坐令倕齕指流俗豈辨飼與饙丹楓閣中盡竒古此鼎屹立何雄尊市丘鼎齲任嘲笑烹雞何似羞明神不煩更問栁下季歷千萬世存吾真順治已亥在京師為少傅劉公賦方鼎康熈乙巳與西樵先生在焦山賦古鼎程邃穆倩為圗多父敦亦戴氏物昨日賦罷天馬鼎今日復示古敦牟山川連日發光怪黄白下覆雲油油此敦形製竒且古兩耳三足窮雕鎪上作饕餮下虽尤細辨非簋非彛舟古人一物殫工巧用盛黍稷神所羞珠槃玉敦載盟府云以㰱血親諸侯流傳千載歷塵刼卻伴髙士山之幽昭餘自昔稱晉藪侯甲水作青瑶流丹楓孤閣踞其上朝霞暮靄臨窓浮先生静坐觀衆妙圖書萬卷皆親讐此鼎此敦置左右蒼然古色来商周庭列九賓發緹幕令我一見生歎啾長安市兒寳康瓠金敦玉敦知何求什襲㱕去閉髙閣㑹有光氣騰龍蚪敦音對摩崖碑有客新自湘江㱕登堂示我浯溪碑芒寒色正三百字忠義之氣何淋漓白日行天破幽曀走避罔兩潛神䕫憶昔天寳初喪亂漁陽突騎如飇馳二十四郡少義士平原太守獨誓師平生不識顔真卿乃能一木支傾危清河年少氣慷慨十歲作質平盧兒中興大業𧺫靈武功成不死神扶持道州刺史昔漫叟振筆大放瓊琚詞請公磨崖書絶壁鐫鑱千仞青雲梯蠻烟瘴雨不剝蝕萬古照曜天南陲昨者劇賊亂滇海盗據衡永為根基太平祭告徧羣望山川一洗無磷緇宜有雄詞繼前代磨崖重刻浯溪湄元祐黨籍碑天津橋上啼杜鵑耕父已見清泠淵宫中堯舜不可作厚陵社飯悲年年二惇二蔡秉國軸同文舘獄紛鈎連衣冠相望赱嶺表一網盡矣嗟羣賢司空手籍元祐黨京自署司空尚書右㒒射兼門下侍郎大書深刻相磨鐫彗星下掃文徳殿毁碑夜半何喧闐攸攸狒狒一兒戲可惜宋社成南遷潭州死骨尚有臭黨人名字光中天西南荒徼八桂郡此碑千載人爭傳上云垂戒萬萬世其詞何異誅共驩從來青蠅亂白黒三代遺直今如弦小人勿用易所戒崇寧僨轍無忘旃秋杪獨逰善果寺感懐亡友葉文敏公秋懐憺無豫古寺聊經行喬木何蒼然㱕鳥時一鳴雨久林葉積人稀秋草生帛公吾夙好敷坐依南榮壁間龍鸞書嵗久猶崢嶸壁上有世祖皇帝御書唐詩洞房昨夜春風𧺫一首自署臆菴道人昔逰偕故人共對寒泉清俛仰遂成昔存没倐自驚西景薄悲谷素魄無常盈世界真一漚何物為冠纓徘徊日云夕駕言返東城古蹟三首為岳給事賦同年岳鎮九給事初知封丘縣頗以古循吏之治治其民以唐髙常侍嘗為縣尉祀典闕焉乃剏為専祠又春秋黄池戰國青陵臺在縣境皆碑其䖏數百年廢墜之典釐然修舉予嘉其事因為賦之髙常侍祠忠公拓落人好談王霸略一辭孟諸野微官此棲託把臂李杜逰慷慨吹臺作懐古薦溪毛風期緬猶昨黄池餘皇既已徙姑蘓亦已焚黄池尚爭長荼火矜三軍肥胡幡名不可見四野空寒雲大河隔濤江至今悲伍員青陵臺東郭一曠望尚見青陵臺臺邉兩梓樹古冡何崔巍下有鴛鴦宿上有烏鵲哀遐㢤一女子大義終不虧雨過陳黙公滌岑躡屐歷危岑單椒上空曲江雨從東来風吟萬竿竹城郭浩茫茫衣裳盡寒緑何䖏是龍眠千峰出雲族十八灘三首繫舟萬安城已聞灘聲惡連峰造天闗疾雷殷地絡篙師理戙楫直與驚湍薄萬山立積鐡其下臨大壑沉沉蛟龍宫神物信所託排空紛恠石森然奮搏攫潛虬動鱗甲巨刃揚鐔鍔地根在何䖏坐覺坤軸弱悵然念神禹封泥此疏鑿長年聚羣力撇漩出寥廓三復垂堂言逺逰亦何樂亂飇吹急雨一折改奔峭連山亘東南瘴霧迷嶺嶠㮄人侵曉發髙卧失臨眺輥雷𧺫何處萬夫迭呼嘯倐忽數灘過到眼一票姚武朔既崖柴崑崙絶排奡始蹈吕梁險終成昆吾譟四山方出雲吐納亦殊妙山木蓊然合㝠㝠子規呌半日過五灘灘灘各殊狀怒流一噴薄石角迷背向激瀑散霜雪倒洒石壁上漩渦走風霆喧豗裂層嶂洶如奔萬馬崩騰不相讓又如閶􅛶開􅑷􅑷羽林仗傷神既慘澹快意倐悲壯出坎在須臾布帆幸無恙探竒遘靈閟豪吟洗惆悵韶石昔聞韶石竒今覩韶石狀竒峰削凡體斗絶各雄長恠石赱中流牙角怒相向峽迫春湍豪撞舂力頗抗雙闕屹東西毬門始誰剏其㫄有阿閣靈鳳昔来貺傳聞帝南廵九成奏崖嶂后䕫不可作疇與辨真妄飄揺翠龍駕髣髴鈎陳仗西望蒼梧雲臨風獨惆悵彈子磯神禹刋九山百粤所不詳蠻夷暨流蔡遺跡盖荒唐此磯始何代峻極蟠穹蒼下臨萬丈潭蛟螭多伏藏黒鷹巢其巔下瞰時飛颺石壁不可梯錯襍五文章鐫鑱復穿漏鬼工肆皴􅜙想當開鑿時巨刃摩天揚安得挾仙靈白日淩飛梁觀音巖粤山無寸膚斯巖益厜㕒其下蟠水府其上排雲霓洞穴豁天半十丈臨江涯騎危躡虚空險絶縁鈎梯白日忽晝晦疑逢魍與魑金獸佩腰間火鈴前後随蝙蝠如白鵶鍾乳皆倒垂羃䍥掩洞門狡獪神所為暗瀑響隂壑尋丈安可知灑落㴱潭中如弩齊發機佛座雲霧生𪷟𪷟沾人衣逺江上明月欄杆拂參旗歸舟意惝怳絶景誰能追峽山飛來寺方舟宿湞陽髙峽厭䝉宻乘風指飛來喜近調御室蒼蒼菩提樹逶迤寺門出金碧閱蕭梁幻語恐非實禺陽二帝子何年此栖息言采阮俞竹遥應黄鐘律如何遂不還空有湖城憶東上縁﨑危詰曲昧蹊術夾磴荔奴隂青蔥上初日石壁留孤雲飛亭俯江色沉沉晴川緑活活流泉疾敷坐憺忘㱕逍遥問摩詰半山亭雲碓水自舂松門風為關坡公題峽山寺句夙愛老坡語㡬載思禺山何意萬里逰兩腳墮孱顔苔碣不可見㝎水猶潺湲宴坐半山亭下見凝碧灣榕根如獰龍怒攫青厓間日午竹雞啼濃緑排烟鬟我行窮祝融何時復来還南海神祠茫茫百粤間衆水㱕扶胥下滙波羅江日夜相灌輸嵯峨兩虎門衛此陽侯居神官壓滄溟潮汐在階除我駕萬斛舟乘風但斯須飛廉送旌麾龍伯為前驅百靈何蜿蜒穹龜與長魚將命肅牲醴来格神所愉振衣浴日亭遥見三足烏咫尺躡樊桐覽彼天帝都與陳元孝屈翁山諸公集光孝寺寺舊名虞苑虞功曺故宅一鳥鳴灌木招提春雨餘偶来方外逰踪跡似閑居清池浮水蕹珀藻躍文魚輕颸散訶林葵樹交扶疎灼灼佛桑花紅􅝰驚珊瑚緬追昔賢跡俯仰懐赤烏孝廉自英雄江左盛文儒魯周閫外寄張顧府中趨如何虞仲翔獨此悲向隅青蠅為弔客千載同欷歔菩提壇一花五葉後此樹留孤根枝條徧震旦老榦無冬春我来漲海逰入此甘露門秦松與漢栢瑣細皆兒孫清池憺疎雨妙義聞風旛菩提本無樹更與智者論偽漢劉龑冡歌紇干山雀凍欲死朱五經兒作天子紛紛負販皆侯王山牛􅊵絲粤中𧺫中原􅐓洞久風塵遂使傭奴竊邉鄙黄屋左纛歷四世坐斥洛州為刺史昭陽溝水流真珠論車卻笑燒沉水金銀當日錮三泉帶劍上陵嗟已矣苦將肖像擬休屠金𧖟玉魚誰料理茂陵甲帳出人間况爾區區安足齒驪山地市竟如何銀海茫茫同一軌羚羊峽逆流入西江巳闖髙峽中何年神羊跡靈奥開鴻𪷟灕江挾牂牁日夜來向東怒流㑹端州奔湊朝祝融萬仞束洪濤大㢤造化功巃嵸雲雷窟黯澹蛟鼉宫更聞溪中石價與瑶琨同當年貢天家千指勞人工鼈行九地底下與水府通微軀一不戒崩墜誰能窮尤物古所歎念此心忡忡羚山寺古寺四月中尚有木棉花殷紅照羚羊苔壁何紛葩下有束江亭俯臨硯洲沙牂牁萬里來逺勢如修蛇髙峽扼其衝天險逾褒斜寺當兩峽口石徑交㟏岈紅泉尚分飛竹筧通拗窪西望端州城七星莽周遮明當􅕾其巔舉手搴匏瓜沈佺期羚山寺賦云中有紅泉分飛碧嶺七星巖北斗森魁杓何年化為石散落南斗㫄光芒色相射遥填端州城七峰張幕帟崧臺屹中央晻靄仙靈宅天帝觴百神扵兹互主客巖竇鳴鼓鐘石乳亂矛㦸徃徃鳥獸形竒譎蕩精魄其㫄兩洞天谽谺㡬年闢水聲暗澎湃時有蜿蜒跡云此龍所宫終古雲霧積沉沉抱珠睡五嶺慳雨澤吾欲割其耳雨工𧺫鞭䇿坐使瀝湖盈乘流掛帆席時旱甚瀝湖竭上屏風巖磴道未及霄關而返暮登扶嘯臺欲問含珠徑山月出未髙羣峰忽巳暝清露滴生衣孤松偃危磴何處仰霄關雲中一聲磬端州別魏昭士因寄和公扵廣州人生如萍蓬飄轉少根蔕况復出處殊合并安可計我夢翠微峰岧嶢在天際幽人侣猿鶴石門掩松桂詎意萬里逰相見炎海裔世事苦匆匆傾葢忽分袂我攀庾嶺松君飽珠江荔阿戎共扁舟崧臺蹔流憇良㑹那能常宿昔紛鼓枻湞水方南下灕江復東逝中宿潮不來何由慰迢逓重逰飛來寺我昨逰飛來乃自東峰始得隴復望蜀夢落西峰裏㱕棹粤江潯烟雨孤篷底菩提解迎客一笑呼屐齒繚繞曲棧危宛與蜀道似數折得石壁萬笏摩空𧺫如厂如步櫩神工信竒詭西巖隱飛瀑迸罅流石髄鳥啼翛翛竹花覆𪷟𪷟水平生禽尚志歎息吾衰矣笑問白足僧胡為羨衣𬗋黄石磯夜雨舂枕萝忽破決溜鳴篷窻驚雷碾隂峽急雨鏦奔瀧新凉卧桃笙逺夢生楓江𧺫坐祝媪龍添波送歸艭大廟峽夜泊黄石磯急雨如萬弩朝過大廟峽恠石蹲渇虎靈祠出叢薄飛甍粲可數美人珥明璫侍者拾翠羽春蘭與秋菊無絶此終古落帆薦溪毛蘋花媚中渚神光乍隂陽朝雲無處所欲去更徘徊桄榔颯飛雨湞陽峽峭帆入臯石絶壁太古色山川方出雲白日轉昏黒浩浩一水逝蒼蒼兩崖逼雄雷地中奮坤軸倐傾仄十步一盤渦下視窈難測云中穴蛟蜃呀呷擇人食牯牛灘名尤險絶艱虞萬夫力石棧縁秋毫百丈牽江直慘慘鷓鴣啼猿猱不遑息尚憶符韶州名錫架閣擬巴僰事徃逾百年遺踪半湮泐陵谷一俯仰感歎情何極與孫豹人周星公徃白􅎷洞次廽流山廬山何髙髙白雲在山腹倐忽縈山椒亦或帶山足上下無㝎姿頃刻屢移矚山徑不逢人樵歌出深谷何處逓松聲風泉滿林麓初入五老峰謁白􅎷洞呈湯佐平先生忽忽逺城市浩浩臨滄洲良辰愜竒賞始遂廬山逰威紆屢轉壑窈窕時經丘潺潺風瀑瀉蒼蒼石川流騎牛緬徃跡眠􅎷欽前修風景宛猶昔年運倐已遒唯有五老峰屹立忘春秋𬗋芝驚漢帝黄石招留矦泉石不我遐桂樹生山幽自白􅎷洞至三峽澗溪行少阡術沿洄屢迷津馬蹄怯危石欲下還逡廵出谷見稻畦烟火自成鄰日午聞雞啼衺徑見遺薪薜荔衣恠樹山風恐行人舉首五老峰白雲如魚鱗遥青逓隱現光景相鮮新望望玉峽亭聊可垂吾綸三峽橋五里聞瀑聲轟若車千兩谿廽見飛梁穹若虹百丈衆流㑹三峽峽門扼其吭建瓴沸驚湍排空削層嶂石激水斯怒水横去聲石逾壯水石終古爭恠竒紛萬狀日射金井潭濺沫出橋上日光散青紅雨絲亂飄颺絶景遇兩蘇何人繼髙唱玉淵潭已歷三峽橋更訪玉淵水水流大壑中路轉層松裏片石横百仞其右平如砥九十九飛瀑一門爭萬軌岝㟧直要衝跳盪不得止雪浪如車輪凸凹忽奔駛激射為深潭神物潛尺咫夜黒風雨來鱣鮪皆避徙久立凛毛髮薄雲漏餘晷西眺石人峰梵唄空中起栖賢寺李渤讀書處乃在栖賢谷何年作招提來尋愜幽獨僧舎如蜂房髙下傅山麓雲來漢陽峰時就簷下宿古寺無所有修竹間喬木野衲喜客來欣然設茗粥便欲置草堂巖栖扵此卜萬杉寺朝過玉京山緬想陶公里谿廻得寺門曲折杉松裏雨中念佛鳥交語清人耳風吹修竹林下有寒泉水開先瀑布神龍擘空㝠颯沓雙峽開青天露鱗甲白晝行風雷峽偪不得逞掉尾揚其頦千仞忽開豁下有布水臺嘗聞龍奮迅三昧何雄㢤誰能一鉢盛終古相喧豗夜來雷雨怒大石為崩摧龍逰引九子烟霧紛徘徊偉矣南宫書壁上有米元章大字破壁鑱崔巍有語不敢吐以俟冠古才寄題三疊泉坡公賦廬山選勝僅取二開先與三峽雙瀑誰軒輊此逰兩經行竒觀偶然遂遺恨三疊泉扶笻未一至譬如禽慶逰五嶽得其四他年謝羈鞅更擬探靈閟一削陸羽經別續廬山記小孤山守風已過落星石前臨大雷岸水宿淹期程日暮中流半紞紞戍鼓鳴蕭蕭水禽散愁對小姑祠靈風送波瀾彭澤雨泊有懐陶公陶公令彭澤柴桑一舎耳猶對匡廬山共飲西江水一朝悟昨非扁舟㱕栗里笑指故山雲吾心亦如此我來彭澤縣秫田没沙觜急雨送寒潮三歎顔延誄三山磯澄江日夕淨㱕鳥投前浦明霞散淪漪䡖飇憺容與南臨春糓溪北眺濡須塢何處是三山沙頭駐鳴櫓采石太白樓觀蕭尺木畫壁歌落帆向牛渚直上太白樓錦袍烏帽太瀟灑廻看四壁風颼颼蕭生何年畫此雪色壁峰巒出沒烟嵐稠元氣淋漓真宰妒江湖􅐓洞蛟龍愁吴觀越觀上海日蒼烟九點横齊州祝融諸峯配朱鳥瀟湘洞庭放逺逰峩睂雪照巫峽水匡廬瀑下彭湖流須㬰使我行萬里瞥如怒隼凌清秋我生海隅近岱畎西逰曾上瞿唐舟昨登五老弄瀑布卻臨三峽窺龍湫七十二峰身未到蒼梧已略天南頭太白逰踪徧四海晚愛青山采石聊淹留丈夫當為黄鵠舉下視燕雀徒啁啾奉符古城我行奉符城不見崑崙迹何䖏仙人閭青山繞長陌唯聞党竹溪髣髴南邨宅徂徠山雲隂移徂徠影覆汶河水下有賢人居清風被田里一抔詎能容千秋今廟祀楊家硿詰曲皆紅泉縦横半白石石暎月明時泉喧風雨夕愛此故郷山臨流布瑶席甕口峽岱宗趨肅然吾郷長白即史記所謂禪泰山下阯東北肅然山亦曰副嶽也隂齊陽則魯中有夾谷臺連峰作門户石壁造天闗蕭蕭緑蘿雨行經鵲華二山間即目山海作經首鵲山招揺之桂生其間麗􅕱音几之水出其下祝餘四照花斕斒今此鵲山勿乃是越人陳迹誰追攀濼水南來紆且直羅生夾岸蘅蕪葌隔水正望華不注疑臨玉鏡窺烟鬟是耶非耶看不㝎尹邢雙照蛾睂彎被山㻬琈不收拾蒸栗黄潤丹砂殷七十二閘逺鈎帶如棊布子交週環栁花滿樹緑扵染杏花點地紅斑斑始知仐日已寒食潑火小雨囘天慳濯纓湖亭好烟景春波澹沲清心顔囘首卻望衛河北風沙莽蒼連雄關嘯園襍題八首梭山云是天孫梭何年化空碧蕭條松桂林晻靄幽人宅不妨折齒人長兹置巖石見山亭張公茂蘭故居正徳間進士也時人語曰天下清官張茂蘭入門不見日風動千箖箊孤亭在竹中猶傳清士居世無劉伯畊豈慕貂襜褕張官京師冬無絮衣遺者皆不受東阿劉田伯畊以衣送之乃受曰世惟劉伯畊衣可服耳竹中見左傳海岱清士見世說長白深處肅然萬壑深結廬最深處昔睹封禪儀今餘采樵路惟有漢時雲悠悠自來去猗玕洞古潭深不測石梁架巖洞中有蟄龍蟠鱗甲欲飛動明玕照清流幽禽時一哢勘書閣北齊勘書圖流傳子華作楊子華有勘書圖髣髴邢魏流劍珮文林閣從容四庫間何如百城樂海燕樓朱樓玳瑁梁春社紅襟燕年年思故巢涎涎㑹相見花動倉琅根美人𧺫常宴横翠閣髙閣冠清溪雪浪相廻薄簾捲暮山晴衣霑空翠落烟暝竹林間㱕飛雙白鶴淨友亭斑竹已解䙀翠菼復如鵻虚堂受荷氣疎簾漾文漪風標兩公子照影時來窺米海岳研山歌爲朱竹垞翰林賦許文穆公故物後㱕朱文恪公海嶽研山不可見人間空說研山圖研山之圖亦遭燬雲烟過眼徒嗟吁宣和艮嶽巳塵刼矧乃片石輕錙銖永嘉流落㡬百載昭陵玉匣仐亦無詎知神物有呵䕶星芒夜隕三天都太平宰相盛文物寳此何啻千璠璵古藤書屋花未放主人愛客招吾徒眼中突兀忽見此乍疑几席羅衡巫壺中九華那足擬仇池枉用誇髥蘇三茅地肺互鈎帶二華雲氣相縈紆蛟龍屈蟠待雷雨仙靈髣髴廽軿車華葢一峰獨秀㧞宛插玉笏翹犀株翠巒玉筍左右列脽尻股腳相欹扶上洞下洞閟曲折潛通小有涵空虚龍池幽窈騐雨候頗疑中有驪龍珠峰獨者蜀屬者嶧上泉有埒下有澞座客摩挱三嘆息蒼然古色生睂鬚海嶽之庵書畫舫㡬伴此老浮江湖巧偷豪奪歷千劫閱盡春秋如蟪蛄翰林好事過顛米日餐蛾緑忘饑劬滄江夜夜虹貫月莫令光怪驚菰蘆飛仙閣山行喜乘流江平况如練岝㟧有開􅛶竹樹一蔥蒨人言利州風今朝泠然善灘如塗毒鼓舟劇離弦箭仰眺飛仙閣鳥道危一線彎環歴三朝向背窮九面絳雲卷䡖綃白日遞隱見嘉陵碧玉色晴雨皆婉孌想見吴道玄應詔大同殿此生兩經行天遣追勝踐醉帽停烏奴已泊益昌縣蜀諺云利州風雅州雨汎嘉陵江至益昌今昭化縣懐何易于益昌古利州由來五達衢白水合嘉陵山谷相盤紆我有汎舟役萬里經川塗望古懐清芬所思何易于刺史乘春下畫鷁盛嬉娱前舟載賓客後舟羅笙竽索民為挽舟牽繂須百夫縣令腰笏前挽舟自先驅刺史驚問狀縣令乃前趨方春耕且蠶民力方勤劬令適暇無事可以充卒徒刺史聞之慙上馬如亡逋仁人重一言能使民力蘇考獻徴樵文摭之載唐書累百守令中尚有斯人無作詩告有位磬石鑱山隅題張敦復大宗伯賜金園圖我昔曾過龍眠山山雪蒼茫嵗方晏龍眠山莊知有無空向圖中㡬囘見遺墟但指璇源舘在舒城亦伯時別業芒鞵未踏垂雲沜祗今彈指閱七載過眼流光等飛電龍眠尚書早致身玉斧森沉侍清燕承恩暫許休沐歸朱提賜出蓬萊殿鑑湖一曲落公手艸木雲嵐荷深眷數問家金共賓客遺事蘭陵何足羡三年卻返承明廬夢寐家山寫東絹溪流百曲學印文山色千層累重甗龍公鸞尾歗烟雨􅎷角鼠鬚飽霜霰㟏岈忽㫁漁浦開仰見雲中寫飛練艸堂抱膝還讀書樂此長年可忘􅌒此山此圖世希有終擬他年追勝踐待公功成歸故山江帆更乞樵風便夢逰三山圖歌為尤悔菴太史賦故人昨有夢夢落滄海東海中三神山徃來倐忽随長風上有金銀宫闕互虧蔽下有雲濤汩沒相撞舂蕭灑古仙人漆園傲吏逍遥翁歲星不見㡬千歲劃然一嘯驚鴻䝉􅟾䝉澤見郭憲東方先生傳羲皇上人北窓卧流觀山海須㬰中謫仙騎鯨去采石玉局西返峨睂峰或被天衣駕烟鴻或乘雲氣騎飛龍西堂八十方兩瞳生不並世道則同笑指桑田洗毛髄下視六合塵𪷟𪷟兜率海山等㳺戲夢耶覺耶皆虚空三千里外訊占萝漢廷尚有大王公甘泉宫長生瓦歌為林吉人作并寄同人漢宫一百四十五三輔黄圖漢幾千里内外宫舘一百四十五所横絶南山包九嵕未央建章最廣麗渭北更𧺫甘泉宮甘泉之山化金碧千門萬户交玲瓏通天臺髙屹宫表下瞰雲雨青𪷟𪷟武皇求仙跨滄海射魚牽犬東門東秦始皇紀立石東海上以為秦東門孫卿已誅五利死飛廉桂館猶巃嵸上陵磨劍勢一變雲陽烟草悲秋風甲帳珠簾盡黄土何况片瓦埋荒叢林生好古極幽賾短衣匹馬空山中太乙壇邉弔鈎弋悲歌躑躅斜陽紅此瓦出土事非偶長生古篆疑神工濯以清泉襲綈錦携㱕嶺海光熊熊令弟繪圖亟示我使我懐古心忡忡終南渭水舊逰歷漢家陵闕随飛蓬豈知一瓦供賞識逺與石鼓岐陽同兄視羽陽㦯作棫弟銅雀纎兒慎勿加磨礲漁洋山人精華錄卷四門人監察御史崑山盛符升國子祭酒江隂曹禾同訂候官門人林佶恭謄寫孫兆鄼恭閱
