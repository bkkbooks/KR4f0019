front:
  text: 漁洋山人精華録卷一門人候官林佶編
  hash: sha256:ca407f075f7a62262d2be417f97a98295d61913c3fc2e432519f55e90b0e0cc1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_001-1a}
body:
  text: 古體詩對酒對酒歌慨慷自我屬有生共得睹太平皇帝陛下惟樂康宫府治丞相無私人諸諌官彈射姦慝咸有直聲自中丞刺史良二千石各各有廉名日南交趾皆我郡縣蠻夷君長以時稽首殿庭屬國具為令文笥生翠來王京幸太學三老而五更遂賜民爵一級存問長老遣都吏循行大酺十日除宫刑美人曼夀百室豐盈慕容垂歌三解慕容初入鄴已有虎狼志前驅丁零部後面鮮卑騎燕燕尾涎涎飛飛啄塘蒲三原隔五嵕緩急當奈何慕容在何許已度涼馬臺飢鷹掣鞲縧一逝不復歸白紵詞三首江南煙水多白鳬羣飛啞啞煙際呼美人窈窕為君娛蜀羅吳縠曵華裾修睂星的妍且都明鐙遙映丹脣朱清歌錯落大小珠折腰流盻意態殊乍進欲退心躊躇芙蕖灼灼回雙趺仙珮丁丁鳴六銖燭殘月暗漏滴壺宛轉為君開繡襦青春遙夜開華堂綺羅絃管東西廂阿誰公子淮南王美人家本邯鄲倡合蟬墮馬耀明粧起舞為君陳樂方翠曾參差煙際翔鸞驚龍婉相頡頏西城北里各擅埸羅褎文巾紛御香明眸善睞含流光舞罷雲中孤月涼若耶溪水勝瀟湘越川佚女春浣香織成白紵氷雪光上為舞衣下舞裳大秦珍珠明月璫崑山玉撥映金梁齊琴趙瑟聲鏘鏘七鞶妙舞紛相當須臾璧月沉西方汝南鳴雞啼曉霜今我不樂去日長裴回念此摧中腸翡幬翠幄陳髙堂請君安坐樂未央擬美女篇洛濱風日好美女出相望瑶象飾香轂玉車犬鳴鏘鏘采春蘭阪上弭蓋衡臯傍龍輔節纎步鶯珠結明璫借問女誰氏少小生平陽大姊入後宫次姊琅琊王小妹雖不貴夫壻直東箱出入冠鵔鸃天子侍中郎檻衣萬錦費騕裊千金裝容華誠自惜貴盛寧易詳洛水正微波明瀾一何長川路西南永扁舟不可方寄語盛年子顧義慎自防擬白馬篇駿馬生代北少年出幽并結束各光采指顧風雲生朝逰屬玉觀夕宿衛承明身逐孤兒隊名隸羽林兵行行南山獵意氣何縱橫蒼隼決雲來飛矢逆風鳴大澤鸘鵠遒深雪狐兔驚回瞻鸛雀門突兀與雲平鞍馬倐來歸勢若浮煙輕昨夜羽書至二師出邉庭上馬別妻子鳴鏑追前旌舊隨冠軍伍復此河源行大漠少行人深谷多鼯鼪朝飲沙上泉夕戍雲間城左顧疏勒服右盻伊吾清無令都護將關外獨聲名自石槗尋黛溪遂至摩訶峯下日落山氣涼清流自回轉窮源不知勞漸忘溪路逺幽石各奔峭修樹亦婉孌遙睇徑難測回矚途屢變寂歷衆山響蕭條晚風善微徑暮樵出懸崖歸鳥見須臾夕霏收殘陽四山遍新月忽清揚餘霞自舒卷稍覺葛衣輕幸藉孤笻健平生丘壑人兹言庶能踐由栁菴踰西山最高頂至醴泉寺拜范祠清境難久留申旦戒徒御引領睎前峯抗策辭東路數武即嶇􅋂危蹊少安步顧盻見百里雲日媚煙樹慿髙俯澄湖風帆競孤鶩晴旭移峯巔明晦變已屢褰衣入空翠溪流渺南注槮疏曠逰眺蒼茫失昏曙東山清風來西澗涼雨度澄潭益蕭瑟遊鱗紛散聚前賢迹已逺山川緬猶故夙昔思古人三歎讀書處醴泉謁志公像觀唐碑碑開元三年乙卯立早讀神僧傳緬希志公迹劍水蹤已遙鍾山事成昔豈知常白峯留此千年石鳥爪帶銅緑鏡面瑩蘚碧磨滅開元碑蟲鳥紛難譯披蘿究遺文剝苔理殘畫斷闕發聞見樵牧增歎惜陸銘圯寒冡王碑委荒僻廬陵傲珠犀東武比博奕淪棄多名珍何憚窮鉤索一勺醴泉氷供此風雨夕神價傳志公面瑩徹如鏡手足皆鳥瓜碑有云陸倕製銘于冡內王筠勒碑于寺門皆與傳合醴泉寺髙閣瞻眺有懷范文正公風雨湖上來蕭條灑飛閣殷雷起睂際極目窮寥廓遙天壓煙水空濛氣磅礴大澤盤蛟龍斜風偃雕鶚郤眺鴻濛中日光逺回錯草木暗四山急淙鳴萬壑悵然思古人大雅何時作書堂絶澗已千仞磴道仍九盤直上若懸溜繦屬勢難安右顧踐􅎷迹左顧憑鳥翰日落空山中蕭然風氣寒精舍壁間出洞門天際看竒石壓巖户孤立何巑岏突兀拔澗底窈窕凌雲端入門度飛梁傍夕聞驚湍幽軒宛初搆几榻皆峯巒頗意雷雨時雲氣生户間諸天發鐘磬星斗方闌干惆悵此靈境睪然懷懶殘復雨花枝濛濛日將暮颯颯涼飇起庭樹雨腳射地晝隂晦急溜鳴簷不知數連年左輔嗟大無有蜚多麋仍屢書良民重纍背鄉縣姦民攻剽成􅍉苻天南干戈未寧息男罷農耕女廢織長沙江中多戰船祝融峰頭尚兵革羽書日曰下山東秸秷轉輸動千億苦竹黃楓猿晝啼舟子征人少顔色掘冡鑄幣既不能展轉呼天猶力穡今年稍稍宜雨暘黍稷撲撲稻葉長長官鞭朴那敢避努力公家輸酒漿和窟室畫松歌黃門園中有窟室背枕亞祿山名臨滄溟石壁磊砢一千丈入眼髣佛生精靈橫壁老松誰所作海風怒攫山欲傾盛隂五月凛霜雪怒姿萬變盤雷霆疑是溟渤含日氣不然天上來星精我來盛夏變冬序白晝慘淡生晦冥顚毛亂指舌上嬌寒肌起粟心骨驚上下蒼茫有神鬼左右騰跳飛鼯鼪江南吳生昔為此一一下茟皆龍形昔者吳道子畫壁天宫寺將軍劍舞何蔚跂興酣筆落氣磅礴萬夫動色嗟神異吳生畫松已百載鐡幹霜皮終不改南榮曝背亦吾儔偃蹇龍鱗好相待蠡勺亭觀海登髙丘而望逺海坐見萬里之波濤長天寥廓雲景異春隂偃蹇魚龍髙怒潮乘風立千丈虎蛟水兕紛騰逃羣靈潛結萬蜃氣一痕未沒三山椒須臾勢盡潮亦止波淡天清靜如綺菱苔沉緑紛塘拗螺蚌搖光散沙汭參差島嶼羅殊域紛如星宿秋天裏擊我劒聽君歌有酒不飲當奈何日主祠前水蕭瑟仙人臺上雲嵯峨羡門髙誓不可見秦皇漢武空經過祗今指顧傷懷抱黃腄㡉瓶盡荒草人生快意無幾時明鏡朱顔豈長好吾將避世女姑山不然垂釣蜉蝣島周文矩莊子説劒圖後有董宗伯書説劍篇古今人物畫手誰第一晉有衛協吳曹興南唐周生更竒雋行筆瘦掣姿崚嶒此圖在世踰千載墨光黯淡生光晶君王隱逸各有態𧖟絲煙篆交回縈目瞋鬢穾五劒客短後之衣曼胡纓二人旁立目左顧劒如星日光縱橫昻首右顧者三士二人按鐔神欲生一人拔劒作虎步怒如截兕吞長鯨使筆如劒劒氣出此公無乃能鐡兵莊生説劒固豪快十步千里無留行千年竒論佐竒筆揮毫潑墨皆飛鳴雲間墨妙更遒絶鍾王腕底紛鬬爭自云昔見吳興書説劒恨不作圖雙妙并今逢此卷信神物又恨作書非趙卿徘徊三歎出金石煥然妙迹如神明我聞周生妙得後主作字法秋胡謝女風格清秦淮花月汴京土感此傷人今古情宣和御藏文矩有秋胡故實謝女寫真等圖冬日偶然作四首太史下𧖟室坎壈誰見知發憤傳貨殖千古同悲噫郭縱出鑄冶翁伯起販脂灑削既鼎食胃脯亦連騎志士守蓬蘿不如交馬醫索帶披敝裘不如規魚陂我愛灌仲孺意氣薄雲天長嘯入吳軍指顧堅壁穿長戟鬱龍蟠怒騎如風旋聲名冠諸侯皆曰夫夫賢魏其勢既落田氏寵益専朝請考工地夕奪城南田丞相故賓客顧盻忽屢遷笑罵顧四筵殊不直一錢當時膝席子岌岌皆危冠鄭季有孽子少小為人奴騎從平陽主給事建章居朝拜大將軍封矦詫鉗徒遂復還尚主賜第耀通衢隴西老飛將猿臂雄萬夫白首不得侯心折幕府書誰能對刀筆臨風自捐軀天道有如此千古同欷歔吾家有方平雅志託林壑拂衣早歸耕貂裘行採藥卜築沃川墅垂釣上虞郭邈矣孔阮儔遐哉箕潁樂琅琊多龍鸞羡此雲中鶴春不雨西亭石竹新作芽逰絲已罥櫻桃花鳴鳩乳燕春欲晚杖藜時復經田家田家父老向我説榖雨久過三月節春田龜坼苗不滋猶賴立春三日雪我聞此語重嘆息瘠土年年事耕織暮聞窮巷叱牛歸曉見公家催賦入去年暘雨幸無愆稍稍三農獲晏食春來榖賤復傷農不見飢烏啄遺粒即今土亢不可耕布榖飛飛朝暮鳴舂莩作飯藜作羹吁嗟荆益方用兵𧖟租行十解丁酉夏有民家養𧖟質衣釧鬻桑而催租急遂縊死其夫歸見之亦縊王子感焉作是詩也陽春三月時𧖟子何蠕蠕三日出奩中五日遍籧篨一解東鄰有少婦養𧖟方一塸夜夜伴𧖟眠桑葉恐不周二解朝出南陌頭猗猗望桑柔亦不見桑柔椹子醉鳲鳩三解歸來見𧖟飢徘徊當奈何脫我耳邉叉鬻我嫁時襦四解阿夫持襦去里正持符來漢中索軍租不得還顧私五解里正且上坐黽勉具晨炊但緩一月餘𧖟成賣新絲六解新絲亦難賣新榖亦難收不見馬上郎雉尾紅錦裘七解再拜謝里正丈人且旋歸鬻我嫁時襦脫我耳邉叉八解𧖟應黑瘦盡軍租持底當痛哭視孤兒畢命朱絲繩九解阿夫還入門不復見故妻生既為同衾死當携手歸十解懷古詩三篇魯仲連陂七雄既龍鬬陳寶歸嬴秦師出函谷關六國咸逡巡邯鄲日夜急咄嗟誰解紛蕩隂師既頓新衍謀豈倫先生畫竒䇿長揖平原君僕妾愧萬乘大義明君臣縱橫數千言顧卻虎狼軍功成不受賞飄然歸海垠蹈海既髙義肆志寧辱身至今齊趙士倜儻希清塵我來古陂上遺祠蔓荒榛甓道竄蒼鼠天風吹白蘋緬懷田巴語景行跂千春顔斶墓末世寡尚志薄俗希乘軒豈不貴纁帛形役神不全吾髙顔夫子抗節藐齊宣鐘簴寧足論殿上呼王前晚食與安步詎以榮利遷監門良自賤趨士理亦賢俯仰二千載弔古悲荒阡墟墓絶樵採清風激頽頑古道邈難作悲哉東逝川轅固里漢初尚黃老儒術暗不章齊魯誕諸儒五經如載陽遐哉清河傳卓為羣倫倡抵掌論湯武大義非荒唐曲學誡孫弘微言詒后蒼訓詞列學官星日同琅琅我生暌千載桑梓寧異鄉寤寐思哲人流風一何長生慙齊魯學私淑附師匡苦寒行逺逰漁陽城飲馬滹沱湄河朔恆苦寒日夕風鳴悲悲風起廣塗霜霰凋人衣欲渡川無梁層氷何壘壘鴟梟鳴枯楊豺虎交路衢深谷多猿猱得食歡相追我行歲既晏十步八九迷他鄉少親故相逢知是誰憂愁鑠肌骨自顧顔鬢衰俯視飛蓬根隨風時轉移我獨久伊鬱嵗暮空徘徊寄語後來人逺逰不如歸梁曰緝為言輞川雪中之遊少志愛山水夢想懷藍田終南西峯下水石餘清妍憶昔維摩詰于此曾挂冠揮手謝時輩草堂常晏眠輞水繞舍下湖光明雲端繩牀間藥鐺清齋日蕭然春鷗漸矯翼夏木紛綿芊時尋名僧會自泛湖中船嘆息古人沒風物隨變遷仙令妙文筆慨然追昔賢積雪曜巖阪秀色曖林巒數里入谷口石流已濺濺水鳥相哀鳴雙垞渺人煙却登華子岡輞水猶淪漣花竹散巳久亭館供諸天王裴杳千載丘壑亦凋殘來者復為誰斯言良足歎慈仁寺雙松歌贈許天玉我昔登泰山舉手攀秦松東南雲海幾千里夜懸日氣開鴻濛山人出山已三載復見金元雙樹在玃髯石骨青銅姿古貌荒唐閲人代長夏蒼蒼秋氣深風來絶澗蛟龍吟仙人五粒不可見但有玄鶴來往飛隂森蚴蟉詰屈宛相向千曲盤拏氣初放一任支離拔地生那須夭矯排雲上我來髙枕石壇邉耳畔往往聞驚泉白日沉沉不到地颯然雷雨生空天煙色欲暝鐘復起雄談岸幘波濤駛千秋萬歲知者誰閩海竒人許夫子洗象行水關蒼蒼栁隂碧寶馬流蘇紛絡繹日中傳呼洗象來玉河波射珊瑚赤須臾鉦鼓干雲霄萬夫聲寂如秋宵虎毛蠻奴踞象頂丘山不動何岧嶤岸邉突兀二十四直下波濤若崩墜縱橫欲蹴黿鼉宅騰踏還成鵝鸛隊乍如昆明習鬬戰萬乘旌旗眼中見又如列陳昆陽城雷雨行天神鬼驚奴子胡旋氣遒壯忽沒中流狎巨浪撇波一躍萬人呼幡然卻出層霄上今年丞相收夜郎扶南盤况求王章逺隨方物貢天闕屹然立仗金階旁聖朝自不貴異物致此亦足威遐荒黃門鼓吹暮復動海立山移浩呼洶大秦師子多威神山林豈是天家珍題趙澄仿王右丞羣峰飛雪圖寒色冥冥下巖壑千峰萬峰雪初落瀑布無聲溪澗凍紅樹微茫敞孤閣閣中有客方緼𫀆當杯氣與蒼山髙遙看飛鳥落何處如聞落木鳴東臯崖橫路斷少人迹稍見老樵下巖隙