夜中起摴蒲百萬皆人豪龍行虎步非凡理從兹大運屬彭城中原趙魏歸經營硤口千軍五龍涸藍田一戰二崤平南北推移幾千載太息雄圖竟何在宿麥寒原少昔人神鴉社鼓成空塞王氣銷殘帝宅荒悠悠江水不勝長忠臣徒歎袁開府天命還歸蕭建康五人墓流連虎阜逰宛轉山塘路石門映回波英靈此中聚滿壇松桂隂落日青楓樹生傍伍胥潮死近要離墓千秋忠介墳鬼雄誓相赴酹酒拂蒼碑寒鴉自來去自光福里入太湖口往聖恩寺扁舟下西崦渺渺入湖口逶迤鄧尉山蒼茫具區藪南來仙靈窟袁墓號稱首銅井連青芝雲錦張左右七十有二峯遙矚皆培塿貝闕敞魚龍金庭開户牖仙壇毛公蛻古笈靈威守名境祕聞見勝逰信非偶巘崿時合沓龍氣殊蚴蟉擊楫泝空明濯纓逺塵垢將來萬峰寺半偈持苕帚還元閣聽雨懷太湖冥冥遙峯雨黯黯重湖雲萬壑急懸溜颯沓聽難分山中梅信發香色方氤氲已蠟阮生屐將墊林宗巾身卧百尺樓心憶五湖濱笠澤渺千里漁村雜鷗羣園綺緬匪遙逝當返吾真雨中尋米堆山僧樓鳴鐘罷徘徊向山路逺眺米堆山蒼蒼積煙霧溪澗窅然深岡巒緬非故千重修竹林一徑江梅樹花香上寒衲石流溼芒屨山靄接湖雲日夕自來去迢迢五雲洞欲問誅茅處自米堆山下行至上陽村錢家磡望湖中漁洋法華諸山杖䇿信忘疲行行畫圖裏﨑嶇下雲壑蒼茫望煙水石徑何盤紆踈籬照梅蕊寥落重湖濱柴門數家市居人太古風但解數雞豕語我種植法敦朴有竒理雖非甪里儔頗謂桃源比逶迤到湖漘浩渺歎觀止震澤控三江波瀾此方始法華表東陲漁洋正相似煙雨春空𪷟峰巒暮俶詭昨朝梵天閣逺眺如隱几豈知方丈山忽落芒鞋底欲乞五湖長垂釣將已矣晚坐雨花槗看梅寒湖望已逺迢迢暮歸寺修竹隱山門金碧眩空翠清溪枕飛梁花氣增明媚緑蕚紛競發翠羽時一至拈花悟禪心作賦識仙意髙低垂繁條明滅見湖次縹眇吹笙人消搖布金地微微蓮華漏蕭然逺塵思登光福塔望穹窿靈巖諸山懷古昨登擅勝閣遙遙見湖濱聚沙矚髙妙珠露髙由旬山趾理歸棹中流望嶙峋鈴鐸天際語獅象雲中蹲攬衣造峯頂大千俯微塵悟彼解脫義得此清淨身名山繚四隅出沒媚煙晨眺逺迹方遐懷古情彌辛采香已荒徑菱歌尚含顰館娃一片石千載為沾巾回身望胥口落日悲孤臣第二泉和涪翁韻春山細雨三人俱藤笈親携桑苧書縛亭甃石幾年事至今浣沼噴明珠山人形癯味道腴九塢不老將焉如軍持銅鉢此生畢買田即傍芙蓉湖木末亭作曉登木末亭南望新林浦煙嵐紛四圍三山渺何許旭日麗飛甍雲物媚晴溆風景在江山離宫半禾黍顧瞻金川門悲來不能語惟餘博士祠正氣留終古守風燕子磯刁騷夜雨打吳榜三日南風燕子磯安得滄波如匹練便乘輕舸去翻飛長江巨石想飛動漁燈戍鼓相因依栖霞咫尺不能到白下古城春又歸憶虎丘鶴澗清逺道士養鶴處人去亭空鶴不飛千古清泠一勺水至今猶浸白蓮磯昔逰曾記仙靈語竒絶白雲蓊欲歸白雲蓊欲歸青松忽消半清逺道士詩也和吳淵穎題錢舜舉張麗華侍女汲井圖景陽樓上鐘聲止結綺閣中美人起百花溼露啼宫鴉􅎷盧曉汲銀河水黃奴慵起倚隱囊瓊枝璧月交輝光貴人夾坐詩先就狎客擘箋歡未央玉樹歌闌方競媚桃葉山前陳鐡騎青龍飛出建陽門羣鳥空呼奈何帝可憐拂檻曉粧時入井倉皇那得知千載畫圖猶省識石欄紅淚黦胭脂和吳淵穎題袁子仁巴船出峽圖桃花夜泛三川水蜀中估船日千里錦官城外指東吳萬里行當自兹始金牛玉壘向天開朝雲突兀瞿唐堆飛流一瞬下萬仞長年屏息顔如灰峽中無人但煙霧杜宇聲悲客行處巴巫迎神歌竹枝忽見雲安郭邉樹上峽懸橦下安流東風吹送江陵舟卻從一幅鵝溪上髣佛三刀夢益州葉訒菴自吳中寄豫長歌兼示金山見憶之作奉答昔者我登浮玉山大江駭浪流潺湲岷峨萬里在眼底荆門郢樹浮杯間彭城蘭陵一朝盡令我慨歎愁心顔此時側望天北極漁陽莾蕩連雄關玉堂美人侍帝側兩年不見飛鴻翼海內慿誰論素心蘿裏思君見顔色蒼梧慘淡雲氣深九疑綿邈瀟湘隂重瞳南巡忽寂莫園花陵草俱沾襟聞道髙陵變深谷即看碧海飛黃塵雲霄侍從幾人在飛蓬落葉愁春心夫子盛年何婉孌日夕含香玉皇殿衆中獻賦欲凌雲御前騎馬如飛電即今蕉萃百不如落拓江湖復相見吁嗟哉人生遇合亦偶然雄飛雌伏皆可憐不見東方曼倩號大隱金門據地歌向天又不見開元天子盛文藻隴西王孫稱謫仙調羹未罷夜郎謫至今青山采石垂千年君家况近崑山麓二陸臺邉結茅屋放鶴朝從西􅎷歸采蓴夜向南湖宿感遇終懷國士恩憂時莫效長沙哭三山圖畫一江分何日題詩共夕曛妙髙臺上江如練南望姑蘇是白雲秋日題閔園水亭南人習煙水結屋如舫居真州水水多城市通樵漁一溪納三江潮汐相盈虛茆亭碧溪上浦溆臨前除曉風斷蒲響夜露幽花舒孤雲散天末好鳥鳴午餘緬懷華林歎持此謝簮裾同楊西印副使蔡馠若秀才夜登觀音山眺曲阿後湖我昨南渡登金焦鯨魚跋浪生風濤更上君山俯震澤長江萬里窮秋毫五日探竒興不盡曲阿城畔來登髙觀音山髙髙百丈星辰羅列捫層霄懸崖絶磴挂猿臂崇巒疊嶂森松毛山巔作亭瞰飛鳥湖光山色相周遭練湖一萬六千頃勢與江海爭迢遙淵注渟著古所歎滄桑磨滅非前朝風景不異謝郎死我來慿眺凌寒宵長嘯空山答山鬼驚飛雕鶻求其曹滄波混茫接元氣有如盂水浮堂坳氷夷擊鼓百靈集金支翠羽光飄搖是時月黑風怒號萬弩突射錢塘潮蛟龍屭贔時隱現靈胥慘淡天吳驕髙麗長山互鈎帶六州一氣回斗杓楊公蘄黃昔開府坐清江漢真人豪蔡生白晢美無度頗能飲酒歌離騷東吳菰蘆有君輩力鞭巨石驅神鼇練塘一勺好栖托結鄰未卜心空勞酒闌歌罷意惆悵煙江明日橫輕舠九日與方爾止黃心甫鄒訏士盛珍示集平山堂送方黃二子赴青州謁周侍郎西風蕭蕭天雨霜秋髙木落當重陽鶗鴂先鳴蕙芳歇鷹門鴻雁來何方今我不樂出行邁西城近對平山堂歐公風流已黃土舊逰寂莫風煙蒼喬木修竹無復在荒蕪斷隴棲牛羊劉原父蘇到日已陳迹况復清淺論滄桑京江南望流湯湯北固山髙枕鐡甕蕭公旌斾何飛揚雲龍直北雲茫茫彭城戲馬啓髙宴至今邉朔傳名章孤蓬驚沙振叢薄哀螢蔓草纏雷塘從來王霸已如此牛山何必霑衣裳與君並坐但鼓瑟醉倒聊復呼葛強樽前聚散况難必羽聲變徴何激昻明朝送汝望諸澤欲趁桓公作急裝登文遊臺玻璃江上謫仙人東來萬里辭峨岷熙寧元豐不得意翩然戲弄淮南春龍圖學士孫莘老忤權要祥符宰相餘王孫王㝎國黃樓一賦軼屈宋無雙國士推髯秦少遊四公相逢向淮海酒酣耳熱氣益振珠湖三十六陂澤髙臺下瞰何嶙峋錦繡詩篇照天地與臺光景長鮮新雲煙過眼一飛鳥黃河曲注江東奔人民城郭半遷改此臺屹立當湖濱惠州儋耳垂萬死後生望古傷吟魂何人請籍元祐黨至今泚顙慙安民豈如此臺好名字永絶狐鼠芟荆榛我來逰眺嵗幾度溪毛明信古所敦逺帆如鳥樹如薺湖光雲霧相摩吞嚴冬沆瀣但一氣大雪片片鋪龍鱗酹公一語公莫嗔作詩一笑君應聞末即坡公題太白像語過汜光湖懷古嗚呼正德中嬖豎隳皇綱華容既遐謫劉謝咸髙翔談笑誅刑餘臺閣資文襄逆濠睨神器弄兵下鄱陽勢異北平順迹同吳濞狂桓桓文成公將帥皆龍驤義旗出章貢狡童旋已亡如何萬乘尊南巡來建康羅綺照江水姝麗傾淮揚誰𢋫白雲謡載詠黃竹章兹湖兩駐蹕名因翠華長龍舸與鳳艒樂哉方未央膠舟古所戒遺恨憐昭王事往二百年寒波但菰蔣月暗津鼓急楓落漁燈􅋽緬懷豫且歎弔古重悲傷至今泰陵樹松柏無斧斨夜遇陳伯璣即別聞君返西江﨑嶇歲將暮不知秋浦歸復此吳陵遇煙暝失漁村雪消數江樹惆悵聞荒雞別君立前渡蘇門行寄劉公勇兼呈孫鍾元先生劉生俠氣老不除腰間玉具纓曼胡目送飛鴻卧西省晝蘿秋水思菰蒲掉頭一竿清潁尾琉璃萬頃堆西湖憶昨聽爾御風撡山泉抉溜松風呼黃鵠山頭一握手戴公往迹今有無山中舊約息壤在相看一笑言非疏舊在京師聽公勇彈御風操贈詩有與君更作他年約黃鵠山頭訪戴行之句壬寅果相遇黃鵠山下此事甚竒濤頭如山五馬渡酒酣夜別黃公壚平山堂上望汝潁恨無好句追歐蘇昔與汪琬程可則共槃礴看君寫作蘇門圖怪石槎丫樹蕭瑟醉墨絶似雲林迂嘯臺鸞鳳儼在耳安知嵇阮非吾徒聞君近散萬金盡便衣掃塔辭妻孥山中有鄰德不孤蘇門先生今大儒夏峯村邉看秋瀑雲中髣佛開精廬尋源采藥去不返空留鳥迹巖間書廣陵西望連孟諸倘逢樵叟一相訊山中服食今何如甓湖舟夜讀渭南集偶題長句少陵不作昌黎死大峨仙人落儋耳渭南老子來堂堂鬱律蛟龍蟠筆底半世功名梁益間拓弦橫矟劒門關白頭鏡水江湖蘿夜夜山南射虎還陸放翁心太平菴硯歌為畢通州賦嫵媚散花峽艱危道士磯放翁過此留清辭何年片石墮漻泬龍堂荒忽蟠蛟螭先生當年西入蜀迎風十丈搴黃旗下牢夔門波浪惡白鹽赤甲天下竒轉入興元瞰河渭山南射虎黃雲垂大散關頭見烽火賦詩草檄如星馳此硯爾時伴戎幕賢於十萬熊羆師鶯花海中九年住春江醉捲千玻璃錦官城裏蘋風閣百觴萬首爭淋漓此硯爾時厠髙宴飽霜千兔相追飛先生老矣竟東下鏡湖支枕看風漪但餘此硯共幽獨猶能起賦從軍詩紹興淳熙一片石流傳異代誰使之曾窮梁益掠吳椘放翁金崖硯銘中語吾曹想像空嗟咨畢侯家近黌堂側草生書帶紛葳㽔劍南一卷不離手興來春日吟茅茨携渠歸去坐懷古㝎有雲霞生墨池卞忠貞公墓下作松柏何蕭蕭云是卞公墓背踞冶城顛前臨大桁路緬昔氷嘉時流人競南渡舉國扇清言作逹相矜慕惟公執鄙吝巗巗畏峰距一朝荒傖來旌飛歷陽樹取節慚王公種薤笑諸庾堂堂卞將軍授命青溪渡父子忠孝俱大節光國步快意溫平南屨及雷池戌一戰翦長鯨鐘簴仍如故握爪識忠貞死綏表風素英爽載雲旗陟降神靈雨咫尺袁司徒異代同金鑄宿長干寺支公邀我宿清夜開南軒龕燈照維摩跏趺寂無言下簾啓北牖山夕煙景昏中夜微風作涼雨灑林園宿鳥稍驚起時聞嘉樹喧枕簟生夕涼罏香歇微溫勞生疲津梁聊息應對煩六朝松石歌贈鄧簡討夀陽太史好竒古邀我來觀六朝之松石不辭重墊一角巾此生當著幾兩屐入門大呌走欲顛袍笏淋漓狂太劇蟠根近連瓦官寺吹香正鄰虎頭宅蒼皮黛色磨青銅老幹樛枝拓金戟蕭梢上摩白日暗輪囷下瞰蒼煙積千年為醫誰得見已有脂香化靈珀石勢嶙峋不相讓元氣盤盤絶繩尺蒼苔剝盡南宋字劫火不受陳宫厄陳叔寶三品石終南太華若在眼咫尺壺中苦崩迫誰遣史書宋星隕將無神受秦鞭斥晦冥豈非鬼物庭風雨當防巨靈擘王謝衣冠失江左齊梁人代成今昔建康宫殿幾青磷此石此松閲朝夕一物亦荷皇天慈懷古茫茫百憂集擊琴欲罷且髙吟謖謖寒風灑巾幘金陵曉發月落驃騎航潮生鎮西宅𪷟𪷟逺林樹煙景紛如積煙際下漁舟樹杪帶行客何處金陵思秋江葦花白陳生行戲送其年歸陽羡陳生陳生爾既不能入淵斬長蛟又不能登山射猛虎復不能亡賴作橫苦鄉里十載哦詩守環堵徒抱輪囷一片心藜藋鼪鼬相枝拄昨日渡江來今復渡江歸運租船上苦憔悴風髙浪湧橫江磯朝來寄我新詞句明月無情蟬鬢去五湖歸去伴漁竿楓岸蘆汀不知處季鷹鱸鱠思江東我亦年年嘆轉蓬期汝扁舟同射鴨銅官山下竹枝弓江上讀韋詩彈琴向空江夜靜見江月水波正遙裔河漢坐超忽五絃泛波濤餘音散林樾沙邉鶴唳逺煙中人語歇何處椘山青孤帆逺將沒獨有韋公詩依依伴清絶蕭尺木楚詞圖畫歌大江秋老歌離騷江波瑟瑟風刁刁怪石巃嵸壓崩濤猩猩嘯雨悲猿猱楚纍一去二千載使我後死心勞忉齧桑敗盟西帝驕商于六百橫相要武關一入不復返章華臺殿生蓬蒿江潭憔悴子蘭怒蛾睂謡諑羌安逃長楸龍門望不見木蘭桂樹棲鴟梟騏驥不御愁局跳菉葹蕠糅申椒呵壁荒唐罷天問沅湘西逝魂難招蕭梁王孫筆佹僪攀挈顧陸提僧繇丹黮粉黕寫此夲墨花怒捲湘江潮湘君夫人降荒忽國殤山鬼來蕭颾青楓斑竹染啼血靈風神雨紛飄颻酒闌歌罷老蛟泣星辰迸落江天髙宿弘濟寺名藍敞積翠遙夜開禪關山半聞清鐘夢覺心亦間飛雨灑江介流雲滿空山五載復投止塵勞慙昔顔黃子久王叔明合作山水圖有客示我七尺練云是黃王之合作粉墨駮蝕神淋漓巖谷髙深氣盤礴長林巨壑來畏佳飛鳥流雲去寥廓空堂白晝生風霆飛瀑千尋競噴薄老松撑突夜乂臂怪石縱橫鵝鸛啄石稜松鬛若無路忽向青冥得樓閣峭壁無梯猿臂絶天外孤茅誰所縛滿堂動色神悄然題字依稀辨黃鶴吳興清逺鷗波亭家法賢甥宛如昨意匠慘淡經營成范緩倪迂大張拓富春老人年九十煙雲供養窮三樂扁舟訪舊霅川來偶從縑素論丘壑為添樵徑螺髻旋逺峰一角空中落逺人無目樹無枝妙解通靈失糟粕吳興富春幾百年此意天然殊斧鑿山人癖如阮宣子蠟屐猶堪代芒屫惜無劉尹買山錢苦向畫圖耽寂寞此中三日容坐卧便擬拂衣永棲託明年借汝春晝間梅老無花竹生籜漁洋山人精華録卷一門人監察御史崑山盛符升國子祭酒江隂曹禾同訂康熙三十九年五月十五日門人林佶謹書男啓涑恭閲
