front:
  text: 萬曆􅏤戍之歲偕余舉南宫者關西文太青新城王季木竟陵鍾伯敬皆雄駿君子掉鞅詞壇太青博而奧季木贍而肆踔厲風發大放厥詞太青贈季木曰元美吾兼愛空同爾獨師蓋其宗法如此而伯敬以幽間隱秀之致標致詩歸竄易時人之耳目迄于今輇材諷説簸弄研削莫不援引鍾談與王李徐袁分茅設蕝而關西新城之集孤行秦齊間江表之士莫有過而問者三子之才力伯仲之間耳而身後之名飛沈迥絶殆亦有幸不幸焉千秋萬歲古人所以深歎于寂寞也季木殁三十餘年從孫貽上復以詩名鵲起閩人林古度論次其集推季木為先河謂家學門風淵源有自新城之壇墠大振于聲銷灰燼之餘而竟陵之光焰熸矣余蓋為之撫卷太息知文苑之乘除有劫運參錯其間殆亦可以觀天咫也嗟乎詩道淪胥浮偽並作其大端有二學古而􅎓者影掠滄溟弇山之賸語尺寸比擬此屈步之蟲尋條失枝者也師心而妄者懲創品彚詩歸之流弊眩運掉舉此牛羊之眼但見方隅者也之二人者其持論區以別矣不知古學之繇來而勇于自是輕于侮昔則亦同歸于狂易而巳貽上之詩文繁理富銜華佩實感時之作惻愴于杜陵緣情之什纏綿于義山其談藝四言曰典曰逺曰諧曰則沿波討源平原之遺則也截斷衆流杼山之微言也別裁偽體轉益多師草堂之金丹大藥也平心易氣耽思旁訊深知古學之繇來而于前二人者之為皆能洮汰其癥結祓除其嘈囋思深哉小雅之復作也微斯人其誰與歸貽上以余為孤竹之老馬過而問道于余余遂趣舉其質言以為敘往余嘗與太青季木論文東闕下勸其追溯古學母沿洄于今學而不知返太青喟然謂季木曰虞山之言是也顧我老不能用耳今二子墓木已拱聲塵蔑如余八十昏忘值貽上代興之日向之鏃礪知已用古學勸勉者今得于身親見之豈不有厚幸哉書之以慶余之遭也虞山蒙叟錢謙益序
