body:
  text: 古詩一首贈王貽上士禛謙益風輪持大地撃颺為風謡吹萬肇邃古賡歌暢唐姚朱絃汜漢魏麗藻沿六朝有唐盛詞賦貞符彚元包百靈聽驅使萬象窮鎪雕千燈咸一光異曲皆同調彼㢤諓諓者穿穴紛科條初盛別中晚畫地成狴牢妙悟掠影響指注闚釐毫甕天醯雞覆井月癡猿號化為劣詩魔飛精入府焦窮老蔽蔀屋不得瞻泬寥正始日以逺詞苑襍莠苗獻吉才雄驁學杜餔醨糟仲黙俊逸人放言訾謝陶考辭􅔡嘈囋懐響歸浮漂江河久雍决厬潏亦騰嚻么絃取偏張苦調搜啁噍鳥空而鼠即厥咎為詩訞喪亂亦云膴詩病不可瘳譬彼膏肓疾傳染非一朝嗚呼杜與韓萬古垂斗杓北征南山詩泰華爭岧嶤流傳到扵今不得免慠嘲况乃唐後人嗤點誰能跳窮子抵尺璧凍人裂復陶熠燿點須彌可為渠畧標昌黎笑羣兒少陵訶汝曹嗟我老無力掩耳任呌呶王君𧺫東海七葉光漢貂騏驥奮蹴踏萬馬喑不驕識字函雅故審樂辨簫韶落𥿄為歌詩絳雲卷青霄自顧骨骼馬創殘卧東郊敢云老識路昏忘慙招邀河源出星海東流日滔滔誰蹠巨靈掌一手堙崩濤古學喪根幹流俗沸螗蜩偽體不別裁何以親風騷珠林既深深玉河復迢迢方當剪榛楛未可榮蘭苕瓦釜正雷鳴君其信所操勿以獨角麟嫓彼萬牛毛伊余久歸佛繙經守僧寮棖觸為此詩狂言放調刁無乃禪病發放筆自抑搔𧺫挑常明燈懴除坐寒宵方厚所植冥其納衆㳅而洪纖不遺冠羣言而聚精成身著朝衫頭戴笠孟縣睂山共標格三百年來無此客宛陵梅庚漁洋山人精華録總目門人候官林佶編卷一古體詩卷二古體詩卷三古體詩卷四古體詩卷五今體詩卷六今體詩卷七今體詩卷八今體詩卷九今體詩卷十今體詩
