body:
  text: 吾師新城王先生以詩學為海內宗師者四十餘年其詩曰漁洋集漁洋續集南海集蠶尾集蜀道集雍益集通三千餘篇門人盛侍御曹祭酒嘗仿宋蜀人任淵纂豫章集之例擇其尤合作者千餘以為精華録凡十卷康熙庚辰夏先生以授門人林佶佶承命編録稍有增減皆任氏所謂叢桂崇蘭竒玉特珠者也先是康熙乙丑佶初學詩黃州慕廬葉先生逰閩出先生所選古詩相授斯時佶已服膺先生之教顧無從得先生所自為詩後三年佶逰吳學于堯峰汪先生每稱詩輒首服先生佶愈益欣慕而燕閩相去益逺先生官中朝日益顯達愈無從得受先生詩又十餘年佶以貢入成均時先生官御史大夫始得登先生門獻詩六章先生嘉許之獲厠門下于今三年矣一日先生謂其弟幔亭曰林子朴誠士其事堯峰特有始終未知異日于我何如蓋佶嘗于堯峰身後手録其集而傳之不自意雅為先生所許因遂請願得受先生全詩時先生遷大司寇政事紛還方抱疾不暇休乃出盛曹二君子所撰精華録以付佶更訂次之夫以先生之為詩上沿四始六義之遺而下薄漢魏六朝唐宋元明諸大家之製作萃其美而滙于成為當世言詩者之宗匠固無俟佶之贊頌獨是遊先生門者亡慮數十百人而佶以末學晚進來至京師與于灑掃應對列以償其草年私淑之願而今又獲以從事筆札挂名于其端曩佶嘗言元黃文獻栁文肅吳淵頴三公集皆其門人宋潛溪為之編序而傳之前跋堯峯文鈔每舉此以致惓惓願學之懷今更舉以似先生良以先生少與堯峰齊名文章品望上與黃栁諸公異世同規而佶皆承其教澤其淂所依歸而將附之以傳于後抑何幸耶因識兹録授受之緣起以為後序云爾康熙􅏤辰夏五門人候官林佶謹書
