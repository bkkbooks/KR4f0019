body:
  text: 吾師新城王先生以詩學爲海内宗師者四十餘年其詩曰漁洋集漁洋續集南海集蠶尾集蜀道集雍益集通三千餘篇門人盛侍御曹祭酒嘗仿宋蜀人任淵纂豫章集之例擇其尤合作者千餘以爲精華録凡十卷康熈庚辰夏先生以授門人林佶佶承命編録稍有增减皆任氏所謂叢桂崇蘭竒玉特珠者也先是康熙乙丑佶初學詩黄州慕廬葉先生逰閩出先生所選古詩相授斯時佶已服膺先生之教頋無從得先生所自爲詩後三年佶逰吴學扵堯峰汪先生每稱詩輙首服先生佶愈益欣慕而燕閩相去益逺先生官中朝日益顯達愈無從得受先生詩又十餘年佶以貢入成均時先生官御史大夫始得登先生門獻詩六章先生嘉許之獲厠門下扵今三年矣一日先生謂其弟幔亭曰林子朴誠士其事堯峰特有始終未知異日扵我何如盖佶嘗扵堯峰身後手録其集而傳之不自意雅為先生所許因遂請願得受先生全詩時先生遷大司㓂政事紛還方抱疾不暇休乃出盛曹二君子所撰精華録以付佶更訂次之夫以先生之為詩上沿四始六義之遺而下薄漢魏六朝唐宋元明諸大家之製作萃其美而滙扵成為當世言詩者之宗匠固無俟佶之賛頌獨是㳺先生門者亡慮數十百人而佶以末學晚進来至京師與扵洒掃應對列以償其廿年私㳤之願而今又獲以從事筆札挂名扵其端曩佶嘗言元黄文獻栁文肅吴淵頴三公集皆其門人宋潜溪爲之編序而傳之前跋堯峯文鈔每舉此以致惓惓願學之懐今更舉以似先生良以先生少與堯峰齊名文章品望上與黄栁諸公異世同規而佶皆承其教澤其淂所依㱕而將附之以傳扵後抑何幸耶因識兹録授受之縁𧺫以爲後序云爾康熙􅏤辰夏五門人候官林佶謹書
