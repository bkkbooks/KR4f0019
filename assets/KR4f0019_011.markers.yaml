  - {type: indent, offset: 0, content: 　　, id: KR4f0019_krp_011-bkkind1}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 别丁雁水僉事與君暫相見揮手古䖍州孤棹山俱逺雙江水亂流急灘穿詰曲深竹呌鈎輈離别兼羈旅中宵感白頭新淦道中懷門人林公韞兼寄丁雁水七載相思木蘭道那知相見鬱孤臺江湖澒洞扁舟逺賓主東南一代才伏雨闌風朝復暮滄波白鳥去還來三洲不共窪樽飲懷抱何因得好開豐城曲江亭磯山髙百尺磯下曲江流芳杜蕭蕭暮金花嵗嵗秋金花潭青峰相嫵􅆺白鳥自滄洲已矣干將氣宵分望斗牛吳城登望湖亭寄周南康星公東南臨眺美何如信有孤亭切太虚極浦長風生左蠡畫簾清晝對匡廬九江潮汐迎人逺五老鬚睂見面初明日玉淵潭上酒共看飛瀑駐籃輿彭蠡守風送孫豹人之南昌茫茫彭蠡雨漠漠匡山雲雨帶孤帆去雲將别緒紛蛟龍深自喜牛馬望難分三峽橋邊水扶笻昨共聞開先寺贈顒公古寺昇元舊興亡感至今晴天雙瀑下急雨萬松深但有龍聴法何須地布金琴髙不可即隂峽畏登臨蘇公開先潄玉亭詩欲從琴髙生云云招隠橋萬仞黄巖瀑流過招隠橋長松吹細雨水石共瀟瀟萬竹亭大竹如盆盎森梢覆古巖試嘗甜苦笋亭上脱春衫佛印松印公手植松挺若舟千斛山空孤月明傳聲亂飛瀑南唐元宗讀書臺猶存讀書臺不見昇元閣寂寂青桂花巖間自開落青玉峽廬南萬古峽常有野雲封朝來雷雨過白日下飛龍聰明泉手掬聰明泉一滴大海味不逢桑苧翁知希我方貴王文成紀功碑文成摩厓碑其字大如手萬古一浯溪光芒同不朽大孤山宫亭湖上好烟鬟倭鬌初成玉鏡閒霧閣雲牕不留客蘋花香裏過鞋山石鐘山蘇公遊賞後餘韻石鐘山水石長如此行人自不閒鶴巢丹壁上魚罱翠微間安得乗明月扁舟數往還即事二絶句吳頭楚尾浪花麤終日彭郎對小姑楊葉洲邊望烟火江南江北雨糢糊往來不見馬當船三日蘆中少爨烟東望皖公才百里金陵難似上青天江上看晩霞三首彭澤縣前風倒吹三朝休怨峭帆遲餘霞散綺澄江練滿眼青山小謝詩白浪空江斷去人連朝風色起青蘋小孤山外紅霞影定子當筵别是春瀟瀟寒雨暗潯陽日日江潮過馬當東望滄溟天萬里乗風欲度赤城梁皖城懷古四首憶昨經過射蛟浦今朝還望盛唐山大江日夜流如昔武帝雄風去不還天馬蒲桃空塞外飛亷桂館自人間茂陵抔土秋風裏玉女何曾解駐顔龍舟曾颭錦帆風回首淮南事不同降邸已聞營汴上皖公猶自落杯中豫章一去歸何日廬阜重來隠未終苦憶舒州徐騎省江潮東下雨濛濛清水塘邊余闕祠雲霄浩氣凜鬚睂英姿颯爽猶横槊古砌荒凉只斷碑鶴化千年非故國鷄鳴十廟不同時皖江便是田横島義士悲歌為涕洟羅刹磯頭落日懸侍中遺跡至今傳楚纍有恨沈魚腹蜀魄何心化杜鵑家國幾看陵谷變江山猶痛革除年青溪血影留遺石巾幗還應愧世賢泊夏家口二首秋浦猿聲夜孤舟客乍聴星星見漁火已到卸帆亭已近梅根冶江流更幾灣明朝風日好應見九華山荻港荻港東來指赭圻估帆停處一鷗飛大江小汊縱横入蓼岸藤灣逺近圍勝地不留逋客住暮潮閒送夕陽歸黄公戰處今殘壘憑眺休登板子磯板子磯板子磯前路風帆之字行紅花將翠篠的的可憐生石上紅花低照水山頭翠篠細含烟楊誠齋題板子磯詩句蟂磯靈澤夫人祠二首白帝江聲尚入吳靈祠片石倚江孤魂歸若過劉郎浦還記明珠步障無霸氣江東久寂寥永安宫殿莽蕭蕭都將家國無窮恨分付潯陽上下潮江行望識舟亭鳩兹北面識舟亭天際歸帆望杳㝠松竹隂中孤塔白樓臺缺處數峰青赭山人去生春草江水潮迴沒舊汀更憶于湖翫鞭跡吳波不動客揚舲溫飛卿于湖曲吳波不動楚天碧天門山夜泊萬里孤舟泊今過博望山勝遊非夢到絶域此生還列宿垂江濶疎螢㸃鬢斑宵分望明月歸思折刀環牛渚望青山峰色如横黛江光似熨羅昔人行樂地今日復來過小謝青山宅桓公白紵歌他年尋菌閣終向此巖阿太白祠白也祠堂在前臨牛渚磯風流映江左山水尚清暉小謝東田近開元舊事非姑溪好風日遊子亦忘歸然犀亭不是温忠武誰堪第一流飛書先赴難灑淚獨登舟赤幘驚幽渚黄旗指石頭孤亭臨玉鏡淅淅荻蘆秋蛾睂亭采石磯頭百尺亭下臨天塹晝㝠㝠天門中斷楚江濶日日蛾睂相對青烈山古寺紅牆出翠微莓苔石壁滴人衣一行白鷺衝船起卻上半巖松頂飛抵金陵佳麗金陵道垂楊夾去津潮迎落帆客花映倚樓人依舊青山繞如何白髮新昔遊三十載髣髴記前塵石城橋示倪雁園太史昔作秦淮客朱樓賦洞簫白頭故人盡重上石城橋雨過醉翁亭三首出郭逢樵牧橋迴境已幽門前荇溪石即菱溪石亭下釀泉流禽鳥鳴何樂松篁颯似秋}
