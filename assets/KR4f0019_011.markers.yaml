  - {type: variant, offset: 4, length: 0, content: '', WYG: 畔見一枝紅壓蜑人船董起男送風雨梅戲占為謝故御史玉虬子吳中五月梅黄雨想像千林舶趠風珍重遺來香軟齒不須將醋沁曹公荅胡耑孩寄懷不見閉門陳正字嶺雲江樹五年餘秋風欲下華陽館粤客纔通尺素書蒲澗紅泉應不改羅浮翠羽夢全疎天南耆舊今頭白珍重新詩獨起予題周文矩五}
