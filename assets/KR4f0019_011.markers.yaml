  - {type: variant, offset: 14, length: 0, content: '', WYG: 昌松談閣在溪上今廢沚園弔郭𦙍伯二首𦙍伯園中置一舫居之名齋舫白崖湖水碧浮天亂石嵯峨凌紫烟十里芙蕖衆香國此中曾泊孝亷船大華小華皆削成東溪西溪夾鏡明仙人鶴背忽飛去天風下來聞玉笙鼎湖原二首軒轅鑄鼎此荆山弓墮龍髯不可攀多事橋陵一抔土伴他鴻冢在人間素女為}
  - {type: page-break, offset: 14, content: '', id: KR4f0019_WYG_010-34a, image: WYG1315/WYG1315-0198a.png}
  - {type: variant, offset: 15, length: 1, content: 者, WYG: 態萬方如聞天老教軒皇馬肝已諱文成死又見神君祀柏梁盤豆驛依然盤豆對藂蘆回望闗門岳勢孤思子臺邊一懷古不知身過玉孃湖湖城二首今閿鄉泉鳩里畔動悲風回首秦山隔萬重仙意已窮巫蠱起茂陵遺恨犬臺宫趙虜誰教近至尊漢廷不照覆盆寃如何病已為天子惡諡重䝉到戾園稠桑驛感張淑人陳孺人而作春蘭秋菊不同芳舊恨新愁爾許長應是三生縁未了又呼妙子到稠桑老子故宅北邙東望冢纍纍上有𤣥元古廟基莫以荒唐笑仙李漢家先奉濯龍祠次陜州首春發京國秋氣忽蕭蕭路入三川險人歸萬里遥黄河流底柱白日下中條河上傳經叟仙蹤不可招甘棠今陜州弭節甘棠日未晡玉釵金縷散青蕪殽陵此去多風雨不用尊前唱鷓鴣許渾有甘棠聞唱鷓鴣詞詩甘棠驛北寺南牙劇戰爭可憐甘露怨誰明甘棠驛外東流水嗚咽年年寒玉聲事見甘棠靈會録魏野草堂陜郊棲隠處寥落對雲山無復花藏縣曾聞菊遶灣二句用野詩偶欹紗帽出時跨白驢還尚憶汾隂祀流風杳莫攀會盟臺二首秦聲趙瑟會西河御史前書較孰多臨訣數言闗大計論功終欲首亷頗不辭頸血濺秦王進缶當筵氣慨慷十五名城酬趙璧何如談笑請咸陽洛陽國本爭來黨錮連楚歌楚舞亦堪憐如何鴻鵠髙飛去又見蒼鵝出地年渡洛水脈脈中流望盈盈羅襪塵西園魏公子南浦洛川神蘅薄芳猶在楊林意未申凌波何處問秋水正魚鱗洛神凌波羅襪欲生塵賦裏驚鴻態尚新不信三臺燈火夜針神真比洛川神洛川南望碧嵩清洛洗愁顔伊闕中分兩髻鬟煖翠浮嵐看不盡緱山南是伏牛山白馬寺伽藍半化洛陽塵漢代鴻臚跡尚新太息他年窮楚獄仁祠空解祀金人王輔嗣冢鍾會齊名果是非白楊孤冢暮煙微如何一夕談名理不救河橋誤陸機緱氏縣今偃師白茅授印事何如底許孫卿更上書桂觀蜚亷人力竭祇縁仙子好樓居望緱山廟王子乗鸞鶴飄摇伊洛間至今明月夜鳳吹滿空山緱氏仙踪杳東萊漢使還樓居髙幾許天路渺難攀七夕前二日鞏縣阻雨大火西流日昇仙故跡存王子晉以七月七日上􅂌秋風來鞏洛暮雨阻轘轅欲把浮邱袂難招杜甫魂工部葬首陽山神嵩不可眺三十六峰昬宋陵洛水邙山飽廢興宋家幽寢閟魚燈奉香不見臨安使白日茫茫下七陵七夕雨抵汜水縣玉門殘壘外云是古成臯濁浪喧牛口雄闗逼虎牢青山空楚漢白骨尚蓬蒿七夕風兼雨悲歌撫孟勞紀將軍祠滎陽東門黄屋競傳呼從此咸陽入帝圖若遣封侯身不死也須鐘室避娥姁夕陽樓野塘菡萏正新秋紅藕香中過鄭州僕射陂頭疎雨歇夕陽山映夕陽樓僕射陂白蓮陂名傳僕射秋氣滿蒹葭十里銀塘冷千枝白㲲斜他年履道宅應憶管城花素手誰攀折飄零自水涯鄭州古管城圃田列子祠泠然鄭圃御風遊}
