  - {type: variant, offset: 10, length: 3, content: 爲海内, WYG: 子皮聞紫柏山絶頂有峨睂老衲獨坐丈室數十年蛇虎皆馴伏今九十有六矣惜不得其名字乃作頌古十絶句屬鳯今寄之丙子歲四月七日棧中留壩驛燈下成維摩詰師利多言説淨名殊黙然語言文字外已示祖師禪須菩提善哉須菩提巗間惟晏坐般若是誰聞諸天雨花墮惠持樹中入定僧千年人不識如何去陳留一往無消息道超我愛道超師絶俗躭憩寂退院閴無人蟋蟀鳴秋壁寒山寒山牛跡話此意誰酬酢趙州小厮兒宛有大人作懶殘煨火傍羣牛謫來幾千歲懶殘亦俗人誰能為拭涕地藏琛禪師栽田博飯喫獨振𤣥沙道一笑視諸方説禪方浩浩法昌遇禪師法昌亦開爐單丁唯一箇賴有十八賢緘口圍爐坐黄龍晦堂禪師山谷大辨才妙義皆糠粃滿院木犀香吾無隠乎爾褒禪山僧見冷齊夜話枕石潄溪流夢見歐陽子覺來萬壑風松聲滿人耳汎漢江廣川微雨過疊鼓發中流白獺銜魚上青峰捲幔收江童竹枝曲漢女木蘭舟歸路重城晩紅燈滿市樓大安驛雷雨客行當四月驟雨過三泉出地雄雷奮穿雲急瀑懸飛龍氐舊國白馬戍西偏潭毒闗前壘英風尚颯然潭毒闗宋劉子羽退敵處百牢闗全秦雄百二南盡百牢闗人雜氐羌俗天連彭濮山漢臣傳諭蜀唐計失征蠻歴歴前朝事孤雲落照間嘉陵江上憶家自入秦闗嵗月遲棧雲隴樹苦相思嘉陵驛路三千里處處春山呌畫睂龍門閣潛水入嘉陵江處即龍洞背亦名葱嶺四圍碧玉色崚嶒著箇行纒盞飯僧松末風來龍背冷坐看流水入嘉陵籌筆驛朝天峽上當年神筆走羣靈千載風雲䕶驛亭今日重過弔陳跡祇餘愁外舊山青意中流水逺愁外舊山青石曼卿題句晩至昭化縣題孔令見野亭葭萌朝掛席弭棹欲三更月上嘉陵水山圍漢壽城主人具雞黍邀客啟柴荆脩竹吾廬似因之故國情郎當驛雨中二首金雞賜帳事披猖河朔從兹不屬唐却使青騾行萬里三郎當日太郎當武連縣南雲氣遮郎當驛北石槎枒西風盡日濛濛雨開徧空山白芨花渡涪江涪江江水抱山流不見唐家帝子樓記取江東詩句好澹烟喬木是緜州鹿抱郭涪江碧玉流一川豐草鹿呦呦倦遊忽憶楊岐語祇有渠儂得自由羅江驛夜雨故縣今省入徳陽城北有潺水潺亭前旌已拂鹿頭闗風雨勾留不肯閒何處行人最愁絶潺亭亭下水潺潺落鳳坡弔龎士元沔上風流萬古存魚梁洲畔向江村何如但作鴻㝠好采藥相攜去鹿門淨居寺謁宋文憲公祠在文殊院一代髙文奉至尊那知投老葬蠻村祇應迴向文殊境共證毘耶不二門漢州西湖當年房次律此地鑿西湖百頃烟波渺中流島嶼孤琴亭何寂寞片石亦榛蕪欲問邢和璞三生事有無放翁房相西湖詩遶城鑿池一百頃島嶼屈曲三四里房公石尚存州廨漢州紀夢照壁孤檠不自聊隔牕寒雨打紅蕉驚回一枕鄉園夢身在西川金雁橋千佛巖江作大圓鏡山為寶樓閣莫遣丹霞聞木石總燒却利州皇澤寺則天后像二首像是一比邱尼鏡殿春深往事空嘉陵禍水恨難窮曾聞奪壻瑶光寺持較金輪恐未工洛陽伽藍記瑶光寺尼工奪壻瓦官寺裏定香熏詞客曾勞記錦裙今日蘭橈碧潭上玉溪空自怨行雲李義山利州江潭詩欲就行雲散錦遥自注感孕金輪處界牌闗道中脩竹覆竒壁飛泉來半空人行翠微裏風度紫蘭藂暫喜俗塵逺休嗟吾道窮誰為洪谷子移向畫圖中四過東湖題宛在亭小鴨唼喋萍葉亂三枝五枝菡萏開魯連陂上花千頃黄帽刺船歸去來重題茂陵絡繹甘泉豹尾催君王夜幸栢梁臺當時譎諫稱方朔也嬖長陵宛若來謁段忠烈公祠昭應離宫盡廢邱司農祠廟儼千秋流芳遺臭知何限火迫當年笑酇侯早發臨潼輦道虛無裏孤城翠靄間西南迴望處滿眼是驪山華州西溪往來宫柳路纔訪鄭南玼水木清華色雲峰澹宕姿江心伏毒寺花外拾遺祠有子美祠不見松談閣松風日暮吹郭𦙍伯}
