  - {type: variant, offset: 9, length: 0, content: '', WYG: 不勝懷古意羌笛暮休吹登吳嶽名嶽標西極金天作鎮雄東看連太白北望盡回中日出横秦畤煙消指漢宫導岍思禹蹟此地鑿鴻濛祀雞臺東周久已換西秦陳寶何須辨偽真猶有漢家使持節益州逺祀碧雞神鳯女臺弄玉空祠鎖寂寥碧雲天際水迢迢丹青不畫乗鸞女夜夜月明聞洞簫賣酒樓東坡有詩昨向宜春下苑遊曲江烟景似悲秋珠簾甲帳皆黄土何必陳倉賣酒樓紫柏山下謁留侯祠相傳是辟榖處并祀黄石公赤松子萬木蕭蕭風晝吹深山忽見留侯祠清流白石閲今古雪柏霜筠無歳時辟穀真従赤松隠授書偶作帝王師也知烏喙逃勾踐未屑鴟夷}
