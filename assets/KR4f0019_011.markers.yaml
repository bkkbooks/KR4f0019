  - {type: variant, offset: 20, length: 5, content: 其詩曰漁洋, WYG: 還嫁衞先生老矣又何求官渡别駕亡來萬事非夕陽官渡客行稀袁家新婦應惆悵賸與陳王詠宓妃中牟縣南湖蒲盧亭是張林宗飲酒處予易名墊巾題一絶句南郭孤亭野水濱菰蒲獵獵水鱗鱗林宗未逺風流在不愧亭名是墊巾板橋板橋衰柳日蕭蕭回首宣和似暮朝上已金明池上飲畫船銜尾駱駝橋昭靈夫人墓驚風古道巻蓬根何處昭靈墓尚存不見梁巫陳桂醑野人耕盡小黄園謁信陵君祠趣救邯鄲却暴秦十年留趙事酸辛大梁歸後悤悤甚日飲亡何近婦人曹南渡河望南華山函闗已弔𤣥元宅鄭圃還過禦冦家問渡漆園風雨裏却臨秋水誦南華春城堆金鄉晉郄公故宅春城堆上弔諸郗絶恨參軍入幕時惟有青溪三十曲風流猶自憶僧施龍女祠汶水北岸冰綃霧縠映迴波半額宫黄蹙黛蛾欲采香蘋慰幽怨不須深避庾毗羅送杜肇余大宗伯予告南歸二首遺榮一疏謝金貂祖帳東門}
