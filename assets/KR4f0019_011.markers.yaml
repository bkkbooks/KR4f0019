  - {type: variant, offset: 1, length: 0, content: '', WYG: 生嗟太晩不及醉翁遊風景非疇昔亭猶號醉翁曾將幽咽意併入七絃中我欲攜琴客臨流撫古桐不逢沈夫子噭噭夜猿空歐梅映池閣半畝散清隂老榦猶存古孤花開至今冰溪尋寺逺雪路入山深此際巡簷好寒香伴苦吟晩至豐樂亭豐山髙不極到寺已昏鴉一隖含桃樹滿山烏桕花僧雛汲幽谷泉在幽谷活火試新茶歸去松蘿暝嚴城報暮笳天慶觀宋立端命殿於滁以奉藝祖置觀於其側宋家天慶觀古跡近千秋原廟春供祭衣冠月出遊莓苔蒼鼠竄風雨杜鵑愁西洛諸陵逺蒼茫接汴州西澗西澗蕭蕭數騎過韋公詩句奈愁何黄鸝喚客且須住野渡菴前風雨多澗上有野渡菴取韋詩命名清流闗瀟瀟寒雨渡清流苦竹雲隂特地愁回首南唐風景盡青山無數繞滁州懷王隼梁無技王字蒲衣梁字王顧皆南海人二子才何妙閒門對海濱繙經裁白㲲行藥過青春綺麗誇宫體風流似晉人最憐閨閣裏清詠玉臺新王婦潘梁妹皆工詩寄蒲澗範公憶訪菖蒲澗榕隂席屢移泉聲微雨裏江色夕陽時空谷無殘客諸方問導}
