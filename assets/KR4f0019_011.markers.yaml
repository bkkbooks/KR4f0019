  - {type: variant, offset: 7, length: 0, content: '', WYG: 折角巾至竟清流解亡國望門投止是何人謁文忠烈公祠精神如破貝州時晩節猶能動四夷天遣不同韓富沒姓名㽞冠黨人碑洪洞縣謁韓忠定公祠𢎞恭已自收蕭傅夏惲翻能殺吕强枉使空同奮刀筆子規不勸李東陽過臯陶廟偶感范滂事題壁汝南范孟博髙義薄雲霄未遂澄清志先逢黨錮朝大名齊李杜幽憤祭臯陶南北甘陵部千秋恨不消風陵渡河抵潼關行盡并汾路前旌欲度闗亂帆河曲水隔岸虢州山地險煙嵐合時清虎豹閒永懷黄綺侣白首卧商顔訪山史讀易廬時久客淮南未歸多年華下遂君初廿載重過訪舊廬滿徑苔㾗侵竹石當牕嶽色淨琴書山中宰相人誰識江左夷吾我不如為報倦遊歸及早淮南無此好家居華山雜詩七首玉泉院目玩玉泉流靜悟先天易多事墜驢時强與人間事山蓀亭結茅孤石稜玉泉下奔注亭空泉尚流上有無憂樹希夷峽洞門峽半開鐵鎖垂千丈俗駕自然迴何地容种放娑羅坪小憇娑羅坪手撫娑羅樹仰見上方雲時向人間去毛女洞毛女負琴去儵然松杪飛青㝠風露冷髣髴見天衣白鹿龕雲中跨白鹿心知魯女生乞我一丸藥相將遊玉清青柯坪窈窕青柯館正在西峰罅二十八潭懸飛瀑從天下謁郭忠武王祠便橋蕃部擁風雷單騎纔臨鐵騎摧回紇萬人齊下拜傳呼天上令公來謁冦忠愍公祠柘枝舞罷蠟成堆千束吳綾夜宴開不是魏三詩句好誰知無地起樓臺新豐漢代枌榆社遺墟極望平空提三尺劍忍啜一杯羮細雨新豐樹寒蕪小苑城惟餘舞陽廟漠漢土花生石甕寺在驪山東繡嶺當年石甕寺曾對集靈臺青雀無迴信黄虬是禍胎杜詩化作長黄虬謂禄山也朝雲何日散山月至今來坐久流仙梵松聲薄暮哀灞橋自古銷魂地茫茫喚奈何行人灞陵渡疎雨櫟陽過楊柳籠烟薄桃花夾㟁多邯鄲東北望流恨滿雲和即漢文帝今慎夫人鼓瑟處灞橋柳灞橋楊柳碧毿毿曾送征人去漢南今日攀條憔悴絶樹猶如此我何堪城南遊詩八首曲江賜沐逢修褉宜春嵗嵗遊傳呼夾城仗早御望仙樓捧劒金人曲凌波綵鷁舟新蒲將細柳蕭瑟至今愁薦福寺院從唐代建人}
