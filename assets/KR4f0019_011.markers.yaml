  - {type: variant, offset: 5, length: 0, content: '', WYG: 避暑圖為李奉倩中丞聞道開元日宸遊花萼同恩深五王宅一作帳勅借九成宫竹映翠微合泉飛碧澗通披圖見隆準夐矣讓皇風喜羨門閣學卜鄰之作少小論交三十載中間離合似浮雲谷風莫問窮兼達舊雨猶存我共君東閣從容多密劄南臺潦倒恕彈文望衡乍喜相鄰並可許談詩坐夜分再題研山絶句示竹垞南唐寶石劫灰餘長與幽人伴著書青峭數峰無恙在不須淚滴玉蟾蜍元章詩研山不可見哦詩徒歎息惟有玉蟾蜍向予頻淚滴青峭數峰南唐元宗語題朱竹垞檢討雪景小照四首天女長空散六花疎枝冷蕊鬭横斜小身幻出維摩影費我連朝玉畫义雪後溪山畫不如梅花林外跨青驢相逢莫笑酸寒甚曾校華林七録書雪屋寒林斷晩烟板橋流水尚濺濺不逢才子安鴻漸定是襄陽孟浩然風急天山雪打圍下韝鷹疾掠空飛誰知驢背江南客手拗寒香插帽歸題小長蘆圖三首為竹垞作史筆髙三館歸心戀五湖分明鰕菜好冩出小長蘆膝上佳兒文度眼中秋色江邨歸路不須扶杖笑凭桐孫稻孫竹垞二孫名一蓑一笠日相隨不似官人似釣師七字愛吟楊處士亂堆漁舍晩晴時送張寶菴宰新野牽絲雖百里湯沐古南陽白水清官舍青山落印牀人祠銅馬帝城倚卧龍岡遥憶絃歌處風流楚塞長送劉君宰建徳先考功兄門下士送者自崖返君真建徳遊桐廬最蕭灑水木况清秋橘柚紛千樹漁商聚一州新安江見底應憶古羊裘送陸次公赴撫州兼寄宋牧仲中丞青門一尊酒言祖謝臨川人憶貝邱别雁隨彭蠡船髙齋逢霽雪春思入江烟為向中丞問吟髭白幾年得同年胡少宰汝南書曾讀先賢傳常懷第一流牛醫黄叔度馬磨許文休風節猶東漢江山古蔡州為農堪沒齒此外復何求聞滕王閣落成寄宋二牧仲開府中丞持節鎮洪州滕閣重開勝庾樓清簟疎簾過暮雨隠囊紗帽對江鷗曾來弭棹悲殘劫未許題詩在上頭安得乗風度彭蠡與君吹笛坐滄洲予乙丑過南昌閣燬於火柳雨態烟姿定有無柔條依舊暗金鋪風情甘讓鍾山隠手寫黄羅付慶奴石谷子與門人合寫谿堂詩思見贈題其上谿流過雨決決鳴天風環珮來淙琤谿邊山色自太古谿上白雲非世情疎簾清簟晝無暑翠竹碧梧時有聲此中幽意少人會起坐彈琴山月明藺相如墓智勇存危趙相如第一人特書王擊缶間道璧亡秦故國山河改孤墳草木春魯連終蹈海千古共悲辛自獲鹿至井陘道中雜咏少日紛多慨龍門太史書劫殘秦復趙齒冷耳兼餘豈謂無雙士而師李左車到頭鐘室恨功狗竟何如故關絶塞依天險雄闗鎖地維石横千仞壁松偃萬年枝盡日無飛鳥經春卧老羆見北史槐花秋雨裏重憶舊題詩壬子秋過此有句云西風忽送蕭蕭雨滿路槐花出故闗郭有道墓大槐坂上逐車塵爭效}
