  - {type: variant, offset: 2, length: 0, content: '', WYG: 杼山詩法好慚負碧雲期見田家飯牛者意有所感賦得牛飯就松凉故友宣城梅磊杓司句也黄犢東臯暇青松北澗生卧餘芳草軟飯處午隂清寗戚歌偏拙華陽計早成勞勞行役者三歎憶巖耕歸次臨淮歸路仍淮水﨑嶇嶺海餘我行萬里道未得一行書漁户緯蕭接估船吹笛初今宵孤館裏鄉夢復何如苻離萬里歸來兩鬢蒼閱他南漢又南唐短衣射虎心猶壯重過苻離古戰場雨中渡河望黄樓已見河魚上㝠㝠雨未休一條飛白浪十丈捲黄樓杳靄龍山隠空濛雉堞浮平生仗忠信欲下吕梁游吳梅村喜李長蘅詩穀城山好青如黛滕縣花開白似銀佳句也予冬夏兩過滕不見一花因成絶句薛北滕南屢問津逺山如畫黛睂}
  - {type: page-break, offset: 2, content: '', id: KR4f0019_WYG_010-10a, image: WYG1315/WYG1315-0186a.png}
  - {type: page-break, offset: 2, content: '', id: KR4f0019_WYG_010-10b, image: WYG1315/WYG1315-0186b.png}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 惟餘底事堪惆悵不見花開白似銀嶧山即事雨足烟邨事不閒家家驅犢出柴關棗花香徧濃隂合水碧沙明望嶧山宿唐濟武太史志壑堂即事新竹捎檐夜氣清忽聞山鳥報寒更單衾喚起瀟湘夢落月已西天未明書堂道中山勢圍黄鵠書堂望愈孤行幐逐禪侣荷篠問樵夫鳥道捫參井人烟儵有無入雲鐘梵近失喜一相呼石梁窈窕度漁梁縈紆一水長臨流多白石列坐復垂楊歴歴禽魚影蕭蕭蘭杜芳雞鳴在何處小隖出松篁柳菴溪行路不極溪上出香林一夜前山雨千迴石瀨深空花春漠漠仙梵午沈沈舊識旃檀味還能恱衆心柳菴西方丈夜坐踏閣攀林罷閒堦坐夜分木犀春半發鼻觀定中聞舉首見明月西峯歸片雲徘徊戀清景谿籟逺紛紛于兹仙人祠我愛寒山好招尋白兔公還過于兹道倚徙古祠空碧水流春澗清猿嘯晩風傳聞駕鸞鶴來往月明中趙北口莫問公孫事茫茫感逝波晩潮魚􅀢急夜火蠏簾多大麓諸流㑹春風萬乗過年年水楊柳頭白此關河女郎山卧輿夢初起遥見女郎山雨過開奩鏡烟消露髻鬟靈祠空翠裏瑶瑟碧雲間不是崔羅什何因奉玉顔題查夏重蘆塘放鴨圖三首横塘盡日雨濛濛閒倚笭箵挂釣筒坐愛琉璃一千頃菱花風急􅇢鳬翁鴨母船依湖水濱船頭長日飯龜蓴憑誰寄謝桓南郡不是鵝欄教鬬人鴨頭丸帖種魚經盡日蘆碕泛渺冥何似漁陽隨突騎天風齊放海東青題張力臣小照二首瘞鶴銘邊攜屐日羊侯祠下卸帆時吳山楚水探竒徧不覺秋霜㸃鬢絲金石遺文太放紛摩娑千巻對罏薰白頭更訪鴻都學手拓陳倉石鼓文題沈客子林屋幽居圖五首萬頃玻璃不受塵樓居髙與太清鄰紫泉石髓儻留得我欲因之窮左神隠几春山似畫屏下窺玉柱接金庭禹書縱遣靈威守合為幽人一啓扄五月楊梅血色斑雲林十里畫圖間杉皮屋子青苔徑獨占吳王銷夏灣玉堂酒渴夢江南林屋東西路舊諳煩汝封題三百顆夜來霜信到黄柑漁洋山下是吾家山北山南半種茶留得繖山方竹杖待君風雪探梅花栖霞紫峰閣前有方竹一叢予取以作杖方爾止銘之追和東癡釣臺懷古帝業真歸赤伏符故人不作執金吾猶嫌齊國知男子終隠桐江學釣徒鼎足三公慎要領師中十載白頭鬚清風萬古嚴陵瀨知有雲臺博士無范升也憶石帆亭寄兒輩四首梅花香裏置茅亭下有蒼筤萬箇青聞道故園三日雪與誰同聴玉瓏玲磬口檀心世外香幽姿那㸃壽陽妝祇宜霽雪明牕裏手搨疎花寫硬黄仙人鸞尾何年墮池北池南共嵗寒又向東華騎瘦馬春風先問竹平安麥顆風爐手自烹林園急雪夜三更不知賀若今存否夢裏琴聲大蠏行題趙承㫖畫羊三百羣中見兩頭依然秃筆掃驊騮朅來清逺吳興地忽憶蒼茫勅勒秋南渡銅駝猶戀洛西歸玉馬已朝周牧羝落盡蘇卿節五字河梁萬古愁正月上旬過朱竹垞太史齋中諸花盛開賦二絶句馬塍曾説野人家每先去聲東皇管物華今嵗長安霜雪少試燈風裏見唐花十笏如聞功徳香曼殊陀利兩芬芳偶來小坐談空處政要天花作道場立齋相公齋中蕉花開索賦六絶句漢主初開扶荔宫甘蕉花入上林紅今朝獨樂園中見始信嵇含狀最工中書退食日蕭蕭簾捲西山爽氣饒茶臼筆牀相對好一林花放膽瓶蕉膽瓶蕉狀如膽瓶玉宇微凉八月中林塘香散木犀風緑天深處一花坼蝙蝠飛來相映紅南中紅蕉花開有紅蝙蝠集花中見酉陽雜俎朱萼新抽萬巻書仙人掌露勝醍醐丹青好借黄筌筆更寫紅蕉水鶴圖紅霞一抹映瓊杯照影銀塘細細開不似平泉閒草木猶煩驛騎日南來木綿千樹粤江邊不及蕉花分外妍常記五羊}
