  - {type: variant, offset: 8, length: 0, content: '', WYG: 寂音傳洪覺範嘗居此水鳥皆聞法雲山不離禪花邊停浴鼓竹外起茶烟即此忘言説虚空借坐眠韋曲皇子陂邊路風光韋曲多曾鄰天尺五最近第三坡芳草新年色桑條舊日歌傷春更懷古容易醉顔酡杜曲春衣杜陵宿窈窕一川花舊是岐公宅人傳故相家名園三品石貴主五雲車今日穠華歇棠梨噪暮鴉牛頭寺牛頭鐘梵罷露坐俯樊川明月生秦嶺清光滿稻田微風喧吠蛤野燒起山烟歸卧禪燈寂心空古佛前少陵原工部祠少陵原下路髣髴浣花村猶似開元日終南對國門秦川空望眼湘水與招魂忍見桃花落紅英糝緑罇樊川桃花三月樊川路紅桃散綺霞終南青送黛潏水碧穿沙艸色裙腰合渠流燕尾叉銷魂過杜曲一樹最夭斜杜曲南鴻固原下緋桃一株方盛開秦􅉖王墓陳王鬬雞道今日望陵園石馬前朝賜銅人漢代原幽蘭悲帝子芳草怨王孫猶有藍田燕年年入墓門杜曲西南弔牧之冢兩枝仙桂氣凌雲落魄江湖杜司入勲今日終南山色裏小桃花下一孤墳茂陵懷古頻年祠太乙晩嵗罷輪臺緱氏仙何往瑶池信不迴紅顔鈎弋盡白首子卿哀失勢秋風客昆明又劫灰李夫人冢在茂陵西北數步長門買賦草萋萋寃魄雲陽杜宇啼惟有佳人解傾國莢陵長傍茂陵西秦穆公墓雨霽陳倉曉日紅杖藜來訪槖泉宫千年斷碣荒烟裏一片殘春秀麥中黄鳥哀時良士盡碧雞飛去霸圖空子車遺冢猶鄰近長與坑儒恨不窮雨中武貞菴督學招集東湖行人衣上雨來自杜陽川湖似郎官好名因學士傳有坡公祠游鯈爭唼雨垂栁欲生烟重過荷香裏還勞運酒船再集東湖拜東坡先生祠復有東湖約來當春暮時凉風散髙柳微雨灑清池自識龜魚樂何殊濠濮思仙翁去千載髣髴下雲旗汧陽縣晩上汧陽閣逺山横翠睂川長連隴首城古枕隃糜太尉千秋笏韋郎七字}
