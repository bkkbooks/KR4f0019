  - {type: variant, offset: 7243, length: 315, content: 華隂道中平田漠漠稻花香百道清泉間緑楊二十八潭天上落無人知是帝臺漿華州道中地古弘農郡雲峰去不窮泉飛名岳雨稻熟野塘風漕輓通河渭雄關界華嵩唐家傳七世何事失山東華州齊雲樓唐昭宗望京䖏齊雲樓上望京師渭水東流無盡時父老尚傳行幸日教坊曾譜㫁腸詞城空只見雙飛燕刼敗猶爭一局棊莫問寒烟十六宅土花凝碧至今悲遇仙橋即事浮雲收渭北初日照終南馳道連秋水官橋度曉驂人烟生浦樹鳥語入晴嵐欲訪漁川隱蘆中有釣菴漁川華州山水勝處渭南道中秦川秋色迥四望極風烟樹隠金椎宻花開玉井鮮水光浮蓮音輦勺山翠入藍田徃昔長安道孤城近日邉豐原豐原髙不極原上行人度秋晴渭川望遥見藍田樹渭南望瀑園寄南鼎甫僉事湭曲風煙好新秋望瀑園池通清渭水花暖𬗋蘭村西蜀天邉節南宫雪夜樽十年鴻爪意愁絶詎堪論, WYG: ''}
