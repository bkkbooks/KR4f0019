野草堂陜郊棲隱處寥落對雲山無復花藏縣曾聞菊遶灣二句用野詩偶欹紗帽出時􅘳白驢還尚憶汾隂祀流風杳莫攀㑹盟臺二首秦聲趙瑟㑹西河御史前書較孰多臨訣數言關大計論功終欲首廉頗不辭頸血濺秦王進缶當筵氣慨慷十五名城酬趙璧何如談笑請咸陽洛陽國本爭來黨錮連椘歌椘舞亦堪憐如何鴻鵠髙飛去又見蒼鵝出地年渡洛水脉脉中流望盈盈羅襪塵西園魏公子南浦洛川神蘅薄芳猶在楊林意未申凌波何處問秋水正魚鱗洛神凌波羅襪欲生塵賦裏驚鴻態尚新不信三臺燈火夜針神真比洛川神洛川南望碧嵩清洛洗愁顔伊闕中分兩髻鬟煖翠浮嵐看不盡緱山南是伏牛山白馬寺伽藍半化洛陽塵漢代鴻臚跡尚新太息他年窮椘獄仁祠空解祀金人王輔嗣冡鍾㑹齊名果是非白楊孤冡暮煙微如何一夕談名理不救河橋誤陸機緱氏縣今偃師白茅授印事何如底許孫卿更上書桂觀蜚廉人力竭祗縁仙子好樓居望緱山廟王子乘鸞鶴飄揺伊洛間至今明月夜鳳吹滿空山緱氏仙踪杳東萊漢使還樓居髙㡬許天路渺難攀七夕前二日鞏縣阻雨大火西流日昇仙故跡存王子晉以七月七日上昇秋風來鞏洛暮雨阻轘轅欲把浮丘袂難招杜甫魂工部葬首陽山神嵩不可眺三十六峰昬宋陵洛水邙山飽廢興宋家幽寢閟魚燈奉香不見臨安使白日茫茫下七陵七夕雨抵汜水縣玉門殘壘外云是古成臯濁浪喧牛口雄闗偪虎牢青山空椘漢白骨尚蓬蒿七夕風兼雨悲歌撫孟勞紀將軍祠滎陽東門黄屋競傳呼從此咸陽入帝圖若遣封侯身不死也須鐘室避娥姁夕陽樓野塘菡萏正新秋紅藕香中過鄭州僕射陂頭踈雨歇夕陽山映夕陽樓僕射陂白蓮陂名傳僕射秋氣滿蒹葭十里銀塘冷千枝白㲲斜他年履道宅應憶管城花素手誰攀折飄零自水涯鄭州古管城圃田列子祠泠然鄭圃御風逰四十年如不繫舟怊悵餘年還嫁衞先生老矣又何求官渡別駕亡來萬事非夕陽官渡客行稀袁家新婦應惆悵賸與陳王詠宓妃中牟縣南湖蒲盧亭是張林宗飲酒處予易名墊巾題一絶句南郭孤亭野水濱菰蒲獵獵水鱗鱗林宗未逺風流在不愧亭名是墊巾板橋板橋衰栁日蕭蕭囘首宣和似暮朝上已金明池上飲畫船銜尾駱駝橋昭靈夫人墓驚風古道卷蓬根何處昭靈墓尚存不見梁巫陳桂醑野人耕盡小黄園謁信陵君祠趣救邯鄲却暴秦十年留趙事酸辛大梁歸後匆匆甚日飲亡何近婦人曹南渡河望南華山函關已弔玄元宅鄭圃還過禦㓂家問渡漆園風雨裏却臨秋水誦南華春城堆金郷晉郄公故宅春城堆上弔諸郗絶恨參軍入幕時惟有青溪三十曲風流猶自憶僧施龍女祠汶水北岸氷綃霧縠映廻波半額宫黄蹙黛蛾欲采香蘋慰幽怨不須深避庾毗羅送杜肇余大宗伯予告南歸二首遺榮一䟽謝金貂祖帳東門集百僚北斗星文兼將相公先爲大司馬南宫地望迥雲霄直清譽重推三禮禁近恩深荷兩朝最羡鱸郷亭下泊蓴絲入饌雨瀟瀟潞亭雲樹望中迷一片歸帆落日低心戀觚稜別金馬夢囘烟水聴潮鷄五湖蝦菜身將隱九列功名物久齊亦欲投簮東海去便從梅里問幽栖漁洋山人精華録卷十終門人監察御史崑山盛符升國子祭酒江隂曹禾同訂候官門人林佶恭謄寫男啟汸恭閱, WYG: ''}
