  - {type: variant, offset: 5, length: 9084, content: 別丁雁水僉事與君暫相見揮手古􅐚州孤棹山俱逺雙江水亂流急灘穿詰曲深竹呌鈎輈離別兼羈旅中宵感白頭新淦道中懐門人林公韞兼寄丁雁水七載相思木蘭道那知相見鬱孤臺江湖􅐓洞扁舟逺賓主東南一代才伏雨䦨風朝復暮滄波白鳥去還來三洲不共窪樽飲懐抱何因得好開豐城曲江亭磯山髙百尺磯下曲江流芳杜蕭蕭暮金花歲嵗秋金花潭青峰相嫵媚白鳥自滄洲已矣干將氣宵分望斗牛吴城登望湖亭寄周南康星公東南臨眺美何如信有孤亭切太虗極浦長風生左蠡畫簾清晝對匡廬九江潮汐迎人逺五老鬚睂見面初明日玉淵潭上酒共看飛瀑駐籃輿彭蠡守風送孫豹人之南昌茫茫彭蠡雨漠漠匡山雲雨帶孤帆去雲將別緒紛蛟龍深自喜牛馬望難分三峽橋邉水扶笻昨共聞開先寺贈顒公古寺昇元舊興亡感至今晴天雙瀑下急雨萬松深但有龍聽法何須地布金琴髙不可即隂峽畏登臨蘇公開先潄玉亭詩欲從琴髙生云云招隱橋萬仞黄巖瀑流過招隱橋長松吹細雨水石共瀟瀟萬竹亭大竹如盆盎森梢覆古巖試嘗甜苦笋亭上脫春衫佛印松印公手植松挺若舟千斛山空孤月明傳聲亂飛瀑南唐元宗讀書臺猶存讀書㙜不見昇元閣寂寂青桂花巖間自開落青玉峽廬南萬古峽常有野雲封朝來雷雨過白日下飛龍聰明泉手掬聰明泉一滴大海味不逢桑苧翁知希我方貴王文成紀功碑文成摩厓碑其字犬如手萬古一浯溪光芒同不朽大孤山宫亭湖上好烟鬟倭鬌初成玉鏡閑霧閣雲窗不留客蘋花香裏過鞋山石鐘山蘓公逰賞後餘韻石鐘山水石長如此行人自不閑鶴巢丹壁上魚罱翠微間安得乘明月扁舟數徃還即事二絶句吴頭椘尾浪花麤終日彭郎對小姑楊葉洲邉望烟火江南江北雨糢糊徃來不見馬當船三日蘆中少㸑烟東望皖公才百里金陵難似上青天江上看晚霞三首彭澤縣前風倒吹三朝休怨峭帆遲餘霞散綺澄江練滿眼青山小謝詩白浪空江㫁去人連朝風色𧺫青蘋小孤山外紅霞影㝎子當筵別是春瀟瀟寒雨暗潯陽日曰江潮過馬當東望滄溟天萬里乘風欲度赤城梁皖城懐古四首憶昨經過射蛟浦今朝還望盛唐山大江日夜流如昔武帝雄風去不還天馬蒲桃空塞外飛廉桂舘自人間茂陵抔土秋風裏玉女何曾解駐顔龍舟曾颭錦帆風囬首淮南事不同降邸已聞營汴上皖公猶自落杯中豫章一去歸何日廬阜重來隠未終苦憶舒州徐騎省江潮東下雨𪷟𪷟清水塘邉余闕祠雲霄浩氣凛鬚睂英姿颯爽猶横槊古砌荒凉只斷碑鶴化千年非故國鷄鳴十廟不同時皖江便是田横島義士悲歌為涕洟羅刹磯頭落日懸侍中遺跡至今傳椘纍有恨沉魚腹蜀魄何心化杜鵑家國㡬看陵谷變江山猶痛革除年青溪血影留遺石巾幗還應愧世賢泊夏家口二首秋浦猿聲夜孤舟客乍聽星星見漁火已到缷帆亭已近梅根冶江流更㡬灣明朝風日好應見九華山荻港荻港東來指赭圻估帆停處一鷗飛大江小汊縦横入蓼岸藤灣逺近圍勝地不留逋客住暮潮閑送夕陽歸黄公戰處今殘壘慿眺休登板子磯板子磯板子磯前路風帆之字行紅花將翠篠的的可憐生石上紅花低照水山頭翠篠細含烟楊誠齋題板子磯詩句蟂磯靈澤夫人祠二首白帝江聲尚入吴靈祠片石倚江孤魂歸若過劉郎浦還記明珠步障無霸氣江東久寂寥永安宫殿莾蕭蕭都將家國無窮恨分付潯陽上下潮江行望識舟亭鳩兹北面識舟亭天際歸帆望杳冥松竹隂中孤塔白樓臺缺處數峰青赭山人去生春草江水潮廻沒舊汀更憶于湖翫鞭跡吴波不動客揚舲温飛卿于湖曲吴波不動椘天碧天門山夜泊萬里孤舟泊今過博望山勝逰非夢到絶域此生還列宿垂江濶踈螢點鬢班宵分望明月歸思折刀環牛渚望青山峰色如横黛江光似熨羅昔人行樂地今日復來過小謝青山宅桓公白紵歌他年尋菌閣終向此巖阿太白祠白也祠堂在前臨牛渚磯風流映江左山水尚清暉小謝東田近開元舊事非姑溪好風日逰子亦忘歸然犀亭不是温忠武誰堪第一流飛書先赴難灑淚獨登舟赤幘驚幽渚黄旗指石頭孤亭臨玉鏡淅淅荻蘆秋蛾睂亭采石磯頭百尺亭下臨天塹晝㝠㝠天門中㫁椘江濶日日蛾睂相對青烈山古寺紅牆出翠微莓苔石壁滴人衣一行白鷺衝船𧺫卻上半巖松頂飛抵金陵佳麗金陵道垂楊夾去津潮迎落帆客花映倚樓人依舊青山繞如何白髪新昔逰三十載髣髴記前塵石城橋示倪雁園太史昔作秦淮客朱樓賦洞簫白頭故人盡重上石城橋雨過醉翁亭三首出郭逢樵牧橋廻境已幽門前荇溪石即菱溪石亭下釀泉流禽鳥鳴何樂松篁颯似秋吾生嗟太晚不及醉翁逰風景非疇昔亭猶號醉翁曾將幽咽意併入七絃中我欲攜琴客臨流撫古桐不逢沈夫子噭噭夜猿空歐梅映池閣半畝散清隂老榦猶存古孤花開至今氷溪尋寺逺雪路入山深此際廵簷好寒香伴苦吟晚至豐樂亭豐山髙不極到寺已昏鴉一隖含桃樹滿山烏桕花僧雛汲幽谷泉在幽谷活火試新茶歸去松蘿暝嚴城報暮笳天慶觀宋立端命殿扵滁以奉藝祖置觀扵其側宋家天慶觀古跡近千秋原廟春供祭衣冠月出逰莓苔蒼䑕竄風雨杜鵑愁西洛諸陵逺蒼茫接汴州西澗西澗蕭蕭數騎過韋公詩句奈愁何黄鸝喚客且須住野渡菴前風雨多澗上有野渡菴取韋詩命名清流關瀟瀟寒雨渡清流苦竹雲隂特地愁囘首南唐風景盡青山無數繞滁州懐王隼梁無技王字蒲衣梁字王顧皆南海人二子才何妙閑門對海濱繙經裁白㲲行藥過青春綺麗誇宫體風流似晉人最憐閨閣裏清詠玉㙜新王婦潘梁妹皆工詩寄