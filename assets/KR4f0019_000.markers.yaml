  - {type: variant, offset: 0, length: 1250, content: 萬曆􅏤戍之歲偕余舉南宫者關西文太青新城王季木竟陵鍾伯敬皆雄駿君子掉鞅詞壇太青博而奥季木贍而肆踔厲風發大放厥詞太青贈季木曰元美吾兼愛空同爾獨師盖其宗法如此而伯敬以幽閒隱秀之致標致詩歸竄易時人之耳目迄扵今輇材諷說簸弄研削莫不援引鍾譚與王李徐袁分茅設蕝而關西新城之集孤行秦齊間江表之士莫有過而問者三子之才力伯仲之間耳而身後之名飛沈迥絶殆亦有幸不幸焉千秋萬歲古人所以深歎扵寂寞也季木殁三十餘年從孫貽上復以詩名鵲𧺫閩人林古度論次其集推季木為先河謂家學門風淵源有自新城之壇墠大振扵聲銷灰燼之餘而竟陵之光燄熸矣余盖為之撫卷太息知文苑之乗除有刼運㕘錯其間殆亦可以觀天咫也嗟乎詩道淪胥浮偽並作其大端有二學古而􅎓者影掠滄溟弇山之賸語尺寸比儗此屈步之蟲尋條失枝者也師心而妄者懲創品彚詩歸之流弊眩運掉舉此牛羊之眼但見方隅者也之二人者其持論區以別矣不知古學之繇來而勇扵自是䡖扵侮昔則亦同歸扵狂易而巳貽上之詩文繁理富銜華佩實感時之作惻愴扵杜陵縁情之什纏綿扵義山其談藝四言曰典曰逺曰諧曰則沿波討源平原之遺則也截㫁衆流杼山之微言也別裁偽體轉益多師草堂之金丹大藥也平心易氣耽思㫄訊深知古學之繇來而扵前二人者之為皆能洮汰其癥結祓除其嘈囋思深㦲小雅之復作也微斯人其誰與歸貽上以余為孤竹之老馬過而問道于余余遂趣舉其質言以為叙徃余嘗與太青季木論文東闕下勸其追溯古學母沿洄扵今學而不知返太青喟然謂季木曰虞山之言是也顧我老不能用耳今二子墓木已拱聲塵蔑如余八十昏忘值貽上代興之日向之鏃礪知已用古學勸勉者今得扵身親見之豈不有厚幸㢤書之以慶余之遭也虞山䝉叟錢謙益序古詩一首贈王貽上士禛謙益風輪持大地撃颺為風謡吹萬肇邃古賡歌暢唐姚朱絃汜漢魏麗藻沿六朝有唐盛詞賦貞符彚元包百靈聽驅使萬象窮鎪雕千燈咸一光異曲皆同調彼㢤諓諓者穿穴紛科條初盛別中晚畫地成狴牢妙悟掠影響指注闚釐毫甕天醯雞覆井月癡猿號化為劣詩魔飛精入府焦窮老蔽蔀屋不得瞻泬寥正始日以逺詞苑襍莠苗獻吉才雄驁學杜餔醨糟仲黙俊逸人放言訾謝陶考辭􅔡嘈囋懐響歸浮漂江河久雍决厬潏亦騰嚻么絃取偏張苦調搜啁噍鳥空而鼠即厥咎為詩訞喪亂亦云膴詩病不可瘳譬彼膏肓疾傳染非一朝嗚呼杜與韓萬古垂斗杓北征南山詩泰華爭岧嶤流傳到扵今不得免慠嘲况乃唐後人嗤點誰能跳窮子抵尺璧凍人裂復陶熠燿點須彌可為渠畧標昌黎笑羣兒少陵訶汝曹嗟我老無力掩耳任呌呶王君𧺫東海七葉光漢貂騏驥奮蹴踏萬馬喑不驕識字函雅故審樂辨簫韶落𥿄為歌詩絳雲卷青霄自顧骨骼馬創殘卧東郊敢云老識路昏忘慙招邀河源出星海東流日滔滔誰蹠巨靈掌一手堙崩濤古學喪根幹流俗沸螗蜩偽體不別裁何以親風騷珠林既深深玉河復迢迢方當剪榛楛未可榮蘭苕瓦釜正雷鳴君其信所操勿以獨角麟嫓彼萬牛毛伊余久歸佛繙經守僧寮棖觸為此詩狂言放調刁無乃禪病發放筆自抑搔𧺫挑常明燈懴除坐寒宵方厚所植冥其納衆㳅而洪纖不遺冠羣言而聚精成身著朝衫頭戴笠孟縣睂山共標格三百年來無此客宛陵梅庚漁洋山人精華録總目門人候官林佶編卷一古體詩卷二古體詩卷三古體詩卷四古體詩卷五今體詩卷六今體詩卷七今體詩卷八今體詩卷九今體詩卷十今體詩, WYG: ''}
