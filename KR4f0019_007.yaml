不須更聽七絃琴新灘二首椘蜀諸灘首險在兵書空舲二峽間上灘嘈嘈如震霆下灘東來如建瓴瞥過前山才一瞬鷓鴣啼處到空舲兵書峽口石橫流怒敵江心萬斛舟蜀舸吳船齊著力西陵前去賽黃牛空舲峽月吐空舲峽流光椘塞旁漁燈搖宿鷺篷背受新霜青草煙波濶黃牛朝暮長曾為雲蘿客回首憶髙唐黃陵廟二首廟後峯頂有人牛像宛然如畫峽裏黃陵廟千秋俎豆新禹功思癸甲靈笈佐庚辰灘石冬逾壯風帆捷有神旌旗臨絶壁長照大江濱秭歸來百里突兀見黃牛下水才朝暮行人已白頭山川夔路險疏鑿禹功留尚憶平成日茫茫辨九州抵彝陵州二首西陵雄鎮地佇立望荆門蜀水天邉緑巫雲峽口昏三湘初落木萬里飽聞猿翦𥿄勞僮㒒為招久客魂扁舟天上落回首萬灘髙斜日明西塞秋風過下牢江湖初莾蕩吳蜀幾旌旄至喜亭邉泊椎牛也自豪西陵竹枝四首今彝陵州蜀道艱難易白頭羊腸虎臂又黃牛西陵才過荆江出聽盡猿聲是峽州峽江三月櫓聲齊扣拍哀歌髙復低十二碚邉初起汕日斜還過下牢溪彝陵俗以三月𥘉八十八草八三日起汕相率扣拍而歌悲愴慷慨乃獲多魚惟十二碚以上下牢溪以下數十里為然金叉繫接髻了枋叉繫年年聚此鄉江上夕陽歸去晚白蘋花老賣鱘鰉俗以八九月取鱘鰉魚先布網而後下又謂之叉繫其地曰繫曰枋荷燈百尺接秋河猶似秦兵駐緑蘿更説元宵好風景竹枝歌續採茶歌元夕連袂唱作枝採茶歌七夕家家張荷葉燈云昔秦白起伐椘將燒夷陵望見城中燈火而止遂沿至今也漢景帝廟昭烈奉木主至此陽陵何處是遺廟此中洲落日西陵渡寒江楚塞樓天心紛割據鼎足失炎劉太息英雄逺樓船下益州宜都縣南中流大風南首猇亭路茫茫白浪間風生羊角戍山盡虎牙關忠信平生志波濤絶域還湘東飄泊日深入五溪蠻枝江道中愁絶丹陽道蕭條暮雨時天遙孤雁沒江濶一帆遲庾信臺空在懷王冡尚疑且隨鷗鳥去今夜泊松滋椘懷王墓二首當年遺恨割商於故國秋風總廢墟望裏丹陽抔土在寒潮猶似哭三閭百里洲前望椘江斜風吹雨暗篷窗可憐雲夢三千里弱繳誰加鳥六雙荆州懷古白帝城邉醉放舟夕陽荆椘此登樓驚心割據三分地放眼關河萬里逰山色茫茫江夏逺風煙漠漠渚宫秋何須更續英雄記今古無人似仲謀江陵書感先祖方伯公曾以儀郎奉使扈故惠王之國先公持節地今日復經過江漢流如昔興亡事若何人歸銅馬後士豈鯽魚多信美非吾土登樓發浩歌荆門州望望荆門外茫茫驛路寬北風江漢起暮雪郢中寒野燒荒原斷昏鴉古木殘遙憐季行役白髮望平安望龎居士山雲煙杳杳樹幢幢消息慿誰問老龐斜日漢川秋水濶居然一口吸西江萬山新釣槎頭縮項鯿椘姬玉手鱠紅鮮萬山潭水清如昨只憶襄陽孟浩然襄陽口號豈有鴆人羊叔子更無悔過竇連波殘碑墮淚回文錦一種銷沉可奈何羊太傳祠峴首何寥落猶存太傳祠門臨漢川水淚墮郢中兒東第無歸日西江有斷碑天涯落帆客一薦椘江蘺峴山和孟公韻往者不可作含悽方在今峴山風景地名士幾登臨陵谷須臾改殘碑涕淚深髙陽池上酒慿仗一開襟隆中咫尺隆中路如聞梁父吟地傳龍卧久山接鹿門深遺憾留關隴髙風激漢隂沔江流不盡西望一霑襟放鷹臺漢江東去有髙臺煙樹蒼蒼椘望開走馬銅鞮坊北路少年齊唱野鷹來劉景升冡豚犬兒郎霸業空冡中人不愧英雄一抔遙酹襄江上愛汝名髙俊及中渡漢江次樊城二首昨過嶓冡陽今來漢臯曲萬里故人心江流鴨頭緑樊口隔銅鞮江樓烏夜啼行人渡江去回首峴山西大堤曲四首何處白銅鞮相逢大堤曲樊城多酒家郎在誰家宿送歡鳳林關別歡桃林岸紅桃作花時與歡復相見漢水緑頭鴨朝朝自呼名何時覔歡去附書到江陵東漢房陵來南流武昌去西漢下巴陵會是相逢處估客樂三首大艑趁潮來落帆向樊口盤鱠槎頭鯿杯泛宜城酒大堤諸女兒三五花映肉斜月半江樓低徊就郎宿與郎㝎情時葳㽔黃金鑰不識墮淚碑但道襄陽樂新野道中窮冬風易緊暝色路何長蠻落黃郵聚寒林赭水鄉雁聲過宛口帆影下襄陽回首昭丘外雲濤墮渺茫南陽漢家陵闕晚煙重路入南陽識舊封何日赤符曾應讖至今白水尚朝宗炎精十世飛雄雉鼎足三分起卧龍惆悵銅駝經幾度西風博望一聲鐘卧龍岡五丈原頭望秋風落大星空留髙卧處古柏日冥冥寄懷鄧州彭中郎直上兄弟兼憶仲亮寧逺禹峰方伯子舊識中郎美新髙第五名中原傳二妙故國繼三甥皂帽遼東客青山宛葉情羡君名父子家夲冠軍城寄于淅川道子西望商于地風前木葉紅荒城三户在官舍萬山中歸路日猶逺故人今不同淅江通漢水心折武關東博望城持節西窮萬里源至今黃鵠怨烏孫空聞寶馬歸天廄不見征人入玉門過長沮桀溺耦耕處曾讀陶公傳尞尞沮溺心耦耕餘故迹流水抱寒岑鳥下日將夕雲歸山半隂從來避世者不厭入林深葉公祠蕭條醴水暮煙封古殿青苔上廢鐘地下子髙應一笑世間誰解好真龍襄城道中角角逐鳴雞遙遙信馬蹄雪殘雍氏北月落潁陽西序已三冬晚途猶七聖迷汝南名士盡望古一含悽拜李元禮墓潁水東流去不回漢家司隸汜城隈西園官爵歸常侍北部髠鉗記黨魁一代荀陳師友誼千秋蕃武死生哀歲寒謖謖松風裏猶似龍門御李來渡汝水戲作襄城君曲椘莊辛事見説苑玉劍翡翠衣光照清川口不願椘執圭願得執君手潁川懷古懷古過陽翟西風落照時廣成何處問童子信堪師喬木臨清潁寒煙望具茨何因稅塵鞅還共羽人期渡河西望有感使者河源復卻回杖藜曾記到雲臺髙秋華嶽三峰出曉日潼關四扇開星宿海從天上落昆崘槎自斗邉來何時更訪茅龍去束望滄溟水一杯滎澤渡河二首西湖岷峨萬里長大河北去渡滎陽平分兩戒回中嶽直下三川阻太行咫尺風雲迷廣武蒼涼暾日射扶桑時清久失成臯險釃酒黃流弔戰場渺渺星槎擊楫登鴻溝極目氣飛騰已過白雪三城戍初試黃河十月氷沙磧連雲朝牧馬獵圍行炙晚呼鷹金提東下夷門路落日寒煙弔信陵贈徐東癡四首東臯三畝宅歲歲掩柴關自得知仁樂因居廉讓間夕煙隱桑柘曉色見雲山為問冥冥者何須放白鷴浩蕩江瑚興扁舟過富春兩臺雲漠漠千尺水粼粼偃蹇狂收態飄零汐社人垂竿與晞髮萬一共悲辛秦椘縱橫地商于宛鄧西棧危驢背滑吟苦帽簷低戰壘猶烽火窮途且杖藜􅌒逰歸卧穩髙枕碧山棲情親二十載回首颯風飇白髮催前事青松識後凋何須論出處只合共漁樵別有人琴痛勞君賦大招為亡兄西樵挽薑貞毅先生諱埰字如農萊陽人明給諌以言事謫戍敬亭後流寓蘇州治命葬敬亭山下曾聞碧血裹朝衣滄海橫流萬事非生已變名吳市去死當埋骨敬亭歸空山落日鳴鶗鴂孤墓深春長蕨薇魂傍要離君愛弟英靈來往怒濤飛先半弟吏部垓字如須葬吳郡挽蔣虎臣先生先生養疾蛾睂尚有手書見及西清三十載九病一遷官晚憶峩睂好真忘蜀道難法雲晴浩蕩春雪氣髙寒萬里堪埋骨天成白玉棺謝愚山寄敬亭茶著書墨四首珍重宣州緑雪芽叉頭玉茗未須誇晚涼夢到雙溪路宿火殘鐘索鬭茶白甀親題記社前紅􅌩開罷瀹清泉桐隂滿地蒼苔滑紗帽籠頭手自煎分來劒脊伴雲腴橫理庚庚玉不如更乞宣城諸葛筆晴窗小試硬黃書澤門晳與邑中黔一種髙風比斷金至竟不須論白黑東坡居士是知音漫興十首漭漭荆襄地當年割據州營連九節度星動五諸侯已共長江險應關上將憂郭門傳息壤不障洞庭流一線金牛道迢迢限雍梁峽猶傳禹鑿山忽兆彭亡戰鼓黃陵廟訛言白帝倉魚鳬曾夢到回首閲蒼茫嗚咽秦川水秋風入鼓鼙妖星躔隴右大將出安西陸陸將誰附蒼蒼回不迷似聞寬大詔未忍戮鯨鯢烽火傳花馬將軍發賀蘭天心誅叛亟國法受降寬衙帳青唐入沙場白骨寒亂臣誰貰死史筆後人看均房山萬疊林箐杳難分故國傳鄖子名城屬冠軍風煙迷椘望金鼓動秦雲父老思原傑當年舊建勳不見離支熟閩州驛騎來大農師漸老使者節難回五嶺烽相照三山瘴未開冥冥炎海外目極釣龍臺西北和親國王姬禮數殊一朝忘甥舅萬里送頭顱露布明駝足軍鋒落雁都六師信神武羣盜敢枝梧慘淡蒼梧野風塵八桂林屠沽投間起巾幗負恩深銅柱無消息交州竟陸沉何時大藤峽披豁散重隂海內兵塵滿乾坤正氣孤數公明大義一死激頑夫關塞青楓晚英靈白日徂他年看秉筆得慰鬼雄無少日論兵事空驚老大身拊膺成一歎食肉爾何人劇孟能傾椘弦髙竟却秦白頭清鏡裏歸卧故山春秋日過子吉讀書齋有懷苕文翰林官自逹疲馬獨行吟日午炊煙寂間門落葉深平生有知已髙卧洞庭隂莫謂飛沉絶千秋共此心謝孫思逺送茶笋鬬茶竹塢麥秋寒燒笋僧樓榖雨闌寄謝江南老桑苧也分風味到粗官陳真亭僉憲殉節詩諱丹赤閩縣人順治辛卯舉人自兵部郎中出為溫處道僉事總兵官祖某叛死之贈通政使爭飛海水動妖氛大節堂堂獨不羣真見司農生擊賊還同車右死鳴君赤城地逺埋殘骨朱鳥魂歸哭陳雲他日東甌應廟食靈旗風雨夜深聞楊茶菴僉憲􅛶門殉節詩諱三知良鄉人順治丙戍進士神木道僉事參將孫崇雅叛同妻妾二女赴井死贈光祿卿西來鼙鼓震秦川神木城頭火夜然直向重泉尋八口居然一死動三邉飛書大將論功日嚙齒孤臣入地年倣佛井幹明月下苔䀶零落聽啼鵑劉富川江屏殉節詩諱欽鄰儀真籍廬陵人順治辛丑進士粵西亂死之贈光祿少卿白沙江上別蒼茫憶爾廬陵節義鄉萬里青磷連桂管三年碧血照清湘烏啼濺淚逢寒食馬革驚心裹戰場望斷銘旌何處是蒼梧愁絶暮雲黃蘭溪丞徐君殉節詩諱哲廣昌人貢士城破懷印死贈淅江按察司僉事連城大帥豎降幡獨有微官死報恩故印猶存同杖節巫陽無地與招魂雙松幾歲哦廳事大鳥何年立墓門聞道荒城還渴葬怒潮穿脅越江昏㝎邉堡守僃劉君夫婦殉節詩諱士英朱龍據堡以叛與妻妾郭氏李氏俱死之贈拜他喇布勒哈畨世襲河套南來花馬池嚴城一夕滿旌旗驚傳絶塞豺狼窟坐失三軍熊豹姿恤緯孤忠留婦女成仁浩氣屬偏禆髙牙大纛工翻覆請視劉君墮淚碑遙送嵇爾遐從軍荆州兼寄秦留仙李屺瞻二首帕首鞾刀氣不羣秀才今復學從軍也知好句輸中散唯有相思寄椘雲秦子清真五字詩李生磊落萬人姿他年幕府論功日七寶莊嚴合是誰贈郝雪海侍御二首龍性詎能馴依然七尺身誰從燎原日還憶徙薪人肝膽酬明主風霜老逐臣孝陵松柏淚霑灑又重新血戰𧖟叢日愁雲壓閬中謗書翻置獄刀筆敢論功又失巴西險何時劍外通慿君重草檄早為破田戎秋夜同容齋説巖二學士聽楊山人彈琴萬里東歸客七絲聞夜彈泉流巫峽裏猿嘯椘雲端淅瀝楓葉落寂寥秋水寒無人知此意試問董庭蘭紀事見説溫泉仗經過畢郢原天言傳近侍小隊駐期門玉座人間閟銀𧖟地下溫冬青當日淚真荷兩朝恩雜感四首隴水洮雲外傳烽萬里通天兵張掖下露布朔方同賊已亡方望時堪仗竇融明年看置酒圖畫滿南宫飲馬洞庭濶連營笳吹聞南人知象主漢表失鄱君斑竹祠邉水蒼梧野外雲何時真下瀨一試習流軍戮力還羌帥孤忠有法王不緣蒙上賞何以警無將天狗過秦野髦牛限鬼方古來稱隴蜀成敗幾蒼茫一髮東甌路懸軍春復秋何人裹馬革幾輩爛羊頭禮比長公主榮逾恩澤侯聖朝寬大德不死竟何憂漁洋山人精華録卷七門人監察御史崑山盛符升國子祭酒江隂曹禾同訂候官門人林佶恭謄寫男啓汧恭閲
