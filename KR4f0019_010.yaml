日出横秦畤煙消指漢宫導岍思禹蹟此地鑿鴻濛祀雞臺東周久已換西秦陳寳何須辨偽真猶有漢家使持節益州逺祀碧雞神鳳女臺弄玉空祠鎻寂寥碧雲天際水迢迢丹青不畫乘鸞女夜夜月明聞洞簫賣酒樓東坡有詩昨向宜春下苑逰曲江烟景似悲秋珠簾甲帳皆黄土何必陳倉賣酒樓𬗋柏山下謁留侯祠相傳是辟榖處并祀黄石公赤松子萬木蕭蕭風晝吹深山忽見留侯祠清流白石閱今古雪柏霜筠無歲時辟穀真從赤松隱授書偶作帝王師也知烏喙逃勾踐未㞕鴟夷學子皮聞𬗋柏山絶頂有峨睂老衲獨坐丈室數十年蛇虎皆馴伏今九十有六矣惜不得其名字乃作頌古十絶句屬鳳令寄之丙子歲四月七日棧中留壩驛燈下成維摩詰師利多言說淨名殊黙然語言文字外巳示祖師禪須菩提善㢤須菩提巗間惟晏坐般若是誰聞諸天雨花堕惠持樹中入㝎僧千年人不識如何去陳留一徃無消息道超我愛道超師絶俗躭憇寂退院閴無人蟋蟀鳴秋壁寒山寒山牛跡話此意誰酬酢趙州小厮兒宛有大人作懶殘煨火傍羣牛謫來㡬千歲懶殘亦俗人誰能為拭涕地藏琛禪師栽田博飯喫獨振玄沙道一笑視諸方說禪方浩浩法昌遇禪師法昌亦開爐單丁唯一箇頼有十八賢緘口圍爐坐黄龍晦堂禪師山谷大辨才妙義皆糠粃滿院木犀香吾無隱乎爾褒禪山僧見冷齋夜話枕石潄溪流夢見歐陽子覺來萬壑風松聲滿人耳汎漢江廣川微雨過疊鼓發中流白獺􅋦魚上青峰捲幔收江童竹枝曲漢女木蘭舟歸路重城晚紅燈滿市樓大安驛雷雨客行當四月驟雨過三泉出地雄雷奮穿雲急瀑懸飛龍氐舊國白馬戍西偏潭毒闗前壘英風尚颯然潭毒闗宋劉子羽退敵處百牢闗全秦雄百二南盡百牢關人雜氐羗俗天連彭濮山漢臣傳諭蜀唐計失征蠻歷歷前朝事孤雲落照間嘉陵江上憶家自入秦關嵗月遲棧雲隴樹苦相思嘉陵驛路三千里處處春山呌畫睂龍門閣潜水入嘉陵江處即龍洞背亦名䓤嶺四圍碧玉色崚嶒著箇行纒盞飯僧松末風來龍背冷坐看流水入嘉陵籌筆驛朝天峽上當年神筆走羣靈千載風雲䕶驛亭今日重過弔陳跡祗餘愁外舊山青意中流水逺愁外舊山青石曼卿題句晚至昭化縣題孔令見野亭葭萌朝掛席弭棹欲三更月上嘉陵水山圍漢夀城主人具雞黍邀客啟柴荆修竹吾廬似因之故國情郎當驛雨中二首金雞賜帳事披猖河朔從兹不屬唐却使青騾行萬里三郎當日太郎當武連縣南雲氣遮郎當驛北石槎枒西風盡日𪷟濛雨開徧空山白芨花渡涪江涪江江水抱山流不見唐家帝子樓記取江東詩句好澹烟喬木是緜州鹿抱郭涪江碧玉流一川豐草鹿􅊯􅊯倦逰忽憶楊岐語祗有渠儂得自由羅江驛夜雨故縣今省入徳陽城北有潺水潺亭前旌已拂鹿頭闗風雨勾留不肯閑何處行人最愁絶潺亭亭下水潺潺落鳳坡弔龎士元沔上風流萬古存魚梁洲畔向江村何如但作鴻冥好采藥相擕去鹿門淨居寺謁宋文憲公祠在文殊院一代髙文奉至尊那知投老葬蠻村祗應廻向文殊境共證毘耶不二門漢州西湖當年房次律此地鑿西湖百頃烟波渺中流島嶼孤琴亭何寂寞片石亦榛蕪欲問邢和璞三生事有無放翁房相西湖詩遶城鑿池一百頃島嶼屈曲三四里房公石尚存州廨漢州紀夢照壁孤檠不自聊隔牕寒雨打紅蕉驚囘一枕郷園夢身在西川金雁橋千佛巗江作大圎鏡山為寳樓閣莫遣丹霞聞木石總燒却利州皇澤寺則天后像二首像是一比丘尼鏡殿春深徃事空嘉陵禍水恨難窮曾聞奪壻瑶光寺持較金輪恐未工洛陽伽藍記瑶光寺尼工奪壻瓦官寺裏㝎香熏詞客曾勞記錦裙今日蘭橈碧潭上玉溪空自怨行雲李義山利州江潭詩欲就行雲散錦遥自注感孕金輪處界牌闗道中修竹覆竒壁飛泉來半空人行翠微裏風度𬗋蘭藂暫喜俗塵逺休嗟吾道窮誰為洪谷子移向畫圖中四過東湖題宛在亭小鴨唼喋萍葉亂三枝五枝菡萏開魯連陂上花千頃黄㡌刺船歸去來重題茂陵絡繹甘泉豹尾催君王夜幸栢梁臺當時譎諌稱方朔也嬖長陵宛若來謁叚忠烈公祠昭應離宫盡廢丘司農祠廟儼千秋流芳遺臭知何限火廹當年笑鄼侯早發臨潼輦道虗無裏孤城翠靄間西南廻望處滿眼是驪山華州西溪徃來宫栁路纔訪鄭南玼水水清華色雲峰澹宕姿江心伏毒寺花外拾遺祠有子美柌不見松談閣松風日暮吹郭胤伯宗昌松談閣在溪上今廢沚園弔郭胤伯二首胤伯園中置一舫居之名齋舫白崖湖水碧浮天亂石嵯峨凌𬗋烟十里芙蕖衆香國此中曾泊孝廉船大華小華皆削成東溪西溪夾鏡明仙人鶴背忽飛去天風下來聞玉笙鼎湖原二首軒轅鑄鼎此荆山弓堕龍髥不可攀多事橋陵一坏土伴他鴻冡在人間素女為師態萬方如聞天老教軒皇馬肝已諱文成死又見神君祀柏梁盤豆驛依然盤豆對藂蘆囘望闗門岳勢孤思子臺邉一懐古不知身過玉孃湖湖城二首令閿郷泉鳩里畔動悲風回首秦山隔萬重仙意已窮巫蠱起茂陵遺恨犬臺宫趙鹵誰教近至尊漢廷不照覆盆冤如何病巳為天子惡謚重䝉到戾園稠桑驛感張淑人陳孺人而作春蘭秋菊不同芳舊恨新愁爾許長應是三生縁未了又呼妙子到稠桑老子故宅北邙東望冡纍纍上有玄元古廟基莫以荒唐笑仙李漢家先奉濯龍祠次陜州首春發京國秋氣忽蕭蕭路入三川險人歸萬里遥黄河流底柱白日下中條河上傳經叟仙蹤不可招甘棠今陜州弭節甘棠日未晡玉釵金縷散青蕪殽陵此去多風雨不用尊前唱鷓鴣許渾有甘棠聞唱鷓鴣詞詩甘棠驛北寺南牙劇戰爭可憐甘露怨誰明甘棠驛外東流水嗚咽年年寒玉聲事見甘棠靈㑹録魏野草堂陜郊棲隱處寥落對雲山無復花藏縣曾聞菊遶灣二句用野詩偶欹紗帽出時􅘳白驢還尚憶汾隂祀流風杳莫攀㑹盟臺二首秦聲趙瑟㑹西河御史前書較孰多臨訣數言關大計論功終欲首廉頗不辭頸血濺秦王進缶當筵氣慨慷十五名城酬趙璧何如談笑請咸陽洛陽國本爭來黨錮連椘歌椘舞亦堪憐如何鴻鵠髙飛去又見蒼鵝出地年渡洛水脉脉中流望盈盈羅襪塵西園魏公子南浦洛川神蘅薄芳猶在楊林意未申凌波何處問秋水正魚鱗洛神凌波羅襪欲生塵賦裏驚鴻態尚新不信三臺燈火夜針神真比洛川神洛川南望碧嵩清洛洗愁顔伊闕中分兩髻鬟煖翠浮嵐看不盡緱山南是伏牛山白馬寺伽藍半化洛陽塵漢代鴻臚跡尚新太息他年窮椘獄仁祠空解祀金人王輔嗣冡鍾㑹齊名果是非白楊孤冡暮煙微如何一夕談名理不救河橋誤陸機緱氏縣今偃師白茅授印事何如底許孫卿更上書桂觀蜚廉人力竭祗縁仙子好樓居望緱山廟王子乘鸞鶴飄揺伊洛間至今明月夜鳳吹滿空山緱氏仙踪杳東萊漢使還樓居髙㡬許天路渺難攀七夕前二日鞏縣阻雨大火西流日昇仙故跡存王子晉以七月七日上昇秋風來鞏洛暮雨阻轘轅欲把浮丘袂難招杜甫魂工部葬首陽山神嵩不可眺三十六峰昬宋陵洛水邙山飽廢興宋家幽寢閟魚燈奉香不見臨安使白日茫茫下七陵七夕雨抵汜水縣玉門殘壘外云是古成臯濁浪喧牛口雄闗偪虎牢青山空椘漢白骨尚蓬蒿七夕風兼雨悲歌撫孟勞紀將軍祠滎陽東門黄屋競傳呼從此咸陽入帝圖若遣封侯身不死也須鐘室避娥姁夕陽樓野塘菡萏正新秋紅藕香中過鄭州僕射陂頭踈雨歇夕陽山映夕陽樓僕射陂白蓮陂名傳僕射秋氣滿蒹葭十里銀塘冷千枝白㲲斜他年履道宅應憶管城花素手誰攀折飄零自水涯鄭州古管城圃田列子祠泠然鄭圃御風逰四十年如不繫舟怊悵餘年還嫁衞先生老矣又何求官渡別駕亡來萬事非夕陽官渡客行稀袁家新婦應惆悵賸與陳王詠宓妃中牟縣南湖蒲盧亭是張林宗飲酒處予易名墊巾題一絶句南郭孤亭野水濱菰蒲獵獵水鱗鱗林宗未逺風流在不愧亭名是墊巾板橋板橋衰栁日蕭蕭囘首宣和似暮朝上已金明池上飲畫船銜尾駱駝橋昭靈夫人墓驚風古道卷蓬根何處昭靈墓尚存不見梁巫陳桂醑野人耕盡小黄園謁信陵君祠趣救邯鄲却暴秦十年留趙事酸辛大梁歸後匆匆甚日飲亡何近婦人曹南渡河望南華山函關已弔玄元宅鄭圃還過禦㓂家問渡漆園風雨裏却臨秋水誦南華春城堆金郷晉郄公故宅春城堆上弔諸郗絶恨參軍入幕時惟有青溪三十曲風流猶自憶僧施龍女祠汶水北岸氷綃霧縠映廻波半額宫黄蹙黛蛾欲采香蘋慰幽怨不須深避庾毗羅送杜肇余大宗伯予告南歸二首遺榮一䟽謝金貂祖帳東門集百僚北斗星文兼將相公先爲大司馬南宫地望迥雲霄直清譽重推三禮禁近恩深荷兩朝最羡鱸郷亭下泊蓴絲入饌雨瀟瀟潞亭雲樹望中迷一片歸帆落日低心戀觚稜別金馬夢囘烟水聴潮鷄五湖蝦菜身將隱九列功名物久齊亦欲投簮東海去便從梅里問幽栖漁洋山人精華録卷十終門人監察御史崑山盛符升國子祭酒江隂曹禾同訂候官門人林佶恭謄寫男啟汸恭閱
