front:
  text: 漁洋山人精華録卷十門人候官林佶編
  hash: sha256:9ef24091045cc59f51bb4117a42a06ca4a6570ea032ccb02a3f94a75aff6b625
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_010-1a}
body:
  text: 今體詩贑州別丁雁水僉事與君暫相見揮手古􅐚州孤棹山俱逺雙江水亂流急灘穿詰曲深竹呌鈎輈離別兼羈旅中宵感白頭新淦道中懐門人林公韞兼寄丁雁水七載相思木蘭道那知相見鬱孤臺江湖􅐓洞扁舟逺賓主東南一代才伏雨䦨風朝復暮滄波白鳥去還來三洲不共窪樽飲懐抱何因得好開豐城曲江亭磯山髙百尺磯下曲江流芳杜蕭蕭暮金花歲嵗秋金花潭青峰相嫵媚白鳥自滄洲已矣干將氣宵分望斗牛吴城登望湖亭寄周南康星公東南臨眺美何如信有孤亭切太虗極浦長風生左蠡畫簾清晝對匡廬九江潮汐迎人逺五老鬚睂見面初明日玉淵潭上酒共看飛瀑駐籃輿彭蠡守風送孫豹人之南昌茫茫彭蠡雨漠漠匡山雲雨帶孤帆去雲將別緒紛蛟龍深自喜牛馬望難分三峽橋邉水扶笻昨共聞開先寺贈顒公古寺昇元舊興亡感至今晴天雙瀑下急雨萬松深但有龍聽法何須地布金琴髙不可即隂峽畏登臨蘇公開先潄玉亭詩欲從琴髙生云云招隱橋萬仞黄巖瀑流過招隱橋長松吹細雨水石共瀟瀟萬竹亭大竹如盆盎森梢覆古巖試嘗甜苦笋亭上脫春衫佛印松印公手植松挺若舟千斛山空孤月明傳聲亂飛瀑南唐元宗讀書臺猶存讀書㙜不見昇元閣寂寂青桂花巖間自開落青玉峽廬南萬古峽常有野雲封朝來雷雨過白日下飛龍聰明泉手掬聰明泉一滴大海味不逢桑苧翁知希我方貴王文成紀功碑文成摩厓碑其字犬如手萬古一浯溪光芒同不朽大孤山宫亭湖上好烟鬟倭鬌初成玉鏡閑霧閣雲窗不留客蘋花香裏過鞋山石鐘山蘓公逰賞後餘韻石鐘山水石長如此行人自不閑鶴巢丹壁上魚罱翠微間安得乘明月扁舟數徃還即事二絶句吴頭椘尾浪花麤終日彭郎對小姑楊葉洲邉望烟火江南江北雨糢糊徃來不見馬當船三日蘆中少㸑烟東望皖公才百里金陵難似上青天江上看晚霞三首彭澤縣前風倒吹三朝休怨峭帆遲餘霞散綺澄江練滿眼青山小謝詩白浪空江㫁去人連朝風色𧺫青蘋小孤山外紅霞影㝎子當筵別是春瀟瀟寒雨暗潯陽日曰江潮過馬當東望滄溟天萬里乘風欲度赤城梁皖城懐古四首憶昨經過射蛟浦今朝還望盛唐山大江日夜流如昔武帝雄風去不還天馬蒲桃空塞外飛廉桂舘自人間茂陵抔土秋風裏玉女何曾解駐顔龍舟曾颭錦帆風囬首淮南事不同降邸已聞營汴上皖公猶自落杯中豫章一去歸何日廬阜重來隠未終苦憶舒州徐騎省江潮東下雨𪷟𪷟清水塘邉余闕祠雲霄浩氣凛鬚睂英姿颯爽猶横槊古砌荒凉只斷碑鶴化千年非故國鷄鳴十廟不同時皖江便是田横島義士悲歌為涕洟羅刹磯頭落日懸侍中遺跡至今傳椘纍有恨沉魚腹蜀魄何心化杜鵑家國㡬看陵谷變江山猶痛革除年青溪血影留遺石巾幗還應愧世賢泊夏家口二首秋浦猿聲夜孤舟客乍聽星星見漁火已到缷帆亭已近梅根冶江流更㡬灣明朝風日好應見九華山荻港荻港東來指赭圻估帆停處一鷗飛大江小汊縦横入蓼岸藤灣逺近圍勝地不留逋客住暮潮閑送夕陽歸黄公戰處今殘壘慿眺休登板子磯板子磯板子磯前路風帆之字行紅花將翠篠的的可憐生石上紅花低照水山頭翠篠細含烟楊誠齋題板子磯詩句蟂磯靈澤夫人祠二首白帝江聲尚入吴靈祠片石倚江孤魂歸若過劉郎浦還記明珠步障無霸氣江東久寂寥永安宫殿莾蕭蕭都將家國無窮恨分付潯陽上下潮江行望識舟亭鳩兹北面識舟亭天際歸帆望杳冥松竹隂中孤塔白樓臺缺處數峰青赭山人去生春草江水潮廻沒舊汀更憶于湖翫鞭跡吴波不動客揚舲温飛卿于湖曲吴波不動椘天碧天門山夜泊萬里孤舟泊今過博望山勝逰非夢到絶域此生還列宿垂江濶踈螢點鬢班宵分望明月歸思折刀環牛渚望青山峰色如横黛江光似熨羅昔人行樂地今日復來過小謝青山宅桓公白紵歌他年尋菌閣終向此巖阿太白祠白也祠堂在前臨牛渚磯風流映江左山水尚清暉小謝東田近開元舊事非姑溪好風日逰子亦忘歸然犀亭不是温忠武誰堪第一流飛書先赴難灑淚獨登舟赤幘驚幽渚黄旗指石頭孤亭臨玉鏡淅淅荻蘆秋蛾睂亭采石磯頭百尺亭下臨天塹晝㝠㝠天門中㫁椘江濶日日蛾睂相對青烈山古寺紅牆出翠微莓苔石壁滴人衣一行白鷺衝船𧺫卻上半巖松頂飛抵金陵佳麗金陵道垂楊夾去津潮迎落帆客花映倚樓人依舊青山繞如何白髪新昔逰三十載髣髴記前塵石城橋示倪雁園太史昔作秦淮客朱樓賦洞簫白頭故人盡重上石城橋雨過醉翁亭三首出郭逢樵牧橋廻境已幽門前荇溪石即菱溪石亭下釀泉流禽鳥鳴何樂松篁颯似秋吾生嗟太晚不及醉翁逰風景非疇昔亭猶號醉翁曾將幽咽意併入七絃中我欲攜琴客臨流撫古桐不逢沈夫子噭噭夜猿空歐梅映池閣半畝散清隂老榦猶存古孤花開至今氷溪尋寺逺雪路入山深此際廵簷好寒香伴苦吟晚至豐樂亭豐山髙不極到寺已昏鴉一隖含桃樹滿山烏桕花僧雛汲幽谷泉在幽谷活火試新茶歸去松蘿暝嚴城報暮笳天慶觀宋立端命殿扵滁以奉藝祖置觀扵其側宋家天慶觀古跡近千秋原廟春供祭衣冠月出逰莓苔蒼䑕竄風雨杜鵑愁西洛諸陵逺蒼茫接汴州西澗西澗蕭蕭數騎過韋公詩句奈愁何黄鸝喚客且須住野渡菴前風雨多澗上有野渡菴取韋詩命名清流關瀟瀟寒雨渡清流苦竹雲隂特地愁囘首南唐風景盡青山無數繞滁州懐王隼梁無技王字蒲衣梁字王顧皆南海人二子才何妙閑門對海濱繙經裁白㲲行藥過青春綺麗誇宫體風流似晉人最憐閨閣裏清詠玉㙜新王婦潘梁妹皆工詩寄蒲澗範公憶訪菖蒲澗榕隂席屢移泉聲微雨裏江色夕陽時空谷無殘客諸方問導師杼山詩法好慚負碧雲期見田家飯牛者意有所感賦得牛飯就松凉故友宣城梅磊杓司句也黄犢東臯暇青松北澗生卧餘芳草軟飯處午隂清甯戚歌偏拙華陽計早成勞勞行役者三歎憶巖耕歸次臨淮歸路仍淮水﨑嶇嶺海餘我行萬里道未得一行書漁户緯蕭接估船吹笛初今宵孤舘裏郷夢復何如苻離萬里歸來兩鬢蒼閱他南漢又南唐短衣射虎心猶壯重過苻離古戰塲雨中渡河望黄樓已見河魚上㝠㝠雨未休一條飛白浪十丈捲黄樓杳靄龍山隱空𪷟雉堞浮平生仗忠信欲下吕梁㳺錢牧翁喜李長蘅詩榖城山好青如黛滕縣花開白似銀佳句也予冬夏兩過滕不見一花因成絶句薛北滕南屢問津逺山如畫黛睂新唯餘底事堪惆悵不見花開白似銀嶧山即事雨足烟邨事不閑家家驅犢出柴關棗花香徧濃隂合水碧沙明望嶧山宿唐濟武太史志壑堂即事新竹捎檐夜氣清忽聞山鳥報寒更單衾喚𧺫瀟湘夢落月已西天未明書堂道中山勢圍黄鵠書堂望愈孤行幐逐禪侣荷篠問樵夫鳥道捫參井人烟倐有無入雲鐘梵近失喜一相呼石梁窈窕度漁梁縈紆一水長臨流多白石列坐復垂楊歷歷禽魚影蕭蕭蘭杜芳雞鳴在何處小隖出松篁栁菴溪行路不極溪上出香林一夜前山雨千廻石瀬深空花春漠漠仙梵午沉沉舊識旃檀味還能悅衆心栁菴西方丈夜坐踏閣攀林罷閑堦坐夜分木犀春半發鼻觀㝎中聞舉首見明月西峰歸片雲徘徊戀清景谿籟逺紛紛于兹仙人祠我愛寒山好招尋白兎公還過于兹道倚徙古祠空碧水流春澗清猿嘯晚風傳聞駕鸞鶴來徃月明中趙北口莫問公孫事茫茫感逝波晚潮魚􆈒急夜火蠏簾多大麓諸流㑹春風萬乗過年年水楊栁頭白此關河女郎山卧輿夢初𧺫遥見女郎山雨過開奩鏡烟消露髻鬟靈祠空翠裏瑶瑟碧雲間不是崔羅什何因奉玉顔題查夏重蘆塘放鴨圗三首横塘盡日雨𪷟𪷟閑倚笭箵挂釣筒坐愛琉璃一千頃菱花風急罥鳬翁鴨母船依湖水濱船頭長日飯龜蓴慿誰寄謝桓南郡不是鵝欄教鬬人鴨頭丸帖種魚經盡日蘆碕泛渺冥何似漁陽随突騎天風齊放海東青題張力臣小照二首瘞鶴銘邉攜屐日羊侯祠下缷帆時吴山椘水探竒徧不覺秋霜點鬢絲金石遺文太放紛摩娑千卷對罏薫白頭更訪鴻都學手拓陳倉石鼓文題沈客子林屋幽居圖五首萬頃玻璃不受塵樓居髙與太清鄰𬗋泉石髄儻留得我欲因之窮左神隱几春山似畫屏下窺玉柱接金庭禹書縦遣靈威守合為幽人一啓扄五月楊梅血色斑雲林十里畫圖間杉皮屋子青苔徑獨占吴王銷夏灣玉堂酒渇夢江南林屋東西路舊諳煩汝封題三百顆夜來霜信到黄柑漁洋山下是吾家山北山南半種茶留得繖山方竹杖待君風雪探梅花栖霞𬗋峰閣前有方竹一叢予取以作杖方爾止銘之追和東癡釣臺懐古帝業真歸赤伏符故人不作執金吾猶嫌齊國知男子終隱桐江學釣徒鼎足三公慎要領師中十載白頭鬚清風萬古嚴陵瀬知有雲臺博士無范升也憶石帆亭寄兒輩四首梅花香裏置茅亭下有蒼筤萬箇青聞道故園三日雪與誰同聴玉瓏玲磬口檀心世外香幽姿那點夀陽籹祗宜霽雪明窗裏手搨疎花寫硬黄仙人鸞尾何年堕池北池南共歲寒又向東華騎痩馬春風先問竹平安麥顆風爐手自烹林園急雪夜三更不知賀若今存否夢裏琴聲大蠏行題趙承㫖畫羊三百羣中見兩頭依然秃筆掃驊騮朅來清逺吴興地忽憶蒼茫勅勒秋南渡銅駝猶戀洛西歸玉馬巳朝周牧羝落盡蘇卿節五字河梁萬古愁正月上旬過朱竹垞太史齋中諸花盛開賦二絶句馬塍曾說野人家每先去聲東皇管物華今嵗長安霜雪少試燈風裏見唐花十笏如聞功徳香曼殊陀利兩芬芳偶來小坐談空處政要天花作道塲立齋相公齋中蕉花開索賦六絶句漢主初開扶荔宫甘蕉花入上林紅今朝獨樂園中見始信嵇含狀最工中書退食日蕭蕭簾捲西山爽氣饒茶臼筆牀相對好一林花放膽瓶蕉膽瓶蕉狀如膽瓶玉宇微凉八月中林塘香散木犀風緑天深處一花坼蝙蝠飛來相映紅南中紅蕉花開有紅蝙蝠集花中見酉陽雜俎朱蕚新抽萬卷書仙人掌露勝醍醐丹青好借黄筌筆更寫紅蕉水鶴圗紅霞一抹映瓊杯照影銀塘細細開不似平泉閑草木猶煩驛騎日南來木綿千樹粤江邉不及蕉花分外妍常記五羊城畔見一枝紅壓蜑人船董起男送風雨梅戲占爲謝故御史玉虬子吴中五月梅黄雨想像千林舶趠風珍重遺來香軟齒不須將醋沁曹公荅陳元孝寄懐不見閉門陳正字嶺雲江樹五年餘秋風欲下華陽舘粤客纔通尺素書蒲澗紅泉應不改羅浮翠羽夢全疎天南耆舊今頭白珍重新詩獨𧺫予題周文矩五王避暑圖為李奉倩中丞聞道開元日宸逰花蕚同恩深五王宅一作帳勅借九成宫竹映翠微合泉飛碧澗通披圖見隆準敻矣讓皇風喜羡門閣學卜鄰之作少小論交三十載中間離合似浮雲谷風莫問窮兼逹舊雨猶存我共君東閣從容多宻劄南臺潦倒恕彈文望衡乍喜相鄰並可許談詩坐夜分再題研山絶句示竹垞南唐寳石刼灰餘長與幽人伴著書青峭數峯無恙在不須淚滴玉蟾蜍元章詩研山不可見哦詩徒歎息惟有玉蟾蜍向予頻淚滴青峭數峯南唐元宗語題朱竹垞檢討雪景小照四首天女長空散六花疎枝冷蕊鬬横斜小身幻出維摩影費我連朝玉畫叉雪後溪山畫不如梅花林外􅘳青驢相逢莫笑酸寒甚曾校華林七録書雪屋寒林斷晚烟板橋流水尚濺濺不逢才子安鴻漸㝎是㐮陽孟浩然風急天山雪打圍下韝鷹疾掠空飛誰知驢背江南客手拗寒香插帽歸題小長蘆圖三首為竹垞作史筆髙三館歸心戀五湖分明鰕菜好冩出小長蘆膝上佳兒文度眼中秋色江邨歸路不須扶杖笑凭桐孫稻孫竹垞二孫名一簑一笠日相随不似官人似釣師七字