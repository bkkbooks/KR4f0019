front:
  text: 漁洋山人精華録卷十門人候官林佶編
  hash: sha256:9ef24091045cc59f51bb4117a42a06ca4a6570ea032ccb02a3f94a75aff6b625
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_010-1a}
body:
  text: 今體詩贑州別丁雁水僉事與君暫相見揮手古􅐚州孤棹山俱逺雙江水亂流急灘穿詰曲深竹呌鈎輈離別兼羈旅中宵感白頭新淦道中懷門人林公韞兼寄丁雁水七載相思木蘭道那知相見鬱孤臺江湖􅐓洞扁舟逺賓主東南一代才伏雨闌風朝復暮滄波白鳥去還來三洲不共窪樽飲懷抱何因得好開豐城曲江亭磯山髙百尺磯下曲江流芳杜蕭蕭暮金花歲嵗秋金花潭青峰相嫵媚白鳥自滄洲已矣干將氣宵分望斗牛吳城登望湖亭寄周南康星公東南臨眺美何如信有孤亭切太虗極浦長風生左蠡畫簾清晝對匡廬九江潮汐迎人逺五老鬚睂見面初明日玉淵潭上酒共看飛瀑駐籃輿彭蠡守風送孫豹人之南昌茫茫彭蠡雨漠漠匡山雲雨帶孤帆去雲將別緒紛蛟龍深自喜牛馬望難分三峽橋邉水扶笻昨共聞開先寺贈顒公古寺升元舊興亡感至今晴天雙瀑下急雨萬松深但有龍聽法何須地布金琴髙不可即隂峽畏登臨蘇公開先潄玉亭詩欲從琴髙生云云招隱橋萬仞黃巖瀑流過招隱橋長松吹細雨水石共瀟瀟萬竹亭大竹如盆盎森梢覆古巖試嘗甜苦笋亭上脫春衫佛印松印公手植松挺若舟千斛山空孤月明傳聲亂飛瀑南唐元宗讀書臺猶存讀書臺不見升元閣寂寂青桂花巖間自開落青玉峽廬南萬古峽常有野雲封朝來雷雨過白日下飛龍聰明泉手掬聰明泉一滴大海味不逢桑苧翁知希我方貴王文成紀功碑文成摩崖碑其字犬如手萬古一浯溪光芒同不朽大孤山宫亭湖上好煙鬟倭鬌初成玉鏡間霧閣雲窗不留客蘋花香裏過鞋山石鐘山蘇公逰賞後餘韻石鐘山水石長如此行人自不間鶴巢丹壁上魚罱翠微間安得乘明月扁舟數往還即事二絶句吳頭椘尾浪花粗終日彭郎對小姑楊葉洲邉望煙火江南江北雨糢糊往來不見馬當船三日蘆中少㸑煙東望皖公才百里金陵難似上青天江上看晚霞三首彭澤縣前風倒吹三朝休怨峭帆遲餘霞散綺澄江練滿眼青山小謝詩白浪空江斷去人連朝風色起青蘋小孤山外紅霞影㝎子當筵別是春瀟瀟寒雨暗潯陽日曰江潮過馬當東望滄溟天萬里乘風欲度赤城梁皖城懷古四首憶昨經過射蛟浦今朝還望盛唐山大江日夜流如昔武帝雄風去不還天馬蒲桃空塞外飛廉桂館自人間茂陵抔土秋風裏玉女何曾解駐顔龍舟曾颭錦帆風回首淮南事不同降邸已聞營汴上皖公猶自落杯中豫章一去歸何日廬阜重來隱未終苦憶舒州徐騎省江潮東下雨𪷟𪷟清水塘邉余闕祠雲霄浩氣凛鬚睂英姿颯爽猶橫槊古砌荒涼只斷碑鶴化千年非故國雞鳴十廟不同時皖江便是田橫島義士悲歌為涕洟羅剎磯頭落日懸侍中遺迹至今傳椘纍有恨沉魚腹蜀魄何心化杜鵑家國幾看陵谷變江山猶痛革除年青溪血影留遺石巾幗還應愧世賢泊夏家口二首秋浦猿聲夜孤舟客乍聽星星見漁火已到缷帆亭已近梅根冶江流更幾灣明朝風日好應見九華山荻港荻港東來指赭圻估帆停處一鷗飛大江小汊縱橫入蓼岸藤灣逺近圍勝地不留逋客住暮潮間送夕陽歸黃公戰處今殘壘慿眺休登板子磯板子磯板子磯前路風帆之字行紅花將翠篠的的可憐生石上紅花低照水山頭翠篠細含煙楊誠齋題板子磯詩句蟂磯靈澤夫人祠二首白帝江聲尚入吳靈祠片石倚江孤魂歸若過劉郎浦還記明珠步障無霸氣江東久寂寥永安宫殿莾蕭蕭都將家國無窮恨分付潯陽上下潮江行望識舟亭鳩兹北面識舟亭天際歸帆望杳冥松竹隂中孤塔白樓臺缺處數峰青赭山人去生春草江水潮回沒舊汀更憶于湖玩鞭迹吳波不動客揚舲溫飛卿于湖曲吳波不動椘天碧天門山夜泊萬里孤舟泊今過博望山勝逰非夢到絶域此生還列宿垂江濶踈螢點鬢班宵分望明月歸思折刀環牛渚望青山峰色如橫黛江光似尉羅昔人行樂地今日復來過小謝青山宅桓公白紵歌他年尋菌閣終向此巖阿太白祠白也祠堂在前臨牛渚磯風流映江左山水尚清暉小謝東田近開元舊事非姑溪好風日逰子亦忘歸然犀亭不是溫忠武誰堪第一流飛書先赴難灑淚獨登舟赤幘驚幽渚黃旗指石頭孤亭臨玉鏡淅淅荻蘆秋蛾睂亭采石磯頭百尺亭下臨天塹晝冥冥天門中斷椘江濶日日蛾睂相對青烈山古寺紅牆出翠微莓苔石壁滴人衣一行白鷺衝船起卻上半巖松頂飛抵金陵佳麗金陵道垂楊夾去津潮迎落帆客花映倚樓人依舊青山繞如何白髮新昔逰三十載髣佛記前塵石城橋示倪雁園太史昔作秦淮客朱樓賦洞簫白頭故人盡重上石城橋雨過醉翁亭三首出郭逢樵牧橋回境已幽門前荇溪石即菱溪石亭下釀泉流禽鳥鳴何樂松篁颯似秋吾生嗟太晚不及醉翁逰風景非疇昔亭猶號醉翁曾將幽咽意併入七絃中我欲攜琴客臨流撫古桐不逢沈夫子噭噭夜猿空歐梅映池閣半畝散清隂老幹猶存古孤花開至今氷溪尋寺逺雪路入山深此際巡簷好寒香伴苦吟晚至豐樂亭豐山髙不極到寺已昏鴉一塢含桃樹滿山烏桕花僧雛汲幽谷泉在幽谷活火試新茶歸去松蘿暝嚴城報暮笳天慶觀宋立端命殿于滁以奉藝祖置觀于其側宋家天慶觀古迹近千秋原廟春供祭衣冠月出逰莓苔蒼鼠竄風雨杜鵑愁西洛諸陵逺蒼茫接汴州西澗西澗蕭蕭數騎過韋公詩句奈愁何黃鸝喚客且須住野渡菴前風雨多澗上有野渡菴取韋詩命名清流關瀟瀟寒雨渡清流苦竹雲隂特地愁回首南唐風景盡青山無數繞滁州懷王隼梁無技王字蒲衣梁字王顧皆南海人二子才何妙間門對海濱翻經裁白㲲行藥過青春綺麗誇宫體風流似晉人最憐閨閣裏清詠玉臺新王婦潘梁妹皆工詩寄蒲澗範公憶訪菖蒲澗榕隂席屢移泉聲微雨裏江色夕陽時空谷無殘客諸方問導師杼山詩法好慚負碧雲期見田家飯牛者意有所感賦得牛飯就松涼故友宣城梅磊杓司句也黃犢東臯暇青松北澗生卧餘芳草軟飯處午隂清寧戚歌偏拙華陽計早成勞勞行役者三歎憶巖耕歸次臨淮歸路仍淮水﨑嶇嶺海餘我行萬里道未得一行書漁户緯蕭接估船吹笛初今宵孤館裏鄉夢復何如苻離萬里歸來兩鬢蒼閲他南漢又南唐短衣射虎心猶壯重過苻離古戰場雨中渡河望黃樓已見河魚上冥冥雨未休一條飛白浪十丈捲黃樓杳靄龍山隱空𪷟雉堞浮平生仗忠信欲下吕梁遊錢牧翁喜李長蘅詩榖城山好青如黛滕縣花開白似銀佳句也豫冬夏兩過滕不見一花因成絶句薛北滕南屢問津逺山如畫黛睂新唯餘底事堪惆悵不見花開白似銀嶧山即事雨足煙村事不間家家驅犢出柴關棗花香遍濃隂合水碧沙明望嶧山宿唐濟武太史志壑堂即事新竹捎簷夜氣清忽聞山鳥報寒更單衾喚起瀟湘夢落月已西天未明書堂道中山勢圍黃鵠書堂望愈孤行幐逐禪侣荷篠問樵夫鳥道捫參井人煙倐有無入雲鐘梵近失喜一相呼石梁窈窕度漁梁縈紆一水長臨流多白石列坐復垂楊歷歷禽魚影蕭蕭蘭杜芳雞鳴在何處小塢出松篁栁菴溪行路不極溪上出香林一夜前山雨千回石瀨深空花春漠漠仙梵午沉沉舊識旃檀味還能悅衆心栁菴西方丈夜坐踏閣攀林罷間階坐夜分木犀春半發鼻觀㝎中聞舉首見明月西峰歸片雲徘徊戀清景溪籟逺紛紛于兹仙人祠我愛寒山好招尋白兔公還過于兹道倚徙古祠空碧水流春澗清猿嘯晚風傳聞駕鸞鶴來往月明中趙北口莫問公孫事茫茫感逝波晚潮魚􆈒急夜火蟹簾多大麓諸流會春風萬乘過年年水楊栁頭白此關河女郎山卧輿夢初起遙見女郎山雨過開奩鏡煙消露髻鬟靈祠空翠裏瑶瑟碧雲間不是崔羅什何因奉玉顔題查夏重蘆塘放鴨圗三首橫塘盡日雨𪷟𪷟間倚笭箵挂釣筒坐愛琉璃一千頃菱花風急罥鳬翁鴨母船依湖水濱船頭長日飯龜蓴慿誰寄謝桓南郡不是鵝欄教鬬人鴨頭丸帖種魚經盡日蘆崎泛渺冥何似漁陽隨突騎天風齊放海東青題張力臣小照二首瘞鶴銘邉攜屐日羊侯祠下缷帆時吳山椘水探竒遍不覺秋霜點鬢絲金石遺文太放紛摩娑千卷對罏薰白頭更訪鴻都學手拓陳倉石鼓文題沈客子林屋幽居圖五首萬頃玻璃不受塵樓居髙與太清鄰𬗋泉石髓儻留得我欲因之窮左神隱几春山似畫屏下窺玉柱接金庭禹書縱遣靈威守合為幽人一啓扄五月楊梅血色斑雲林十里畫圖間杉皮屋子青苔徑獨占吳王銷夏灣玉堂酒渴夢江南林屋東西路舊諳煩汝封題三百顆夜來霜信到黃柑漁洋山下是吾家山北山南半種茶留得繖山方竹杖待君風雪探梅花栖霞𬗋峰閣前有方竹一叢豫取以作杖方爾止銘之追和東癡釣臺懷古帝業真歸赤伏符故人不作執金吾猶嫌齊國知男子終隱桐江學釣徒鼎足三公慎要領師中十載白頭鬚清風萬古嚴陵瀨知有雲臺博士無范升也憶石帆亭寄兒輩四首梅花香裏置茅亭下有蒼筤萬箇青聞道故園三日雪與誰同聽玉瓏玲磬口檀心世外香幽姿那點夀陽籹祗宜霽雪明窗裏手拓疏花寫硬黃仙人鸞尾何年墮池北池南共歲寒又向東華騎瘦馬春風先問竹平安麥顆風爐手自烹林園急雪夜三更不知賀若今存否夢裏琴聲大蟹行題趙承旨畫羊三百羣中見兩頭依然秃筆掃驊騮朅來清逺吳興地忽憶蒼茫敕勒秋南渡銅駝猶戀洛西歸玉馬巳朝周牧羝落盡蘇卿節五字河梁萬古愁正月上旬過朱竹垞太史齋中諸花盛開賦二絶句馬塍曾説野人家每先去聲東皇管物華今嵗長安霜雪少試燈風裏見唐花十笏如聞功德香曼殊陀利兩芬芳偶來小坐談空處政要天花作道場立齋相公齋中蕉花開索賦六絶句漢主初開扶荔宫甘蕉花入上林紅今朝獨樂園中見始信嵇含狀最工中書退食日蕭蕭簾捲西山爽氣饒茶臼筆牀相對好一林花放膽瓶蕉膽瓶蕉狀如膽瓶玉宇微涼八月中林塘香散木犀風緑天深處一花坼蝙蝠飛來相映紅南中紅蕉花開有紅蝙蝠集花中見酉陽雜俎朱蕚新抽萬卷書仙人掌露勝醍醐丹青好借黃筌筆更寫紅蕉水鶴圗紅霞一抹映瓊杯照影銀塘細細開不似平泉間草木猶煩驛騎日南來木綿千樹粵江邉不及蕉花分外妍常記五羊城畔見一枝紅壓蛋人船董起男送風雨梅戲占為謝故御史玉虬子吳中五月梅黃雨想像千林舶趠風珍重遺來香軟齒不須將醋沁曹公答陳元孝寄懷不見閉門陳正字嶺雲江樹五年餘秋風欲下華陽館粵客才通尺素書蒲澗紅泉應不改羅浮翠羽夢全疏天南耆舊今頭白珍重新詩獨起豫題周文矩五王避暑圖為李奉倩中丞聞道開元日宸逰花蕚同恩深五王宅一作帳敕借九成宫竹映翠微合泉飛碧澗通披圖見隆準敻矣讓皇風喜羡門閣學卜鄰之作少小論交三十載中間離合似浮雲谷風莫問窮兼逹舊雨猶存我共君東閣從容多密劄南臺潦倒恕彈文望衡乍喜相鄰並可許談詩坐夜分再題研山絶句示竹垞南唐寶石劫灰餘長與幽人伴著書青峭數峯無恙在不須淚滴玉蟾蜍元章詩研山不可見哦詩徒歎息惟有玉蟾蜍向豫頻淚滴青峭數峯南唐元宗語題朱竹垞檢討雪景小照四首天女長空散六花疏枝冷蕊鬬橫斜小身幻出維摩影費我連朝玉畫叉雪後溪山畫不如梅花林外􅘳青驢相逢莫笑酸寒甚曾校華林七録書雪屋寒林斷晚煙板橋流水尚濺濺不逢才子安鴻漸㝎是襄陽孟浩然風急天山雪打圍下韝鷹疾掠空飛誰知驢背江南客手拗寒香插帽歸題小長蘆圖三首為竹垞作史筆髙三館歸心戀五湖分明蝦菜好寫出小長蘆膝上佳兒文度眼中秋色江村歸路不須扶杖笑憑桐孫稻孫竹垞二孫名一簑一笠日相隨不似官人似釣師七字