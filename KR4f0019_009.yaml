front:
  text: 漁洋山人精華録卷九門人候官林佶編
  hash: sha256:b85ecfe85324a896fe37c49021affa8a242929345ee9fd4ed023e1256cf2337d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_009-1a}
body:
  text: 今體詩詔起奮威將軍鎮保寧仍用貢馬韻手詔雲霄下將軍授鉞新即看驅虎兕不必鬭麒麟百戰能輕敵孤忠久致身龍驤功第一重憶㝎三秦聞官軍復瀘州月黑斫連營嫖姚轉戰輕已探猛虎穴急扼釣魚城三峽烽相照雙江浪漸平萬州羣盗在從此事刀耕為牧仲題黄鶴山樵破牕風雨卷卷首四字分隷書古田作風雨催黄葉蕭蕭下敝廬秋凉擁衣褐老屋卷殘書逺岫茫茫失寒潮淰淰虚故園饒此境歸思近何如懐翕菴中丞沅州渺渺沅江路悠悠椘塞窮昆明猶萬里休聴鼻亭公送陸辛齋歸海寧叢菊初花秋氣深花前君唱渡江吟杜陵乍喜歸三徑寳劍猶堪直百金樽酒離亭折楊栁孤舟遥夜泊楓林若邪谿水雲門寺欲約東逰思不禁辛齋已行復來取別再送之意外復攜手徘徊下潞亭扁舟逐陽雁秋色老江萍去路潮連樹離心雪滿庭入門嘲陸展一笑攬星星送侯大年歸嘉㝎送客三江去東吴更向東潮添瓜蔓水秋老鯉魚風徃事浮雲外名家信史中明年見侯喜把釣莫匆匆題王元照仿宋元人小畫為牧仲作琅琊家世鳳麟洲翰墨人間第一流松勢髙低疑鸛啄溪紋參伍學蠶頭扶笻名岳雲峰細放鶴空亭雪棧幽白首奉常今又死買絲重擬繡廉州烟客先生以今年卒題王元式國博秋思詩後詩云秋雨茂陵人獨卧西風汾水雁還來茂陵風雨瀟瀟夜愛爾哦詩四壁秋多少長安苦吟客瘦羊博士擅風流史局漫興南山種豆憶長林東觀淹留諧隱心巫峽猿啼兵未解武谿鳶跕嵗將隂牢愁不畔中山酒慷慨還為上堵吟槖筆年年竟何補虚將衰鬢點朝簪得翕菴書昔建中丞節天邉送使車連朝薊門雪一𥿄漢陽書雲夢征鴻𧺫沅湘落木踈夜郎莊蹻路兵氣近何如送袁士旦之玉田無終東去路亭鄣古雄邉水出彈箏峽春生種玉田馬蹄穿塞雪鳥道入山烟詠史清秋夜應逢謝尚賢送李松客令髙淳託訪詩人邢孟貞遺集縣庭臨石臼風俗至今淳鳬雁成墟市菰蒲雜吏人花時閑卧閣漁舍曉班春借問詩人宅柴門滿白蘋李因是詩訪邢妻子以三百金為置腴田若干畆云懐崔不雕不雕常有丹楓江冷人初去黄葉聲多酒不辭之句為世傳誦藉甚崔黄葉才名二十年身無一枝隱詩已衆人傳屋傍撈鰕渚潮荒種蛤田風塵京洛客深愧博陵賢十一月六日星變召對紀事明河寒已沒白氣亘宵長掩月光疑晝經天夜有芒轉輸窮蜀道邉計切秦疆見說蓬萊仗公卿近御床是日有裁併秦蜀制府之命送髙念東先生予吿還山五首前身憶是陶通明山中白雲無限情滿院松風一聲鶴三層樓上坐吹笙若士雲將是夙期相逢汗漫欲何之偶然擲杖成龍去又過蓬萊日主祠何處神山滄海東巨峯萬仞插晴空青天無數雲濤捲下視辰韓墨點中巨峯勞山最髙處暮逰碧玉閬風顛朝過扶桑近日邉戯弄東王與西母神芝行處滿瓊田曾窮華蓋與鈎陳又到朱陵蜃海濱不信仙人十洲地也傳風俗似吴人再送念東五首龍門雪後山爭白金谷園中花映紅著箇香山老居士任人圖畫作屏風白詩兼聞好事者寫我作屏風解印歸來履道居風情真似白尚書孤琴隻鶴還留在駱馬楊枝卻讓渠錦湖秋色漾漣漪湖裏逰人歌竹枝斜日泊船紅蓼岸神鴉飛過魯連祠長白山中􅘳白驢偏提時掛小籃輿八騶朱雀航南路可似先生薄笨車籠水羣山繞郭明杖藜随處有泉聲名藍金碧和煙雨小李將軍畫不成曉雪稍稍侵簾額盈盈堕瓦溝竹枝全搶地芸餅未離篝風峭遲開閣窗明緩裹頭如何玉堂曉偏憶剡川逰訒菴翰長招同荆峴侍講羡門編修過善果寺偶然偕素侣佛日到香林亭午無人處青苔滿院隂三衣消瘦服半偈妙明心愛就魚山宿蕭條寫梵音輓伊翕菴中丞二首家世南充郡唐伊慎封南充郡王功名僕射看行營諸道合報國寸心丹未取黄金印先逢白玉棺招魂何處是瘴霧夕漫漫馬革平生志昆明未息戈星辰移九列書檄動諸羅歿視悲荀偃生還失伏波故人歌薤露流涕向山河瀛臺賜宴恭紀六首朝來勅賜宴淋池桂檝蘭舟待水嬉渡盡雲沙囘首望緑楊風外颭黄旗越羅吴錦尚方來黄𥿄書名繡作堆次第鵷行齊拜賜凉蟬聲裏謝恩廻御舟徃徃艤沙汀瓊島中流日㡬經不是華林樂魚鳥慈顔近在五龍亭中㫖頻傳内大臣龍眠學士命重申捧觴跪𧺫華裀上蘋末風來散酒鱗唐詩玉船風動酒鱗紅崇蘭風汎共徘徊九畹揚揚取次開鄭重天香攜滿袖移從弘徳殿中來太液池中百子蓮花開十丈藕如船酒䦨宣賜歸鞍重錯認滄洲太乙仙送毛斧季歸常熟故處士晉子也昆湖有真隱金粟緬髙風桑海遺民老襄陽耆舊空人言虞仲里又得小毛公廿載淮南別吴江㡬落楓中秋後得富順范生嘉州帥生書知其陷賊不辱偽命遂有是作㡬載豺狼横去聲巴蜀今朝書尺慰相思天彭井絡欣無恙伏劍佯狂更不疑㑹見費貽徴合浦何妨甄濟動京師汝曺識字知忠孝一笑南樓倒接䍦蘇羅國王墓在徳州王以明永樂十五年來朝賜印誥歸次徳州卒葬以王禮謚恭㝎當年重譯入長安屬國威儀盡漢官萬里滄波歸路逺九河春雨墓門寒空聞螭首生金粟無復魚膏照玉棺欲薦溪毛重迴首亂鴉殘日夕漫漫寄李鄴園尚書二首閩天烽火逹錢塘太乙靈旗指越疆文武共推周吉甫勲名誰竝郭汾陽椎牛五夜千夫膳射虎三秋百戰塲今日羅平妖鳥盡早聞憂國鬢如霜爛柯山上陣雲低太末城頭月暈齊飛檄直臨彭島外纎塵不動浙江西戰袍血濺盤鵰鶻雄劍霜寒淬鸊鵜半壁東南功不細天書頻下武都泥和徐健菴宫賛喜吴漢槎入關之作丁零絶塞鬢毛斑雪窖招魂再入關萬古窮荒生馬角㡬人樂府唱刀鐶天邉魑魅愁遷客江上蓴鱸話故山太息梅村今宿草不留老眼待君還吴梅村先生昔有送漢槎出塞長句見集中大雪過宋牧仲郎中至後第三雪依然六出斜度窗明曙色穿樹競春華清唳鶴將子暗香梅著花素心零落盡動即到君家雪中牧仲置酒邀食熊白故人寒置酒熊白亦初胹已下何公箸寧思漢殿時蟄藏元自宻攻穴苦相危當食勞三歎風花滿意吹送葉井叔歸椘落燈風急寒吹衣寒谿先生昨憶歸青門祖帳太蕭瑟白社故人今是非漢上題襟情不極郢中懐古和真稀碧雲無際椘天濶目送瀟湘春雁飛井叔近示郢中懐古詩甘首甚工送汪舟次檢討林石來舎人奉使琉球四首屬國滄波外微茫萬里流雙持龍虎節遥拂鳳麟洲守禮諳殊俗乘槎愜壯逰使星霄漢上先入大琉球掛席指歸墟通言隷象胥避風占海鳥䟦浪舞神魚卉服看天使金函䕶璽書雄才能作賦休讓木御名虚積氣浩茫茫乘流出大荒嘯歌聞海若擊汰薄扶桑日月相吞吐蛟龍或遯藏始知九州大騶衍未荒唐見說彭湖嶼元戎佇捷勲習流多戰士横海拜將軍出險雲濤壯飛書露布聞早成風土記歸報聖明君上陵歌四首兩京相望海雲開馳道如弦候騎催金馬碧雞新奏捷太平天子上陵來令支廻合萬重山閃日旌旗虎豹閑東望風雲過沛上西來車騎出蕭關遼水東廻北鎮斜龍盤虎踞帝王家依依最是關門栁十二年前拂翠華辛亥大駕謁陵扵盛京今十二年矣艱難王業本岐豐扶杖來觀父老同詔賜大酺還給復一時歌舞徧遼東贈蔣京少靈潭名玉女窈窕冨仙蹤蔣子讀書處雲嵐深㡬重曾過洞庭野長嘯祝融峯他日期相訪潭烟吟夜龍張祐玉女潭詩可當烟月下一聽夜龍吟荅沈客子示洞庭新詩吴越具區藪中浮兩洞庭逸情逐花水長嘯獨揚舲靈笈傳神禹丹砂訪蔡經抽帆吾計得同看莫釐青爲㓜華題五子論文圖馳情渭北樹注目江東雲不是顔光禄誰當詠五君雨後至天寧寺凌晨出西郭招提過新雨日出不逢人滿院風鈴語㓜華給諌招同愚山健菴大可季甪集祝氏別墅黄門休沭暇池館愜招尋人語碧苔徑鶴鳴修竹林微風交落絮流水澹春隂坐愛鯈魚樂悠然濠上心吾州休夏吾州好明湖爽客襟亭横帝子渚北渚亭溪繞使君林酒愛碧筩飲詩成白苧吟凭欄指千里雲外數峯深錢選折枝牡丹二首三尺霜縑寫䑕姑檀心倒暈貌來殊如今疑夢還非夢曾向南泉見一株卷中多衲子詩驛騎筠籠進折枝洛陽金粉入宫時永嘉水際知多少謝客曾無五字詩滇南凱旋歌六首鈞天樂動五城樓玉輅前行十二斿親見萬方頻送喜翠華三度幸盧溝湖南福建雲南大軍振旅皆駐蹕盧溝郊勞將軍收取舊山河飲馬蘭滄萬里波珍味天厨人不識禁中特遣一封駝升中大禮視圜丘黄幄天清宿霧收朝罷將軍先受賞尚方催進𬗋貂裘都人夾道看旌旄萬里歸來血洗刀韝上竒鷹皆帶角仗前天馬盡拳毛原廟衣冠二十春太平今見上陵辰象犀瑇瑁新供祭巧使安南僃九賓上將謁孝陵適安南國請封表至京清時王㑹徧諸方絶調昇平嗣柏梁從此漢家新樂府白狼添詠又三章今年上元賜朝臣宴扵乾清宫效柏梁體賦昇平嘉宴詩御書頒賜㝎武蘭亭䟦尾二首繭𥿄風流世不傳昭陵玉匣死難捐乞兒一物雖癡絶猶勝分香望墓田片玉明駝出禁門人間蟬翼重璵璠一般雲散宣和刼不及陳倉十鼓存寄曰緝侍御與君契濶十載餘聞君卻掃身巖居中年頗學慈氏法邇來兼讀長桑書梅開臘月一杯酒鄢陵臘梅冠天下氷泮黄河雙鯉魚擬向老禪分半席狸奴白牯意何如憶公㦷吏部公㦷未歿前一日與其友蘇銘茂斿在鳳陽龍興寺禪喜竟日歸旅舎遂化去是夕見夢扵蘇吟詩云六十年來一夢醒飄然四大御風輕與君昨日龍興寺猶是柂泥帶水行弱草棲塵漫自驚知君解脫萬緣輕分明一笑凌雲去撒手靈芝殿上行朱浙清明上河圗二首萬伯修司馬家物金明池上栁吹綿仕女紅粧照水鮮學取鵝黄宫様窄一雙新畫孟家蟬夢華彷彿舊東京瞥見丹青眼暫明忽忽停盃縁底事西風殘照近青城送虞虞山通㕘予告歸雲南時年八十有五特賜馳驛兩朝黄髪承恩久萬里青蛉擁傳歸驛路近南梅信早家山向日鷓鴣飛刼灰歷後昆明在華表來時故舊非檢點賜衣重灑淚孝陵松柏巳成圍得董玉虬侍御書離別是何日蒼茫十五年形容非少壯喪亂各風烟諌草今誰識遺經好獨傳君註三禮故交零落盡有夢太湖邉題徐騎省集後二首江左黄星事又新蕭蕭白髪入咸秦茂陵玉盌通天表未信初明是恨人菽寥小雪閑中過斑駁新霜鬢上加徐句擁鼻微吟一惆悵殘年風景又天涯冬夜詠說巖翰長貽詩感舊賦懐兼呈容齋侍郎凍雲釀雪故低垂手爇松明漏箭遲半世心期三嵗字殘年風景六篇詩草橋南畔看花處浴殿西頭下直時暗數同逰㡬人在吟成催白數莖絲喬子靜編修見示使粤集既為序之復得一絶句書扵卷尾澧蘭湘芷供章句海雨江風生齒牙卻笑陸郎無此筆歸裝空載日南花和陳子文入蜀詩二首鳳州三絶無纎手又少旗亭酒共傾唯有金絲㡬株栁臨江映驛拂人行古稱鳳州三絶手栁酒右鳳縣金絲栁乍食西川諸葛蓴重誇楊檏𬗋芽辛栁家新樣君從擅多少薑芽歛手人子女㝡工書法故云右蜀薑䟦子文入蜀詩卷萬里有行役三巴誰賞音經過下簾客風調倚樓吟羯鼓髙臨水蟬花秀出林舊逰離亂後棖觸十年心玉泉御宿川南似渼陂碧琉璃滑淨無泥穠桃弱栁垂垂發沙燕鵁鶄故故低銀漢紅牆九天上流雲𬗋閣數峰西太平暇日稀逰豫碧草春深輦路齊頃和子文蜀薑詩殊非本意再成一首蜀味初嘗萬里餘子薑作鱠憶鯔魚相思若遇東吴使為報張温欲附書懐東癡之徳安垂老匡廬去初看九疊屏江湖春浩浩雲霧晝㝠㝠名續髙賢傳人占處士星伍喬事相思問鴻雁㡬日泊宫亭興州聞說興州地炎天氷雪遲行宫餘故礎野蔓覆殘碑虎旅廻遼海鸞旗拂具茨名王今欵塞千帳荷恩私趙玉峯通政招同沈繹堂宫詹張