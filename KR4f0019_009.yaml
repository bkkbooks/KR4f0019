惜好春佛桑花下酒應憶北歸人三水月夜別陳宗德程衎祖碧天月皛皛江水風蕭蕭明發一爲別孤踪千里遥梅關稀見雁中宿不通潮好寄相思子時時慰寂寥十五夜峽口對月寄廣州諸故人峽口今宵月其如客思何離離見珠斗穆穆展金波故壘餘蕭勃殘山弔尉佗珠江猶一水相望似秋河雨入湞陽峽野泊開頭早重隂入峽寒側過釣魚石逆上牯牛灘雨逼驚瀧失雲從大壑看十年經劍閣轉見路行難歸度大庾嶺大庾連横浦艱難此再經鬢從五嶺白山入百蠻青嶠水流炎海榕隂數上聲驛亭今宵望南斗漸逺使臣星抵南安嶺南巳負荔支天横浦重過意惘然暫借谿樓看山色蠟花如雪寺門前南安人以蠟樹爲業彌望皆是荅鍾聖輿送芍藥新緑横牕穏晝眠一簾微雨似輕烟午晴睡𧺫維摩榻花氣熏人又破禪常𬗋侯少司空使西域囘有贈曾騎白馬度安西絶域名從屬國題雪嶺天寒人去少河源日落鳥飛低彈棊握槊分曹出皓齒青娥按拍齊東入陽關更囘首輪臺春草正萋萋送王石谷南歸君憶慧車子言歸烏目山帆随五湖濶心與孤雲閑潑墨營丹嶂開籠放白鷴遥知破山寺髙卧掩松關漁洋山人精華録卷九門人監察御史崑山盛符升國子祭酒江隂曹禾同訂候官門人林佶恭謄寫男啟涑恭閱
