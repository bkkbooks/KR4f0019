front:
  text: 用韻答别容齋説巖二學士訒菴侍讀憂患餘生見面遲故人驚喜鬢成絲茶盃冷澹香殘處麈尾横斜月落時沙磧斷鴻千㸃沒都亭衰柳數行垂霑襟又作銷魂别不為中年好酒悲
  hash: sha256:77a4d16ce9bb5aebf87d4c9226e98d31cb86060e0117dcfa97a9d59240333017
body:
  text: 再别李容齋陳説巖葉訒菴三子長安幾度别忽作白頭翁君輩還簪筆吾生自轉蓬王師懸楚塞羣盜横闗中努力匡時畧歸心滄海東阜城感偽齊劉豫作殘堞昏鴉外人烟古阜昌龍蛇逢戰鬬羖䍽慨興亡父老思宗澤朝廷負李綱紛紛齊與楚一笑對斜陽元裕之詩河邊羖䍽尚能飛無角無鱗自一齊張邦昌亦河間東光人過邢子愿先生墓秋晩犁邱道西風黄葉深婆娑歎官柳惆悵少來禽一代風流絶孤墳牧豎侵通家懷舊客重鼓雍門琴閲先兄西樵故書泣賦丹鉛脱手尚依然淚灑蛛絲對舊編南面百城如昨夢河東三篋憶當年縱横鼠跡承塵上零落苔花廢砌邊痛絶人琴今已矣牙生從此竟摧絃傷十笏艸堂梅竹二首西樵先生讀書處蒼苔被門巷風動蕭蕭竹孤鳳不重來磊砢空節目種樹人何在三逢嵗暮時夜來風雪裏無復舊連枝過古城格孫城外逺烟迷瘦馬凌兢上大堤茅屋幾人輸井税田家終嵗把鋤犂殘碑剥落横苔蘚古道縈迴長蒺藜陵谷消沈盡如此一聲村落夕陽雞西堂甘橘初熟招東癡二首昨宵霜信熟黄甘小閣離離夕照酣為報故人須過飲掛帆何必洞庭南楚頌吟來憶左徒酒牀新漉待招呼田園别後春蕪長欲買青山種木奴雪中題七賢過闗圖雲重雪堆門空堂破帽温風流七賢逺圖畫百年存鳥沒藍田縣梅開灞水村開元舊時老招得幾吟魂題黄鶴山樵畫憶昨茅齋雪霽時地罏松火夜談詩春風騎馬長安去如此溪山坐付誰吕忠節公輓詩二首為敬芝侍御作一自澠池渡風塵天地昏銅駝悲故國龍種失王孫司馬空居洛巫陽詎返魂長令懷古者流涕上東門紫陌臨伊岸青山抱洛中殽函失天險父老哭遺忠秉國人誰在騎箕恨未窮橋陵西望近應逐鼎湖弓為許生洲比部題梅淵公畫柏梘山中舊草堂溪流淼淼樹蒼蒼白雲谷口不飛去卧聴松風春畫長題董舜民蒼梧詞追悼訏士文友南望毘陵路江流日夜東應徐常調盡嵇吕舊遊空才子蒼梧怨清詞白苧工依然鄰笛起悽斷夕陽中送許竹隠之紹興二首一棹西陵去名山入剡中放衙臨鏡水行部逐樵風江渚鳶烏集蘇臺麋鹿空沼吳兼霸越懷古意無窮蟬聲集深樹驛路遍槐花黄鵠逝千里浮雲天一涯鶯啼范蠡宅草長謝敷家迢遞相思處春風滿若耶夢中作凉雲止復行水花開更落烟柳夕陽時蟬聲動髙閣送董樵歸成山舊隠白社何年别威輦相逢颯颯鬢毛蒼飄零楚客紉蘭佩蕭瑟無且剰藥囊隠處神山鄰九㸃愁來兵氣動三湘水仙操罷扁舟去海水天風萬里長招魂八桂荒雲外三湘落照中空城盡豺虎戰士幾沙蟲生死無消息傳聞有異同招魂關塞黑杳杳暗青楓秦中凱歌十二首上相乗春西出師至尊推轂建旌旗兩宫絡繹黄封下天廐飛龍賜與騎新開麟閣賞元功頗牧重看出禁中此去西人須破膽將軍昨日下遼東康熈十四年圖公以副將軍平察哈爾獻俘闕下軍中歌舞喜投醪令下如山戒驛騷扶杖已聞秦父老王師有詔肅秋毫天上黄河萬里來巨靈高掌抱雲臺遥看丞相行營過日射潼關四扇開韓文公詩日出潼關四扇開相公親破蔡州迴涇原西北駐王師尺一無煩介馬馳共道皇恩天浩蕩不教京觀築鯨鯢莫愁登隴望秦川休道長安在日邊驛騎流星催露布捷書三日到甘泉虎狼十萬競投戈不唱三交隴上歌朝見降書來北地暮看烽戍罷朝那慶陽固原相繼降衮衣照路有輝光班劒威儀出尚方大將櫜鞬迎道左萬人鼓吹入平凉三軍解甲隗囂宫百丈磨崖待勒功欲紀元和天子聖更攜參佐上崆峒丹青圖畫上麒麟五等俄驚寵命新未許熊羆歸禁籞且懸堂印鎮三秦部議圖海封二等侯有二等㫖封公河西三將氣如虹百戰功名次上公詔下一時齊虎拜漢朝争羡竇安豐將軍張勇進爵靖逆侯提督王進寳進奮威將軍總兵官孫思克進凉州提督三月軍烽次渭橋旋看飲至紫宸朝空言韓范威名大五路何曽制曩霄得留仙書知將入楚還吳戀子舍適楚動離心列戍洞庭埜征帆雲夢林寒潮秋望逺楓葉暮愁侵此去逢漁父休為澤畔吟寄汪苕文堯峰隠居四首卜築何峰好堯峰近太湖蓴鱸供客饌橘柚足官租泥飲從田父題詩付獠奴蕭然山澤裏真有列仙儒海内紛傳檄烽烟數驛騷算緡諸道急伐叛幾年勞久已疑吳濞頻聞赦貫髙步檐還倚杖中夜首應搔黄公壚下過感舊每停車哀樂中年事艱難逺道書新知虚託契老輩久離居生意憐枯樹婆娑畧似渠欲訪天隨子來過甪里村五湖正秋色一棹到閒門林屋探仙跡咸池問水源㗳然白雲外相對坐聞猿題江辰六借書圖二首何處淹留可判年亂書堆裏日髙眠何人解似宣城守手為江郎割半氊飲馬荆江戍火紅龐睂書客悔雕蟲諸生亦有封侯相一巻隂符兩石弓題冒辟疆姬人圓玉女羅畫三首雪後空庭氣蕭瑟千頭䊸竹尚嬋娟畏寒凍雀不飲啄斜日蹋枝相對眠踈篁寒雀記取凌波微步來明珠翠羽共徘徊洛川淼淼神人隔空費陳王八斗才水仙堂堂䇿䇿百千頭荇葉菱花滿碧流彷彿吳興騎馬處江南風色白蘋洲蘋花戲魚題汪季用百尺梧桐閣巻二首别館多梧桐偶此成幽寂獨向髙閣眠夜聞疎雨滴百尺髙樓上何人相往還夕陽海門樹秋雨江南山再題梧桐閣巻河漢澹中夜碧梧隂漸疎幽人坐髙閣秋色滿巖居風竹同蕭瑟蒼苔倦掃除數峰江上好朝夕映琴書和曹陸海舍人壽良懷古二首長城自壞復誰尤戰地經過憶唱籌野鳥啼春寺門寂可憐猶似白符鳩右鳳山寺檀道濟戰場鐵鎗名抵周陽五夾寨楊劉各一竒可惜英雄為梁死不知世有鬭雞兒右王彦章故宅荅盤山拙菴道人寄電光雲鶴諸集曹溪遊萬里酌水問南能世界隨縁住人天最上乗蕭然白足侣不作紫衣僧寄我新吟巻清凉五月冰悼亡詩二十六首哭張宜人作一錯誰能鑄六州藁砧無復望刀頭當年對泣人何在獨卧牛衣哭暮秋少小香閨熟女儀雞鳴長自軫風詩君如徳曜齊睂日我愧樊英荅拜時門第河東雙㦸圍當年燕子􅅖誰飛可憐陌上花開後常送香車緩緩歸小閣垂簾日掃除罏薰茶具宛精廬紅囊揀得釵頭茗手瀹清泉伴著書千里窮交脱贈心蕪城春雨夜沈沈一官長物吾何有卻損閨中纒直善切臂金辛丑春閩中友人許天玉公車過廣陵以匱乏告予適無一錢宜人解腕上條脱付予贈之樵蘇絶爨未知愁林下風期矢白頭廿載無衣搜藎篋不曾悔卻嫁黔婁雪白花紅繡褓齊頻年靧面祝中閨牙牙學語今何似忍聴驕兒索母啼病中送我向南秦感逝傷離涕淚新長憶啼猿斷腸處嘉陵江驛雨如塵灞橋秋雨望秦川劒閣西風聴杜鵑萬里不歸歸有路雙魚何處達重泉三載西風䧹影分登髙淚盡隴頭雲從今腸斷重陽節又採寒花酹細君先兄西樵以癸丑秋沒蚤嵗曾期共隠居祇應桓孟得相如青山縱有歸來日更與何人挽鹿車鋪首經秋澀緑苔承塵蛛網任成灰祇餘金縷裙猶在爭忍無情布施來遺掛空存冷舊熏重陽閣閉雨紛紛方諸萬㸃鮫人淚灑向窮泉竟不聞肅肅靈風冷繐幃亭亭孤月掩重扉寶釵明鏡俱黄土悔煞秦嘉上計非帖子宜春認舊題粧樓人去草凄凄東風不啓葳蕤鎖一任空梁落燕泥樓角參差幾曲欄繞欄親種碧琅玕月明昨夜風驚竹翠袖何人倚暮寒春前小别死生分望斷新阡宿草墳我似東坡老居士何年歸哭魏城君年年辛苦寄冬衣刀尺聲中玉漏稀今日嵗殘衣不到斷腸方羨雉朝飛愁見新年改故年朔風吹雪欲寒天黄金屈戍中宵閉長伴鰥魚夜不眠續絃膠與返魂香碧海青天路渺茫若使少君真有術不辭千里到稠桑熒熒薤露葉還低華屋山邱理亦齊四十年來成小劫悤悤何暇唱黄雞春事愁中復病中可憐寒食到悤悤故園夢去瀟瀟雨一樹棠梨照殯宫藥罏經巻送生涯禪榻春風兩鬢華一語寄君君聴取不教兒女衣於戲反蘆花陌上鶯啼細草薰魚鱗風皺水成紋江南紅豆相思苦嵗嵗花開一憶君錦瑟年華西逝波尋思往事奈君何若為乞得江郎筆應較文通恨賦多宦情薄似秋蟬翼愁思多於春繭絲此味年來誰領略夢殘酒渴五更時聞方山北山諸公連日出遊戲寄公子春蕪白鼻騧病夫擁褐客天涯城南幾日無風雨十里徐熙落墨花絶句石帆山後黄茅屋一樹寒梅作意香長憶花開風雪裏卧聞春雨滴糟牀曹正子邀同家兄子側及諸君豐臺看芍藥晩過祖氏園亭八首回首旗亭畫壁時重來已是十年遲應劉逝後風流盡只有恒河照鬢絲昔合肥公招同公㦷苕文諸君遊此今公與公㦷皆沒矣依然春草樊川路竝馬來過覆盎門記得城南天尺五緑蕪紅藥水邊村陂塘㸃㸃烏犍出夏木隂隂白鳥飛也似江南好風景水田一帶學僧衣宫錦千絲費翦裁䛏他婪尾殿春盃老顛賸欲相料理乞取齊奴步障來雨雨風風態自殊花花葉葉不曾孤更添練鵲和蟬蝶便是徐熙六幅圖霑溼春衣更不嫌花枝婭姹雨亷纖鬢絲禪榻心情改閒看兒郎插帽簷沙禽一一事髙格烟柳斜陽初弄姿更愛風標兩公子水葒花外立移時晩晴賦白鷺潛來兮􅊬風標之公子水檻清凉跂腳眠菱花菰葉一溪烟阻風中酒年年事絶憶春江上水船友人送白蓮花為詠無復澄江載酒船折枝猶帶五湖烟香來月白風清裏花放叢祠水驛前鴨唼池萍微雨後犀垂簾押夕陽天魯連陂上新秋色觸忤閒愁又一年初秋示董蒼水零落交遊感式微與君邂逅忍相違隆中自許真名士殿上誰知大布衣越燕巢空秋近社鱸魚風起夢思歸先生未是平原客玉貌塵中見亦稀張員外園亭送金山人歸越客有越鄉感抱琴辭上京離堂秋月色别思楚鴻聲水國三千里冰絃一再行成連何處去今夕獨移情金孝章以壬子冬畫梅寄予兄弟今六年矣丁巳七月先生之子祖生至京師始見之而先生與先兄考功皆已下世愴然賦詩四首拗取銅坑玉一枝江南春贈隴頭時到來已是塵沙劫賦得瑶華欲寄誰維摩方丈幾黄昏春草禪房日閉門成佛生天兩何處暗香疎影為招魂十笏先兄堂名春草閒房先生所居也花時鄧尉夢無聊十七年來似暮朝恨不相攜風雪裏短篷同繫虎山橋當年五字寫柴桑又寄孤山世外香一幅生綃千載意也應配食水仙王辛亥嵗先生手寫陶詩見寄西蜀唐家宰相迴翔地漢代公孫割據秋劒閣嵯峨仍北向彭門波浪自東流風雲諸將爭秦棧鼓角中宵夢益州何日西南銷戰伐浣花行樂看遨頭哭公㦷吏部二首零落親知更有誰聞君訣去不勝悲彈琴古調千秋絶説劒雄風一代竒舊館脱驂應出涕天涯磨鏡是何時故人雙鬚蒼浪在賸欲刋君第二碑廿年藝苑忝同遊迴憶音塵淚不收結客曾傾四公子論兵欲動五諸侯星名故人半化遼東鶴世事終輸閣道牛手定君文纔幾日可憐馬䇿慟西州丙辰春先生以全集寄予論次見北山遊西山詩示謝千仞吟眺清暉思不窮昔遊如夢幾人同憶君共蹋西山雪坐聴清猿萬木中山茶雪兔石罅猩紅透幾枝花間東郭眼迷離漫天風雪鷹初擊正好營君三窟時郭河陽雙松平逺為牧仲題石骨崚嶒五鬛盤河陽筆底傲秦官興亡七百年朝槿留得蒼蒼耐嵗寒孝昭皇后挽詞六首金所流塵掩瑶齋寶幄空禁花零曉露苑柳泣春風思媚傳千古深恩徧六宫唯留歌詠在應與二南同上夀慈寧日人知内則賢徽音殊未逺文母至今憐淚濺鶯花色神傷袚褉天凄凉餘故館猶近濯龍前祕殿傳金䇿神人覆玉衣四星初應曜一鑑忽藏輝脱珥言猶在乗雲馭不歸皇情宵旰切永巷漏依稀萬乗親臨送容車出國門羽儀辭禁掖笳鼔望陵園素旐浮雲慘青山落日昏臣民同雨泣哀動鳯凰原西汜沈寒月中天澹夕陽愁雲低壠樹春禁罷公桑楚挽蘭風寂虞歌薤露長通靈應有夢可到紫宸傍𣺌𣺌沙河道凄凄玉輦空綺疏扄夜月繐帳肅靈風故劒皇心切祠官禮數同榮名綸綍貴早賁九原中為尤展成悼亡二首時予喪張宜人三載矣三年明月鑒虚帷那更吟君惆悵詩不分阿灰腸斷句黄昬微雨畫簾垂金昌亭下柳毿毿長記烏啼送曉驂風景不殊人不見謝家飛絮滿江南陳其年索詩送王生之襄陽試説襄陽好曾遊路不迷江帆過峴首水竹繞檀溪市上江陵估機中竇氏妻不知征戍後誰唱白銅鞮遥題王咸中石隖山房四首我愛堯峰叟汪鈍翁憐君比屋居雲林交罨畫烟火共村墟顛倒牀頭屐逍遥谿上漁漢隂雞黍約今古意何如髙情躭野逸文采舊清門跡與市朝逺心將達者論飛泉晴界道脩竹雨連村誰識逃名客蓬蒿方灌園心逺地仍偏琴書雜坐眠湖霜收橘日社火焙茶天人意孤雲外山容太古前叩門田父至襤縷亦欣然筆墨誰能事吾宗今右丞茂京作石隖圖悠然輞川路寫向剡谿藤短彴宜行藥空林偶飯僧片帆天外影興到直須乗送宋牧仲員外𣙜贑州四首都亭一樽酒落日照行軒帆下潯陽郭春過敷淺原故人持使節微尚愛邱樊想到西林寺清吟和夜猿文成誓師處慘澹尚聞笳野戍青山逺荒江白日斜春風渡蛟浦夜雨宿龍沙戰地多新鬼須添兩鬢華章貢交流地孤城百戰餘江山應不改父老問何如五嶺稀烽火三湘動羽書似聞兵馬後租賦未全除贑石三百里寒江尺五流帆檣來島客風物逼炎州試訪端明蹟應懐清獻遊山川供嘯詠莫似賈胡留九日寄説巖院長訒菴學士二公向同内直泬寥天氣𣺌愁予無恙黄花伴索居江介黿鼉聞漸徙時聞茶陵湘潭捷鄉園鴻雁近何如千門落照凉飇發一片寒砧木葉疎遥憶故人清切地登高彩筆奉宸輿以昌樂筆送容齋閣學戲成承㫖歸來每日曛揮毫猶足張去聲吾軍只愁坡老三錢筆難稱郇公五朶雲荅徐東癡隠君小雪見懷之作積雪東原路孤村似剡溪幾年阻乗興千里憶幽棲凍雀柴門掩寒烟古木齊不逢洛陽令僵卧到晨雞題龔節孫種橘圖二首震澤鱸魚欲上竿千林風露熟金丸美人無事披香坐領得頭銜是橘官會稽内史風流甚三百封題引興長何日扁舟洞庭上與君小摘滿林霜題其年填詞圖玉梅花下交三九其年詞句紅杏尚書枉擅名記得微吟倚東閣梅花如雪撲簾旌洪昉思送湖州茶笋二絶句愛道前溪似若耶行幐歸去便移家悤悤未訊溪山好第一先分顧渚茶周妻何肉斷根塵玉版聊堪結淨因贏得武康斑竹笋從今休笑庾郎貧二月二日大雪晨起懷愚山淵公耦長夢覺聞飄瞥虚牕徹曉明蕭條同委巷悵望倚簷楹寒色饑禽語荒堦折竹聲雙羊風雪路留滯逺含情雪中簡秦對巖第二泉邊路扁舟落鏡中林塘春命酒風雪夜推篷别鶴吳田渺歸鴻楚塞通朝來吟望處流霰滿房櫳和施愚山喜梅耦長至新詩冰玉質故人蘭蕙芬相逢姑射客宛對敬亭雲雪色融春霽清談入夜分翻憐金錯贈十載託殷勤題蘇臺楊柳枝詞後二首汪鈍翁編修首唱吳越和者數百人白家半格詩曾見愛説蘇州柳最多不似蘇州柳最多樂天詩也今日鈍翁吟巻裏雨條風絮奈君何雁齒紅橋鴨嘴船麴塵風起豔陽天明湖憶得吟秋柳慘緑當年最少年予賦秋柳詩時順治丁酉海内和者亦數百家送吳僧尚徳歸堯峰迢遞青山路風流白足師安居深雪裏行道落花時京洛過寒食江帆拂柳絲歸逢尊宿問應識馬駒兒送吳天章歸中條中條最深處風物四時幽水鶴穿雲下林楓夾岸稠人烟盤豆驛村路玉溪流卧起清暉裏蕭然何所求送董蒼水歸雲間昔作甌閩客漳泉正合圍江瑶驚旅食山鳥怪儒衣邊徼逢人少諸侯好士稀長篇猶在篋感激涕交揮蒼水閩歸有見寄百韻詩送鄧孝威授正字歸海陵再示豹人當年綺里季曾友夏黄公共詠紫芝曲俱棲巖穴中鬢睂驚漢帝羽翼緬髙風一出還歸隠白雲商洛東送山史歸蕐山華山丹頂鶴清唳向西峯不羨三珠樹長棲千嵗松林巒有佳色眠起日髙舂石上流泉好菖蒲方紫茸送吳僧秋臯之津門上人有句云鳥啼殘雪樹人語夕陽山愛君殘雪句宛似碧雲篇獨向中峯住深參五味禪直沽春水岸通潞夕陽船乞食王城去遥聞袒右肩題顧茂倫雪灘釣叟圖二首垂虹秋色東南好雨笠烟蓑送此生今日三髙祠下過唯君不愧隠人名彷彿桐江百尺臺􅅖人漫作客星猜投竿一笑烟波外陽鱎紛紛入釣來送宗梅岑歸淮南相逢纔幾日復欲返東原梁父雲間樹蘭陵雨後村雄雞能斷尾野鶴詎乗軒一葉䢴溝水隨潮到里門擬山家閨怨戲為鈍翁編修作璇璣賦罷氣凌雲下直金蓮每夜分那憶璇璣圖上字錦機辛苦寄迴文送李鄴臣赴東安我愛瀟湘水粼粼見底清稍聞征戍罷遥送使君行别浦石蘭長叢祠斑竹生經過道林寺沈杜有題名午睡蘄州笛材好八尺含風漪恰稱龜兹枕閒抛玉局棋凉蟬隂卓午花鴨水平池富貴浮雲耳寧須熱客知蠅幾日亂朱紫商飇欣掃除孫郎彈不易戎子賦何如瑟瑟凉初至營營計已疎何來遽集此往事笑中書與陸冰修我愛辛齋叟蕭然無世情笑看公府辟夢憶故山耕斜日樹交䕃微風蟬一鳴知君人境外寂莫道心生初秋索梅耦長畫詩到無聲足卧遊雨牕含墨對清秋不知鄉思今多少祇寫澄江與北樓送李武曾之鳳陽郡幕武曾嘗客公㦷吏部近有樂府後補題諸調最佳年來巖谷競春姿誰遣青松獨後時七月僧廬常避客八公山色又臨岐故人惆悵題襟集好句玲瓏散水詞此地正連清潁尾西州應有淚如絲送冰修歸海昌兼寄朱生二首且住為佳耳將歸可奈何人隨吳䧹影葉下浙江波好往尋鱸鱠誰當破雀羅小叢今老去重唱竹枝歌予戊申嵗送冰修南還賦竹枝歌三首今十二年矣老大身將隠飛揚氣自雄遊燕交馬客歸越事猿公仙飯青精􅏇諸儒白虎通故人朱季在何處駕飛鴻送李屺瞻歸涇陽故國傳烽火歸來弔戰場三秋看太白萬騎塞陳倉射虎身猶健聞雞意不忘悲歌燕趙别風雨又重陽送葉井叔歸樊上六首今日華陽館誰當是劇辛重陽一杯酒風雨送歸人秋盡黄州路千峰送馬蹄夢回山館裏落月汝南雞斷岸黄泥坂寒江千尺流羨君歸去好雲夢澤南州舊業在寒溪門前五株柳遊子到家時日上樊山口西山松櫪多谷口好泉石君登九曲亭蘇公有遺跡我夢石魚湖依依問聱叟試尋脩竹林為予安井臼花燭詞二首戲為鈍翁賦鈍翁既改官翰林往迎兩如夫人皆不行而為别納小姬因賦是詩碧玉迴身奈此宵汝南雞喚夜迢迢從今倦聴蘭臺鼓莫更熏衣事早朝嬴女吹簫引鳳雛莫將縑素怨狂夫似聞一語分明寄我見猶憐况老奴䧹五聴長安雁征夫猶未歸重城聞搗練幾處寄寒衣雲夢雪中去瀟湘蘋際飛沅州射生滿好避弋人機題汪鈍翁洞庭詩後蒲帆十幅逐沙禽罨畫湖山次第尋香稻炊來鱸切玉髙林霜後橘懸金且招龍伯閒投釣卻笑鴟夷苦用心兩洞庭前三萬頃不能同上上頭吟跋傅彤臣侍御楊柳枝詞後衣上明湖舊酒㾗漢南昨夢苦銷魂仙人有恨看銅狄羌笛何心度玉門斜日靈和春殿樹西風清弋晩江村丱兮城畔新吟好只似三生石上論問鈍翁編修疾先生方丈似山茨聞道維摩病起遲乍可心情同木石依然談笑却熊羆坡詩此老神完中有恃談笑可却千熊羆别裁偽體時流忌獨抱遺經後代知遥憶玉堂清夜夢雪中花塢水邊籬又戲呈鈍翁二絶句藥罏經巻日相親隠几蕭然逺市塵聞道姬人怨服㪚也須料理苦吟身紅㽔枕畔辟寒犀夢覺時聞烏夜啼若使清齋三百日箇儂何異太常妻為愚山侍講題嚴蓀友畫山氣化雲雲作烟幽人蓑笠不知年清谿曲逐楓林轉紅葉無風落滿船送鄭郎赴粤西幕府故郎中次公子當時紅斾向西川水部風流似鄭䖍被酒共眠金䧹驛分題多在浣花牋故人一别成千載公子重逢又十年去謁征南年正少牂牁春盡水如烟寄題鮑聲來草庭愛君三徑好芳草滿南榮微雨過時緑春風吹處生紛紜書帶色瑣細楚騷名不是江潭客休悲鶗鴂鳴謝梅耦長送木瓜宣城木瓜壓西洛秋林黄處滿寒烟寄來脩竹明牕底留伴疎梅小雪前橘柚初包難逺致櫨梨雖好未須憐相思愧乏瓊琚報重賦風人第一篇辱耦長枉酬佳作有方物昔年勞入貢之句偶傚義山體再報一首兼邀施愚山陸辛齋同作作貢當年事已陳烟林摇落重含辛空臨謝朓城邊水不逐唐羌驛路塵灰可藥魚妨稚子香堪漬粉教姬人北宫賦後情何限解使韓宣賦更新賈兵部改中條别業為巢雲菴索賦右丞輞川宅江令攝山居本自香林境宜繙貝葉書花藏共命鳥池長放生魚已悟非身義何須演鹿車冬夜大雪王師時取蜀方翳翳窮冬雪蕭蕭天北風清思戴安道壯憶大梁公寂寞剡溪興蒼茫洄曲功聞雞不成寐松火夜深紅李愬弟徳亦封梁國公杜牧詩人稱小太尉國號大梁公聞奮威將軍保寧大捷秦軍四道出巴庸在徳何勞設險重寶玉大弓歸魯廟華陽黑水盡堯封賨人筒布寛新賦王祭包茅問舊供遥憶師行過枕席劒門千仞削芙蓉冬杪卧疾寄愚山辛齋耦長閉關當嵗晏窮巷少來車免豈相如病交宜叔夜書松聲含淅瀝雪色照清虚獨愛文殊好時時近起予喜聞官軍已復保寧大將臨興勢神兵下武都地中鳴鼓角天上拔蝥弧困獸誰能鬬長鯨竟就誅錦屏連劒閣絶壁勒銘無二月六日雪荅梅耦長兼示陸冰修長安春雪好作態故霏霏乍入幽蘭曲真疑柳絮飛故人同委巷曉色共清暉且擬調湯餅比鄰問陸機同愚山侍講𢎞衍菴看海棠柬梅耦長四首韋杜城南十萬家東風處處酒旗斜不知冷節悤悤過猶見僧樓一樹花木魚聲靜佛香遲日午風簾自在垂好是維摩方丈室恰逢天女㪚花時沒骨天然别有情風流何處錦官城會禽圖裏依稀見安得徐熙為寫生平陽池館亞枝紅移入香林便不同莫為叢殘自憐惜梅家詩體擅江東耦長先有三絶句送張仲誠知資縣不憚三巴逺髙名萬乗知子規聲斷處山木雨來時囊有涪州易園無魯相葵王褒諸弟子應習鹿鳴詩齋中三詠金孝章畫梅鄧尉花時雪幽人日往還生綃纔半樹忽憶漁洋山徐昭法畫芝天池白雲裏寫此商山姿感君黄綺意勝食齋房芝王玠右草書逃名東海上時復帶經鋤自是髙人筆非關餓𨽻書送江辰六令益陽二首作吏湘南去浩然尋舊遊秋風吹木葉初下洞庭流城對茱萸岸香傳杜若洲毬門髙唱在重上岳陽樓小邑稀公事髙齋俯洞庭佳期邀帝子遺曲感湘靈澬水悠悠緑君山面面青詩成閒拄笏雲際九疑亭送同年伊翕菴中丞巡撫雲南二首金馬山前駐碧油青蛉塞外陣雲收天威近已通諸賧王㑹依然徧九州銅弩雨深諸葛壘叢祠春賽潁川侯鐃歌鼓吹征蠻府萬里昆明是壯遊柏臺新命帝親除重譯西南罷羽書雒將朱鳶皆内屬越人黄屋竟何如賜來天廐飛龍馬行避中丞赤棒車荒服祇今勞睿慮要令絶域化耕鋤雨後再題梅瞿山畫松林燈明暗雨糢糊雷電㝠㝠夜氣孤破壁長松欲飛去曉來疑是坐龍圖宣和御府所藏有僧傳古坐龍圖供奉某君歸呉門索詩四首玉斧森沈罷講迴承恩别殿午仍開凌烟將相尋常事曽寫龍顔日角來歸釣呉淞四十鱸手炊楓葉飯雕胡卻思待詔蓬萊上細寫淋池斫鱠圖弄筆明牕作卧枝寫生妙處幾人知篋中藤角光於水貌得蠻鳩義燕兒一片青山短簿祠夕陽花隖帶茅茨歸心便逐江鴻去已過橙黄橘緑時聞道聞道降王入經時尚濟西徘徊為怪鳥進退類藩羝鐵券功何在金牀夢已迷回頭郿隖逺不必怨然臍荅劉子羽見懐聞君卜築處舊傍瑯琊臺海氣秋逾逺濤頭日幾迴秦封猶廣麗石刻自莓苔想像高吟罷鯨魚跋浪開閏中秋夜不寐悼亡時張淑人沒四年矣商飇淅淅響庭除竟夕蘭膏映綺疏閏氣經時驗梧葉月華重見溢方諸紅牆銀漢途難越碧海青天怨有餘怊悵江東謝希逸芳塵凝榭欲何如進馬庚申閏八月奮威將軍王進寶自固原進馬二十匹聞道安西將龍媒貢御新籋雲近閶闔行地有騏驎險阻三巴路驍騰百戰身長鳴思駕馭終為静風塵聞蜀警懐茂衍大㕘行李捫㕘井何時逹錦城懸軍今益部設險古南京䕫府公孫壘瀘江漢相營艱危望消息天末未休兵不得宋荔裳妻孥消息宋玉今終古西川信未通九原悲馬鬛八口寄蠶叢想像離綿竹艱難出大蓬猶聞豺虎亂未可泝巴東精華録巻八欽定四庫全書精華録巻九刑部尚書王士禎撰
