body:
  text: 鑾江大雪歌寄家兄西樵夜聞觱發曉瀁漭衝寒四顧江天朗雲氣欲壓揚子津濤頭直突仙人掌平生愛雪勝瓊貝况復横江發奇賞朔風獵獵犯貂裘急霰霏霏灑烏榜大澤蛇龍避寒蟄髙天鵰鶻盤空響江南羣山張畫屏玉笏嶙峋袤百丈隔江心馳茅山洞咫尺波濤絶来往遥憶茅家好兄弟驂鸞騎鶴三峰上學仙不能且學劒耳後風生致慨慷西郊大道接符離霹靂鳴弓穿宿莽玉踠神騮氣清峻金毛胡鷹颯蕭爽雄狐狡兎那得避雨雪風毛灑原壌横吹聲中歌競病據鞍盤矟真吾黨歸来一笑卧煙篷淅淅江風吹五兩南將軍廟行在泗州南公霽雲乞師處范陽戰鼔如轟雷東都已破潼關開山東大半為賊守常山平原安在哉睢陽獨遏江淮勢義激諸軍動天地時危戰苦陣雲深裂眥不見官軍至誰與健者南將軍包胥一哭通風雲抽矢誓讐已慷慨拔劒堕指何嶙峋賀蘭未滅將軍死嗚呼南八真男子中丞侍郎同日亡碧血斕斑照青史淮山峩峩淮水深廟門遥對青楓林行人下馬拜秋色一曲淋鈴萬古心家兄信宿焦山有寄聞君游松寥託宿招提境佇待江潮生茶香酒初醒松風流夕梵蘿月散清影暝坐歸鳥稀晚飯鐘魚静昔逰不可忘夢向焦仙嶺焦山古鼎詩同西樵賦曉入枯木堂恠禽驚翩翻清露滴松杪下見古鼎蹲寶光耀昆吾中有飛廉魂上文為雷回下文為雲紜獰狀饕餮伏兵氣蚩尤昏辛壬與丁甲世次迷夏殷初疑周虎彛復惑虞蜼敦尊從不可辨牛豕誰能論瑰怪壓􅒋鼎譎詭旅紀甗蛟龍雜蝌蚪五指不敢捫在胙想屭贔識字驚蜒蜿月黒鬼神泣峡束波濤奔籀書失趩􅞚斯篆摧􅀢􅛍史游久已沒皇象不復存不遇博雅流孰為洗煩寃諒彼岐陽狩或同泗水淪山僧與道古感激聲還吞分宜昔枋國氣勢傾崑崙斯鼎出京口上燭光絪緼役使萬指衆負載千蹄犍大哉宗廟器詎屑豪貴門威力鎮禪窟寂寞歸祗洹午夜鳴鐘魚清晝啼林猿閱人恒沙刼如彼蝨在褌我昔訪焦先望氣􅤉不言五年隔揚子無翮思騰鶱吾兄癖好古八書探河源三日松寥逰坐卧忘囂喧扁列析螺書巻尾搜蠆文作為竒偉辭大海摶鵬鯤春江壯風霆響激雲濤渾三嘆繼髙唱海門上朝暾送家兄同無言逰吳越二首挂帆指吳㑹雲水空濛間上已美風景登臨散襟顔湘湖蓴正滑應上蕭然山共訪金庭宅淹留殊未還吾家王吏部江左有髙名五字論詩品隂何欲比清偶思鏡湖好忽作剡中行輸爾天都子逍遥訪赤城上已辟疆招同邵潛夫陳其年修褉水繪園八首前年曽到湘中閣閣外天寒水方落西風颯颯猿啾啾惜别懷君芳杜若今来三月青春深浯溪窈窕桃花林為君一曲答欵乃寫作雲山韶濩音碧琉璃上雙玉壺蘭橈宛轉沿春蕪未傳洛下羊酪法且醉淮南櫻筍厨射雉城中煙景暮流鶯唤人且須住囬頭笑謝襄陽兒詎可摇鞭背花去平山堂下五清明甲辰紅橋賦冶春句也草長鶯飛無限情不怪老顛裂風景名園上日相逢迎銀筝初彈阮初擘此夕留髠應十石春衣明嵗杜陵逰憶汝狂歌拓金㦸西豪里中訪老友况復陳生與我厚辟疆園敞羅羣賢大兒小兒唱銅斗烟際鸕鷀一隻飛吳歌水調欲沾衣風光如此不成醉帽影鞭絲何處歸陳公家近罨畫溪溪邊花草令人迷離墨山中一宵雨竹雞白鷴相應啼先生大隱隱城市萬壑千巖牕户裏花朝已過上已来日坐蜻蛉釣沙尾逥溪綠浄不可唾碧蘿隂中棹船過落花㳺絲春晝閒獨許先生此髙卧劇憐風物共披襟蕭然絲竹皆清音永和三日今千載坐使清風滿竹林時出文衡山蘭亭巻同觀暮春三月為水媐棠梨葉大山禽啼田家社酒壓缸面雪白橙香玉練槌夜聽醡頭滴春雨曉報提壺如潑乳醉郷大户百分空起喚花奴自撾鼔谽谺一徑略彴紅地肺疑與朱陵通沅湘春水蒲桃綠江蘺蘭杜愁烟空主人少年登嶽麓祝融峰頭幾逥宿七十二峰羅户庭日汲湘潭燃湘竹再泛水繪園看月作二首林塘自幽映况復清夜月輕舟漾浦溆習習涼飇發竹深禽響亂徑僻人蹤滅島嶼已千尋川途更百折月影散水木光景紛竒絶孤篷泊烟霜澄懷抱冰雪我有素心友掩關事禪悦噉粥日消散觀道離言説示我秋水篇邈然寄㵳泬逺寺傳鐘魚空山鳴蜻蛚流連印渚㳺惆悵林中别脩林帶髙館巖壑相因依水波澹瀟照雲霞收夕霏遥遥暝色来肅肅沙鳥飛永懷謝希逸望古歎知希斯人不可作乗月扣舷歸雨夜懷其年園居久客春向暮歡游罷不適孤館歇清漏卧聞春雨滴暗蛩吟幽草寒燈耿虛壁念我同心人咫尺何由覿雨聲湖上来蕭條散蘆荻此時掩關卧應聽林間笛雨登湘中閣眺望曠望臨清湘楚天夜来雨合沓連江潮空濛散洲渚野鳬溼不飛墟落逺堪數漁榜沿逥谿停橈飯孤嶼不見烟中人但聞烟中語詠史小樂府二十四首望望北邙坂黄蒿長似人夜来螢火暗失路小平津欲得卿曹拜何妨破産求蒲桃原不惡一斛博涼州長揖横刀出將軍一代雄頭顱行萬里失計殺田豐祝衂復祝衂君聽羖䍽歌𤓰廬方一畝漢臘此中多生女不如男所論非英雄不見龎娥親殺人都亭中太息王髦劒前年失孔融曾言赦雍齒地下愧袁公一作崩城操三軍且莫哀丹陽使君婦衰絰報讎来可憐卿慚長陳徳何涼薄不及朗陵公猶有荀文若子義来江左青州名士稀丈夫死知已枉用寄當歸將相江東美英風壓上流魯公最忠烈慷慨借荆州猘兒健如虎髙步跨江東孝廉殊娬媚人說紫髯公腹痛思前事分香惑後人二喬得佳壻不是洛川神赤壁戰堂堂綸巾繡裲襠元戎在何許顧曲有周郎濡須髙㑹日諸將在轅門醉袒貂裘看斑斑刀箭痕龍鳯全歸漢三分指掌中惜哉雒城戰失此半英雄魯國真男子關西社稷臣阿瞞渾自可滿寵爾何人大義辨國賊吾欽趙順平寧須法孝直方可制東征足堪加帝股故態笑狂奴何如朱盪冦直捋大王鬚邴管持風節髙名合作龍何人工賣國老竊博平封費公能辨賊嚴駕且圍棋賭墅東山者風流自汝師生乞步兵厨死埋陶家側一時兩酒人亦足張南北石馬来張掖公然大討曹可知北部尉典午啟塗髙今年賜劍履明年假黄鉞可憐青頭雞躊躇不得發吳漢分龍虎終憐石子岡何如綿竹戰父子死堂堂登天闕望金陵懷古我登牛首山天闕何厜㕒上造青雲端下瞰無端倪壯哉六朝都佳麗誠在兹龍虎氣盤鬱將相羅雄姿緬思赤烏年爰逮太元時五馬浮渡江一馬獨權竒桓桓始興公幕府陳軍麾懿此帝王宅雙闕衛京師青山似洛陽大江環四垂智力邈千載興廢如奕棋江山看不殊俯仰自生悲北眺𤣥武湖蔣山虧蔽之博望峙西南列戍多旌旗時清異偏安慿弔將奚為落照横江流萬里天風吹壯心不可已淚下如綆縻龍潭登舟棲霞僧相送昨朝山中雨惆悵中峰别回望上方人雲嵐但明滅龍潭復相送江晚潮如雪瀏瀏巖際風皎皎波間月世外本忘情幽懷無斷絶終卜僧紹鄰長兹味禅悦淮北晩行寄廣陵故人南風吹五兩淅淅乗潮便綠波蓮浦漲白露蘅臯逺稍看烟景夕篙師柂樓飯不見廣陵人含凄詠江練寄宗定九東原讀書處夏木紛成結江潮門外落烟岫牕中列誰言謝公埭復作零陵别懷中團扇詩睠此清秋節分賦得館娃宫送子吉編修歸吳館娃宫中花蘂紅美人白紵嬌春風館娃宫中烟草綠蝴蝶雙飛井欄宿囬首穠華能幾時羡君一舸逐鴟夷五湖淼淼烟波濶何處黄金鑄范蠡又賦得甪里村笠澤濛濛水烟夕細雨丹楓浪頭白先生去後幾千年甪里之名今尚傳玉堂晝卧夢烟水卻挂扁舟尋甪里我亦江湖舊散人蓴鱸思逐秋風起昭陽顧符稹畫棧道圖歌顧生畫學李思訓尤工棧道兼騾綱丹青金碧妙銖黍近形逺勢窮毫芒褒斜山色一千里子規啼處烟蒼蒼女郎祠邊人跡絶但見哀猿連臂呌嘯青崕傍江水如油下南鄭閣道似髪通陳倉紅氊裹背笠覆首人物結束疑唐裝車馬班班入雲際如蟻緣垤相扶將秦川渭水望不到蠶叢直上天茫茫仰家扇子冰雪色一莖斑竹磨瀟湘如何方寸懷褏裏宛然置我蜀道青天長揚一益二古天險譙周鬻國謀非臧阿瞞四紀作天子青騾西幸何倉皇三十年来蜀道塞况從古史論興亡因君妙蹟發遥慨如聽鈴聲替戻岡送陶季之潞州先生昔日登武夷鐵船峰頭看奕棋中冠離支三百顆酒酣自劈輕紅肌峰頭爛睡忘甲子坐笑曽孫生白髭張帆伐鼓下黄鶴欲濫三湘窮九疑披襟蘭臺發髙唱快哉不辨風雄雌平生名岳屐齒遍風塵京雒嗟衣緇投我竒文浩千頃蛟龍大澤纒躨跜謂我四海一知已譬若莊休從惠施髙齋茗飲坐清晝風爐活火分槍旗我時無事似犀首酒鱗浮動銀留犁豐臺紅藥花照眼驪駒忽告將西馳壯心猶作驥伏櫪適志無如泥曳龜我聞上黨天下脊當年潛邸傳臨淄飛龍荒宫沒烟莽斷碣髣髴開元詞紛紛梁晉夾河戰鵶兒萬騎陳軍麾錦嚢負矢盛意氣歌聲慷慨留三垂時平不用弓箭手空老昭義千熊羆戰場下馬問亭長鬼燐颯颯寒飇吹君家草堂臨射陂門前五栁藏東籬何時單舸徑歸去北牕髙枕談黄羲送朱秋厓歸安宜兼訊陳冰壑北平太守老不封身經百戰關强弓平陵岸頭爾何物李蔡為人居下中昔者應侯未入秦折脅摺齒難為容一朝西行取相印故人馬食何悤悤丈夫不遇且蓬累古来雄俊將無同愛汝朱干草堂好甓社湖北如吳淞釣船春入鰕菜市柴門晝掩菰蒲藂據梧時復同惠子上冡聊爾随龎公當年我作淮南客落帆屢及桃花紅兒童習見鵞鴨熟濁醪為我来牆東此邦佳士復有幾稍從湖海知元龍唱于唱喁樂復樂大湖漠漠来天風自别淮南老鞍馬筆墨蕭颯如秋蓬眼明乍喜故交至劇談徃徃連晨鐘聞君此行意惝怳五湖春水磨青銅夢随白鷗沒浩蕩覺来目送南飛鴻歸逢陳鈺相問訊余方袴褶騎黄驄送周量同梁芝五㳺西山西山香山妙無比一道飛泉萬松裏馬曹自矜能拄笏不知落汝芒鞵底猢猻藤子青銅堅為汝一日窮緣攀遥想空山下風露嗒然坐對開禪關膠東張雉畫葛洪移家圗歌下簾卧清晝逺夢生羅浮覺来北堂上素練横滄洲依稀三萬六千丈風吹絶壑紅泉流何人㩦持雜負戴全家避地来山幽先生身騎烏牸牛丹雞白犬随行輈鮑家小女兩丫髻手把芙蓉居上頭惠懷之際那可道萬乗不洗金墉羞王家寧馨失三窟華亭鶴唳悲清秋回首銅駞洛陽陌名士對泣新亭囚伏波將軍不受賞丹砂欲就来交州大鵬詎可伍鷦鷃跛鼈坐笑追驊騮張生妙筆擅黔陬令我逸興生丹邱夙昔讀書慕仙意望而不見中心愁十年婚宦願粗畢青鞵快作逍遥逰刀圭為我留井竈此生未作坳堂舟送同年袁秋水僉事覲事畢歸甘州白馬黄金柑蹀􅉜思邊疆河西四郡天萬里中分弱水臨河湟漢家天子重邊冊大開張掖連燉煌陽關以西盡亭障屬國一氣通諸羌逺求汗血厯絶域玉門使者遥相望輪臺之悔復何補弛刑十萬空雄張苜蓿離宫待天馬蒲桃大郡酬伊涼至今祁連古邉塞控弦士馬多精强衙帳雲屯襍囘鶻部落星散延燒當當年武皇用兵處傳烽髙並天山長祭酒布衣諸生耳虎頭食肉何昻藏紅鹽池邊開幕府羌女如花羅酒漿安西都䕶受成事戊巳校尉停秋防使君能令金作粟使君能使馬如羊使君今且為急裝還報天子開明堂特賜安車圖未央五星嵗嵗臨東方傳經堂歌送卓永瞻歸浙西因寄火傳中原喪亂連天崇鑿蹄驕馬嘶江東昭陵玉匣出隧道鴻都祕䇿飛秋蓬小作幐囊大帷盖石經三體皆磨礱卓家世徳不可紀侍郎謀國真公忠巢傾卵破悔不早曲突徙薪誰謂功革除事往三百載至今化碧千長虹聞孫抱經隠苕霅千秋人識梁邱宗清廟明堂列球貝深山大澤藏蛇龍我慕蕊淵生苦晩晩及孫子相追從雄才能慮五石瓠大力欲挽千鈞弓桓榮稽古累數世郎君人地將無同昭氏鼓琴有妙理誰云竟以文綸終至尊通經過漢代㑹開東觀臨三雍白虎諸儒考同異如懸大簴鏗洪鐘郎君攝衣作都講雅歌殿上何雍容野夫窮經不得力坐使尹季傷瘖聾他年登堂問章句五湖帆影隨樵風述舊贈劉公㦷吏部昔在順治中天府羅文昌至尊右儒術海㝢盛詞章夫子起汝南髙步翰墨場僕從稷下來意氣猶蹶張雲龍歘然合相逐共翺翔論文無囁嚅結交多老蒼四海得汪苕文程周量驤首同周行一臺稱二妙籍籍董玉虬與梁曰緝璋射必有邸玉巵豈無當窮秋八九月草木萎以黄憑弔望諸君驅馬金臺傍風雲慘營平邊朔多嚴霜和歌猛虎行天地為低昂時序一以變良㑹誰能常君思潁西湖歸尋兩歐陽諸子亦星散各各之四方僕觀廣陵濤時上平山堂側聞清潁水嫩緑如𤓰瓤小艇擬艖䒀往往破湖光别業寄蘇門水竹紛陂塘百里見黄華神工肆皴􅀈飛瀑下千尋灑落層冰涼熊岳所居處瑰異不可詳破衲山水紋蕭然居士裝真江五馬渡暮雪天滄浪是時一握手泥飲傾千觴豈知十載别㑹合仍帝鄉羣公更翕集列宿森光芒翰林蔣與李詄蕩排天閶亦有陳與吴鳯凰鳴鏘鏘雅歌出金石髙論窮羲皇夫子正始音卓為羣倫倡僕忝龎公交時登元龍牀小春風氣佳晩菊有餘芳賓從㑹西園絃管羅東廂援毫申此詞朂哉毋相忘世祖章皇帝御畫渡水牛戲以指上螺紋成之臣從黄州通判臣宋犖得觀㳟賦一章章皇握乾符武功燀旁魄孚齋春晝長游藝睠圖籍泉壑窮窈窕烟雲羅幽賾寳繪賜近臣往往等球璧常從青箱堂奎藻覩赫奕營邱及河陽到眼堪一擲想見憂勤暇勝情寄山澤戲作渡水牛生態妙盤辟肉怒垂星圓筋突隂虹直脰似滿黄鐘角堪扣白石彈指九牛毛森疎如刻畫水波稍演迤浮鼻未沒􅆃髣髴緑楊風掩映春蕪碧神武十八載文教洽重譯干戈與弓矢包用黄牛革小雅賡宣王爾牛何濕濕旐旟牧人夢考牧周官職應知翰墨餘與世登衽席龍髯去已逺謳思徧荒僻雲漢爛天章典謨布方策聖主念紹庭率由正無射小臣沐皇風流涕記飛白為宋牧仲題林良宫娥望幸圖杏華春水團宫纈宛宛鵞羣白於雪林良好手二百年犀軸飄零見竒絶太平内則徧閨襜宫漏迢迢響夜籖何處離宫三十六金羊空望竹枝鹽送楊鄂州職方奉使安南于闐玉帶横腰身猩紅袍蹙金麒麟使者青霄下千仞旌節遥臨日南郡日南郡縣古交州唐家都䕶天南頭大長叩關奉朝請比于佩印為通侯咫尺髙平亦王土誰使穴中鬬羣鼠要令萬里靖烽烟先見兩階列干羽楊郎意氣不可當談兵畫省神揚揚雄才常擬略卭笮壯心更欲規河湟此去烏蠻過銅柱曾是伏波用兵處即看金馬獻彤庭不用飛鳶愁毒霧朝来祖帳城東門羣公冠葢如雲屯虎頭食肉志亦得新婦帷車安足論送米紫来令建昌南風吹船健如鶻一月飛渡西江灣名流正得山水窟雲中五老玉孱顔畫禪書聖兩無敵官閒潑墨東林間風流海岳菴中客直取廬山作硯山晨起為錢宫聲題長橋烟雨圖松枝麈尾壁角懸桃笙火出晝不眠長安五月旱太甚自郊徂宫空告䖍昨宵新涼生枕簟五更簷溜聲奔泉大江萬里瀉春漲濤頭泛泛何滇滇豁如毛摯去酷吏身傅兩翮思騰鶱坐憶江南此時節流水決決鳴稻田錢郎打門送急逓鼠鬚煤尾交雲烟青松短壑妙結構髙厓巨瀑紛鉤連長橋烟雨更竒絶空濛似欲無山川濕篷折疊縴掠水黄泥曲岸相夤縁江南舊遊入夢寐彷彿五湖春水船錢郎自號五湖長此圖日在衡門邊胡為欵段來長安披裘帶索履後穿我欲與君同扣舷青蓑篛笠隨長年詩成閣筆一笑粲簷前急雨衝洄漩愁霖行涒灘之歳隂氣凝愁霖不絶如貫縆江星動摇陽景匿蝦虹閉藏潦霧増𤣥駒戴粒蟻封穴白蹢涉波豕出繒恢台變節百草死縱有紈扇須何曽立秋八日又七夕不見河鼓低玉繩肅時雨若哲燠若此事無乃非休徵今年災異亦太劇延慶旱魃嗟頻仍太白失舍晝不入白𤯝夜見生芒稜左輔銅龍翻地軸川竭水涌騫髙陵我讀劉向五行説天意人事如相乗溴梁之㑹書地震龍鬬於鄭梁山崩吁嗟盛世詎有此胡為變易違其恒何時扶桑日東升重霾一掃天宇澄野人爛睡曲兩肱晨炊不復愁薪烝送吴天章歸中條山月始在房羣隂終凍禽塌翅啼酸風吕生置酒邀我飲清歌笑倚商玲瓏朝來宿酲卧未析吴郎告我歸河東北風雨雪滿天地層冰千里髙穹窿行人皸瘃手指墮狐裘嗟汝胡蒙茸長安甲第髙入天馬蹄動地聲隆隆漿酒藿肉不足道金玉磊砢堆堂中汝詩千首文百軸洿塗未拔誰相通汝家王官谷中條青濛濛藤蘿相紏水相激至今猿鳥悲司空汝歸讀書甘菽茙致君堯舜㑹有日飛伏詎辨誰雌雄雙劒行孫退谷侍郎席上作其一魚腸其一有銘云吳季子之子永寶用劒凡九字延陵季子不忘故千金之寶帶邱墓我聞此語餘千年何来虎氣騰重泉天精下觀㒺兩伏雷公擊槖蛟龍纒古綠光射人瓜皮出土争新鮮錯落黄金書列星明滅蒼浪天五步殺一人易如削豚肩又有古魚腸形製殊蜿蜒貫甲洞胷不濡縷立㦸交軹如浮烟幽州十月風折綿雪片堕地飛烏鳶是時看劒夜置酒快若渴驥奔長川勾吳舊事足感激悲来清淚忽潺湲延陵已蹈子臧節誰令窟室生戈鋋太湖魚炙事亦逆蘇臺鹿走今誰憐鱄諸要離匹夫耳屬鏤之賜吾悲焉孫公八十目如電博古直擅歐劉前為公作歌驚四筵烏尾畢逋河漢懸燈明酒盡雪亦止囬看劒氣相騰旋雪中寄宗定九東原兼呈西樵先生一冬不雪春融融江梅岸栁俱空濛黄紬衾暖睡初足起看牕紙何曈曨蠻奴失喜縛雙帚走報玉戲勞天公開門三寸沒階砌拂空六出縈簾櫳舟膠浦凍人跡絶天色慘慘雲而風銅缾筑響蟹眼沸地罏火爇獸炭紅故人昔寄東原圖漁灣窈窕橋梁通駃雪固佳霽亦好草堂正與圗中同蕭晨畫雪復好手能以粉墨摹虚空前年幽州大風雪馬毛如蝟鳴雕弓白檀山髙鷹隼疾狐兎殺伐無留蹤故人再寄蕭郎畫寒江釣雪推烟篷展看忽憶東原客醉吟禁體追潁翁適客江淮意不樂悵望百里無由逢何當笭箵挂驢背踏雪直過東原東題施愚山賣船詩後國家急廉吏將以風百寮如何十年来吏道紛吳敖哀哉此下民鞭朴分安逃魯山與陽城斯人竟難招江西飽亂離白骨填蓬蒿石田廢不治遺黎雜山魈一二老寡妻煢煢困征徭昔者數守令為政嚴風飇峻令盛誅求細不遺齔齠金玉競輦致樂哉共宣驕憲府前上夀鞠􅎽一何勞公堂侮下民意氣一何豪寡妻哭向天血淚埋荒郊亂後幾孑遺乃以資汝曹是時宛陵公持節吉臨交為政貴簡易潔己先清翛放衙苔蘚浄飛鳥營其巢賦詩彈子嶺慷慨同石壕白鹿與青牛斯道誰鼓櫜公獨奮百世臯比陳唐堯廉耻存綱維義利窮毫毛蘭芷變荆棘孔鸞革鴟梟汝曹即不仁寧終肆闞虓七載一舸歸無物充官艘兩郡萬黔首留公但號咷讀公賣船詩中心何忉忉填膺抒此詞庶以備風謡他年韋丹碑㑹見留江臯翹首望宇中烟火尚蕭條安得百施公為時激頑澆吳歴修竹吾廬圖為汪季甪題讀書茅簷下樂於奉朝請磵邉清淺流屋後檀欒影借問輞川人何如斤竹嶺送愚山逰嵩山夙昔山水懷夢想嵩陽寺先生江海人蕭條自孤寄寒潭漸收潦華林起涼吹落日下轘轅青山帶行騎褰衣涉清潁羣峰亂蒼翠二室秋崢嶸三花未顦顇卻尋盧鴻宅巖扉饒古意窈窕玉女牕投壺或一至煙中眺龍門伊洛宛相次古人去已逺山川見標致安得方外逰從君共題字初春四日休沐同荔裳方山西樵往西山道中作遥山鴈齒列逺水魚鱗波朝朝國西門馬上呈嵯峨卻掃閉簾閣幽夢紛陂陁坐羡雲間禽歸飛向巖阿上春寡人事勝侣時来過望山馬注坂投林鳥驚羅行行近磊砢清暉一何多豈識絶塞山姢静如媌娥禽夏如可期遑復知其他香山寺月夜明月出東嶺諸峰方悄然殘雪尚在地掩映西齋前竹色既閒静松隂媚淪漣清暉一相照萬象皆澄鮮此時憇寂者宵分猶未眠觀祕魔崕至龍潭作山行逐􅀢若徑轉無人迹亭午踰髙嶺逍遥随所適古寺披荒榛乍到如有獲盧師晏坐處猶存澗邉石石上留孤松終古不盈尺地僻山鬼鄰鳥下蒼苔積孤閣臨寒溪林壑莽蕭槭灌木紛相糾隂厓互崩坼何當秋雨時驚湍若潮汐来此十日眠濯足蛟龍宅晩望翠微寺澗西翠微寺迢迢翠微裏蒼茫采樵路似有微鐘起山風冷炊烟斜日亂溪水紛紛飛鳥還行人去何已登石景山浮圖絶頂眺望浮圖兹山頂峻嶒插孤標千盤厯詰曲直上凌風飇寒空稍明淨百里見纎亳茫茫塞上山浩洶連波濤渾河盪山来石壁如動摇咫尺居庸關烏道迴青霄上谷接雲中設險非一朝聖代亭障空丸泥罷函殽關門開落日士馬無矜驕迴身望漁洋城闕何尞尞薊邱植汶篁遺烈思燕昭望諸與騎刼智勇皆蓬蒿朔吹揚驚沙屯雲盤怒鵰慷慨一傷懷覽古心鬱陶逝將御泠風揮手辭塵囂碧雲寺魏閹葬衣冠墓恭顯坐中書能死前將軍赤伏盡鈎黨禍始誅李雲讀史長太息閔彼漢運屯我来西山逰極目多邱墳何人穿復土雙闕髙嶙峋天禄與辟邪夹道紛錯陳大書復深刻似欲驕千春冡中玉蟾蜍變化亦有神豈知窮竒骨不得安穸窀牢石與五鹿彈指随飇塵嗟哉陽司𨽻毅魄為青燐狐貉同一邱無事勞沾巾松風催落日泥飲當千巡西望咸陽原石馬嘶荆榛卧佛寺清晨越南磵畢景来東林石徑入幽閴稍聞鐘磬音禪房鴨腳古别院桫欏隂春夕月復佳微雲滅遥岑山氣自蓊鬱天宇亦森沉道人澹相對松風灑衣襟夙懷清浄退因識妙明心寂寥無可説請君張玉琴晩入退谷卻寄孫北海先生谷口逺烟暝水石起寒色西溪有歸人東峰隱餘日積雪封巉巖微徑雪中出殘冰流復斷暗泉聽還失不知荒寒中前峰去安極稍見觳觫牛悵望歸飛翼侍郎昔掛冠於此散愁疾畫壁滄洲圖有故友陳路若畫壁結屋雲林側溪南萬竿竹嵗久漸䝉宻為述浄名意更就支公室慙歎觧巾非何年此棲息故明景帝陵懷古金山南臨裂帛湖荒陵十里鵂鶹呼奪門事往二百載行人過此猶欷歔紅牆剥盡古瓦落莓苔溜雨生銅鋪老松離立色枯槁但穴蟲蟻餘根株菆塗龍輴禮本殺矧乃刼火經樵蘇咫尺天夀雲氣接坏土獨葬西山隅洪宣老臣稍凋喪國成一旦歸刑餘勃鞮之問史所貶詎有宦寺干征誅黄沙慘澹鼓聲死萬乗一擲成纍俘國有君矣社稷重孫申謀鄭無差殊白登城南翠華返錢塘司馬功難誣紛紛南渡議和戰乃知計左非良圗仝寅之占信竒中朝衣東市嗟何辜劒南歸来西内閉唐家父子輸廐奴處人骨肉事非易子臧季札今則無功罪千秋有特筆九鼎一髪須人扶諡同泉鳩理太酷紀年猶幸無革除裁令流水良亦足寧論玉匣還珠襦欲落不落夕陽下弔古且復留斯須殘碑滅沒牛礪角石玃横卧蒼髯鬚君臣一代盡宿草雍門太息當何如玉泉蕭晨金山下濯纓玉泉水十畝清瑶流分明鏡相似金膏時掩映碧玉相傾委水荇随風翻靡靡映清泚垂楊夹碕岸其下多芳芷流為裂帛湖宛若昆明裏湖上多漁村網罟集沙尾宣宗昔逰幸龍舸兹山趾當年功徳寺荒涼嘯山鬼何况芙蓉殿遺跡皆銷毁碧水自東流彌傷人代駛儻逐五湖舟去問鴟夷子過金魚池懷愚山因以寄答昔君振遥䇿獨徃嵩山中還歸陵陽下髙詠北樓風舊榭宛苔迹清池銷蕙叢聊慿一書札緘意向飛鴻計甫草至得苕文展成既庭書芳序竟荏苒别離年嵗多綠隂散林樾首夏氣清和懷人罷琴酌思徃屬流波還欣松陵子步屧一来過雨中懷彭羡門因示葉訒菴夏雨忽芊眠流雲度髙閣簾幙數禽鳴綠隂一花落相思武原子逺寄羊城作文酒昔歡娛别離今寂寞年時易晼晩壯嵗風驚蘀何當一樽酒共對成斟酌井陘關歌迴星城邊落日黄西来氣欲無太行柏巖雙壁稍狡獪目成已覺心清涼天公一夜送寒雨千疊萬疊雲錦張丹崖翠壁窈萬狀瑰竒娟妙難具詳綠蘿蕭蕭罥巾角石瀨颯颯漸去聲衣裳峯迴徑絶不知數谽谺倐見開中央戍樓旌竿滿雲直横亘長城環巨防冠山子城瞰窮漠噴壑巨瀑聞雷硠登樓顧盼豁胸臆四山雲氣争飛楊蛟龍鬱律起眼底散為雲雨周八荒關南石勢更竒恠亦如突奥連堂皇懸車束馬那可度行人緣棧如秋秧幽并澤潞此天險飛鳥欲過愁翺翔聖代即今罷烽燧空餘畫角吹嚴霜乃知地利未足恃此關幾閱諸侯王夀陽驛題韓文公詩後天寶昔喪亂窣干及阿犖扇禍始漁陽流毒被河朔辛苦九門戰堂堂李與郭滋蔓逮三鎮世守恣兇虐軍中立留後諸藩擅官爵山東勁兵處縣官實自弱元和聖天子咨相授方略淮蔡洎淄青次第就束縛移兵壓山東勢如掃秋籜遺恨功未成殺機生魏博庭湊何么麽跳梁敢弗恪偉哉昌黎公談笑狎巨鰐我行過夀陽遺詩緬如昨韓愈殊可惜朝廷乃大錯真卿與巢父兹事詎堪數誰與秉國成蛾睂竟謡諑杜牧有罪言千秋實良藥介山驅車綿上聚懷古綿上田授璧事已逺遺跡今虚傳晉國昔多難公子實大賢五蛇為之輔一蛇獨耆乾身隱竟焉文狐趙羞比肩逃榮義固髙報徳理亦然徘徊望忌坂落日無寒烟何人貪天功嗟哉南内年首陽山峩峩首陽山迢迢屬雷首遥揖巨靈掌近對風陵口蒼茫河上舟摇落關門栁一詠採薇歌昔人復何有河上寄山史前年君徃蘭谿道金華洞中拾瑶草傳来八詠似休文愛翫新詩愁絶倒華隂古道接𢎞農一望秦山深萬重遥看青壁孤雲起知在西南第幾峯拜楊伯起墓道悠悠關内路驅馬桃林塞歸鳥岳祠邊長河逺天外大鳥下潼亭落羽今猶在夕日薦蘋蘩愁心逐征斾渭橋懷古秦川夕澄霽灃水明如練西上中渭橋颯然秋氣變嬴政昔構造作此象天漢美人與鐘鼔流連恣荒晏徐市期不来山鬼璧已獻我昨驪山行徘徊弔中羡荆榛蔽銀海樵牧羅金雁麒麟折其股冷落青梧觀後代復何王繡嶺明珠殿唯有終南山興亡幾回見望華山關中八水滙清渭獨朝宗黄河西北来交㑹船司空河流挟砥柱岳勢分𢎞農山河兩戒首氣壓殽函東金天正肅殺屹然白帝宫削成五千仞真宰散鴻濛及關見岌嶪元精羅心胷倐忽雲氣生西接終南峯諸峯忽已失俯首趨河潼峨峨司冦冠獨立青雲中蒼茫望三輔秋氣去安窮荒唐秦王獵寂寞希夷蹤何當駕白鹿還共驂茅龍鳯嶺南岐地何髙鳯領據其右路絶無鈎梯直上若懸溜日月互蔽虧光明錯昏晝雲霧四蕩潏雷車中雜糅飛龍何衙衙夭矯出巖竇俯瞰兩當水奔流下騰湊轉石類搏橶畫沙成篆籀初疑饑蛟蟠更作外蛇鬬聞昔周文王盛徳及靈囿鳯鳥此来集世逺事悠謬末季重邊防戎馬幾馳驟秋風吹散關一夕驚老瘦柴關嶺早發陳倉道馬蹄亂雲霧行行到柴關雲低雨傾注衺徑中槎牙幽篁四森布大石立當關勢如猛虎踞世無飛將軍磨牙爾何怒蛟龍喜昵近氣奪生憂懼怪鳥時一啼聞聲不知處黒江逺澒洞萬瀑齊奔赴頗聞紫柏山仙靈所逰寓石髄儻一逢白日生毛羽誰使野鶴姿氋氃堕籠笯真宰不可問更向蒼茫去馬鞍嶺南下畫睂關逺色曡諸嶺夤緣百里間齗齶蔽光景蹇㠊疲登降纎路亦脩整或厂如連軒或植如負屏或如歧陽鼓或如宛朐鼎如鳥或跂翼如魚或骨鯁殊狀紛角逐詭類争一逞峭岸勢欲坼捷足不遑騁二分垂在外趾壓後人頂飛瀑時界道赴壑力逾猛人與水鬬争心目各相警天意限雍梁設險有斯境君子履忠信小人懷僥倖永念垂堂言乗危更三省觀音碥本名閆王碥賈中丞改今名壁上有宋荔裳賦棧道平歌沈繹堂書觀音碥險絶連山列天仗奔峭洶波濤大石蹴龍象造物鬱磊砢及兹乃一放急瀑何砰訇盤石成巨防渟為千丈湫潭潭不流宕怪物中屈蟠豈無鎖紐壯儻燃牛渚犀窮此精靈狀頗聞賈中丞於此鏟疊嶂故人推沈宋詩筆各雄長星宿森光芒虬龍怒倔強觧鞍苔石滑髙歌一神王更須巨靈手運斤出天匠鑱我郙閣銘敵彼小海唱七盤嶺七日行褒斜目瞶耳亦聾濁浪奔崖垠征衣碎䝉茸不知天地濶詎測造化功岌然土囊口雞幘摩蒼穹磴道上七盤大翮排天風絶頂忽開豁白日當虛空褒水出谷流漢江繞其東巴山􅘳秦蜀蜿蜒連上庸川原盡沃野天府如關中橘柚鬱成林稻苖亦芃芃㐮陽大艑来千里帆檣通當年號天漢運歸隆準公將相得人傑驅䇿芟羣雄一戰収三秦遂都咸陽宫智勇久淪沒山川自巃嵸跋馬向褒國日落烟濛濛定軍山諸葛公墓下作髙宻起南陽文終從去聲髙祖暴繫本見疑數衂亦非武堂堂諸葛公魚水託心膂二表匹謨訓一徳追伊吕視操但如鬼畏蜀還如虎嗟彼巾幗徒與公豈儔伍紫色復蛙聲抵隙各為主火井方三炎赤伏更平聲典午志士恥帝秦祭器猶存魯隂平一失險面縛忘奔莒知公抱遺憾龍卧成千古峨峨定軍山悠悠沔陽滸鬱鬱冬青林哀哀號杜宇耕餘拾敗鏃月黒聞軍鼔譙侯寧足誅激昂淚如雨五丁峽南窮石牛道嵓嵓下雲棧三日招我魂足踔目猶眩豈知東蒼州耳目益竒變始過金牛驛樛嶱已凌亂漾水從北来劣足泛鳬雁舉頭嶓冡山峩冠倚天半大哉神禹功從此導江漢漸入五丁峽譎詭駭聞見斗壁何獰猙十萬磨大劒攅羅列交㦸茫昧通一綫亂水殷峽中鮫蜃喜瀾汗仰眺絶圭景俯聆競雷抃九鼎鑄神姦到此百憂患東方牧犢兒竟使蠶叢判我行忽萬里風土異鄉縣身落大荒西終賴皇天眷咄咄復何言艱虞一身賤夜至黄壩驛短歌氐道森沉十日雨石林㝠㝠斷行旅洪濤殷地四山動百折盤渦噤難語前有蝮蛇後豺虎紅鶴哀號奮毛羽吾生胡為狎此曹命輕如毛爭一縷妻孥飄泊寄京國欲歸不歸在何所鄉關迴首四千里縱有苦辛誰告汝朝天峽朝登嘉陵舟日出羌水赤履險倦鞍馬即次亦稱適黕黮雙峽来突見巨靈跖嶄巖無寸膚青冥厲雙翮隂崕積龍蜕跳波畏鯨擲徃徃壓人頂駭此欲崩石洞穴峽半開兵氣尚狼籍蛇豕據成都置戍當險阨至今三十年白骨滿梓益流民近稍歸天意厭兵革㑹見賨盧人燒畬開确􅣶慷慨一扣舷浩歌感今昔風便黎州城茫茫波濤白龍門閣衆山如連鼇突兀上龍背鱗鬛中怒張風雨晝晦昧出爪作之而神竒始何代亂水趨嘉陵波濤勢交滙萬壑爭一門雷霆走其内直跨背上行四顧氣什倍夕陽下岷峩天彭光破碎咫尺劍門關益州此絶塞子陽昔躍馬妖夢成佁儗區區王與孟泥首終一概李特亦雄兒僭竊竟何在桔柏江小舟飛青鶻西掠馬鳴閣閣道臨天關稍幸息腰脚茫茫雙江來抱此益昌郭荒城豺虎多殘堞出叢薄國憶苴侯開江疑鼈靈鑿武都地勢高衆水競流落分道下氐羌兩川乃磅礴鳴水迴驚瀾隂平劃大壑仇鳩勢未夷犀牛道彌惡千里㑹葭萌崩騰似相索漭漭竟同流西逝連井絡九十九峯間迴首一錯愕天柱山朝出𤣥武門雲垂雨忽涷登登天柱山千盤墮澒洞峥嶸逾巴閬槎牙過秦鳯陟嶺如累棋下谷如入甕心俯凥益高足縮目先送敢嗟鳥獸羣稍喜徒旅衆我有大羽箭麗龜輒命中於莵昻其首飲羽乃不動道旁松合抱巨可任梁棟惜哉野蔓纒不䝉匠石用絶頂見岷山青城亦伯仲一氣連諸蕃三州實西控太平幸無事左髻時入貢念彼松姚戍坐甲苦饑凍俯臨陸海雄仰視天宇空長嘯千仞岡出險忽如夢精華録巻二欽定四庫全書精華録巻三刑部尚書王士禎撰古體詩眉
