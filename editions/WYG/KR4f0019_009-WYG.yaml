年烟際遥相問十八灘頭水淺深吉水道中望楊誠齋故居江行盡日愛清暉峽逺江平碧四圍幾處峰青臨水照一羣魚翠拂船飛雲隂澹澹將成雨嵐氣濛濛欲溼衣髣髴南溪楊監宅蒼苔白石繞巖扉吉水絶句螺川川北字江西沙暖舟暄咫尺迷纔過元宵如上已春山處處郭公啼賦得廣澤生明月放舟豫章水月上廬陵城照影疑無定窺人似有情泠泠青桂溼歴歴白榆生故國當三五清暉亦自盈望青原山有懷藥地愚山二公愚山重建白鷺書院今燬於火白鷺空洲又劫灰青原山色自崔嵬風流二老今何在獨問廬陵米價來肺病昨日頭風愈新年肺病多何山足芝术隨處繫牂牁地僻容髙枕鄉遥憶伐柯青林啼暮雨無那鷓鴣何泰和道中寄陳説巖都憲李容齋少宰彭羨門編修捩舵開頭不計程睡餘真愛贑江清將尋方麴猶嫌早欲卸吳綿尚有情木客山都人比舍功曹主簿鳥多名炎荒風物看殊異略附雙魚達上京泰和縣夜泊雷雨明月墮何處忽聞鳴雨懸雷驚殷上聲山起電急劃江圓宿鷺依連舸神龍出大川戰場蕭瑟極百感夜茫然萬安縣戰地餘流水滔滔贑石東幾年紛􅖻􅑳今日尚刀弓沙嶼宵霑雨江船午帆去聲風明朝聞好語清漲百灘空坡詩一篙清漲百灘空皁口雨泊急雨孤篷溼髙峰四面同茫茫送灘水颯颯會江風山鬼幽篁裏楓人苦霧中明朝攬清鏡衰䬃任成翁攸鎮雨泊竟日孤篷雨宵分尚未休瘴雲來嶺表江漲下䖍州暗溼桃花重平添竹箭流更聞春喚鳥名語催白五更頭黄金洲見桃花巖屋纔三合烟扉自一家春風何造次開遍小桃花瓶中桃花水晶枕上一枝新别作嫣紅楚㟁春疑是息夫人未起細腰宫裏見横陳贑州謁王文成公祠新建當年此誓師森然松柏見靈祠軍聲不藉條侯壁籌䇿唯應漢相知萬古許孫同廟食一時張桂太傾危後來論定煩青史峴首猶存墮淚碑同丁雁水僉事登八境臺二首天末欣相見登臨復此臺飛樓切雲上危堞枕江開章貢雙流合雲峰四面來凌風思玉局故國近蓬萊坡公八境臺詩有云想見之罘觀海市絳宫明滅是蓬萊尚憶圍城日熊羆此枕戈劫灰孤閣在戰地國殤多東越鏦王郢南荒服尉佗祇今烽火息吾輩許髙歌題南安寶界寺劉元成張無垢兩先生皆居此寺坡公亦嘗過之古寺興亡閲幾秋諸賢誰遣到炎洲可憐横浦關前水猶繞當年鐵漢樓張文獻公祠峽寺重雲裏人瞻丞相祠開元如夙昔風度想當時羽扇三秋恨淋鈴萬古悲何來雙海燕猶自入簾帷始興江口西過始興水湞谿增緑波湞水合始興水流始大推篷春日下髙枕粤山多前路逢瀧吏迴風起蜑歌鼻亭不可問亂石鬱嵯峨舜祠翠華亭髣髴南巡蹟重華事有無雨㾗上斑竹雲氣接蒼梧儀鳳何年逝啼鵑嵗又徂不勝懷古意江色日荒蕪將抵曲江二月一日春態閒桃花欲落鳥綿蠻回頭不識中原路人在三楓五渡間三楓亭范雲賦詩處武溪水南紀標銅柱滔滔萬里征我窮伏波道重和武溪行斜日聞吹笛誰為轅寄生因思少游語回首不勝情平圃張文獻公故居扣舷聊騁望川上浩烟波往往竒峰出行行松石多人言故相宅遥指曲江過太息開元後爭傳得寶歌公初發曲溪詩溪流清且深松石復隂臨潖江衆緑被山足舟行當翠微潖江流水逺洭口住人稀海日臨崖吐蠻禽拍浪飛阮俞如可采長嘯竟忘歸二禺祠軒轅二帝子聞住緑雲間世逺無遺迹夕陽空亂山攀髯失弓劒采藥異荆蠻猿鳥青㝠裏應悲去不還歸猿洞若為越女化猿公霧鬢風鬟向此中留得訶陵環子在月明長憶上陽宫登浴日亭乗槎興不盡復欲帆去聲南溟夕次扶胥口朝登浴日亭島夷紛破碎天水倒空青一望窮寥廓真看小洞庭濓泉寺閒隨緑蘿去忽與碧溪逢水石微通徑烟霞獨倚笻寺門編竻竹磴道入雲松尚憶安期子青天跨白龍登粤秀山越王古臺上春暮復登臨割據無秦漢滄江自古今風吹鼇背雨日射虎門隂欲問呼蠻道荒凉蔓草深歌舞岡歌舞岡前輦路微昌華故苑想依稀劉郎去作降王長斜日紅綿作絮飛廣州竹枝六首潮來濠畔市名接江波魚藻門邊淨綺羅兩岸畫欄紅照水蜑船爭唱木魚歌海珠石上柳隂濃隊隊龍舟出浪中一抹斜陽照金碧齊將孔翠作船篷梅花已近小春開朱槿紅桃次第催杏子枇杷都上市玉盤三月有楊梅佛桑花下小迴廊曲院深深牡蠣牆細爇海沈銀葉火金籠倒掛試收香鬊雲盤髻簇宫鴉一線紅潮枕畔斜夜半髮香人夢醒銀絲開遍素馨花才到花朝似夏闌雨紗霧縠間冰紈洋船新買紅鸚鵡卻苦羊城特地寒登六榕寺浮圖舊名寶莊嚴寺六榕不可見地以大蘇名白社無人到蒼苔滿院生塔窮炎海目山擁粤王城欲假南溟翼扶摇詄上征大將軍孝揚弟餞别海幢寺即席有詩賦荅元戎小隊到禪扉蹋閣攀林興不違賦似江淹頻惜别人如楚客送將歸貝多樹下花沾席瑇瑁潮邊雨濺衣最是斑騅留不得陸郎行處正芳菲别胡耑孩黎方囘耆舊海南偏相思二十年來攀貝多樹别負荔支天江晩饒芳草山春有杜鵑别離無限思都付蜑人船題崧臺石室崧臺儼畫圖百神觴罷散清都七峰處處供人眼莫笑淹留類賈胡大廟峽寄黄庭表太史自清逺至湞陽亦曰三峽出峽復入峽舟行多苦辛青山蠻徼外黄帽越溪濱迢遞經寒雪飄零惜好春佛桑花下酒應憶北歸人三水月夜别陳宗徳程衎祖碧天月皛皛江水風蕭蕭明發一為别孤踪千里遥梅闗稀見雁中宿不通潮好寄相思子時時慰寂寥十五夜峽口對月寄廣州諸故人峽口今宵月其如客思何離離見珠斗穆穆展金波故壘餘蕭勃殘山弔尉佗珠江猶一水相望似秋河雨入湞陽峽野泊開頭早重隂入峽寒側過釣魚石逆上牯牛灘雨逼驚瀧失雲從大壑看十年經劍閣轉見路行難歸度大庾嶺大庾連横浦艱難此再經鬢從五嶺白山入百蠻青嶠水流炎海榕隂數上聲驛亭今宵望南斗漸逺使臣星抵南安嶺南已負茘支天横浦重過意惘然暫借谿樓看山色蠟花如雪寺門前南安人以蠟樹為業彌望皆是荅鍾聖輿送芍藥新緑横牕穏晝眠一簾微雨似輕烟午晴睡起維摩榻花氣熏人又破禪常紫侯少司空使西域回有贈曽騎白馬度安西絶域名從屬國題雪嶺天寒人去少河源日落鳥飛低彈棊握槊分曹出皓齒青娥按拍齊東入陽關更回首輪臺春草正萋萋送王石谷南歸君憶慧車子言歸烏目山帆隨五湖闊心與孤雲閒潑墨營丹嶂開籠放白鷳遥知破山寺高卧掩松關精華録巻九欽定四庫全書精華録巻十刑部尚書王士禎撰今體詩贑州别
