front:
  text: 梅村周櫟園諸先生鄒訏士陳伯璣方爾
  hash: sha256:cd6952334b8b8c930e61a4c24ead52ff5d9684d0c088a6f455b16bae9f0a2286
body:
  text: 止董文友諸同人相繼徂謝棧道感懐愴然有賦載酒題襟處處同平生師友廿年中九原可作思隨㑹四海論交憶孔融春草茫茫人代速落花寂寂墓門空白頭騎馬嘉陵路惟有羊曇恨未窮漢中府路遶褒斜夣故園今朝風物似中原平蕪蹀􅉜連錢馬近郭參差橘柚村萬叠雲峰趨廣漢千帆秋水下襄樊只愁明日金牛路回首興元落照昏漢臺絳灌當時伍黥彭異代看竟成隆凖帝不屑沐猴冠磊落真王氣蒼茫大將壇風雲今寂寞江漢自波瀾故宫曲二首溼螢幾㸃粘脩竹昏黄月映蒼烟緑金牀玉几不歸來空唱人間可哀曲往日朱門帝子家柴車一去即天涯平臺賔客今何處零落小山叢桂花虛谷菴二首菴有黄楊二株最竒三寸黄柑水浸渠一林紅桂映棕櫚鈎簾恰對中梁色正好髙眠讀道書太息黄楊樹子前琳宫幾歳飽風烟交柯接葉真憐汝未似先生厄閏年南鄭至沔縣道中黑水梁州道停車問土風沔流天漢外嶓冡夕陽東處處棕櫚緑村村䆉稏紅更須參玉版脩竹賤如蓬女郎廟朝過女郎道遥望女郎祠溪水疑環珮春山學黛眉千林丹橘熟一徑碧苔滋日暮神靈雨西風滿桂旗沔縣謁諸葛忠武侯祠天漢遥遥指劍闗逢人先問定軍山恵陵草木冰霜裏丞相祠堂檜柏間八陣風雲通指顧一江波浪急潺湲遺民衢路還私祭不獨英雄血淚斑武侯琴室竹篠娟娟静江流漠漠隂至今籌筆地猶見出師心遺恨成銜璧元聲有故琴千秋絃指外髣髴遇髙深大安驛犖确三泉縣坡陁一徑開江流沮口合風雨㳫中來漢相經營地氐王駕馭才西窮嶓冡盡節使亦雄哉五丁峽徼外蕃王國荒荒巨峽侵龍居三洞祕熊館四時隂笮馬何年度金牛此路深五丁虛斧鑿愁絶畏登臨寧羌州威遲辭北闕浩蕩賦西征天險金牛峽悲歌猛虎行岷峩連雨氣沔漢走江聲三户遺民少蕭條見廢城寧羌夜雨不信無晴日曽聞有漏天武都連夜雨巴子幾人船山入氐中亂寒臨僰道偏荒城聞鼓角回首意茫然廣元舟中聞棹歌江上渝歌幾處聞孤舟日暮雨紛紛歌聲漸過烏奴去九十九峯多白雲昭化縣亂山圍一縣哀柝下初更近郭雙江合扁舟萬里情浪翻寒月影風急夜潮聲何限人間事茫茫恨未平昭化夜泊淅淅風欺枕明明月入船三巴空有淚獨夜不成眠流宕魚鳬國淒其鴻雁天故園梅信早歸去逼殘年虎跳驛路逗蒼溪縣荒涼破驛存漉金稀見艇畏虎早闗門水合南江壯山連大劒昏巴西兵馬後多少未招魂夜泊雙漩子聞笛嘉陵江上泊舟時戍鼔初停月上遲已聴寒潮不成寐誰家横笛怨龜兹蒼溪縣萬里行難到三秋雁不過蠻江吹積雨急峽束盤渦綿谷青山逺賨人白弩多泛舟思杜老漂泊意如何閬中縣二首見說閬中好軒牕臨錦屏山川無髣髴耆舊况凋零殘壘浮兵氣寒江滯使星忽聞羌笛起風雨晝冥冥滕王何寂寞江抱玉臺偏沙岸收賨馬湍流激磑船五城虛夢到三户有人烟不奈驚摇落魂銷帝子前閬中感興四首行役忽永久衣裳白露淒秋風吹劍外客鬢老巴西螢火飛還沒寒螿咽復啼不堪蜀道雨山霧晝常迷巴樹小摇落薄寒初中人江山紛暮節風露感蕭晨逺使非卭杖思歸閱角巾流波三峽外何處覓文鱗西漢茫茫去來過碧玉樓九迴腸已斷三折水還流涕淚聞鵑鳥雲山繞劍州老親穿望眼霜雪白盈頭蜀雨連秦棧秋隂暮復朝山盤黄鶻急江合紫羌遥烏鵲知何意黿鼉爾獨驕蓬萊不可到回首向風飇藥物藥物知何益愁多老病侵眼枯兒女淚心折短長吟鄉信何時達秋濤日夜深巴猿殊造次悽絶呌楓林望劍州懐喬文衣名鉢内邱名士以湖口令遷守劍州卒官次公狂自好名字滿人間才士無髙位吟魂寄百蠻音書湖口縣生死劍門闗太息青蠅弔交州幾歳還寄綿州守西南芳草路幾驛到綿州蜀道風雲外涪江日夜流丹青楚公壁城郭越王樓故里康浪水何人㺯釣舟龍山驛雨閬州城邉雲氣浮龍山驛裏雨聲愁逺遊不唾青城地絶域空悲白雁秋巴嶺稀逢人北去渝江長是水南流蕭條孤館荆榛夕更指千峯入漢州富村驛雨隂蟲何太苦户外即蒼山急柝侵孤枕秋河落百蠻燈昏山鬼逼雨止蟄龍還一夜瀰江水愁人淚㸃斑天馬山雨行兩炬殘更裏亂山髙復低疾風吹白雨折坂下青泥詰屈穿牛角縱横印虎蹄廿年餘戰骨何處聴荒雞鵞溪剰水殘山袛益愁梓州荒絶接隆州眼明今日鹽亭路十里鵞溪碧玉流鹽亭縣南渡梓潼江南下孱亭路千峯挟雨秋江潮不送客獨向射洪流秋林驛雨積氛常不徹天地日㝠㝠俗雜蟾夷種林深虎豹扄荒村隂峒黒寒夜鬼燐青夢裏䕫門路開頭下洞庭涪江十日巴西雨艱難到梓州晩晴見涪水清絶抱南樓不見千頭橘空驚萬里秋尚餘登覽興留眼望牛頭潼川懐少陵返景下東津扁舟涪水濵女牆崩積雨郡郭入荒榛山夕烟花少江流戰伐頻飄零思弟妹嗟爾杜陵人中江縣慘淡黄雲暮行人出草萊風濤兩江合斜照亂峰開秋老飛烏縣鄉遥戱馬臺郫筒何處是一月罷銜盃天柱山絶頂望見岷山作鞍馬衆峰頭蒼茫萬里收岷山横塞出灌口接天流要害三城戍邉防八月秋大荒飛鳥外眼底盡姚州山中有蟲聲如擊磬甚清越蜀人謂之山子又有花名龍爪甚艷偶成絶句稻熟田家雨又風枝枝龍爪出林紅數聲清磬不知處山子晩啼黄葉中題漢州驛壁漢州城郭刼灰前房相西湖有斷烟更問臉波添幾許昨宵金雁驛中眠唐人漢州詩十日醉眠金雁驛臨岐無限臉波横望青城山雲氣連西域名山作漢標千秋軒帝蹟每夜岳靈朝玉宇淩丹壑神鸞下碧霄丈人一招手天路未應遥彌牟道中望八陣圖遺址落日彌牟道霜風百戰場青天迴玉壘逺樹出華陽陸海三都濶雄圖八陣荒卧龍虛故蹟駐馬惜降王新都縣題楊升菴先生故宅有二桂樹尚在侍臣遷謫後常憶泰陵園詞賦留金齒生還望玉門交州無士爕南海得虞翻廢宅西風裏連蜷桂樹存防秋聞道防秋急千山復萬山傳烽來僰道插羽過靈闗屬國何嘗絶懸軍且未還卻思漢丞相心力盡征蠻登成都西城樓望雪山秋老錦官城西風捲斾旌霜髙犀浦落日出雪山明黎雅初増戍松潘未罷兵誰能淩絶頂萬里一崢嶸金方伯邀泛浣花溪二首解纜江村外溪沙失舊㾗夕陽來灌口秋水下彭門清吹臨風緩神鴉得食喧百花潭上好新月破黄昏萬里橋邉去還多弔古情人烟過蠶市新月上龜城寂歴更漏發蕭條鱗甲生迴看草堂路脩竹水蕪平王蜀徐妃詩又驅金翠入龜城九日謁昭烈恵陵萬里登髙日橋山白露寒至今悲蜀帝何處問祠官杳杳衣冠閉淒淒封樹殘錦江非渭水猶作霸陵看武侯祠别鄭次公水部白雁三秋候青山萬里橋與君俱絶域此别更魂銷遺廟丹青盡荒陵草木凋祠西即恵陵平羌江上水相望隔風潮金花橋道中作半年浪迹錦城遊纔數歸程已暮秋晩照開時見千里寒鴉飛盡過雙流眼明脩竹横塘路心逐江雲下峽舟異域忽驚摇落久今宵一醉失鄉愁雙流縣今廢入新津路近雙流縣縈紆一徑斜雞鳴深竹裏暝色幾人家日暮寒雲合城荒野蔓遮愁將蓬鬢色絶域老霜華新津縣渡江南過蠶叢國秋風正授衣青山初日上黄葉半江飛脩竹連千畆髙柟徑十圍臨江呼渡舸極目一清暉雨發眉州五更吹角罷細雨出眉州雜樹堆紅葉蠻荒感白頭岷峨雲氣接卭僰亂山稠東望玻瓈水風前葉葉舟寄朱峨眉方菴兼懐蔣修撰虎臣蔣時卧病峨眉伏虎寺絶域相逢感鬢華幾行清淚落悲笳愁中巫峽暮雲合望裏峨眉秋月斜方丈一燈誰問疾孤帆萬里客還家故人咫尺不相見夢繞平羌江水涯夾江縣地近川南好孤城罨畫間江山真萬里雨雪到諸蠻馬渡青衣水雲遮紫目闗大峨天半落相見二開顔夾江道中二首沈黎東上古犍為紅樹蒼藤竹亞枝騎馬青衣江畔路一天風雨望峩眉嘉陽驛路俯江流寒雨瀟瀟送暮秋誰識蠻中風景别洋州風竹戴嵩牛九盤望峨眉紺壁臨千仞蕭蕭木葉黄水流通越嶲峯逺入江陽十月蠻雲澹三峨積雪蒼來朝掛帆去回首意茫茫竹公溪二首漏天未放十分晴處處江村有笛聲水逺山長聴不足竹郎祠下竹雞鳴竹公溪水緑悠悠也合三江一處流珍重嘉陽山水色來朝送客下戎州入嘉州問丁東院無知者過髙望山趾廢寺鄭生曰丁東寺也訪方響洞尚存感而賦此廿年夢想丁東院何意丁東院裏來山水清音空復在刼灰殘燒自生哀井欄僧汲稀銅鉢石甃秋深長緑苔不遇江南老桑苧風罏誰遣試茶盃放翁丁東院詩我是江南老桑苧諸君小住共茶盃山谷詩古人題作丁東水自古丁東直到今我為更名方響洞始知山水有清音三登髙望樓作風流曾説荔支樓欄檻髙明壓四州謂戎眉卭雅也峩頂晩霞寒白雪江心殘照出烏尤雲烟早暮還殊態楓桕丹黄只似秋自笑心情無頼甚清晨臨眺不梳頭曉渡平羌江歩上淩雲絶頂真作凌雲載酒遊漢嘉竒絶冠西州九峯向日吟江葉三水通潮抱郡樓山自涪翁亭畔好泉從古佛髻中流東坡老去方思蜀不願人間萬户侯坡詩生不願封萬户侯亦不願識韓荆州但願身為漢嘉守載酒時作凌雲游凌雲襍詠五首爾雅臺郭生注蟲魚遺跡空山裏何處蔡充兒幾為勸學死大佛閣韋南康鑿閣燬於袁韜惟佛像存三十六莊嚴不生亦不滅朝夕三江潮如聞廣長舌治易洞宋呉祕古洞何方廣垂蘿覆巖石想見昔年人研朱㸃周易清音亭振衣清音亭松桂鳴騷屑坐對大峩峯雲消露殘雪洗墨池東坡初日石梁上猶傳洗墨池故山歸未得空和淵明詩漢嘉竹枝五首今嘉定州龍遊城郭碧玻瓈西望三峩曉黛滋分取三江作明鏡鏡中各自照蛾眉城頭山色入虛無城下清波望鬱姑白塔紅船歸去晩嘉州也復有西湖側生一樹㑹江門水遞年年進大藩寂寞蜀宫三十載夕陽零落荔支園竹公溪口水茫茫溪上人家賽竹王銅鼔蠻歌爭上日竹林深處拜三郎平羌峽裏府江來西望青衣抱郭逥大佛足前相㑹合早潮晩汐不分開三江岷江東來青衣水沫水西來至大佛前乃合流坡公詩奔騰過佛脚土人謂岷江為府江嘉陽登舟青衣江水碧鱗鱗夾岸山容索笑新悵望三峩九秋色飄零萬里一歸人亭臺處處餘金粉城郭家家繞緑蘋信宿嘉州如舊識茘支樓好對江津江行望烏尤山墨魚吹浪一江浮爾雅臺荒古木秋碧水丹山留不得風帆回首别烏尤犍為道中潮音閣下戒舟航回首凌雲堕𣺌茫土俗漸臨巴子國江流遥接楚人鄉爐熏細細縈琴薦荻葉蕭蕭映筆牀天外峨眉如送客晴雲千片白毫光叙州鎻江亭晩眺望望朱提路夕陽千萬山落霞明極浦飛鳥近南蠻城角旌竿直江亭鐡鎻閒鬱姑臺咫尺烟靄畫圖間江安縣斜日玉津渡青山銅鼓灘蠻江來浩蕩行路飽艱難晩市稀橙客荒園罷橘官波濤三百里猶是怯兵欄清溪納溪縣西五里太白詩夜發清溪向三峽即此蠻雲漏日影淒淒夾岸蕭條紅樹低好在峩眉半輪月伴人今夜宿清溪瀘州登忠山江源分内外千里會瀘州歴歴五峯影茫茫三峽流青山烟外寺黄篾水邉樓夕照層城暮迴風引棹謳撫琴渡尹伯竒彈琴處明月生琴渡似聞彈履霜猿聲何處發今夜宿江陽更有巴渝曲能霑旅客裳楓林前路逺葉葉似瀟湘晨起渡江登五峯過北巖寺江郭曉烟合擕琴來五峯水容青滑笏山態碧玲瓏雲樹孤城外風帆小市東香林迴望好下界一空濛江陽竹枝二首今瀘州錦官城東内江流錦官城西外江流直到江陽復相見暫時小别不須愁妾如江心黄龍堆江枯石爛長崔嵬郎如治平寺中塔戎州西望忽飛來相傳叙州北江上塔頂飛至瀘州治平寺塔上而止合江縣鰼部蠻荒水東南裂地來江臨巴子濶山倚少岷開故國音書絶天涯老鬢催渝歌聲太苦中夜起徘徊合江