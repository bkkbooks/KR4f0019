front:
  text: 討見和緑雪之作復遺岕茶一器索賦敬亭如静女姽嫿有餘態洞山如道流吐納成沆瀣陽羨連故鄣尻脽相負戴地靈草木異雲霧凝靉靆尤重羅嶰名超軼絶流輩山氣夕陽佳岕中茶夕陽勝朝陽風露非灌溉昨賦緑雪詩鹵莽乏清裁名流逓􅆳唱粲若珠百琲髯也實致師拔㦸成一隊白甀題紅籖細君自蒸焙朝來肯送似秀色染眉黛下簾候魚目芳瓷露蟾背雖復遭水厄頗亦澆壘塊茶聲正瑽琤竹影交瑣碎詩成遣長鬚聊作三舍退君當賈餘勇吾衰鼓已再
