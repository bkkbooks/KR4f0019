body:
  text: 送邵子湘之登州我聞大九州香海環其外禪海内絡之萬川勢交滙禹貢周職方中央浮芥蔕鄒衍不可作疇與辨茫昧昔者始皇帝東巡極海岱海神駕橋梁大魚射澎湃號為秦東門刻石表朐界三山在水下其事頗奇恠邵生列仙儒逺逰信所届遥飛阜鄉舄往撫天吳背龍蹻陵丹崕九㸃烟凝黛嶄絶日主祠夐與之罘對日月影動摇島嶼光破碎朝潮激天輪夕汐裂地肺巨鯨若連山奮鬛雲晝晦時見新羅船墨㸃空青内廣乗𣺌何所歸墟誰負戴木張悉文雄髯才更十倍歸來述滄溟始信九州大讀馮圃芝餘事集因題天章還山詩巻木脫石氣青吟君古調詩落日髙鳥去碧空澹涼颸一吟扣一絃一吟傾一巵嘈嘈立部伎孑孑寡女絲巧笑倚市門漆室聲苦悲猿鳴上峽夜雁警團沙時遥憶中條山雲物秋正奇吳生家山南拾橡恒苦饑朝吟看雲出暮吟逐雲歸河聲與嶽色中有太古詞誰為昭與聾獨有馮生知天章在燕市得古銅章文曰河聲嶽色所居正河嶽之間也和田綸霞郎中移居田郎詩格如雪車昨來新句傳移家夢向漪亭坐秋水蒼筤萬个眠􅀢麚冬官事少蹋壁卧日未卓午先放衙殘書滿前自穿穴紛如雁字風中斜未要沈范相賞識風亭月觀吟梅花廬如𤓰牛足摇膝畢逋愛伴城頭鴉鷙鳥累百詎比數蹀􅗿聊試終參撾牽蘿補屋絶代子慎莫無匹悲㚿媧風氏園老松城南風氏園徑僻無車馬野色暮蒼然徘徊古松下松花自開落松籟何蕭灑落日望烟歸時逢負苓者徐健菴宫賛送金陵伊氏扇舊京扇貴李昭骨二百年來名滅沒近來後出仰與伊細砑剡藤如笏滑骨取湘江斑竹枝黄楊烏角光參差妙手須煩畫蟬雀名流底許矜蒲葵蘋末微風散髙栁八尺琉璃當户牖持贈難忘東冶亭題詩逺媿東陽守盆魚井泉初汲寒射鮒蓱衢界水花紛敷草堂咫尺見濠濮碧羅扇底紅鱗魚丹砂瑇瑁非一狀亦有玉雪瑩冰壺中庭兩樹正交䕃日夕蟬鳥相鳴呼朱門定無此輩客但聞擊鼔吹笙竽匡牀視景移枕簟風來蘋末看跳珠夜凉月白河漢轉起聴喣沫疑江湖托身幸得逺鯨鱷一一尾鬛乗清虚出入荇􅍨絶籪滬笑渠殘鱠矜王餘誰為惠施解吾樂牀頭尚有蒙莊書東丹王射鹿圖人馬勢逸不可當開圖素練生風霜奇哉落筆如挽强誰其作者東丹王東樓西樓二千里乗秋出獵凌窮荒番部紅靴鐡裲襠左射右射必疊雙鑿蹄驕馬如風檣三花翦鬛紛怒張俊鶻初變為正鶬蒼鷹塌翅隨馬韁雄狐狡兔皆遁藏射麋麗龜走且僵東丹昔日稱人皇扶餘開國鄰扶桑秋冬射獵海東磧頭鵞燕罷傳􅀈漿跨海南歸大梁苑時時夢憶穹廬鄉往往丹青自逰戲寸縑尺素如琳琅宣和壓架六千軸東丹九幅千金裝艮岳灰飛玉匣散此圖豈不闗興亡蠟炬如椽照空廊雄談劇飲累百觴東丹丹青逺擅場蹊田奪牛語堂堂令人千載悲同光李渭清檢討以龍鬚二莖見贈來書云有風鬟霧鬢之態非火鬛朱鱗比也戲報長句阿誰拔此蒼龍鬚白如珂雪光驪珠風鬟霧鬢憶髣髴汜人愁態瀟湘姝鮫室織絲冰萬縷博山龍涎午方䰞龍皮之扇驅殘暑紫拂龍髯勝揮麈夢入瀟湘洞庭渚貝闕金堂見龍女樂奏還宫迎貴主錢唐破陣交風雨覺來一笑望秋空依舊癡龍卧相語劉子端舍人惠琴魚琴溪水泱泱鯉魚三尺長琴髙騎鯉撇波去至今溪水桃花香桃花香時臨上已琴魚忽徧琴溪水半寸難求鱗與鬐况從丙乙分腸尾由來風俗當園蔬水鄉風味無時無居然逺致同茶筍不用門生議蟹䱉故人家傍琴溪渡渡口桃花幾千樹花時魚美酒正熟好共琴溪結茆住送彭古晉二首玉露塗蘭階明河耿遥夕昨别宛陵人耦長復送華亭客渺渺九峰青茫茫五湖白秋風佳景時菰蓴正堪摘故園隠君子夙抗嘉遯跡吳六益沈友聖既邱園董生蒼水亦山澤問訊今何如予懐在三益聞君逰蓬池訪阮公嘯臺臺上多悲風臺下生蒿萊渌水揚洪波東逝不復迴南有三亭岡寒蕪望崔嵬一言奪相印應侯亦奇才當其置厠時何異諸輿儓君行大梁道覽古紛徘徊埋照實至慎睚眦終禍胎且呼竹林人啜醨盡餘盃瞿山畫松歌寄梅淵公誰能畫龍兼畫松鱗而爪鬛行虚空誰能畫松如畫石石骨犖确松䝉茸韋鑾董羽兩奇絶眼中突兀瞿山翁瞿山翁所居乃在柏梘深山中此山上與黄山通軒轅鼎成上天去遺薪往往成虬龍翁時散髻坐顛頂興酣潑墨浮空濛孤根裂石不三尺倒飲萬丈疑雄虹瞰臨峥嶸下無地盤拏雲霧迴長風世人少見多所恠絶技豈必昭羣聾兩峰對起何巃嵸瀑流直下當其衝輥雷噴雪不知數下與松勢相撞舂撫松看瀑者誰子得非偓佺之屬青羊公何時與翁結廬天都雲海東松肪煮罷方兩瞳更千萬世無終窮獒圖為牧仲郎中賦何人畫此四尺獒目光䁑睒生寒毛重鋂繫頸氣何驁望之非獫非歇驕美鬈碧眼手自撡番部君長身帶刀豪豬作鞾獸錦袍西旅底貢來周郊畫師得非顧與曹趙盾往事悲夷臯君獒臣獒適相遭躇階而走走且號逆踆絶頷摶以鏖彌明鬬死靈輒逃一獒世變心忉忉丹青妙手良可褒題詩齷齪非人豪為君一石傾春醪張茂先宅當年張壯武此地留空宅平生無髣髴何處尋遺跡流恨金墉城傷心洛陽陌風流陸浚儀曽容笑鬚帛賈浪仙墓遥望大房山蒼蒼但烟霧下有千年墳微茫辨封樹照夜少魚燈凌寒走狐兎落日青楓林是君獨吟處王若水古木鳴禽圖為宋子昭郎中作古木幽篁亂疎蘀下有棘枝聚寒雀枝頭顆顆紅珊瑚石畔菲菲芳杜若一雀振羽如欲飛一雀掉尾矜毛衣復有兩雀目相瞲號作竊丹知是非鷓鴣臨流宛相竝戢翼回頭復交頸黄陵廟裏花落時啼罷鈎輈照雙影髙堂置酒相徘徊眼中不數濠梁崔天清雪霽北風作多少蒼鷹欲下來傅青主徴君寫荷竹見寄奉答兼懷戴楓仲眼中突見篔簹谷露壓烟啼萬竿竹下有亭亭菡萏花大似凌波倦膏沐烟墨淋漓元氣足老筆縱横破邊幅卧逰真對兩詩翁晉祠流水如碧玉初拜國子祭酒釋菜太學作雍雍禮樂地肅肅堂廡深皚皚素雪零鬱鬱青松隂堂上鐘簴懸壁中絲竹音末學愧承師撫躬實難任文學盛鄒魯流風感至今早入矍相圃夙侍緇帷林未能習禮器遂以玷華簮聖朝敷文徳憬彼胥獻琛岧嶤白虎觀諸儒粲璆琳議郎悉承制更老多横襟低徊宫牆下如聴師襄琴何處故鄉思二首北齊房君豹有山池在齊州自製詩云風淪歴城水月倚華山樹時人以比康樂子在京師有故鄉之思因取其語為詩云爾何處故鄉思風淪歴城水處處清瑶流時時白鷗起日暮浣紗人臨流獨徙倚何處故鄉思月倚華山樹清輝河漢外散入平湖去不見謫仙人空山下風露繪川書院詩二首為湯荆峴侍講賦大道滙鄒魯洙泗何洋洋邈矣二千載伊洛為巨防江漢有遺民卓為姚許倡至今百泉上源流深且長曖曖夏峯村鬱鬱通徳鄉湯公起梁宋攝衣早升堂側聞睢渙間五色多文章黼黻與華蟲宗廟繪衣裳汝南多先賢鄒魯實頡頏中原昔戎馬講肆為鞠場起衰賴通人屹兹數仞牆樂職備中和諸生歌鹿鳴六籍列經緯諸史成宫商不才忝成均臯比坐傍徨倚席乆不講士氣何由昌愧彼巫醫師糜粟空一囊先生昔挂冠棲遲樂巖谷睠彼二三子望古企髙躅逶迤清川上搆此數椽屋三年侍承明夢想在林麓大道不終晦天中盛耆宿轘轅有耿介上蔡有張沐著書各滿家衆流滙川瀆耿公實亷吏齋㕑甘杞菊張公赴徴車萬里向巴蜀𡨕𡨕子䂓啼蠶叢凍雲木何日成徳鄰絃誦譬家塾予亦步屧來嵗晩共饘粥題徐電發檢討畫蟹仄行與外骨并入考工記何如紈扇上善寫招潮勢草泥擁郭索兩鉗亦何利便欲左手持未勞門下議湘水行送良輔宰零陵陽朔二水湘與灕源同派别分條支湘水東來入南楚曲抱衡山經九疑九疑之山蒼梧野斑斑淚竹英皇祠零陵郡古枕湘水瀟江曲折來赴之自古騷人憔悴地九歌哀怨留其詞亦有元和舊司馬八愚感激傳歌詩其文往往擬山海坐使荒徼増傀奇子今年少去為吏况有詩筆人所知黄溪山水勝鄠杜何必慨歎窮荒為此去浯溪止百里磨崕洗剔中興碑元公作頌魯公筆長與日月相昭垂經術縁飾固良可勿隨流俗矜繭絲衣租食税盡赤子誰云南人鬼且禨捕蛇有説更三復軍輸尚急西南陲贈許生我來太學已八月長日坐卧石鼔旁松風灑然送蟬語一庭碧草生新凉嗟哉趩􅞚不可辨如箝在口誰能詳安得邀君坐東序共窮史籀賡宣王送湯荆峴侍講使浙江我愛西子湖夙昔夢見之湖光與山緑樂事輸呉兒譬客談江瑶未免思朶頤聞君往東南起舞掀兩眉緑蒲十幅帆西風美滿吹初下南徐州三山已麗崎行行過震澤萬頃青玻璃夜航到臨安髙枕殊未知新笋晩花過橘緑橙黄時湖水雄鴨頭緑浄相差􅏔掩映湖上山影娥照清池錢塘八月潮詭異天下奇疾雷震百里蛟龍競躨跜潮頭坐靈胥重水汨後隨三千彀强弩射潮勝雄師至今擊西陵鐡幢髙以危釃酒臨樟亭江海為東馳壯觀今古無寄之於聲詩歌送潞河船郵籖催畫旗吳江顧樵水寫予平山舊詩摘星樓閣浮雲裏一傍危欄望楚江之句為圖相寄雨中偶成一詩奉答兼寄茂倫定九哦詩三十年往往在人口旗亭與樂府流傳亦時有江淮好事多圖畫煩好手詎敢擬右丞家風映先後廿載走京塵頗已忘敝帚君復為此圖毋乃太駢拇平山髙矗矗楚江清瀏瀏雁齒紅欄橋鵝黄水楊栁風景故依然問是淮南否俛仰慨今昔少壯成皓首他時鱸鄉亭相過索盃酒息壤猶在彼寄語雪灘叟遂安毛貞女詩新安水清泚水清石見底黄河水瀰瀰一石五斗泥水清復水濁女心空自知三日為君婦未識君容儀一月侍君疾不聞君履綦秋風響庭樹夜夜哀羈雌髙樓切浮雲直下忽若遺昭昭白日光奄與黄泉期手斲女貞木絃以寡女絲彈作處女吟千載有餘悲十一月十八日紀事招摇方指子七日後長至五星如連珠貞符協天瑞詄蕩天門開日射觚稜次公卿儼行列百寮咸備位雲中露布下琅琅動天地十月日在未軍府秉諮議雷動傳滇城十萬連步騎貝子坐武帳諸道師總萃將軍拜祓社偏禆怒裂眥搜穴翦狐鼠然犀照魑魅天上舞鈎梯地中鳴鼓吹不遑濡馬褐况敢執象燧膽落鐘詎聞約長髪競繫半年築長圍屏息門晝閉樵採路乆絶啖食到殘骴鼫技悔已窮蟻援復何冀孺子一七殊偽相五刑備自然天助順豈曰吾得嵗昆明水清泠金馬山屭贔妖氛一朝洗磨崖勒文字釐圭命召虎乗軒寵邴意六詔歌且舞給復置官吏皇哉聖人徳涵育及動植手提三尺劍削平諸僣偽何以硎曰仁何以淬曰義所以八年中次第芟醜類師行不驛騷民居不憔悴自兹萬斯年櫜弓兵不試敢告載筆臣著之大事記戴氏鼎為楓仲作昔在京師賦方鼎年少筆力回千鈞焦山鼎圖嵗在已江海起立魚龍奔邇來衰謝二十載雖有意氣無由振戴氏此鼎何處得勢如恠獸獰以蹲平頭負戴到蓬户四座動色誰敢捫雲雷盤旋間饕餮斑斑古色疑周秦凹中尾鬛狀天馬縁尻鼯鼠拱且馴或云子午紀年月或如癸甲兼庚申或云乾上艮在下天山為遯理則均著馬履鼠古所訓義云隂屈而陽伸制器尚象有深戒寡聞尠見徒紛紜大巧坐令倕齕指流俗豈辨飼與饙丹楓閣中盡奇古此鼎屹立何雄尊市邱鼎齲任嘲笑烹雞何以羞明神不煩更問栁下季歴千萬世存吾真順治己亥在京師為少傳劉公賦方鼎康熈乙巳與西樵先生在焦山賦古鼎程邃穆倩為圖多父敦亦戴氏物昨日賦罷天馬鼎今日復示古敦牟山川連日發光怪黄白下覆雲油油此敦形製奇且古兩耳三足窮雕鎪上作饕餮下蚩尤細辨非簋非彞舟古人一物殫工巧用盛黍稷神所羞珠槃玉敦載盟府云以歃血親諸侯流傳千載歴塵刼卻伴髙士山之幽昭餘自昔稱晉藪侯甲水作青瑶流丹楓孤閣踞其上朝霞暮靄臨牕浮先生静坐觀衆妙圖書萬卷皆親讐此鼎此敦置左右蒼然古色來商周庭列九賔發緹幕令我一見生歎愀長安市兒寳康瓠金敦玉敦知何求什襲歸去閉髙閣㑹有光氣騰龍蚪敦音對摩崖碑有客新自湘江歸登堂示我浯溪碑芒寒色正三百字忠義之氣何淋漓白日行天破幽曀走避罔兩潜神䕫憶昔天寳初喪亂漁陽突騎如飇馳二十四郡少義士平原太守獨誓師平生不識顔真卿乃能一木支傾危清河年少氣慷慨十嵗作質平盧兒中興大業起靈武功成不死神扶持道州刺史昔漫叟振筆大放瓊琚詞請公磨崖書絶壁鐫鑱千仞青雲梯蠻烟瘴雨不剥蝕萬古照曜天南陲昨者劇賊亂滇海盜據衡永為根基太平祭告徧羣望山川一洗無磷緇宜有雄詞繼前代磨崖重刻浯溪湄元祐黨籍碑天津橋上啼杜鵑耕父已見清泠淵宫中堯舜不可作厚陵社飯悲年年二惇二蔡秉國軸同文館獄紛鈎連衣冠相望走嶺表一網盡矣嗟羣賢司空手籍元祐黨京自署司空尚書右僕射兼門下侍郎大書深刻相磨鐫彗星下掃文徳殿毁碑夜半何喧闐攸攸狒狒一兒戲可惜宋社成南遷潭州死骨尚有臭黨人名字光中天西南荒徼八桂郡此碑千載人争傳上云垂戒萬萬世其詞何異誅共驩從來青蠅亂白黒三代遺直今如弦小人勿用易所戒崇寧僨轍無忘旃秋杪獨逰善果寺感懷亡友葉文敏公秋懷憺無豫古寺聊經行喬木何蒼然歸鳥時一鳴雨乆林葉積人稀秋草生帛公吾夙好敷坐依南榮壁間龍鸞書嵗乆猶峥嶸世祖壁上有書唐詩洞房昨夜春風起一首皇帝御昔逰偕故人共對寒泉清俛仰遂成昔存沒倐自驚西景薄悲谷素魄無常盈世界真一漚何物為冠纓徘徊日云夕駕言返東城古蹟三首為岳給事賦同年岳鎮九給事初知封邱縣頗以古循吏之治治其民以唐髙常侍嘗為縣尉祀典闕焉乃剏為専祠又春秋黄池戰國青陵臺在縣境皆碑其處數百年廢墜之典釐然修舉予嘉其事因為賦之髙常侍祠忠公拓落人好談王霸略一辭孟諸野微官此棲託把臂李杜逰慷慨吹臺作懷古薦溪毛風期緬猶昨黄池餘皇既已徙姑蘇亦已焚黄池尚争長荼火矜三軍肥胡幡名不可見四野空寒雲大河隔濤江至今悲伍員青陵臺東郭一曠望尚見青陵臺臺邊兩梓樹古冡何崔巍下有鴛鴦宿上有烏鵲哀遐哉一女子大義終不虧雨過陳黙公滌岑躡屐歴危岑單椒上空曲江雨從東來風吟萬竿竹城郭浩茫茫衣裳盡寒緑何處是龍眠千峯出雲族十八灘三首繫舟萬安城已聞灘聲惡連峰造天闗疾雷殷地絡篙師理戙楫直與驚湍薄萬山立積鐡其下臨大壑沉沉蛟龍宫神物信所託排空紛恠石森然奮摶攫潜虬動鱗甲巨刃揚鐔鍔地根在何處坐覺坤軸弱悵然念神禹封泥此疏鑿長年聚羣力撇漩出寥廓三復垂堂言逺逰亦何樂亂飇吹急雨一折改奔峭連山亘東南瘴霧迷嶺嶠榜人侵曉發髙卧失臨眺輥雷起何處萬夫迭呼嘯倐忽數灘過到眼一票姚武朔既崖柴崑崙絶排奡始蹈吕梁險終成昆吾譟四山方出雲吐納亦殊妙山木蓊然合㝠㝠子規呌半日過五灘灘灘各殊狀怒流一噴薄石角迷背向激瀑散霜雪倒洒石壁上漩渦走風霆喧豗裂層嶂洶如奔萬馬崩騰不相譲又如閶闔開􅑷􅑷羽林仗傷神既慘澹快意倐悲壯出坎在須㬰布帆幸無恙探奇遘靈閟豪吟洗惆悵韶石昔聞韶石奇今覩韶石狀奇峰削凡體斗絶各雄長恠石走中流牙角怒相向峽迫春湍豪撞舂力頗抗雙闕屹東西毬門始誰剏其旁有阿閣靈鳯昔來貺傳聞帝南巡九成奏崖嶂后䕫不可作疇與辨真妄飄摇翠龍駕髣髴鈎陳仗西望蒼梧雲臨風獨惆悵彈子磯神禹刋九山百粤所不詳蠻夷暨流蔡遺跡葢荒唐此磯始何代峻極蟠穹蒼下臨萬丈潭蛟螭多伏藏黒鷹巢其巔下瞰時飛颺石壁不可梯錯雜五文章鐫鑱復穿漏鬼工肆皴􅀈想當開鑿時巨刃摩天揚安得挾仙靈白日淩飛梁觀音巖粤山無寸膚斯巖益厜㕒其下蟠水府其上排雲霓洞穴豁天半十丈臨江涯騎危躡虚空險絶縁鈎梯白日忽晝晦疑逢魍與魑金獸佩腰間火鈴前後隨蝙蝠如白鵶鍾乳皆倒垂羃䍥掩洞門狡獪神所為暗瀑響隂壑尋丈安可知灑落深潭中如弩齊發機佛座雲霧生濛濛沾人衣逺江上明月欄杆拂參旗歸舟意惝怳絶景誰能追峽山飛來寺方舟宿湞陽髙峡厭䝉密乗風指飛來喜近調御室蒼蒼菩提樹逶迤寺門出金碧閱蕭梁幻語恐非實禺陽二帝子何年此栖息言采阮俞竹遥應黄鐘律如何遂不還空有湖城憶東上縁崎危詰曲昧蹊術夾磴荔奴隂青蔥上初日石壁留孤雲飛亭俯江色沉沉晴川緑活活流泉疾敷坐憺忘歸逍遥問摩詰半山亭雲碓水自舂松門風為闗坡公題峡山寺句夙愛老坡語幾載思禺山何意萬里逰兩腳墮孱顔苔碣不可見定水猶潺湲宴坐半山亭下見凝碧灣榕根如獰龍怒攫青厓間日午竹雞啼濃緑排烟鬟我行窮祝融何時復來還南海神祠茫茫百粤間衆水歸扶胥下滙波羅江日夜相灌輸嵯峨兩虎門衛此陽侯居神宫壓滄溟潮汐在階除我駕萬斛舟乗風但斯須飛亷送旌麾龍伯為前驅百靈何蜿蜒穹龜與長魚將命肅牲醴來格神所愉振衣浴日亭遥見三足烏咫尺躡樊桐覽彼天帝都光孝寺燕集寺舊名虞苑虞功曹故宅一鳥鳴灌木招提春雨餘偶來方外逰踪跡似閒居清池浮水蕹碧􅍨躍文魚輕颸散訶林葵樹交扶疎灼灼佛桑花紅豓驚珊瑚緬追昔賢跡俯仰懷赤烏孝亷自英雄江左盛文儒魯周閫外寄張顧府中趨如何虞仲翔獨此悲向隅青蠅為弔客千載同欷歔菩提壇一花五葉後此樹留孤根枝條徧震旦老榦無冬春我來漲海逰入此甘露門秦松與漢栢瑣細皆兒孫清池憺疎雨妙義聞風旛菩提本無樹更與智者論偽漢劉龑冡歌紇干山雀凍欲死朱五經兒作天子紛紛負販皆侯王山牛兎絲粤中起中原􅐓洞乆風塵遂使傭奴竊邊鄙黄屋左纛歴四世坐斥洛州為刺史昭陽溝水流真珠論車卻笑燒沉水金銀當日錮三泉帶劍上陵嗟已矣苦將肖像擬休屠金蠶玉魚誰料理茂陵甲帳出人間况爾區區安足齒驪山地市竟如何銀海茫茫同一軌羚羊峽逆流入西江已闖髙峽中何年神羊跡靈奥開鴻濛灕江挾牂牁日夜來向東怒流㑹端州奔湊朝祝融萬仞束洪濤大哉造化功巃嵸雲雷窟黯澹蛟鼉宫更聞溪中石價與瑶琨同當年貢天家千指勞人工鼈行九地底下與水府通微軀一不戒崩墜誰能窮尤物古所歎念此心忡忡羚山寺古寺四月中尚有木棉花殷紅照羚羊苔壁何紛葩下有束江亭俯臨硯洲沙牂牁萬里來逺勢如脩蛇髙峽扼其衝天險逾褒斜寺當兩峽口石徑交㟏岈紅泉尚分飛竹筧通坳窪西望端州城七星莽周遮明當陟其巔舉手搴匏𤓰沈佺期羚山寺賦云中有紅泉分飛碧嶺七星巖北斗森魁杓何年化為石散落南斗旁光芒色相射遥填端州城七峯張幕帟崧臺屹中央晻靄仙靈宅天帝觴百神扵兹互主客巖竇鳴鼓鐘石乳亂矛㦸往往鳥獸形奇譎蕩精魄其旁兩洞天谽谺幾年闢水聲暗澎湃時有蜿蜒跡云此龍所宫終古雲霧積沉沉抱珠睡五嶺慳雨澤吾欲割其耳雨工起鞭䇿坐使瀝湖盈乗流掛帆席時旱甚瀝湖竭上屏風巖磴道未及霄闗而返暮登扶嘯臺欲問含珠徑山月出未髙羣峯忽已暝清露滴生衣孤松偃危磴何處仰霄闗雲中一聲磬端州别魏昭士因寄和公於廣州人生如萍蓬飄轉少根蔕况復出處殊合并安可計我夢翠微峰岧嶢在天際幽人侣猿鶴石門掩松桂詎意萬里逰相見炎海裔世事苦悤悤傾葢忽分袂我攀庾嶺松君飽珠江荔阿戎共扁舟崧臺蹔流憇良㑹䢷能常宿昔紛鼓枻湞水方南下灕江復東逝中宿潮不來何由慰迢逓重逰飛來寺我昨逰飛來乃自東峯始得隴復望蜀夢落西峯裏歸棹粤江潯烟雨孤篷底菩提解迎客一笑呼屐齒繚繞曲棧危宛與蜀道似數折得石壁萬笏摩空起如厂如步櫩神工信奇詭西巖隠飛瀑迸罅流石髓鳥啼翛翛竹花覆濛濛水平生禽尚志歎息吾衰矣笑問白足僧胡為羨衣紫黄石磯夜雨舂枕夢忽破決溜鳴篷牕驚雷碾隂峡急雨鏦奔瀧新凉卧桃笙逺夢生楓江起坐祝媪龍添波送歸艭大廟峽夜泊黄石磯急雨如萬弩朝過大廟峽恠石蹲渴虎靈祠出叢薄飛甍粲可數美人珥明璫侍者拾翠羽春蘭與秋菊無絶此終古落帆薦溪毛蘋花媚中渚神光乍隂陽朝雲無處所欲去更徘徊桄榔颯飛雨湞陽峽峭帆入臯石絶壁太古色山川方出雲白日轉昏黒浩浩一水逝蒼蒼兩崖逼雄雷地中奮坤軸倐傾仄十步一盤渦下視窈難測云中穴蛟蜃呀呷擇人食牯牛灘名尤險絶艱虞萬夫力石棧縁秋毫百丈牽江直慘慘鷓鴣啼猿猱不遑息尚憶符韶州名錫架閣擬巴僰事往逾百年遺踪半湮泐陵谷一俯仰感歎情何極與孫豹人周星公往白鹿洞次迴流山廬山何髙髙白雲在山腹倐忽縈山椒亦或帶山足上下無定姿頃刻屢移矚山徑不逢人樵歌出深谷何處逓松聲風泉滿林麓初入五老峯謁白鹿洞呈湯佐平先生忽忽逺城市浩浩臨滄洲良辰惬奇賞始遂廬山逰威紆屢轉壑窈窕時經邱潺潺風瀑瀉蒼蒼石川流騎牛緬往跡眠鹿欽前修風景宛猶昔年運倐已遒惟有五老峯屹立忘春秋紫芝驚漢帝黄石招留侯泉石不我遐桂樹生山幽自白鹿洞至三峽澗溪行少阡術沿洄屢迷津馬蹄怯危石欲下還逡巡出谷見稲畦烟火自成鄰日午聞雞啼衺徑見遺薪薜荔衣恠樹山風恐行人舉首五老峯白雲如魚鱗遥青逓隠現光景相鮮新望望玉峽亭聊可垂吾綸三峽橋五里聞瀑聲轟若車千兩谿迴見飛梁穹若虹百丈衆流㑹三峡峡門扼其吭建瓴沸驚湍排空削層嶂石激水斯怒水横去聲石逾壯水石終古争恠奇紛萬狀日射金井潭濺沫出橋上日光散青紅雨絲亂飄颺絶景遇兩蘇何人繼髙唱玊淵潭已歴三峽橋更訪玊淵水水流大壑中路轉層松裏片石横百仞其右平如砥九十九飛瀑一門爭萬軌岝㟧直要衝跳盪不得止雪浪如車輪凸凹忽奔駛激射為深潭神物潜尺咫夜黒風雨來鱣鮪皆避徙乆立凛毛􅄠薄雲漏餘晷西眺石人峯梵唄空中起栖賢寺李渤讀書處乃在栖賢谷何年作招提來尋惬幽獨僧舍如蜂房髙下傅山麓雲來漢陽峰時就簷下宿古寺無所有脩竹間喬木野衲喜客來欣然設茗粥便欲置草堂巖栖於此卜萬杉寺朝過玊京山緬想陶公里谿迴得寺門曲折杉松裏雨中念佛鳥交語清入耳風吹脩竹林下有寒泉水開先瀑布神龍擘空㝠颯沓雙峽開青天露鱗甲白晝行風雷峽偪不得逞掉尾揚其頦千仞忽開豁下有布水臺嘗聞龍奮迅三昧何雄哉誰能一鉢盛終古相喧豗夜來雷雨怒大石為崩摧龍逰引九子烟霧紛徘徊偉矣南宫書壁上有米元章大字破壁鑱崔巍有語不敢吐以俟冠古才寄題三疊泉坡公賦廬山選勝僅取二開先與三峡雙瀑誰軒輊此逰兩經行奇觀偶然遂遺恨三疊泉扶笻未一至譬如禽慶逰五嶽得其四他年謝羈鞅更擬探靈閟一削陸羽經别續廬山記小孤山守風已過落星石前臨大雷岸水宿淹期程日暮中流半紞紞戍鼓鳴蕭蕭水禽散愁對小姑祠靈風送波瀾彭澤雨泊有懷陶公陶公令彭澤柴桑一舍耳猶對匡廬山共飲西江水一朝悟昨非扁舟歸栗里笑指故山雲吾心亦如此我來彭澤縣秋田没沙觜急雨送寒潮三歎顔延誄三山磯澄江日夕浄歸鳥投前浦明霞散淪漪輕飇憺容與南臨春糓溪北眺濡須塢何處是三山沙頭駐鳴櫓采石太白樓觀蕭尺木畫壁歌落帆向牛渚直上太白樓錦袍烏帽太瀟灑迴看四壁風颼颼蕭生何年畫此雪色壁峯巒出沒烟嵐稠元氣淋漓真宰妬江湖􅐓洞蛟龍愁呉觀越觀上海日蒼烟九㸃横齊州祝融諸峯配朱鳥瀟湘洞庭放逺逰峩眉雪照巫峽水匡廬瀑下彭湖流須㬰使我行萬里瞥如怒隼凌清秋我生海隅近岱畎西逰曾上瞿唐舟昨登五老弄瀑布卻臨三峽窺龍湫七十二峯身未到蒼梧已略天南頭太白逰踪徧四海晚愛青山采石聊淹留丈夫當為黄鵠舉下視燕雀徒啁啾奉符古城我行奉符城不見崑崙迹何處仙人閭青山繞長陌惟聞党竹溪髣髴南邨宅徂徠山雲隂移徂徠影覆汶河水下有賢人居清風被田里一杯詎能容千秋今廟祀楊家硿詰曲皆紅泉縱横半白石石暎月明時泉喧風雨夕愛此故鄉山臨流布瑶席甕口峽岱宗趨肅然吾鄉長白即史記所謂禪泰山下阯東北肅然山亦曰副嶽也隂齊陽則魯中有峽谷臺連峯作門户石壁造天闗蕭蕭緑蘿雨行經鵲華二山間即目山海作經首鵲山招摇之桂生其間麗􅕱音几之水出其下祝餘四照花斕斒今此鵲山勿乃是越人陳迹誰追攀濼水南來紆且直羅生夾岸蘅蕪葌隔水正望華不注疑臨玉鏡窺烟鬟是耶非耶看不定尹邢雙照蛾眉彎被山㻬琈不收拾蒸栗黄潤丹砂殷七十二閘逺鈎帶如棊布子交週環栁花滿樹緑於染杏花㸃地紅斑斑始知今日已寒食潑火小雨回天慳濯纓湖亭好烟景春波澹沲清心顔回首卻望衛河北風沙莽蒼連雄闗嘯園雜題八首梭山云是天孫梭何年化空碧蕭條松桂林晻靄幽人宅不妨折齒人長兹置巖石見山亭張公茂蘭故居正徳間進士也時人語曰天下清官張茂蘭入門不見日風動千箖箊孤亭在竹中猶傳清士居世無劉伯畊豈慕貂襜褕張官京師冬無絮衣遺者皆不受東阿劉田伯畊以衣送之乃受曰世惟劉伯畊衣可服耳竹中見左傳海岱清士見世説長白深處肅然萬壑深結廬最深處昔睹封禪儀今餘采樵路惟有漢時雲悠悠自來去猗玕洞古潭深不測石梁架巖洞中有蟄龍蟠鱗甲欲飛動明玕照清流幽禽時一哢勘書閣北齊勘書圖流傳子華作楊子華有勘書圖髣髴邢魏流劍珮文林閣從容四庫間何如百城樂海燕樓朱樓玳瑁梁春社紅襟燕年年思故巢涎涎㑹相見花動倉琅根美人起常宴横翠閣髙閣冠清溪雪浪相迴薄簾捲暮山晴衣霑空翠落烟暝竹林間歸飛雙白鶴浄友亭斑竹已解䙀翠菼復如鵻虚堂受荷氣疎簾漾文漪風標兩公子照影時來窺米海岳研山歌為朱竹垞翰林賦許文穆公故物後歸朱文恪公海嶽研山不可見人間空説研山圖研山之圖亦遭燬雲烟過眼徒嗟吁宣和艮嶽已塵刼矧乃片石輕錙銖永嘉流落幾百載昭陵玉匣今亦無詎知神物有呵䕶星芒夜隕三天都太平宰相盛文物寳此何啻千璠璵古藤書屋花未放主人愛客招吾徒眼中突兀忽見此乍疑几席羅衡巫壺中九華那足擬仇池枉用誇髥蘇三茅地肺互鈎帶二華雲氣相縈紆蛟龍屈蟠待雷雨仙靈髣髴迴軿車華葢一峯獨秀拔宛挿玉笏翹犀株翠巒玉筍左右列脽尻股腳相欹扶上洞下洞閟曲折潜通小有涵空虚龍池幽窈騐雨候頗疑中有驪龍珠峯獨者蜀屬者嶧上泉有埒下有澞座客摩挲三嘆息蒼然古色生眉鬚海嶽之庵書畫舫幾伴此老浮江湖巧偷豪奪歴千刼閲盡春秋如蟪蛄翰林好事過顛米日餐蛾緑忘饑劬滄江夜夜虹貫月莫令光怪驚菰蘆飛仙閣山行喜乗流江平况如練岝㟧有開闔竹樹一蔥蒨人言利州風今朝泠然善灘如塗毒鼔舟劇離弦箭仰眺飛仙閣鳥道危一線彎環歴三朝向背窮九面絳雲卷輕綃白日遞隠見嘉陵碧玉色晴雨皆婉孌想見吳道𤣥應詔大同殿此生兩經行天遣追勝踐醉帽停烏奴已泊益昌縣蜀諺云利州風雅州雨汎嘉陵江至益昌今昭化縣懷何易于益昌古利州由來五達衢白水合嘉陵山谷相盤紆我有汎舟役萬里經川塗望古懷清芬所思何易于刺史乗春下畫鷁盛嬉娛前舟載賔客後舟羅笙竽索民為挽舟牽繂須百夫縣令腰笏前挽舟自先驅刺史驚問狀縣令乃前趨方春耕且蠶民力方勤劬令適暇無事可以充卒徒刺史聞之慙上馬如亡逋仁人重一言能使民力蘇考獻徴樵文摭之載唐書累百守令中尚有斯人無作詩告有位磬石鑱山隅題張敦復大宗伯賜金園圖我昔曽過龍眠山山雪蒼茫嵗方晏龍眠山莊知有無空向圖中幾回見遺墟但指璇源館在舒城亦伯時别業芒鞵未踏垂雲沜祗今彈指閲七載過眼流光等飛電龍眠尚書早致身玊斧森沉侍清燕承恩暫許休沐歸朱提賜出蓬萊殿鑑湖一曲落公手草木雲嵐荷深眷數問家金共賔客遺事蘭陵何足羨三年卻返承明廬夢寐家山寫東絹溪流百曲學印文山色千層累重甗龍公鸞尾歗烟雨鹿角鼠鬚飽霜霰㟏岈忽斷漁浦開仰見雲中寫飛練草堂抱膝還讀書樂此長年可忘倦此山此圖世希有終擬他年追勝踐待公功成歸故山江帆更乞樵風便夢逰三山圖歌為尤悔菴太史賦故人昨有夢夢落滄海東海中三神山往來倐忽隨長風上有金銀宫闕互虧蔽下有雲濤汩沒相撞舂蕭灑古仙人漆園傲吏逍遥翁嵗星不見幾千嵗劃然一嘯驚鴻䝉鴻䝉澤見郭憲東方先生傳羲皇上人北牕卧流觀山海須㬰中謫仙騎鯨去采石玉局西返峨眉峯或被天衣駕烟鴻或乗雲氣騎飛龍西堂八十方兩瞳生不並世道則同笑指桑田洗毛髓下視六合塵濛濛兠率海山等㳺戲夢耶覺耶皆虚空三千里外訊占夢漢廷尚有大王公甘泉宫長生瓦歌為林吉人作并寄同人漢宫一百四十五三輔黄圖漢畿千里内外宫館一百四十五所横絶南山包九􅉄未央建章最廣麗渭北更起甘泉宫甘泉之山化金碧千門萬户交玲瓏通天臺髙屹宫表下瞰雲雨青濛濛武皇求仙跨滄海射魚牽犬東門東秦始皇紀立石東海上以為秦東門孫卿已誅五利死飛亷桂館猶巃嵸上陵磨劍勢一變雲陽烟草悲秋風甲帳珠簾盡黄土何况片瓦埋荒叢林生好古極幽賾短衣匹馬空山中太乙壇邊弔鈎弋悲歌躑躅斜陽紅此瓦出土事非偶長生古篆疑神工濯以清泉襲綈錦携歸嶺海光熊熊令弟繪圖亟示我使我懷古心忡忡終南渭水舊逰歴漢家陵闕隨飛蓬豈知一瓦供賞識逺與石鼓岐陽同兄視羽陽或作棫弟銅雀纎兒慎勿加磨礲精華録巻四欽定四庫全書精華録巻五刑部尚書王士禎撰
