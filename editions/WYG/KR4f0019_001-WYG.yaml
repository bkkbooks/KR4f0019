力鞭巨石驅神鼇練塘一勺好栖托結隣未卜心空勞酒闌歌罷意惆悵烟江明日横輕舠九日與方爾止黄心甫鄒訏士盛珍示集平山堂送方黄二子赴青州謁周侍郎西風蕭蕭天雨霜秋髙木落當重陽鶗鴂先鳴蕙芳歇雁門鴻雁来何方今我不樂出行邁西城近對平山堂歐公風流已黄土舊逰寂莫風烟蒼喬木脩竹無復在荒蕪斷隴棲牛羊劉原父蘇到日已陳跡况復清淺論滄桑京江南望流湯湯北固山髙枕鐵甕蕭公旌斾何飛揚雲龍直北雲茫茫彭城戲馬啟髙宴至今邊朔傳名章孤蓬驚沙振叢薄哀螢蔓草纒雷塘從来王霸已如此牛山何必霑衣裳與君並坐但鼓瑟醉倒聊復呼葛彊樽前聚散况難必羽聲變徴何激昻明朝送汝望諸澤欲趁桓公作急裝登文㳺臺玻璃江上謫仙人東来萬里辭峨岷熈寧元豐不得意翩然戲弄淮南春龍圖學士孫莘老忤權要祥符宰相餘王孫王定國黄樓一賦軼屈宋無雙國士推髯秦少游四公相逢向淮海酒酣耳熱氣益振珠湖三十六陂澤髙臺下瞰何嶙峋錦繡詩篇照天地與臺光景長鮮新烟雲過眼一飛鳥黄河曲注江東奔人民城郭半遷改此臺屹立當湖濱惠州儋耳垂萬死後生望古傷吟魂何人請籍元祐黨至今泚顙慙安民豈如此臺好名字永絶狐鼠芟荆榛我来逰眺嵗幾度溪毛明信古所敦逺帆如鳥樹如薺湖光雲霧相摩吞嚴冬沆瀣但一氣大雪片片鋪龍鱗酹公一語公莫嗔作詩一笑君應聞末即坡公題太白像語過汜光湖懷古嗚呼正徳中嬖豎隳皇綱華容既遐謫劉謝咸髙翔談笑誅刑餘臺閣資文㐮逆濠睨神器弄兵下鄱陽勢異北平順跡同吳濞狂桓桓文成公將帥皆龍驤義旗出章貢狡童旋已亡如何萬乗尊南巡来建康羅綺照江水姝麗傾淮揚誰賡白雲謡載詠黄竹章兹湖兩駐蹕名因翠華長龍舸與鳳艒樂哉方未央膠舟古所戒遺恨憐昭王事徃二百年寒波但菰蔣月暗津鼓急楓落漁燈涼緬懷豫且歎弔古重悲傷至今泰陵樹松栢無斧斨夜遇陳伯璣即别聞君返西江﨑嶇嵗將暮不知秋浦歸復此吳陵遇烟暝失漁邨雪消數江樹惆悵聞荒雞别君立前渡蘇門行寄劉公㦷兼呈孫鍾元先生劉生俠氣老不除腰間玉具纓曼胡目送飛鴻卧西省晝夢秋水思菰蒲掉頭一竿清潁尾琉璃萬頃堆西湖憶昨聽爾御風撡山泉抉溜松風呼黄鵠山頭一握手戴公徃蹟今有無山中舊約息壌在相看一笑言非疎舊在京師聽公㦷彈御風操贈詩有與君更作他年約黄鵠山頭訪戴行之句壬寅果相遇黄鵠山下此事甚竒濤頭如山五馬渡酒酣夜别黄公壚平山堂上望汝潁恨無好句追歐蘇昔與汪琬程可則共槃礴看君冩作蘇門圖恠石槎枒樹蕭瑟醉墨絶似雲林迂嘯臺鸞鳳儼在耳安知嵇阮非吾徒聞君近散萬金盡便衣掃塔辭妻孥山中有鄰徳不孤蘇門先生今大儒夏峰邨邊看秋瀑雲中髣髴開精廬尋源采藥去不返空留烏跡巖間書廣陵西望連孟諸倘逢樵叟一相訊山中服食今何如甓湖舟夜讀渭南集偶題長句少陵不作昌黎死大峨仙人落儋耳渭南老子来堂堂鬱律蛟龍蟠筆底半世功名梁益間拓弦横矟劒門關白頭鏡水江湖夢夜夜山南射虎還陸放翁心太平菴硯歌為畢通州賦娬媚散花峡艱危道士磯放翁過此留清辭何年片石堕㵳沉龍堂荒忽蟠蛟螭先生當年西入蜀迎風十丈搴黄旗下牢䕫門波浪惡白鹽赤甲天下竒轉入興元瞰河渭山南射虎黄雲垂大散關頭見烽火賦詩草檄如星馳此硯爾時伴戎幕賢於十萬熊羆師鶯花海中九年住春江醉捲千玻瓈錦官城裏蘋風閣百觴萬首争淋漓此硯爾時厠髙讌飽霜千兎相追飛先生老矣竟東下鏡湖支枕看風漪但餘此硯共幽獨猶能起賦從軍詩紹興淳熈一片石流傳異代誰使之曽窮梁益掠吳楚放翁金崖硯銘中語吾曹想像空嗟咨畢侯家近黌堂側草生書帶紛葳㽔劍南一巻不離手興来春日吟茅茨㩦渠歸去坐懷古定有雲霞生墨池卞忠貞公墓下作松柏何蕭蕭云是卞公墓背踞冶城顛前臨大桁路緬昔永嘉時流人競南渡舉國扇清言作達相矜慕惟公執鄙吝巗巗畏峰距一朝荒傖来旌飛厯陽樹取節慚王公種薤笑諸庾堂堂卞將軍授命青溪渡父子忠孝俱大節光國步快意温平南屨及雷池戍一戰翦長鯨鐘簴仍如故握爪識忠貞死綏表風素英爽載雲旗陟降神靈雨咫尺袁司徒異代同金鑄宿長干寺支公邀我宿清夜開南軒龕燈照維摩跏趺寂無言下簾啟北牖山夕烟景昏中夜微風作涼雨灑林園宿鳥稍驚起時聞嘉樹喧枕簟生夕涼罏香歇微温勞生疲津梁聊息應對煩六朝松石歌贈鄧檢討夀陽太史好竒古邀我来觀六朝之松石不辭重墊一角巾此生當著幾兩屐入門犬呌走欲顛袍笏淋漓狂太劇蟠根近連瓦官寺吹香正鄰虎頭宅蒼皮黛色磨青銅老幹樛枝拓金㦸蕭梢上摩白日暗輪囷下瞰蒼烟積千年為䃜誰得見已有脂香化靈珀石勢嶙峋不相譲元氣盤盤絶䋲尺蒼苔剝盡南宋字刼火不受陳宫厄陳叔寶三品石終南太華若在眼咫尺壺中苦崩廹誰遣史書宋星隕將無神受秦鞭斥晦㝠豈非鬼物庭風雨當防巨靈擘王謝衣冠失江左齊梁人代成今昔建康宫殿幾青燐此石此松閲朝夕一物亦荷皇天慈懷古茫茫百憂集擊琴欲罷且髙吟謖謖寒風灑巾幘金陵曉發月落驃騎航潮生鎮西宅濛濛逺林樹烟景紛如積煙際下漁舟樹杪帶行客何處金陵思秋江葦花白陳生行戲送其年歸陽羡陳生陳生爾既不能入淵斬長蛟又不能登山射猛虎復不能亡賴作横苦鄉里十載哦詩守環堵徒抱輪囷一片心藜藋鼪鼬相支拄昨日渡江来今復渡江歸運租船上苦憔悴風高浪湧横江磯朝来寄我新詞句明月無情蟬鬢去五湖歸去伴漁竿楓岸蘆汀不知處季鷹鱸鱠思江東我亦年年嘆轉蓬期汝扁舟同射鴨銅官山下竹枝弓江上讀韋詩彈琴向空江夜静見江月水波正遥裔河漢坐超忽五絃泛波濤餘音散林樾沙邉鶴唳逺烟中人語歇何處楚山青孤帆逺將沒獨有韋公詩依依伴清絶蕭尺木楚詞圗畫歌大江秋老歌離騷江波瑟瑟風刁刁恠石巃嵸壓崩濤猩猩歗雨悲猿猱楚纍一去二千載使我後死心勞忉齧桑敗盟西帝驕商於六百横相要武關一入不復返章華臺殿生蓬蒿江潭憔悴子蘭怒蛾睂謠諑羌安逃長楸龍門望不見木蘭桂樹棲䲭梟騏驥不御愁跼跳菉葹蕠糅申椒呵壁荒唐罷天問沅湘西逝䰟難招蕭梁王孫筆佹僪攀挈顧陸提僧繇丹黮粉黕寫此本墨花怒捲湘江潮湘君夫人降荒忽國殤山鬼来蕭颾青楓斑竹染啼血靈風神雨紛飃䬙酒䦨歌罷老蛟泣星辰迸落江天髙宿𢎞濟寺名藍敞積翠遥夜開禪關山半聞清鐘夢覺心亦閒飛雨灑江介流雲滿空山五載復投止塵勞慙昔顔黄子久王叔明合作山水圖有客示我七尺練云是黄王之合作粉墨駮蝕神淋漓巖谷髙深氣盤礴長林巨壑来畏佳飛鳥流雲去寥廓空堂白晝生風霆飛瀑千尋競噴薄老松撐突夜乂臂恠石縱横鵞鸛啄石稜松鬛若無路忽向青冥得樓閣峭壁無梯猿臂絶天外孤茅誰所縛滿堂動色神悄然題字依稀辨黄鶴吳興清逺鷗波亭家法賢甥宛如昨意匠慘澹經營成范緩倪迂大張拓富春老人年九十煙雲供養窮三樂扁舟訪舊霅川来偶從縑素論邱壑為添樵徑螺髻旋逺峰一角空中落逺人無目樹無枝妙觧通靈失糟粕吳興富春幾百年此意天然殊斧鑿山人癖如阮宣子蠟屐猶堪代芒屩惜無劉尹買山錢苦向畫圖躭寂寞此中三日容坐卧便擬拂衣永棲託明年借汝春晝閒梅老無花竹生籜精華録巻一欽定四庫全書精華録巻二刑部尚書王士禎撰古體詩
