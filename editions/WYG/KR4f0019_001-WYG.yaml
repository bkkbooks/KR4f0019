front:
  text: 精華録巻一
  hash: sha256:a25fc7647d4f0c87a25d69b1538fe42aecddb27ef759d6239f1f7784a803a99d
body:
  text: 刑部尚書王士禎撰古體詩對酒對酒歌慨慷自我屬有生共得睹太平皇帝陛下惟樂康宫府治丞相無私人諸諫官彈射姦慝咸有直聲自中丞刺史良二千石各各有廉名日南交趾皆我郡縣蠻夷君長以時稽首殿庭屬國具為令文笥生翠来王京幸太學三老而五更遂賜民爵一級存問長老遣都吏循行大酺十日除宫刑美人曼夀百室豐盈慕容垂歌三觧慕容初入鄴已有虎狼志前驅丁零部後面鮮卑騎燕燕尾涎涎飛飛啄塘蒲三原隔五􅉄緩急當奈何慕容在何許已度涼馬臺饑鷹掣鞲縧一逝不復歸白紵詞三首江南煙水多白鳬羣飛啞啞烟際呼美人窈窕為君娛蜀羅吳縠曳華裾修睂星的妍且都明鐙遥映丹脣朱清歌錯落大小珠折腰流盼意態殊乍進欲退心躊躇芙蕖灼灼迴雙趺仙珮丁丁鳴六銖燭殘月暗漏滴壺宛轉為君開繡襦青春遥夜開華堂綺羅絃管東西廂阿誰公子淮南王美人家本邯鄲倡合蟬墮馬耀明妝起舞為君陳樂方翠曽參差烟際翔鸞驚龍婉相頡頏西城比里各擅場羅褏文巾紛御香明眸善睞含流光舞罷雲中孤月涼若耶溪水勝瀟湘越川佚女春浣香織成白紵冰雪光上為舞衣下舞裳大秦珍珠明月璫崑山玉撥映金梁齊琴趙瑟聲鏘鏘七槃妙舞紛相當須㬰璧月沉西方汝南鳴雞啼曉霜今我不樂去日長裴回念此摧中腸翡幬翠幄陳髙堂請君安坐樂未央擬美女篇洛濱風日好美女出相望瑶象飾香轂玉􅋴鳴鏘鏘采春蘭阪上弭葢蘅臯傍龍輔節纎歩鶯珠結明璫借問女誰氏少小生平陽大姊入後宫次姊瑯琊王小妹雖不貴夫婿直東廂出入冠鵔鸃天子侍中郎檻衣萬錦費騕褭千金裝容華誠自惜貴盛寧易詳洛水正微波明瀾一何長川路西南永扁舟不可方寄語盛年子顧義慎自防擬白馬篇駿馬生代北少年出幽并結束各光采指顧風雲生朝遊屬玉觀夕宿衛承明身逐孤兒隊名𨽻羽林兵行行南山獵意氣何縱横蒼隼決雲来飛矢逆風鳴大澤鸘鵠遒深雪狐兎驚迴瞻鸛雀門突兀與雲平鞍馬倐来歸勢若浮烟輕昨夜羽書至貳師出邉庭上馬别妻子鳴鏑追前旌舊随冠軍伍復此河源行大漠少行人深谷多鼯鼪朝飲沙上泉夕戍雲間城左顧疏勒服右盼伊吾清無令都䕶將關外獨聲名自石橋尋黛溪遂至摩訶峰下日落山氣涼清流自迴轉窮源不知勞漸忘溪路逺幽石各奔峭脩樹亦婉孌遥睇徑難測迴矚途屢變寂厯衆山響蕭條晩風善微徑暮樵出懸崖歸鳥見須㬰夕霏収殘陽四山徧新月忽清揚餘霞自舒巻稍覺葛衣輕幸藉孤笻健平生邱壑人兹言庶能踐由栁菴踰西山最髙頂至醴泉寺拜范祠清境難久留申旦戒徒御引領睎前峰抗䇿辭東路數武即嶇嶔危蹊少安步顧盼見百里雲日媚烟樹慿髙俯澄湖風帆競孤鶩晴旭移峰巔明晦變已屢褰衣入空翠溪流𣺌南注槮疎曠逰眺蒼茫失昏曙東山清風来西澗涼雨度澄潭益蕭瑟㳺鱗紛散聚前賢跡已逺山川緬如故夙昔思古人三歎讀書處醴泉謁誌公像觀唐碑碑開元三年乙夘立早讀神僧傳緬希誌公迹劍水蹤已遥鍾山事成昔豈知常白峰留此千年石鳥爪帶銅綠鏡面瑩蘚碧磨滅開元碑蟲鳥紛難譯披蘿究遺文剥苔理殘畫斷闕發聞見樵牧増歎惜陸銘圮寒塜王碑委荒僻廬陵傲珠犀東武比博奕淪棄多名珍何憚窮鉤索一勺醴泉水供此風雨夕神僧傳誌公面瑩徹如鏡手足皆鳥爪碑有云陸倕製銘于冡内王筠勒碑于寺門皆與傳合醴泉寺髙閣瞻眺有懷范文正公風雨湖上来蕭條灑飛閣殷雷起睂際極目窮􅋁廓遥天壓烟水空濛氣磅礴大澤盤蛟龍斜風偃鵰鶚郤眺鴻濛中日光逺迴錯草木暗四山急淙鳴萬壑悵然思古人大雅何時作書堂絶澗已千仞磴道仍九盤直上若懸溜􅀈屬勢難安右顧踐鹿跡左顧慿鳥翰日落空山中蕭然風氣寒精舍壁間出洞門天際看竒石壓巖户孤立何㠝岏突兀抜澗底窈窕凌雲端入門度飛梁傍夕聞驚湍幽軒宛初構几榻皆峰巒頗意雷雨時雲氣生户間諸天發鐘磬星斗方闌干惆悵此靈境睪然懐懶殘復雨花枝濛濛日將暮䬃䬃涼飇起庭樹雨腳射地晝隂晦急溜鳴簷不知數連年左輔嗟大無有蜚多麋仍屢書良民重累背鄉縣奸民攻剽成雈苻天南干戈未寧息男罷農耕女廢織長沙江中多戰船祝融峰頭尚兵革羽書日日下山東秸銍轉輸動千億苦竹黄楓猿晝啼舟子征人少顔色掘冡鑄幣既不能展轉呼天猶力穡今年稍稍宜雨暘黍稷撲撲稻葉長長官鞭扑那敢避努力公家輸酒漿和窟室畫松歌黄門園中有窟室背枕亞禄山名臨滄溟石壁磊砢一千丈入眼髣髴生精靈横壁老松誰所作海風怒攫山欲傾盛隂五月凜霜雪怒姿萬變盤雷霆疑是溟渤含日氣不然天上来星精我来盛夏變冬序白晝慘淡生晦㝠顛毛亂指舌上撟寒肌起粟心骨驚上下蒼茫有神鬼左右騰跳飛鼯鼪江南吳生昔為此一一下筆皆龍形昔者吳道子畫壁天宫寺將軍劍舞何蔚跂興酣筆落氣磅礴萬夫動色嗟神異吳生畫松已百載鐵榦霜皮終不改南榮曝背亦吾儔偃蹇龍鱗好相待蠡勺亭觀海登髙邱而望逺海坐見萬里之波濤長天寥廓雲景異春隂偃蹇魚龍髙怒潮乗風立千丈虎蛟水兕紛騰逃羣靈潛結萬蜃氣一痕未沒三山椒須㬰勢盡潮亦止波淡天清静如綺菱苔沉綠紛塘坳螺蚌摇光散沙汭㕘差島嶼羅殊域紛如星宿秋天裏擊我劍聽君歌有酒不飲當奈何日主祠前水蕭瑟仙人臺上雲嗟峩羨門髙誓不可見秦皇漢武空經過祇今指顧傷懷抱黄腄㡉缾盡荒草人生快意無㡬時明鏡朱顔豈長好吾將避世女姑山不然垂釣蜉蝣島周文矩莊子説劒圖後有董宗伯書説劒篇古今人物畫手誰第一晉有衛協吳曹興南唐周生更竒雋行筆痩掣姿峻嶒此圖在世踰千載墨光黯淡生光晶君王隱逸各有態蠶絲烟篆交迴縈目瞋鬢突五劒客短後之衣曼胡纓二人旁立目左顧劒如星日光縱横昻首右顧者三士二人按鐔神欲生一人抜劒作虎步怒如截兕吞長鯨使筆如劒劒氣出此公無乃能鐵兵莊生説劒固豪快十步千里無留行千年竒論佐竒筆揮毫潑墨皆飛鳴雲間墨妙更遒絶鍾王腕㡳紛鬬争自云昔見吳興書説劒恨不作圗雙妙并今逢此巻信神物又恨作書非趙卿徘徊三歎出金石煥然妙蹟如神明我聞周生妙得後主作字法秋胡謝女風格清秦淮花月汴京土感此傷人今古情宣和御藏文矩有秋胡故實謝女寫真等圖冬日偶然作四首太史下蠶室坎壈誰見知發憤傳貨殖千古同悲噫郭縱出鑄冶翁伯起販脂灑削既鼎食胃脯亦連騎志士守蓬蘿不如交馬醫索帶披敝裘不如規魚陂我愛灌仲孺意氣薄雲天長嘯入吳軍指顧堅壁穿長㦸鬱龍蟠怒騎如風旋聲名冠諸侯皆曰大夫賢魏其勢既落田氏寵益專朝請考工地夕奪城南田丞相故賓客顧盼忽屢遷笑罵顧四筵殊不直一錢當時膝席子岌岌皆危冠鄭季有孽子少小為人奴騎從平陽主給事建章居朝拜大將軍封侯詫鉗徒遂復還尚主賜第耀通衢隴西老飛將猿臂雄萬夫白首不得侯心折幕府書誰能對刀筆臨風自捐軀天道有如此千古同欷歔吾家有方平雅志託林壑拂衣早歸耕貂裘行採藥卜築沃川墅垂釣上虞郭􅊬矣孔阮儔遐哉箕潁樂瑯琊多龍鸞羡此雲中鶴春不雨西亭石竹新作芽逰絲已罥櫻桃花鳴鳩乳燕春欲晩杖藜時復經田家田家父老向我説穀雨久過三月節春田龜坼苖不滋猶賴立春三日雪我聞此語重嘆息瘠土年年事耕織暮聞窮巷叱牛歸曉見公家催賦入去年暘雨幸無愆稍稍三農獲晏食春米榖賤復傷農不見饑烏啄遺粒即今土亢不可耕布穀飛飛朝暮鳴春莩作飯藜作羮吁嗟荆益方用兵蠶租行十觧丁酉夏有民家養蠶質衣釧鬻桑而催租急遂縊死其夫歸見之亦縊王子感焉作是詩也陽春三月時蠶子何蠕蠕三日出奩中五日徧籧篨一觧東鄰有少婦養蠶方一塸夜夜伴蠶眠桑葉恐不周二觧朝出南陌頭猗猗望桑柔亦不見桑柔椹子醉鳲鳩三觧歸来見蠶饑徘徊當奈何脱我耳邉釵鬻我嫁時襦四觧阿夫持襦去里正持符来漢中索軍租不得還顧私五觧里正且上坐黽勉具晨炊但緩一月餘蠶成賣新絲六觧新絲亦難賣新穀亦難収不見馬上郎雉尾紅錦裘七觧再拜謝里正丈人且旋歸鬻我嫁時襦脱我耳邉釵八觧蠶應黒痩盡軍租持㡳當痛哭視孤兒畢命朱絲繩九觧阿夫還入門不復見故妻生既為同衾死當㩦手歸十觧懷古詩三篇魯仲連陂七雄既龍鬬陳寶歸嬴秦師出函谷關六國咸逡巡邯鄲日夜急咄嗟誰觧紛蕩隂師既頓新衍謀豈倫先生畫竒䇿長揖平原君僕妾愧萬乗大義明君臣縱横數千言顧郤虎狼軍功成不受賞飄然歸海垠蹈海既髙義肆志寧辱身至今齊趙士倜儻希清塵我来古陂上遺祠蔓荒榛甓道竄蒼鼠天風吹白蘋緬懷田巴語景行跂千春顔斶墓末世寡尚志薄俗希乗軒豈不貴纁帛形役神不全吾髙顔夫子抗節藐齊宣鐘簴寧足論殿上呼王前晚食與安步詎以榮利遷監門良自賤趨士理亦賢俯仰二千載弔古悲荒阡墟墓絶樵採清風激頽頑古道􅊬難作悲哉東逝川轅固里漢初尚黄老儒術闇不章齊魯誕諸儒五經如載陽遐哉清河傅卓為羣倫倡抵掌論湯武大義非荒唐曲學誡孫𢎞微言詒后蒼訓詞列學官星日同琅琅我生睽千載桑梓寧異鄉寤寐思哲人流風一何長生慙齊魯學私淑附師匡苦寒行逺逰漁陽城飲馬滹沱湄河朔恒苦寒日夕風鳴悲悲風起廣塗霜霰凋人衣欲渡川無梁層冰何壘壘鴟梟鳴枯楊豺虎交路衢深谷多猿猱得食歡相追我行嵗既晏十步八九迷他郷少親故相逢知是誰憂愁鑠肌骨自顧顔鬢衰俛眎飛蓬根随風時轉移我獨久伊鬱嵗暮空徘徊寄語後来人逺遊不如歸梁曰緝為言輞川雪中之逰少志愛山水夢想懷藍田終南西峰下水石餘清妍憶昔維摩詰于此曾挂冠揮手謝時輩草堂常晏眠輞水遶舍下湖光明雲端繩牀間藥鐺清齋日蕭然春鷗漸矯翼夏木紛綿竿時尋名僧㑹自泛湖中船嘆息古人沒風物随變遷仙令妙文筆慨然追昔賢積雪曜巖阪秀色曖林巒數里入谷口石流已濺濺水鳥相哀鳴雙垞𣺌人烟却登華子岡輞水猶淪漣花竹散已久亭館供諸天王裴杳千載邱壑亦凋殘来者復為誰斯言良足歎慈仁寺雙松歌贈許天玉我昔登泰山舉手攀秦松東南雲海㡬千里夜懸日氣開鴻濛山人出山已三載復見金元雙樹在玃髯石骨青銅姿古貌荒唐閲人代長夏蒼蒼秋氣深風来絶磵蛟龍吟仙人五粒不可見但有𤣥鶴来往飛隂森蚴蟉詰屈宛相向千曲盤拏氣初放一任支離抜地生那須天矯排雲上我来髙枕石壇邊耳畔往往聞驚泉白日沉沉不到地颯然雷雨生空天煙色欲瞑鐘復起雄談岸幘波濤駛千秋萬嵗知者誰閩海竒人許夫子洗象行水關蒼蒼栁隂碧寶馬流蘓紛絡繹日中傳呼洗象来玉河波射珊瑚赤須㬰鉦鼓干雲霄萬夫聲寂如秋宵虎毛蠻奴踞象頂邱山不動何岧嶤岸邊突兀二十四直下波濤若崩墜縱横欲蹴黿鼉宅騰踏還成鵞鸛隊乍如昆明習鬬戰萬乗旌旗眼中見又如列陣昆陽城雷雨行天神鬼驚奴子胡旋氣遒壯忽沒中流狎巨浪撇波一躍萬人呼幡然郤出層霄上今年丞相収夜郎扶南盤况求王章逺随方物貢天闕屹然立仗金階旁聖朝自不貴異物致此亦足威遐方黄門鼔吹暮復動海立山移浩呼洶大秦師子多威神山林豈是天家珍題趙澄仿王右丞羣峰飛雪圖寒色㝠㝠下巖壑千峰萬峰雪初落瀑布無聲溪澗凍紅樹微茫敞孤閣閣中有客方緼袍當盃氣與蒼山髙遥看飛鳥落何處如聞落木鳴東臯崖横路斷少人跡