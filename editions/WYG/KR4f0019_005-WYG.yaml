宵畫圖裏如聴暝猿吟二月五日淮隂作二月五日春已半淮南風物劇駸駸麥苗亂茁垂楊岸蝴蝶交飛花樹林白羽徴兵吳㑹逺黄巾掠地海堧深何時戍罷狼烟浄擊壤長從田父吟環溪觀玉蘭同朱秋厓陳冰壑淮南二月好天氣八寳城中春鳥鳴溪閣客來尋舊約辛夷花發值新晴迴風雪霰當盃落遲日雲霞拂檻生杏葉栁枝俱髣髴驚心袚褉逼清明送苕文之京二首淼淼江湖春水生淮南風景過清明故人恰向愁中至感激真從難後平竹外寒烟𤓰步鎮花時細雨廣陵城謝公埭下通宵語酒冷香殘十載情潦倒徒成未拂衣疎狂真與世相違南徐載鶴横江去西磧看花壓㡌歸此去故人京雒少莫教逺道尺書稀嶺南程五如相問為道維摩减帶圍載鶴探梅皆余與苕文近事絶句波遶雷塘一帶流至今水調怨揚州年來慣聴吳孃曲暮雨瀟瀟水閣頭寄陳伯璣金陵東風作意吹楊栁緑到蕪城第幾橋欲折一枝寄相憶隔江殘笛雨瀟瀟贈蔣虎臣先生盧橘已垂實楊梅初滿林仙人一相訪樽酒話同心天台烟霧逺華陽邱壑深平生山水意兹夕寄瑤琴紅橋二首舟入紅橋路垂楊面面風銷魂一曲水終古傍隋宫水榭迎新秋素舸自孤往漠漠栁綿飛時時落波上真州絶句五首揚州西去是真州河水清清江水流斜日估帆相次泊笛聲遥起暮江樓白沙江頭春日時江花江草望參差行人記得曽逰地長板橋南舊酒旗曉上江樓最上層去帆婀娜意難勝白沙亭下潮千尺直送離心到秣陵江干多是釣人居栁陌菱塘一帶疎好是日斜風定後半江紅樹賣鱸魚江鄉春事最堪憐寒食清明欲禁烟殘月曉風仙掌路何人為弔栁屯田栁耆卿墓在城西仙人掌和李退菴侍郎讀水經注懷洞庭之作楚望經時入窅㝠岳陽樓上數峰青曽臨南極浮湘水坐對西風憶洞庭斑竹想從春後長落梅猶向笛中聴新詩吟罷愁多少腸斷當年帝子靈江東江東人物舊難儔遺老飄零半白頭斑管題詩吳祭酒梅村紅顔顧曲袁荆州蘀菴太常縑素雲烟落烟客宗伯文章江漢流華亭徑欲相從破蕭瑟片颿髙挂五湖秋吳公臺大業那堪問長城怨有餘回頭成一笑三十六封書青暘道中二首黛色横天際蒼蒼秦望山東巡殊不返流恨此山間脩竹被晴川淪漣映空曲日夕雪初消人家在寒緑江隂何明府邀登君山楚相何年邑凄凉此獨經棘門成宿草浮逺祗空亭上有亭名浮逺半壁收吳楚空江入杳冥卻思洞庭上一十二峯青鄧玉書檢討招飲梅園暨陽城外路倚棹數寒鴉何處吹横笛江南雪後槎故人碧山隠招我問梅花更上花間閣香山數㸃斜髙橋曉望惠山寄修逺留仙心甫流綺清盥披衣􅁸開簾見九峯烟深微辨樹潮落緩聞鐘秦塢望中近髙流何處逢那能品泉水與爾趺長松潤州曉渡用皇甫冉萬嵗樓韻練湖分艇悵何依北渡迴看雲樹微白下西來潮正落丹陽南去雁還飛笛殘逺步新愁集酒醒江闗旅夢稀鐵甕城邊重懷古當年萬馬蹴重圍題趙澄畫為周櫟園侍郎題烟栁南朝寺風花建業城年年春盡日玊笛喚愁生鑾江舟中雪霽月出即事題鄒喆畫拂曉春寒重揚帆急霰侵月明生水際積雪滿空林岸火推篷近漁菴閉户深平生剡溪興兹夕是山隂葛一龍枇杷洞庭詩人葛震父畫成盧橘亦清蒼想他縹緲峯頭坐快寫西林五月黄亡名氏畫蘆荻蕭蕭山氣隂横笛吹作蒼龍吟一聲入破鐵皆裂舉世無人知我心惲向千巖競秀圖萬壑千巖雲霧生曹娥江外幾峯晴分明乞與樵風便身向山隂道上行馬士英畫秦淮徃事已如斯斷素流傳自阿誰比似南朝諸狎客何如江令擘箋時葉欣離宫秋曉翠華寂寂罷宸遊苑樹聲凄碧水流一片敗荷千㸃葉靈波宫外不勝秋送葉子吉編修入都憔悴江潭客先皇侍從臣宫車一朝出三别帝城春自灑蒼梧淚行吟楚澤濵重來清切地憶奉屬車塵送家兄禮吉歸濟南二首龍山晴雪馬蹄長山翠湖雲罨畫香好到旗亭寒貰酒雙鬟低按小秦王錦秋湖邊稻花凉錦秋亭下鱸魚香垂虹秋色一千里秋到呉淞思故鄉戲倣元遺山論詩絶句三十二首巾角彈碁妙五官搔頭傅粉對邯鄲風流濁世佳公子復有才名壓建安五字清晨登隴首羌無故實使人思定知妙不闗文字已是千秋幼婦詞青蓮才筆九州横六代淫哇總廢聲白紵青山魂魄在一生低首謝宣城挂席名山都未逢潯陽喜見香罏峯高情合受維摩詰浣筆為圖寫孟公杜家箋傳太紛拏虞趙諸賢盡守株苦為南華求向郭前惟山谷後錢盧漫郎生及開元日與世聱牙古性情誰嗣箧中冰雪句谷音一巻獨錚錚風懷澄澹推韋栁佳處多從五字求解識無聲絃指妙栁州那得並蘇州中興髙步屬錢郎拈得維摩一瓣香不解雌黄髙仲武長城何意貶文房草堂樂府擅驚竒杜老哀時託興㣲元白張王皆古意不曽辛苦學妃豨廣大居然太傅宜沙中金屑苦難披詩名流播雞林逺獨媿文章替左司獺祭曽驚博奥殫一篇錦瑟解人難千年毛鄭功臣在猶有彌天釋道安涪翁掉臂自清新未許傳衣躡後塵郤笑兒孫媚初祖强將配饗杜陵人詩人一字苦㝠搜論古應從象罔求不是臨川王介甫誰知暝色赴春愁苦學昌黎未賞音偶思螺蛤見公心平生自負廬山作才盡禪房花木深林際春申語太顛園林半樹景幽偏豫章孤詣誰能解不是曉人休浪傳鐵厓樂府氣淋漓淵頴歌行格儘奇耳食紛紛説開寳幾人眼見宋元詩藐姑神人何大復致兼南雅更王風論交獨直江西獄不獨文塲角兩雄三代而還盡好名文人從古善相輕君看少谷山人死獨有平生王子衡正徳何如天寳年寇侵三輔血成川鄭公變雅非闗杜聽直應須辨古賢十載鈐山冰雪情青詞自媚可憐生彦回不作中書死更遣悤悤唱渭城接跡風人明月篇何郎妙悟本從天王揚盧駱當時體莫逐刀圭誤後賢翩翩安定四瓊枝司直司勲絶妙詞底事濟南高月旦僅存水部數篇詩中州何李並登壇𢎞治文流競比肩詎識蘇門高吏部嘯臺鸞鳯獨逌然文章烟月語原卑一見空同逈自奇天馬行空脱羈靮更憐譚藝是吾師濟南文獻百年稀白雪樓空宿草菲未及尚書有邉習猶傳林雨忽沾衣楓落呉江妙入神思君流水是天真何因㸃竄澄江練笑殺談詩謝茂秦來禽夫子本神清香茗才華未讓兄徐庾文章建安作悔教書法掩詩名海雪畸人死抱琴朱絃踈越有遺音九疑淚竹娥皇廟字字離騷屈宋心澹雲微雨小姑祠菊秀蘭衰八月時記得朝鮮使臣語果然東國解聲詩溪水碧于前渡日桃花紅是去年時江南腸斷何人會只有崔郎七字詩太倉崔華字不脽曾聴巴渝里社詞三閭哀怨此中遺詩情合在空舲峡冷雁哀猿和竹枝九嵗詩名銅雀臺三年留滯楚江隈不如解唱黄麞者新自王戎墓下來夢與唐祖命逰黄山昨宵山中駕咫尺窮黄海夢裏軒轅臺迢迢復何在至日懷申鳬盟兼寄張覆輿晩雪融長至春風到廣羊有書來逺道知汝卧清漳久客諳呉語行歌憶楚狂如聞巖壑裏慢世得琴張太液兄家舊藏倪元鎮畫自題云蕭蕭風雨麥秋寒把筆臨摹强自寛賴有俞君相慰籍松肪筍脯勸加餐此詩甚佳而雲林集不載今年偶得松圓老人畫愛其風格不減雲林因用前韻題于左方輕螺如髻秀堪餐新栁微黄晩漲寛應有扁舟天上坐􅚝魚吹雪一江寒方山道中前山白雲外繚繞一江横漁舍參差見風帆自在行烟花憐故國湖海寄浮生洗盞船頭坐一聲沙鳥鳴𤓰步晩望西日低銜𤓰步鎮亂鴉飛去石帆山支頤獨眺江南岸龍虎銷沉悵等閒望雞籠山雪寄杜于皇天半雞籠雪遥遥逸興徧春隂寒未散雲壑更相鮮不辨谷中樹應添巖下泉因懷杜陵叟拾橡此中眠秦郵雜詩六首夾岸人家短竹籬鴨頭新緑雨如絲㡬年寒食秦郵路拂面楊花被酒時國士無雙秦少㳺堂堂坡老醉黄州高臺㡬廢文章在果是江河萬古流予方修文㳺臺成露觔祠前水拍村平湖水暖生蘭蓀靈風斜日畫旗捲時有神鴉歸廟門濤聲東走海陵倉蛾子紛紛割據場三百年來陵谷變居人猶是説張王張士誠元末據此三十六湖如玦環青蘋風起白銀灣紅橋四百姑蘇郡徑合移來著此間小桃初紅栁垂隂甓社湖中花水深鴉頭十五竹枝曲不聴歌聲何處尋茅山進香曲四首揚俗舟人嵗以三月進香茅山戯為作此家住茱萸灣復灣年年三月上茅山白沙江邊吹笛去赤山湖上賽神還遥指三峯次第青五雲深處擁雲軿猿啼日暮神靈雨知是茅君欲現形雷平峯前雲氣開池中隠約起風雷何人戲取華陽劍直割乖龍左耳來江淮兒女愛孤篷水宿烟餐西復東但祝茅君賜安穏年年不怕石尤風冶春絶句十二首同林茂之前輩杜于皇孫豹人張祖望程穆倩孫無言許力臣師六修褉紅橋酒間賦冶春詩今年東風太狡獪弄晴作雨遣春來江梅一夜落紅雪便有夭桃無數開野外桃花紅近人穠華簇簇照青春一株低亞隋皇墓且可當盃酒入脣紅橋飛跨水當中一字闌干九曲紅日午畫船橋下過衣香人影太悤悤三月韶光畫不成尋春步屧可憐生青蕪不見隋宫殿一種垂楊萬古情髯公三過平山下白髪門生感故知欲覔醉翁呼不起碧虚樓閣草離離東風花事到江城早有人家唤賣餳他日相思忘不得平山堂下五清明坐上同矜作達名留犂風動酒鱗生江南無限青山好便與諸君荷鍤行海棠一樹淡胭脂開時不讓錦城姿花前痛飲情難盡歸卧屏山看折枝卭竹方袍老謫仙威儀猶復見前賢蓬萊三度揚塵後坐閲春光九十年當年鐡礟壓城開折㦸沉沙長野苔梅花嶺畔青青草閒送逰人騎馬回彭澤豪華久黄土梁谿歌舞散寒烟張御史達泉彭澤人鄒副使愚谷梁谿人林翁酒間述二家聲伎豪侈之樂今俱衰歇矣生前行樂猶如此何處看春不可憐故國風光在眼前鵲山寒食泰和年元遺山濟南詩句䢴溝未似明湖好名士軒頭碧漲天時祖望談吾郡山水之勝名士軒在明湖曽子固守郡時所作精華録巻五欽定四庫全書精華録巻六刑部尚書王士禎撰
