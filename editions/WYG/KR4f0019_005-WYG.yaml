body:
  text: 今體詩清明後三日鄒平西郭賦詩雨歇西原上鶯花事事妍青山環縣郭白鳥破溪烟墟落明流外園林霽景前永懷蘭渚客行悵暮春天蠶詞四首青青桑葉映迴塘三月紅蠶欲暖房相約明朝南陌去背人先祭馬頭娘戴勝初來水染藍女桑濃葉滿江南誰家少婦青絲籠知向香閨飼女蠶玊蛾飛飛金繭酥蠶時幾日閉門樞白葦與儂作璘藉黄金與儂作踟躇鳩鳴屋角桑葉低三眠四眠蠶始齊小姑嬌小好閒事簇蠶學罷學添梯山蠶詞四首清溪槲葉始濛濛樹底春蠶葉葉通曽説蠶叢蜀道險誰知齊道亦蠶叢那問蠶奩更火箱春山到處是蠶房槲林正緑􅎛園碧閒却猗猗陌上桑春繭秋絲各自諳一年三熟勝江南柘蠶成後寒蠶續不道吴王八蠒蠶尺五竿頭絡色絲龍梭玉鑷動妍姿紅閨小女生來慣中婦流黄定未知雨止碧漢歇微雨美人横素琴牕前明月影洞口緑蘿隂邱壑結遥想茅茨清道心稍聞西澗水寂歴響空林阮亭秋霽有懷西山寄徐五孤亭新霽後藤竹夜凉生忽憶西峯寺曽經采藥行夕陽雲木秀秋雨石泉清不見烟霞侣相思空復情南唐宫詞六首細雪霏霏落院門金鋪鴛甃早黄昏宫中玉女隨君側搏得春冰帶爪㾗曽邀醉舞媚君王鬢朶珠翹别様妝紅燭當筵新破就更將金屑譜霓裳簟錦鸞綾萬卷殊澄心堂裏皁羅㕑保儀玉貌空傾國妙選深宫但掌書御溝桃葉水潺潺姊妹承恩并玉顔花底自成金葉格宫中齊唱念家山花下投籖漏滴壺秦淮宫殿浸虚無從兹明月無顔色御閣新懸照夜珠重午龍舟嵗嵗陳輕鳬飛燕各如雲瓦官閣下黄花漲别有凌波水上軍聞雁縹緲凉天數雁鳴幾家砧杵起秋聲懷人江上楓初落卧病空堂雨易成尺素經時常北望暮雲無際且南征沅湘一帶多兵甲莫動髙樓少婦情蠡勺亭觀海二首和家兄西樵春浪䕶魚龍驚濤與漢通石華秋㪚雪海扇夜乗風徐市荒唐後秦臺滅沒中扶桑試晞髮朝日萬山紅吾廬臨少海及此更空蒼飛觀圖雲氣靈槎著日傍十洲真浩𣺌六博足翺翔乗蹻何年去重來覽下方秋暮與家兄禮吉叔子小飲有懷蕭瑟秋為氣凋蘦始欲愁酒人方落魄名士半離憂桂樹猶招隠雲旗未逺逰吾曹如野鶴偃蹇待浮邱秋栁四首秋來何處最消魂殘照西風白下門他日差池春燕影祗今憔悴晩烟㾗愁生陌上黄驄曲夢逺江南烏夜邨莫聴臨風三弄笛玉闗哀怨總難論娟娟凉露欲為霜萬縷千條拂玉塘浦裏青荷中婦鏡江干黄竹女兒箱空憐板渚隋堤水不見琅琊大道王若過洛陽風景地含情重問永豐坊東風作絮糝春衣太息蕭條景物非扶荔宫中花事盡靈和殿裏昔人稀相逢南雁皆愁侣好語西烏莫夜飛往日風流問枚叔梁園回首素心違桃根桃葉鎮相憐眺盡平蕪欲化烟秋色向人猶旖旎春閨曽與致纒綿新愁帝子悲今日舊事公孫憶往年記否青門珠絡鼓松枝相映夕陽邊息齋夜宿即事懷故園夜來微雨歇河漢在西堂螢火出深碧池荷聞暗香開牕鄰竹樹髙枕憶滄浪此夕南枝鳥無因到故鄉采蓴曲四首湘湖雉尾蓴郅支馬肝石采蓴作蓴羮底用作方伯不食上湖荇但采下湖蓴縁流棹歌去西風愁殺人采蓴臨淺流采蓮在深渚歡似蓴心滑那識蓮心苦蓴絲何纒綿柔白勝玉臂持作千里羮朝朝下鹽䜴即事作二首草堂殘雪後不出系南邨暮鳥常穿屋寒家少候門讀書慕終古養疾樂邱園顧已慚通隠浮沉莫更論二十偶通籍三年歸舊林聊知返初服豈敢謝朝簮遯跡思壺口忘機憶漢隂終當與嘯父天路試相尋讀史雜感八首王謝烏衣六代同名家龍虎盛江東可憐東邸鑾輿出僕射終當愧侍中過江名義共推袁宋室孤臣念愍孫千古消魂石城曲司徒家世本陽源鑿地蓮花映雉頭卻忘鼙鼓下荆州白門一決須㬰事枉向宫中拜蔣侯結髮從戎老戰争揮鞭立就十三城凉風堂側桃枝戲絶勝平陽九道兵江陵士馬控西疆坐使吹脣沸建康湘土尋戈同氣盡卻教韋粲死青塘殿中擁槊唱無愁江左重開南豫州十萬敵軍齊北哭至今淝水不曽流汾上軍書夜刺閨天池較獵未言歸不愁粉鏡悤悤去更語官家殺一圍芳華苑裏奏名倡積翠池邊舍利裝衍得魚龍新散樂大家恩賜學曹王雪後答東癡見憶之作昨夜東臯雪憑誰問隠居不知髙卧者嵗杪意何如井邑頻憂税溪山早著書因垂楚蘭咏吟望一愁予雪後懷家兄西樵竹林上斜照陋巷無車轍千里暮相思獨對空庭雪别萬大屏楊勝林别鶴念湖海離羣秋夜心風聲鄖口暮江色禦亭深去路分吳楚相思各滯滛闗門今夕雨蕭颯動寒砧法慶寺閣上望雲門山祗園有珠閣髙出碧林端落日眺平楚青山生暮寒歸雲天際去逺樹坐中看今夕雲門月無人照戒壇即目蒼蒼逺烟起槭槭疎林響落日隠西山人耕古原上滸山道中斷靄望沉沉闗河嵗暮心蒼山連凍浦雪屋入寒林鳬䧹荒陂晚雞豚古社深墨王亭畔路載酒憶登臨南園池上清言不覺暑纎月生西林苔徑少塵色夜猿清道心漁樵晚多侣風壑静同音㑹學涓髙術隂潭鳴玊琴阻雨望醴泉寺用徐昌榖韻誌公飛鍚處巖壑至今深𣺌𣺌青山路蒼蒼脩竹林法雲懸瀑影幽鳥亂泉音自歎塵中駕空勞出世心題迪功集昭代嬋娟子徐卿雅好文稱詩如典午譚藝似參軍濩落雲霞質飄搖鸞鶴羣祗應禹洞裏靈蹟待夫君寄董樵聞卜崑崙宅棲遲嵗幾更人烟分蜃影海嶠出秋晴島屋閒垂釣山田晩罷耕多君離亂日白社獨逃名題公㦷蘇門圖巻曽學如鸞㫖心懷汲縣逰秋清嘯臺月竹映百泉流小隠何年卜名山一巻收聊當共嵇阮把臂向林邱紀事天夀蒼凉石獸陳荒原驚見翠華春君王淚灑思陵樹玉盌金鳬感侍臣髙郵雨泊寒雨秦郵夜泊船南湖新漲水連天風流不見秦淮海寂寞人間五百年淮安新城有感二首澤國隂多暑氣微一城烟靄晝霏霏春風逺岸江蘺長暮雨空堤燕子飛四鎮蟲沙成底事五王龍種竟無歸行人淚墮官橋栁披拂長條已十圍開府當年據上㳺建牙賜爵冠通侯即看别院連雲起更引長淮作帶流荒徑人稀鼪鼬嘯野塘風急荻蘆秋永嘉南渡須㬰事忍向新亭問楚囚江上寄程崑崙二首白浪金山寺青山鐡甕城故人今不見楊栁作秋聲江北望江南祗隔江津水日暮寒潮生愁心滿揚子余澹心寄金陵詠懷古跡詩卻寄二首千古秦淮水東流遶舊京江南戎馬後愁殺庾蘭成鍾阜蔣侯祠青溪江令宅傳得石城詩腸斷蕪城客再過露筋祠翠羽明璫尚儼然湖雲祠樹碧於烟行人繫纜月初墮門外野風開白蓮青山晨雨過青山漠漠寒烟織不見秣陵城坐愛秋江色江上吳頭楚尾路如何烟雨秋深暗白波晩趁寒潮渡江去滿林黄葉雁聲多即目蕭條秋雨夕蒼茫楚江晦時見一舟行濛濛水雲外皇厰河鳬䧹被沙洲沿洄一徑幽萍花紛曲岸竹色壓迴流晩鼓滄江戍人家白板樓好乗𤓰蔓水溪上問漁舟雨後觀音門渡江飽挂輕帆趁暮晴寒江依約落潮平呉山帶雨參差沒楚火沿流次第生名士尚傳揮扇渡踏歌終怨石頭城南朝無限傷心史惆悵秦淮玉笛聲曉雨復登燕子磯絶頂岷濤萬里望中收振策危磯最上頭呉楚青蒼分極浦江山平逺入新秋永嘉南渡人皆盡建業西風水自流釃酒重悲天塹險浴鳬飛鷺滿汀洲題徐半山山居圖先生竟學道自製水田衣獨卧寒林靜故人相見稀晩凉松鼠落曉日竹鷄飛亂葉千峰裏行歌何處歸登金山二首振衣直上江天閣懷古仍登海嶽樓三楚風濤盃底合九江雲物坐中收石簰落照翻孤影玉帶山門訪舊逰我醉吟詩最髙頂蛟龍驚起暮潮秋三山縹緲望如何有客褰裳俛逝波絶頂髙秋盤鸛鶴大江白日踏黿鼉泠泠鐘梵雲間出歴歴帆檣檻外過京口由來開府地不堪東望尚干戈丹陽二首夜火丹陽郭移舟暫解維川塗紛雨雪彌望逺凄其戍鼔蘭陵鎮荒烟葛令祠五湖行漸近杳杳欲何之曲阿後湖路百里望南徐解纜從漁父臨風誦卜居庱亭朝射虎練水暮觀魚如此堪終老窮愁悔著書潤州懷古二首楚雲直下大江流鐵甕城髙落木秋宋帝南徐猶作鎮蕭公北顧更名樓江山勝蹟留三國海道烽烟動五州見説孫盧西犯日青憐白浪使人愁興亡六代已銷沉對此茫茫思不禁黄鵠山頭寒雨暝佛貍帳外暮濤深兵聞北府千年勁雲入西津一片隂興劇且傾京口酒三山披豁足開襟焦山曉送崑崙還京口山堂振法鼔江月挂寒樹遥送江南人雞鳴峭帆去海嶽菴拜蘓米二公像前輩風流地為菴易研山浄名猶故蹟磨衲識清顔江月長如此髙人去不還惟應餘翰墨終古照人間𤓰洲渡江二首昨上京江北固樓微茫風日見𤓰洲層層逺樹浮青薺葉葉輕帆起白鷗揚子橋頭雞未鳴𤓰洲城外日東生風波不憚西津渡一見金焦雙眼明吕城雪霽二首雞鳴吕城鎮日出市橋東雪屋迴汀口煙檣野竹中鳥飛皆貼水舟泛若乗空古蹟成荒壘行行慨阿䝉午夜雲陽道扁舟狎老漁神亭雪幾許直瀆路何如烟水懷前侣江湖未定居斷橋叢樹裏何處卜吾廬舟暮向晩金牛道林寒響宿禽雪晴烟樹小日夕竹園深川路通蕭港扁舟動越吟蘭陵今夜酒無那故鄉心滸墅舟中眺陽山殘雪日出陽山外參差見幾峯依稀露烟靄窈窕明雲松忽憶梅花發清溪深萬重扁舟欲乗興杳杳暮天鐘虎邱闔廬霸業夕陽沉鐘梵空山自古今劍去虎邱青嶂在水枯鶴澗碧苔侵吳宫歌散聲猶苦越絶書成怨不任惟有生公臺畔石年年白月照禪心闔廬墓劍池春日水清虚石壁臨風弔闔廬於越行成誰狡獪夫椒往事重欷歔飄零王氣傳金虎寂寞空山𦵏玊魚太息恩讐竟何在荒臺青草認姑胥姑蘓懷古三首爭長黄池未濟師餘皇舟已徙熊夷山川終古迷商魯花草千年怨種蠡故國魂銷吳苑水行人腸斷越溪絲竹枝聲裏春將盡破楚門東暮雨時斜日停橈喚奈何横塘聲散采蓮歌青山古道通閶闔緑黛春風憶苧蘿廢苑愔愔花欲暮長洲淼淼水空波千金枉鑄鴟夷像鳥自髙飛避網羅山徑何時𦵏玉鳬興亡轉瞬日西徂越人已自籌三䇿秋祭當年竟五湖雨過麋城空碧草春深鶴市半青蕪傷心更有南陽宰不獨寒潮泣子胥文種歎曰南陽之宰而為越王之禽夜雨題寒山寺寄西樵禮吉二首日暮東塘正落潮孤篷泊處雨瀟瀟疎鐘夜火寒山寺記過吳楓第幾橋楓葉蕭條水驛空離居千里悵難同十年舊約江南夢獨聴寒山半夜鐘虎山擅勝閣眺光福以雨阻不得往虎山橋畔盡層松掩映寒流古寺紅卻上重樓看鄧尉太湖西去雨濛濛雨夜宿聖恩寺還元閣梅樹初花石澗流滿山香雪送行舟三更蕭瑟湖邊雨百尺髙寒水上樓師子窟中嵐翠合法華山外暝烟收霜天欲曉鯨音起萬壑聲從何處求山中寄叔子時阻雨滸墅平生兄弟逺逰心世外𤣥棲約共尋澗道名花任開落湖天春水半晴隂何山往事思求㸃五嶽前期負向禽遙憶孤篷宿烟雨青芝南望白雲深鄧尉竹枝詞六首二月梅花爛漫開逰人多自虎山來新安塢畔重重樹畫舫青油日幾迴鄧尉山頭片雨晴司徒廟下晩潮生卻登七十二峯閣玉柱銀房相向明西施洞望米堆山夕翠朝烟擁髻鬟不道鴟夷曽載去至今人在五湖間西來銅井又銅坑山勢髙低有二名試上龜峯光福塔白波翠巘兩邊生楓橋估客入山來艓子多從木瀆開瑪瑙冰盤堆萬顆西林五月熟楊梅緑黛遥浮玉鏡間峯巒千叠水彎環居人卻厭真山好袁墓南頭看假山題春申澗桃夏遺宫廢章華蔓草深但餘流水意如聴女環琴春申澗上望澗亭邊野望新明流秀嶂碧粼粼青山終古連秦隖珠履何年問楚人冰雪倒懸三峽水風烟遥接五湖濵李園已事成荒草太息空祠一愴神惠山下鄒流綺過訪雨後明月來照見下山路人語隔谿烟借問停舟處江上望青山憶舊二首揚子