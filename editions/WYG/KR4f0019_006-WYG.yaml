陽中樂府康王好何時訪沜東扶風道中北望迴龍薄西行過馬嵬俠遊無栁市史筆闕蘭臺老鬢愁中改秋風隴上催田園情話好何事不歸來馬伏波祠冥冥炎海伏波祠肅肅靈旗故國思萬里功名銅馬式五谿淫潦跕鳶時隗囂詎識真王異朱勃終慙地下知空憶平生少游語歸來欵段悔教遲織錦巷慧絶璇璣手當如棄置何憐他蘇蕙子枉嫁竇連波鳳翔府城邉汧渭兩交流隴蜀中分第一州西雍横當斜谷路南山髙接杜陵秋雌鳴尚憶秦人霸星隕難銷漢相愁形勢依然身萬里扶風歌罷拂吴鈎寳雞道中時序颯已變征蓬何處休逺天呉岳影斜日渭川流雲棧餘髙鳥磻溪有釣鉤龍鍾三十九白盡老夫頭寳雞縣險絶古陳倉停車落日黄霸圖今寂寞陳寳亦銷亡城郭秋雲裏人家清渭旁迴看三輔逺秦樹但蒼蒼石鼔山遥憶岐陽狩來過石鼔山韓蘇今地下星斗尚人間谿谷歸飛少川原獵騎還寄情汧渭水千折過潼闗益門鎮天險當秦鳳提封界雍梁棧雲髙不落隴樹曉還蒼古􅕤催征騎秋風弔戰場山南明日路漸入武都羌煎茶坪大壑沉雲霧冥冥萬仞梯孤峯分隴漢兩水劃東西坪東水北流西水南流遥直金牛峽旁臨白馬氐當年誰設險不用一丸泥自長橋至草涼樓西下嘉陵水瀰瀰緑滿灘縁崖紅叱撥縈棧曲闌干九折行人少千峰落日寒不知投宿處樵響隔雲端鳳縣險絶岐南路岧嶢蜀北門千峰圍邸閣一線望中原城下嘉陵水林間謝豹村衰遲慙鳳徳愁向接輿論寄家人京洛分襟七夕前南岐驛路五更烟故園刀尺齊紈素逺道風花蜀國絃斷續鸚飛深隖裏横斜雁度夕陽邉棧雲隴樹重重隔閨夢何由向左綿雨度柴闗嶺棧中新漲未歸槽百丈柴闗水怒號鳥語不聞深箐黒馬蹄直上亂雲髙天垂洞壑蛟龍蟄秋老牙鬚虎豹豪誰識熏香東省客戎衣斜壓赫連刀南星雨發驟雨南星道秋隂草木風澗寒傷馬骨雲亂失蠶叢僣憶公孫帝危知大禹功中原何處所夢落散闗東雨趨留壩急雨下烏櫳千峰一線通路遥洋水北天盡武闗東峽偪風雷氣人穿虎豹叢誰知星使節今夜託牛宫畫眉闗南渡野羊水四山封􅌄窱一水急波瀾巨壑蛟潜穏飛流馬渡難隂崖終古閟白日幾時看惡竹縱横甚還須斫萬竿武闗寄家書驛騎千山裏平安兩字書髙堂衰白早兒女死生餘聴雨思兄弟臨風問起居白頭吟更苦莫負錦江魚閏七夕抵褒城縣褒斜十日路白髪忽侵尋紅葉下江水始知秋氣深馬驚初出谷城閉不聞砧何處天河影浮雲只自隂精華録巻六欽定四庫全書精華録巻七刑部尚書王士禎撰今體詩年來吳
