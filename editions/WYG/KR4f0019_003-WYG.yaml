body:
  text: 登髙望山絶頂望峨眉三江作歌四海復四海九州還九州河伯海若更相笑蟪蛄何足知春秋今年辭帝蓬萊宫乗風偶作西南遊中條姑射不足數失喜太華揚高旒河潼逺坼巨靈跖鉤梯百丈臨龍湫終南太白幻雲物秦棧詰曲哀猿愁錦城小住五十日岷山秀色垂簾鈎青城玉壘凥首接灌口屈注雙江流興極欲蹋大峨脊卻騎痩馬來龍游嘉州罨畫枕江上孤峯縹緲東南浮神霄玉清有遺跡登臨可以消煩憂蹋泥盤盤到絶頂江山披豁開雙眸峯巒八面簇金碧下瞰江海如浮漚八十四盤在衣帶氣凌五嶽驕公侯暮雲早雪忽明滅兜羅綿現無時休岷江從東來奔騰迴萬牛沫水滙青衣􅉫蕩千斛舟三江九峯倐然合丹崖翠嶂窮雕鎪江山竒麗冠天下何意絶景來蠻陬天風蓬勃日西墜搔首欲去仍淹留荆呉萬里自兹始來朝起柂尋巴邱叙州流盃池瀘州使君巖皆山谷先生舊逰都不及訪悵然賦此憶昨登凌雲江邊蹋亂石興劇罷鞍馬逍遥散輕䇿徑危草露多處處見虎跡東林雨新霽初日射青壁浩蕩三江流安穏平如席西笑揖峨眉遥連雪山白酒酣掛帆去矯若生羽翮心知流盃池遺跡在巴僰俗物敗人意交臂輕一擲今日使君巖南望還咫尺通詞託微波蹇修空脈脈平生一瓣香敢為涪翁惜如何萬里遊虚此幾兩屐迴首望南雲蠻江日將夕西凉神祠曲在合江縣苻堅時吕光討李焉之亂至此土人祠之陸務觀謁祠詩我雖不識神知是山水人不敢持笏來裋褐整幅巾似未詳本末賦詩正之長安氐王頭有甪東掃鄴宫西定蜀西域校尉婆樓兒勒銘直到岷山腹功成振旅咸陽中萬里玉門旌斾紅三十六國拜都䕶酒酣作賦龜兹宫甲乙讖成苻氏滅魚羊食人日流血黒龍晝起姑臧城坐制三河亦人傑少岷山下岷江流西凉廟貌凌髙秋山頭龍出作雲雨神靈雜沓風颼飂烟消雨散𣺌何許靈欲歸兮憺容與船旗獵獵西北斜落日隂房竄蒼鼠岑公洞岑公昔學道遺跡空山中洞門界飛流白日生雷風石髓無古今鍾乳盡玲瓏巖泉日穿穴㸃滴成窪窿中央若累棋狡獪造化功頽竈倚青壁中夜丹砂紅睠彼遺世翁於今悟參同壁間題字人嵗月何悤悤巨碑亦笏立文詞競豪雄中間岑襄州頗擅語句工豈其南陽裔源流故難窮此洞與魯池望望江流通昔是仙靈宅今為豺虎叢太息下山麓風健孤帆東元符間岑巖起象求虚鑒真人賛一碑李廌文叔所書岑洞魯池今皆為侯家所有登蝦蟇碚黄牛打鼓朝發船碧波白鳥争清妍迴首名山大川閣烏尾已捩西陵煙三峽欲盡尚迤邐云十二碚紛鈎連頗聞中有第四泉康王谷水差隨肩峽窮碚轉詫奇事忽見飛瀑流琤潺爬沙終古此巖側青冥無路誰夤縁江風吹笠冷毛􅄠峽雲挾雨鳴船舷大索瓶盎貯飛雪旋去屐齒窮危巔横斜拾級一徑上藤梢橘刺相紏纒皴皰槎牙澀苔蘚清泉百道爭涓涓隂洞終古閟白日神瀵噴薄鍾乳堅石壁麤惡艱礱錯題名豈辨唐宋年永叔涪翁詩不滅誰為好事重鎚鐫名山蒙頂壓顧渚䝉山茶出蜀名山縣春芽開裹勞烹煎山谷詩巴人漫説蝦蟇碚試裹春芽來就煎下巖轉舵未忍去下牢闗外斜陽懸昌黎詩爬沙脚手鈍誰使汝解縁青𡨕欲訪三逰洞不果舟下十二碚西陵遥在目江雲峽口多碚轉猶千曲悵望三逰洞靈異非一族石鐘卧蒼蘚唐碣迷深竹緬懷長慶人一往遂不復斜日下牢谿依依為誰緑潁亭青山圍潁亭下有清潁流石瀨何淺淺力始勝方舟金沙映素鯈䇿䇿千萬頭斜日照冰雪微風矯輕鷗側身望終古企彼巢與由糠粃鑄堯舜心與造物逰不逢掛瓢人北指軒轅邱廣武山朝登廣武山四望古戰塲黄河泱漭流寒日無晶光孤獸索其羣驚鳥亂無行平沙轉飛藿白骨堆嚴霜昔者英雄人於此分霸王强弱理無恒得失爭敖倉名騅蹶隂陵萬乗入咸陽東指芒碭雲五色成龍章大風沛上來逰子悲故鄉新鄉望蘇門山懷孫鍾元先生朝來衛河上遥見蘇門山蒼翠雜諸嶺清涼分百泉緬懷松舟趣長詠竹竿篇及兹限跬步擊汰失夤縁遥憶嘯臺翁山中方晏眠兒孫繞膝下洞壑當門前茶臼隠脩竹蓮舟隨稻田少年任豪俠白首此終焉無由逐髙鳥矯翮青冥邊徐五兄自號嵇菴我慕阮步兵君學嵇中散平生竹林期鳬鶴誰長短君抱出世姿夙昔薄軒冕彈琴聊自足採藥忽忘返且復龍性馴兼之養生善嗟哉儁傷道斯語君知免獨應七不堪彷彿嵇生懶我本澹蕩人早嵗頗任誕一聞如鸞嘯自顧為人淺廿年嬰世網嵗月坐晼晩往往逢途窮痛哭迴車阪深慙至慎言薄俗誰青眼永懷素心侣詎異平生撰空傳周㒒射逺欲希嵇阮江正鹿角膠墨梅淵公所寄深山五月中鹿角暖初蛻取作黄明膠良工妙調劑黄海松萬株夀者幾千嵗古屋收輕烟萬杵功不細易水𣺌已逺潘張復誰繼歙州有江正妙絶擅斯製故人鹿裘翁愛我一丸惠老無隃麋賜研田蕪不薙晴牕手摩挲風日忽開霽袖中官奴帖飛動苦難逮牙滑剡溪藤熟視空睥睨啜汁亦復佳為君掃文字戴嵩牛圖一川莎草烟濛濛曉來雨過開牛宫三尺短箠兩觳觫午隂掉尾嬉凉風一頭摩角一頭齕寢訛有態何其工江干笛材老烟竹横吹髣髴穿林叢絹素慘澹神理在是耶非耶傳戴嵩田家風物宛在眼但有耕作亡兵戎我行峨下踰萬里青衣江上平羌東翠藤紅樹亂烟雨風景略與圖中同一從羽書急滇海甌粤秦楚交傳烽益部迢遥隔天未舊遊有夢尋巴賨旄牛徼外阻王㑹萬蹄驕馬髙纒騣干村萬落長荆棘何時金甲銷春農童牛不牿可三歎巻圖風雨來長松用東坡先生清虚堂韻送黄無菴僉事歸甘肅兼寄許天玉金城烽火連瓜沙榆林盜賊趨彭衙三秦昨夜㨗書至闗門百丈開蓮花甌閩格鬭尚未已天南望斷今無家登隴嘶羣怯班馬及闗接翅隨昏鴉甘州官舍幸少事譯經往往紛天葩河西番帳盡外徙何妨羊酪煎春茶許生潦倒作秦贅岑牟單絞漁陽撾竹林諸賢乆雨散我亦蟣蝨勞搔爬何時九州絶豺虎吾徒一笑忘咨嗟小戎賦罷意慷慨瓦亭西北紛虹霞二君俱閩人黄精禪理同李湘北陳子端二學士葉子吉侍讀登慈仁寺閣再用清虚堂韻化人閱世恒河沙老松攫地龍衙衙盤空閣道下無地妙香似有陀羅花吾衰作客不稱意每逢望逺疑還家三闗寥落數行䧹雙闕霏微千㸃鴉翰林三君負公望髙文大册流滂葩惜我旅病色枯槁頭綱屢許分官茶兵車轔轔指荆楚門外蕭蕭多馬撾從來決勝在廊廟詎有羣盜煩梳爬書生手無五尺箠中宵倚柱徒咨嗟罪言欲吐更指口遥山雨脚低殘霞通州水月菴三用清虚堂韻鳬翁三五嬉晴沙殘僧閉闗如退衙黄蘆苦竹隠缺岸水葓往往飄殘花濠濮㑹心豈在逺便可泛宅仍浮家水闗上接鮑邱水伯珪戰地啼寒鴉卓老一抔沒荆棘誰憐文采兼奇葩古人於此兩寂寞髙枕且聴風罏茶漕河如林萬檣立負城時送迴颿撾彷彿扁舟落吾手背癢欲倩鳥𤓰爬病鶴觸籠翅翎短老隨雞鶩吁可嗟安得十洲縱汗漫排空一氣凌雲霞與曹升六舍人食蠏海上有蝤蛑力可制於菟縱横凌風潮一殻能専車失勢稻芒候八跪充庖廚津門連渤碣珍錯首蟹胥誰遣三十輩束縛就寒蒲磊落堆盤中香味宜葵菹易酒碧玉色無錢亦須沽與君對持螯風味思江湖野人厭藜莧腸饑鳴轆轤今朝食指動襟袖霑膏腴酒船數帆健絶勝三日酺寄謝虞嘯父未須誇䱥魚和沈石田鈎弋夫人歌漢宫窈窕千峨眉春華未謝秋風吹落葉哀蟬明怨惜複道佳人葬桐柏一朝望氣來河間玉鈎乍啟迴天顔朝侍宸逰陪豹尾暮歸别館幸甘泉容華未老君恩歇西弄迴頭成決絶雲陽南去女陵旁怨粉零香水嗚咽漢家競説貳師功衛霍勲名甲第同青史祇今憐趙父茂陵烟草亦連空五君詠劉考功公㦷劉生慕節俠杜陵一男子從軍驃騎幕長嘯蘇門裏萬金輕鴻毛妻子如脱屣少日魯朱家為官偶然耳施少參尚白宛陵實盛徳卓犖為真儒馳情慕周孔抗志希黄虞作為一家言頗綜七畧書從政三十載屢空方晏如汪户部苕文右司固簡傲狂狷乃其真􅊬然望終古豈顧世上人軒冕詎足貴雲壑心所親著書洞庭上寥寥誰問津梁侍御曰緝陽夏善閉闗性不因人熱偶然騎驄馬非意固不屑一歸嵩陽寺邈與世相絶作佛固未能蕭然自禪悦董侍御玉虬易農不羇士爽朗多所遺脱畧梁竇勢放浪班馬詞一迴秦州駕髙卧荆谿湄文園自消渴猶聘茂陵姬雪中送酒與東癡二首清晨起盥潄開户聞騷屑風㣲竹烟淡雪重松枝折缾水寒屢凝罏香散還結忽念東臯子孤懷抱冰雪東臯未三里潢水凡幾曲風雪掩荒蹊往來斷樵牧先生髙卧處柴門翳苦竹雪深門未開村雞鳴喬木日髙炊烟絶吟聲出茅屋欲寄一瓢酒聊以慰幽獨天晴儻來過就我西齋宿朱璧揭鉢圖歌方寸水精鉢中有寧馨兒崔巍青蓮座上有人天師一人窈窕美且頎迴風髣髴捎雲旗作使羣鬼無不為神姦萬億連凥脽震電煜煜雷車馳修羅刀鼻雨不訾飛龍衙衙勢躨跜前有饑蛟後肥遺或騎朱虎驂文貍猰㺄駚􅱐騶吾䕫蹄者角者毛耏耏銅弩蹶張齊發機彤弓玈矢射麗龜鼘鼘伐鼓聲振悲師子之鎧劒鈒鈹懸橦度索上騎危牙齒棧齴肩隠頤左擔雞足移須彌威容廣大調御姿不聞不見坐若尸天花青紺下葳㽔山鬼邪揄不得施授女五戒跪涕洟豈悟前因羯肌夷賔伽解脱母性慈山河墨㸃無瘡痍顧陸不作作者誰崑山朱璧能繼之絹素䵟暈丹粉漓神彩浮動窮毫釐城北徐公虎頭癡三日不食坐茅茨抱持此巻忘朝饑大雪叩門索我詩開巻一引千留犁呵冰灸硯為此詞十指皸瘃兩肘胝杜陵老叟不可追金粟神妙徒嗟咨雪中登黄山空齋蹋壁卧忽夢溪山好朝騎秃尾驢來尋雪中道石壁引孤松長空沒飛鳥不見逺山横寒烟起林杪張友石户部得雷氏琴枯木向千載中有太古音君子重拂拭寄此山水心閒庭何蕭條苔色上衣襟罏烟方斷續房櫳杳森沉遥懷託散暢古調刪哇淫良以辨亷志詎必徽黄金相賞在松石蕭然風滿林贈葉井叔三首别業在樊口門前臨大洄樊水𣺌東逝大江從北來蒼翠對吳峴崢嶸臨釣臺紫髥信已矣山川鬱佳哉蕭條聱叟居門徑餘蒼苔隠跡既蕪沒霸業隨飛灰唯傳退谷銘流風激蒿萊君詩似聱叟令我懷抱開豈忘樊上居出處理亦諧江湖就魚麥日夕増徘徊作吏客伊洛門對嵩髙山山色映終古客心長自閒朝看飛鳥沒夕對孤雲還聞昔王子喬吹笙碧落間揮手駕白鶴一往三千年至今緱山上逸響凌紫烟夫君有仙骨雲駕如可攀逰目憇嵐嶺躡足升天闗盧巖瀑布佳百丈聞琤潺懸流濺冬雪宻樾生夏寒何當蠟屐來與君蹋飛湍樊口去荆江雲濤渺千里估客日上下清風片帆耳五溪有傳烽飲馬洞庭水鈴旂雲夢多悲笳渚宫起南岳無迴䧹江介多封豕如聞樊上居風土異南紀雞犬白雲中桑柘寒烟裏理亂不復聞漁釣信為美扁舟倘知津逍遥問園綺展子䖍髙歡歸晉陽圖已下二首為宋牧仲比部題黄河浩蕩流三城龍門底柱禹所營巨舟峨峨掉尾鯨乗風破浪來峥嶸身臨河魁賀六渾虬髥虎視真天人紅妝執樂一千指玉貌錦衣充下陳黄頭鮮卑一何鋭怒如佽飛軒猛氣露車載酒非狂生復有敖曺好兄弟當年霸府氣如虹洛陽三月珍珠紅韓陵片石紀元功晩逢黒獺非籠東熒惑一朝犯南斗下殿真成入闗走傷心渭水日東流鸜鵒跦跦實戎首展生何年寫此圖丹青横絶絶代無想見櫪頭綱惡馬如此老公豈人下周禮綱惡馬沈周秋林讀書圖白露變丹葉楓林颯髙寒青山出白雲巖壑増孱顔何人坐林中長日頽巾冠堯舜禹武湯如櫛羅簡編最愛青牛翁至哉五千言山風日蕭條楓葉墮我前瀑布拏蛟龍赴谷為奔川川上小石磯磯頭挿綸竿巻書即垂釣得意遂忘筌我本山中人見此心依然何當及秋風歸翦茅三間移竹戲題齋居飽藜藿兼句食無肉昨從季主卜筮得蒼筤竹入世二十年磬折仍負俗愛君霜雪姿磊砢多節目秋雨日瀟瀟卧起篔簹谷露下更婆娑官奴試㸐燭勾龍爽蠟屐圖為牧仲題磊磊白石瀨落落松竹林林下彼何人蕭灑古冠巾手中自蠟屐神氣何閒暢人生百年中著此當幾兩晉人故多癖此癖復自佳錢奴身障簏優劣何有哉兒子竟辦賊入户屐齒折寧憶剡中時長歗泛溟渤兩人持髙屐三人持衣裾作佛靈運後習氣那復除奇哉勾龍生有此通靈筆把臂方入林欲呼阮遥集題秦留仙然竹集卻寄小孤山下江水白聞君去作潯陽客大别山前江漢清憶君重過武昌城荆鄂相望纔幾驛憐君來去隨潮汐盤中縷膾武昌魚座中人物荆州鯽亦識王門懶曳裾參卿軍事復何如早將表餌摧强敵莫為窮愁且著書送徐武令人生如飛蓬飄轉不得住與君十載别紫髥已非故邂逅蔓草間為君歌零露歌聲未及已離觴忽復御淼淼江上波離離海門樹悵望秋風時客帆此中去雁飛京口驛潮落西興渡幾日罷清砧閨中理紈素訒菴學士移居故人長安居門巷碧苔色徑僻少人過空庭唯鳥跡長思茂陵卧未厭承明直仕宦本易農胡為方食力圖書盈五車茅茨唯四壁室聞原憲誦家鮮公儀織晨夕隔望衡徘徊坐成憶唐寅紈扇圖偼伃辭輦後無復承恩宴緑草萋廣庭流塵掩華殿幽懷寄搗素宻意題紈扇凄凉柘館閉繾綣昭陽讌運往恩潜移常虞委霜霰太息木門謡含情望飛燕聴張晴峯員外彈琴愛君園林好花藥幽蒙茸渌池澹將夕蘋末來清風美人惜流景目送孤飛鴻何以寫我心清響寄絲桐班姬淚秋殿箕子傷離宫瀟湘𣺌雲水星月寒魚龍誰知園客絲窅黙含無窮屈茨間箜篌繁音令人聾希聲愛遥夜思盡神相通巻簾滅明燭月上聞秋蟲和呉孟舉種菜丈夫志四海隻手提天綱不然折尺箠為國笞戎羌胡為坐褏手學圃躭滄浪澤國春雨餘溪流碧泱泱戴笠日荷鉏土膏發勾芒曉露劑白莧夕照分紅薑葵韭䪥蓼蘇紛葩各成行􅋾􅋾斑竹笋勢欲凌蒼筤劚登寒具筵糝用鹽䜴香野人食不鑿晨炊拏黄粱詎諳七菹妙聊喜四體强便腹何貴人日羞大官羊不解出一奇嗟嗟耗太倉鮭菜二十七風味輸庾郎倘許充園官待我相攜將題王文安公畫在昔孟津公詼嘲頗慢世結習稱畫師往往得三昧山路縁秋毫上與青㝠際孤舟泊風荻􅀈閣懸水碓此境何嶄絶略與秦棧似忽憶大散闗巴馬金纒轡東城泛舟秋氣軫楚悲商飇感梁賦河橋一騁望葉下亭臯樹叢雁入雲飛沙禽背船去暮節入羈懷誰能鬒不素仇英畫九成宫圖唐九成宫即隋仁夀宫君不見隋皇初作仁夀宫累榭穹臺宛相屬夷山堙塹幾百里役卒崩騰死崖谷功成厭見獨孤公不知怨自封郎築宫車晩出凡幾載已見迷樓起相續虬髥真人西入闗削平六合營長安青山碧水自無恙雕牆峻宇猶人間年年清暑備法駕千乗萬騎驤孱顔醴泉瀵出如沆瀣下入涇渭為通川步櫩周流鑿山翠雲窓霧閣當空懸化人之臺屹中天銅烏六月雄風寒披襟萬仞待飇馭咸陽宫闕如雲烟宫娃笑語翠微上阿監絡繹青冥邊羽林千牛萬萬輩解牛放馬紛華旃從來世事有倚伏太平倐過開元年白頭拾遺此駐馬愁聞林藪啼哀猿畫圖想見全盛日令我涕涙雙䦨干腳痛去年牙齒豁一痛連鼸車今年腰腳痛登降須人扶吾年纔四十早衰信有諸憶昔登金焦南逰窮具區騰趭如飛猱神凥駕空虚西行極岷峨奇觀凌清都兩腳輕孱顔卭杖非吾須十載一彈指肉緩筋亦駑况復苦􅏓盭舉步多崎嶇始悟咸其腓初九利安居既不䇿㨗足安用悲泥塗誰能相比附如彼蟨與驉題昌黎詩後淮隂舉足分項劉運籌帷幄鄼與留河汾門下羅將相房杜李魏非常儔西京功業繼三代貞觀仁義被九州惜哉韓公不及此但取將相酬恩讐北山約逰摩訶菴不果往卻寄天色欲雨鳩勃磎麥苗剡剡翠始齊白石莊前入山徑已有犖确紛髙低春湖靴紋漾綷䌨逺山玉立森角圭荷蓑觺觺驅繭栗垂竿拍拍驚鳬鷖漁陽地寒花事晩春隂風氣恒慘悽今朝乍霽日暄暖垂楊蘸水新生稊小桃㸃㸃杏苞拆裾腰草緑紛萋萋諸公蹋青拂晨出果下銜尾聞驕嘶郎官頭白老簿領經年坐困如醯雞自嗟樊雉苦籠縶决起安得排雲霓况逢寒食催上冡紙錢麥飯澆棠梨感念存歿淚雙迸玉壺那復相提攜賦詩望逺但咄咄逰心已過香山西曹升六謝千仞攜酒過飲宋牧仲張杞園亦至同賦長句二首陵州羅酒玉雪清青州金露琥珀頳直沽冰開酒船到屬車捆載連瓶罌二子提挈肯過我鴟夷交卧紛縱横我愛徐景山不知曹事惟酒鎗復愛謝安西玩弄元子如老兵眼中况是我輩客談天灸轂聲彭觥一斗枯腸芒角生五斗胷中鱗甲平一石曠若逰八極逍遥齊物無􅉛成幽州二月草始萌小桃照地如紅鞓天涯酒人不易得何必琴筑琵琶筝十擲輒犍詎縁拙三語作掾誰所令蠟炬成堆冠幘墮西南月作金盆傾昔聞馬文淵居後欲軒前欲輊又聞欒將軍賤貧辱身貴快意此語非長者亦復非㳺戲勁翮扶摇九萬里豈識青㝠更垂翅鳶肩火色多少年一老行吟獨憔悴惟應中山釀供我千日醉駃騠為胾駝作羮有酒如澠那復記千秋亭上相呌呼不知何與癡人事丈夫不得手執丈二殳身領漁陽萬突騎親射蠻氊縛鬼章誰識鄧先好奇計此酒須滿百斛船使我反覆沒飲如渴驥子路百榼堯千鍾黄土誰能别愚智諸君不釂閣當閉舉觶徑須煩杜蕢宣和打馬圖前馬奔馳後馬逐萬馬奔騰隘川陸初看逐隊來玉門又見争先度函谷虎胷彗尾骨權奇千里追風競齊足傳聞天馬是星精豈與凡材同碌碌扼窩據險一敵萬倒行逆施歘馳突漫言稱徳不稱力徑籋浮雲何太速得意横行彼一時詎少鹽車太行麓殽函晡秣朝飛龍咫尺君門上天育那知髙步易顛蹶夾壍一朝遭困辱莫誇棗脯與文繡世事由來有翻覆直須十丈的顱飛待向黄池更歕玉秦鏡詞為袁松籬作熒熒古鏡雙盤龍流傳本出咸陽宫秦時明月至今在剥落泥沙露光彩當年秦并六國時後宫閉置千雙眉守宫注臂鏡照膽三十六年君不知華隂道上逢山鬼輼輬東來祖龍死美人鐘鼔散如烟此鏡蒼凉閲朝市憶昔大收天下兵十二金人初鑄成還令餘事作奩鑑太乙下視蛟龍驚劉興嬴蹶何倉卒金鑑千秋如一髮秦鏡虚誇照膽寒不照長城多白骨漢祖入咸陽宫得方鏡廣四尺九寸照見五藏見西京雜記與董蒼水彭駿孫小飲葉子吉學士齋同限箇字寄諸乾一進士長安風塵日堀堁扇障不能衣苦涴天官昨占月離畢十日愁霖足髙卧髙車大馬諸貴人今雨蕭條誰肯過玉峯學士數相見打門不辭泥没髁今朝置酒招我飲黄雀披綿蜻鮓剉百盃以後呼酪奴白絹斜封朱印破天下健者今董公富貴浮雲輕涕唾彭郎未奉一嚢粟路鬼揶揄甘凍餓抱膝誰信比管樂髙論依然遡卿軻世情但競牢石耶女子猶知伯休那酒酣岸幘忽大笑吾曹蠶絲自纒裹青山一髮江南路雨笠烟蓑有幾箇細林主人老躭隠枕上九峯青錯磨漁樵近局不争席復有名僧伴髙座空山水流花又開不識都門送臨賀我生未覩細林面聞君快語殊已癉已癉見山海經當年我作萬里逰劒閣西風聴鈴䭾凌雲九峯悔輕别筋駑肉緩四體惰他年但乞五湖長纔話蓴鱸口先哆未須木石笑呉兒小海歌成我當和張晴峯員外園亭聴金山人彈琴同訒菴學士北山都諫作平生慕古澹頗笑筝笛耳愛此太古音寥寥寄絃指客來江海上偶契希夷㫖髣髴七里灘松風入江水曲罷孤月明溪光散清泚主客一無言露坐攬衣起送浦潜夫吳江有髙士讀書慕皇羲心逺契一畫意得無九師摓䇿筮嘉遯遂養邱園姿荒江屋欹斜鷗鳥同朝饑在昔洪丞相經畧天南陲君佐幕中畫俶儻復權奇試吏嶽麓下蒲鞭懸不施丞相解兵柄角巾東第歸君亦困株木周道多蒺藜投賦汩羅岸弔古湘妃祠歸吳二十載飄蕭雙鬢絲丞相宰木拱部曲無復遺重來渡易水感激酬恩私慟哭龍驤塋手刋第二碑袖中周易編未有君平知徙步過市中塵染蒼浪髭湖南方用兵馬飲瀟湘湄辱在卿大夫脩劒空拄頤老子好奇計才鋒尚如錐無人為薦達垂老嗟數奇古王者行師必鑚九州龜君書寔有用足為王伯資秋風動鱗甲扁舟犯漣漪白首抱遺經具區卧茅茨季主定捧腹髙賢當為誰羅塞翁猿圖栗葉初黄山水渾引臂呌嘯來羣猿縁條附蔓下絶壁連凥結股争攀援老猿下視獨招手羣猿跳擲騰且奔可憐猿子亦大黠襁負母背如乗軒黒者𤣥衣白玉雪下飲百丈臨奫淪􅰺齗嚄咋生趣備丹青漫漶神明存品題云是塞翁筆江東詩法傳清門我疑或是易元吉景靈畫壁昔所尊余鏗韓性競短詠天姥五字雙眉掀吟詩翫畫輒移晷坐屏寒具忘朝飱忽憶元和栁司馬投荒始解憎王孫文姬歸漢圖宋南渡祗候司張某畫大漠茫茫沙草枯天葢四野如穹廬隂山秋髙雪片麤朔風中人金㒒􅣏髙飛鴘轉追韓盧前行一馬建隼旟後有數馬鳴相呼尾鬛蝟縮慘不舒馬蹄流血冰裂膚蕃兒漢兒手口瘏相顧不能鼓嚨胡文姬玉面貂襜褕聳肩顰黛愁不娛越燕向日思南徂君獨何為苦嗟吁兠離窈停非故都魂消影絶悲兩雛歸來為公寫遺書名在列女丹青俱老瞞睨鼎目睢盱破壁牽后如收孥獨能千金歸蔡姝吁嗟髙義今已無荅徐勝力二首雁門太守解食雁豈識凉州皇甫規王符到門倐驚起屣履出户倒裳衣折揚皇荂萬夫和清廟朱絃知者希潜夫論就自愛惜㑹有知我傳來兹我來都門得二士董生蒼水磊落君多聞董生萬里適甌越君也饑餓留燕雲登車不落為著作笑君何意窮皇墳被褐懷玉莫太息他年定可張吾軍送洪昉思由大梁之武康澤腹堅凍冰峨峨舳艫銜尾填漕河北風吹雪如鸛鵝急裝結束尫驢䭾欲向夷門訪朱亥便從燕市辭荆軻三年京國何所見日中攘攘肩相摩哫訾喔咿時所愛骯髒詎免常人訶亦知貧賤世看醜恥以勁柏隨蓬科我衰於世百無用僦屋深閉如􅀢螺蒼苔被階寒雀啄汝何愛此頻來過耳語佀鄙程不識騎危解笑公叔痤吳興清逺我夢到水精宫在琉璃波防風古國更幽絶餘不溪水清逶迤山歌處處採茶荈漁舟往往穿菱荷西陵潮信近咫尺方言百里無差譌勸君卜築豈無意貞曜故宅留山阿結鄰尚友亦不惡溪山况足供婆娑名髙身隠恐難得丈夫三十非蹉跎朝廷正須雅頌手待汝清廟􅆳猗那蘇門三賢詩張于度蘇門孫徴君曰于度為鹿伯順髙弟從予五十年未嘗或離左魏之難履虎尾涉春冰烈士之名滿天下卒歸老蘇門髙蹈逺隠志士不忘溝壑其庶幾乎于度名果中容城人𦵏夏峰北原明運昔中圮奄豎奸大位衣冠虚南牙政柄歸北寺誰實鈎黨魁嶽嶽左與魏一朝檻車徴牢户事隂袐傷哉史弼言荼甘乃如薺容城有布衣發憤亡鯁避要鑕理太尉舉幡訟司𨽻貫械渤海生赤幘夏門吏桑海四十年往事如夢寐骨歸蘇門山名在顧㕑次理寒石本李姓也名鬯和西華人恥與逆闖同姓改曰理孫徴君與西華左令書稱為魯連後一人魯連蹈東海其志恥帝秦龔生天天年詎知有美新陶公懷晉室聊存頭上巾嗟哉均垍流乃愧青巖甄西華理寒石為儒甘賤貧奉母蓬藋中歸潔恐辱身梟鏡破鏡與獍同交蹄跡神州日沉淪靈氛乆上天呼號竟無因感激變姓名下士良苦辛何人傳節義誦言聊一申餓夫彭姓字了凡蠡縣人遭闖亂棄諸生客饒陽為鄉塾師已而從孫徴君於蘇門或授之粟不受竟坐死嘯臺之旁徴君題曰餓夫墓黔敖呼餓人不受嗟來食使之當大事必讓千乗國靈輒餓翳桑倒㦸一何力簞食不忘報竟脫宫甲逼蘇門有餓夫風節夙所植生餓蘇門下死𦵏蘇門側嘯臺髙峨峨百泉流湜湜清風一相映水石起寒色遐哉首陽薇千古長太息送陳子文赴安邑丞四首我愛田子方同時段干木髙義動諸侯清風激頽俗聞鍾知左髙佳言足三復下車或式閭寧浼踞堂辱斯人􅊬已逺餘韻留鄉曲賢哉魏成子千秋擅遐躅峨峨中條山迢迢涑川汜人物表西河流風至今美陳侯東海來髙文一何綺閶闔籋浮雲夐絶致千里自抱萬古心五斗焉足恥滹沱冰上渡故闗雪中啟懷古多逺情到官正春水目送中條雲松風滌雙耳騏驥服鹽車躑躅上虞坂山石何磽聱日暮途且逺道逢紵衣惠未敢悲晼晩仰首奮長鳴帀日思一展譬彼軼世士遭時未離蹇君過虞坂上懷古向陵緬古之賢達人澄懷善舒巻淼淼沅湘流香草目以蘭鬱鬱徂徠松百尺凌嵗寒君子重結交貞固期不刋解巾二十載閲世如波瀾菀枯既以移素心良獨難喬木隠窮巷饑禽噪簷間君偕辛齋叟時時造門端告我媯汭行能不傷肺肝保此金石心在逺義亦安不見蕭長倩録録曽抱闗藝圃雜詠十二首為萊陽姜學在賦南村豈知城市間村路忽超逺曖曖桑柘隂晨光散雞犬應有素心人空林共偃蹇鶴柴長身兩君子宛與孤松映三疊素琴張一聲逺山静嘹唳月明時風泉雜清聴紅鵝館疏館籠鵝羣素羽臨秋水濯濯映鳬翁沿流亂芳芷乞寫茴香花共入丹青裏乳魚亭幽人知魚樂為復知魚計䇿䇿與堂堂宛有江湖意時逐落花來更向空明逝香草居湘君遺逺時汀洲搴杜若菲菲來襲予脈脈情相託常恐鶗鴂鳴芳香坐摇落朝爽臺崇臺面呉山山色喜無恙朝爽與夕霏氤氲非一狀想見拄笏時心在飛鳥上浴鷗池海鷗戲春岸時下池塘浴何樂從君逰忘機自馴熟不用駭爰居朝朝泛寒緑度香橋陂塘何逶迤飛虹鏡中起但聞功徳香都不辨花水鼻受心已著遂契無言㫖響月廊脩廊非一曲窈窕隨清樾掃地坐焚香心跡兩幽絶箖箊風蕭蕭無人見明月垂雲峯具區三萬頃奇峯七十二割取一片雲虎牙自孤鋭颯然山雨來咫尺流雲氣六松軒髯翁閱千嵗纔如熟羊胛不逐桃李妍何妨雪霜壓可望不可狎愛此李鱗甲繡佛閣樓閣衆香中日夕供調御仙梵逺蕭條隨風不知處更有迦陵鳥聲來貝多樹古詩答金榖似西山紛鈎綿具區逺泓峥巗洞既殊麗草木滋鮮榮靈威古丈人素書發其英千載多秀民㳺札髙令名昔聞夫子賢乃自長洲生鈍翁五經何紛綸七畧亦縱横提攜吳純鈎落筆干天精相思二十年無由達中誠都門競錐刀車馬如踐更不解作髙髻誰與為目成昨者枉佳贈其言明且清賦詩備三類餘音散鯨鏗顧慙實不腆欲報無瑶瓊自非羊肸流詎曰知鬷明矧子少而颺執手安敢輕來詩有云倘無歛器言堂下失鬷蔑悉索固所願毋為笑荒傖同施愚山陳藹公集山史昊天寺寓觀唐子華水仙圖先生舊隠三峰椒太乙玉女時招邀秦都漢畤一蟻蛭目翫易象窮昏朝蒲車應詔謝賔客城西古寺風蕭蕭殘碑老樹氣象古凉衫重戴風神超八騶喧闐不到此兩三素侣還相要殘冬氣暖似吳越佛香入院鐘魚飄徐出一軸自拂拭古光黯澹生鮫綃青峯出沒髙歴歴海天萬里迴春潮仙人綽約駕雲氣飛龍决起横烟霄六銖衣輕逐風舉熒熒顔色如陵苕四座咨嗟歎奇絶倐乗六氣逰空寥子春一去伯牙逝海波汨沒秦人橋君歸西嶽望東海齊烟九㸃非迢遥題喬子静桃花流水圖青山白雲外合沓無終始小艇漾溪流幽興何窮已夾岸桃花林連綿復相似落英正繽紛芳草亦鮮美茗椀置船頭笭箵掛船尾不愁風水逆去住皆可喜儻遇避秦人或逢鬼谷子鸞嘯一逌然沙禽忽驚起同楊爾茂富磐伯兩宗伯李湘北閣學張素存宫庻信初侍御遊摩訶菴二首西院枕迴溪青山滿髙閣祗園天氣佳苔砌餘紅藥鳥如迦陵響梵是魚山作微雨忽來過紛紛幾花落東院更幽絶蒼苔引深處脩篁蔽簾櫳風聲在髙樹怳惚思舊逰繾綣未能去誰賦洞庭詩清如杼山句東院壁間有僧題詩云圖畫當年愛洞庭波心七十二峯青而今髙卧思前事添得盧師倚石屏顔修來吏部寄孔廟碑十二種生近聖人居未得拜祠墓頗聞魯諸生講禮以時聚故宅聞金絲猶傳壁書處漢祖祠太牢過魯曖餘慕六經出秦火諸儒明訓故歴代遞相嬗碑版屹森布龜龍或齾缺蛟螭無錯互顔生陋巷裔學古鄙章句餘事攻六書韋蔡競先騖金薤逺見投聊持伴魚素論世慨桓靈末造紛黨錮元嘉永夀建寧三碑尤愛梁鵠書筆勢䬃軒翥貢墨與匱紙椎拓亦殆庶明牕秋日晴水沉午方炷彷彿闕里逰低佪不能去午食得鱸蜃虀鴈醢百不愛縷鱠愛斫松江鱸年來絶有步兵興江船難致途且紆今朝忽訝食指動四腮登饌加蒲菹京師最重灤河鯽侯鯖下箸矜膚腴貴人不識鱸鱠味儘輸蓑笠垂竿徒吾鄉魯陂亦産此鱸豸稍别方言殊齊人呼鱸曰豸釋名爾雅未及録㑹資好事箋蟲魚廿年仕宦去鄉里走避舊隠如逃逋昌歜形鹽享備物何如鄉味炊雕胡他年歸卧錦湖岸日抛􅟐槴臨清渠夜月冰修子湘耦長見過同傚宛陵體三首舉頭新月佳開軒滅明燭流螢稍開闔風露下踈竹素心二三子比鄰往來熟漢隂無主賔何用加幘屋衮衮九衢間未少噉名客老懶倦逢迎誰當較尋尺髙齋時卧病河漢忽已夕緑蘚被階生幽人見行跡聴君談劍術四座輒色變青天走風雨虚堂激雷電香丸合雌雄太乙經百錬勿快睚眦讐應侯吾所賤冰修談劍術甚奇愚山侍講送敬亭茶敬亭雲木好香茗叢幽巖鴉山舊擅名晩出思并兼茶人競春霽歴險如鼔儳新火細蒸焙青篛勞封緘先生住山時採摘心所忺封題寄千里知我殊酸鹹年來同直廬思歸夢巖嵌白毛劇臯盧强飲口已箝何當候蠏眼颼飀響風簾故山昨有寄水驛馳江帆開籠亟分我芳香透重匳鞾紋隠蹙縮犎臆垂亷襜磑成玉雪霏持作粱肉砭渴羌老解事未敢加薑鹽戲題兩髯行後贈陳其年邵子湘楚王宴章華乃以長鬛相彼鬛有何好霸國用自壯平生交兩髯于思不相讓絶倫陳魁梧軼羣邵跌宕昨見兩髯行囅然忽神王士龍能笑不吾髯幸無恙送姜西溟歸慈谿春風滋百卉不榮孤柏根白日迴隂崖霜雪慘不温丈夫重知已烈士輕感恩姜生起句餘水擊南溟鯤商歌一畝宫名動萬乗尊孤髙取衆忌當路誰攀援季布揖曺丘感激由片言何况貧賤士風飇阻重閽枚朔善骫骳莊徐擅髙論連尻結股腳詞賦若雲屯君獨銜恤歸秋風刈叢萱虎鼠竟何常揮手聲暗吞得陳子文書兼知吳天章消息雁聲初墮地黄葉已盈除秋雨蕭條夕忽枉故人書故人復何在中條白雲裏昔别霜霰零昨日秋風起曽聞隴頭水驅馬度闗山烽烟照駱谷征戍何時還書中云有度隴之役黄雀縱横飛孤鶴正乗羽祭竈請比隣停車共騶語嵗月易永乆離羣難處心為問朝歌令相思深不深寄青浦丞李青立麟趾異凡蹄鳯毛異凡羽君為南陽孫豁達類其祖請從復辟論即事感今古神龍奮幽蟄天星落如雨倉皇奪門功造次成肺腑輿儓珥貂蟬政柄歸奄豎陳請濫恩澤帶刀依負斧晉文定王室請隧不見許吁嗟彼何人憑藉亂狐䑕爰立當危疑踪跡等羇旅當時武功伯脣齒終齟齬公實仗忠信臲卼成心膂嗚呼三楊後伯仲見伊吕天地鬱風雲將相如龍虎愛君清門後克秉髙曽矩低眉百寮底手版趨公府青袍映春草逺向春申浦婦有林下風樂事笑眉嫵青立娶於彭為禹峯方伯女有詩名詩寄雁南飛因風墮洲渚寄牧仲贛州䖍州界閩湘蘭蕙賤於草復有寳珠香玉雪映清曉江城微雨過炎瘴浄如掃髙齋開八牕豁達凉風早方牀黄琉璃卧起日杲杲清芬惱魂夣仙膚愛綦縞嶺外陸郎花未敢鬬娟好幾嵗客京國冠葢苦紛擾朱門多林塘無由聴啼鳥今年八境臺雙江入登眺閒註詩楚騷多識不為少遥憶書到時贛石風嫋嫋精華録巻三欽定四庫全書精華録巻四刑部尚書王士禎撰古體詩其年檢
