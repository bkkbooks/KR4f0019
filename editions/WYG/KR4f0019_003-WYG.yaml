front:
  text: 州謁三蘇公祠蟇頤山色腴不枯玻瓈江水如醍醐眉州城郭刼灰後水塍漠漠成榛蕪郵亭下馬詢老卒蘇公故第城西隅旋來束帶薦蘋藻辰良何必煩神巫往者此地鐵腳亂順治初有賊據眉號鐵腳蠻高門大宅皆焚如此祠巋然誰所作惟公大節驚頑愚雙柏輪囷溜霜雨廷立冠劒古丈夫長公遺像龍眠筆馬劵剥落涪翁書祠有石刻龍眠畫東坡像潁濵賛又坡書玉鼻騂劵山谷有跋殘碑挿笏尚林立紫藤碧蘚纒龜趺祠西一水最蕭瑟經霜菡萏猶扶疎甘蕉十丈覆簷霤落花亂迸紅珊瑚當年結構不草草要令咫尺成江湖故園如此不歸老與人家國徒區區瓊儋雷藤歴九死口甘熏鼠隨猿狙頭綱八餅有何意桄榔萬里非吾廬兩公神靈未磨滅應翳白鳯遊清都遊戲下界亦聊爾鯤鵬豈必搶枋榆眉州玻瓈天馬駒陸務觀詩句玻瓈春眉州酒名酹公三釂公歸乎
