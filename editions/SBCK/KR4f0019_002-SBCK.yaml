front:
  text: 漁洋山人精華録􅃃二門人􅃸官林佶編
  hash: sha256:2eb4bf86b333f2da19c4c551e01d3e9d0628cd7e8179173d535034fb8e91d8d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_002-1a}
body:
  text: 古體詩鑾江大雪歌􅀉家兄西樵夜聞觱發曉瀁􅐯衝寒四顧江天朗雲氣欲壓􅀭子津濤頭直突仙人掌平生愛雪勝瓊貝况復横江發竒賞朔風獵獵犯貂裘急霰霏霏灑烏㮄大澤蛇龍避寒蟄髙天鵰鶻盤空響江南羣山張畫屏玉笏嶙峋袤百丈隔江心馳茅山洞咫尺波濤絶來徃遥憶茅家好兄弟驂鸞􅀐鶴三峯上學仙不能且學劒耳後風生致慨慷西郊太道接符離霹靂鳴弓穿􅀫莽玉踠神騮氣清峻金毛胡鷹颯蕭爽雄狐狡兎􅃚得避雨血風毛灑原壤横吹聲中歌􅔡病據鞍盤矟真吾黨歸來一笑卧煙篷淅淅江風吹五兩南將軍廟行在泗州南公霽雲乞師處范陽戰鼓如轟雷東都巳破潼􅀜開山東大半為賊守常山平原安在㦲睢陽獨遏江淮􅀔義激諸軍動天地時危戰苦陣雲深裂眥不見官軍至誰與健者南􅀅軍包胥一􅂘通風雲抽矢誓讐已慷慨㧞劒墮指何嶙峋賀蘭未滅將軍死嗚呼南八真男子中丞侍郎同日亡碧血斕斑照青史淮山峩峩淮水深廟門遥對青楓林行人下馬拜秋色一曲淋鈴萬古心家兄信􅀫焦山有􅀉聞君㳺松寥託􅀫招提境佇待江潮生茶香酒初醒松風流夕梵蘿月􅊌清影暝坐㱕鳥稀晚飯鐘魚靜昔逰不可忘夢向焦仙嶺焦山古鼎詩同西樵賦曉入枯木堂恠禽驚翩翻清露滴松杪下見古鼎蹲寳光耀昆吾中有飛廉魂上文為雷囘下文為雲紜獰狀饕餮伏兵氣􅃖尤昏辛壬與丁甲世次迷夏殷初疑周虎彞復惑虞蜼敦尊􅀙不可辨牛豕誰能論瑰怪壓􅒋鼎譎詭旅紀甗蛟龍雜蝌蚪五指不敢捫在胙想屭贔識字驚蜒蜿月黑鬼神泣峽束波濤奔籀書失趩􅞚斯篆摧寴􅛍史㳺久巳殁皇象不復存不遇博雅流孰為洗煩寃諒比岐陽狩㦯同泗水淪山僧與道古感激聲還吞分冝昔枋􅀦氣􅀔傾崑崙斯鼎出京口上燭光絪緼役使萬指衆􅀒戴千蹄犍大㢤宗廟器詎㞕豪貴門威力鎮禪窟寂寞㱕祗洹午夜鳴鐘魚清晝啼林猿閱人􅁪沙刼如彼蝨在褌我昔訪焦先望氣􅤉不言五年隔􅀭子無翮思騰鶱吾兄癖好古八書探河源三日松寥㳺坐卧忘嚻喧扁列析螺書􅃃尾搜蠆文作爲竒偉辭大海􅅮鵬鯤春江壯風霆響激雲濤渾三嘆􅁇髙唱海門上朝暾送家兄同無言逰吴越二首挂帆指吴㑹雲水空􅄥間上已美風景登臨散襟顔湘湖􅐜正滑應上蕭然山共訪金庭宅淹㽞殊未還吾家王吏部江左有髙名五字論詩品隂何欲比清偶思鏡湖好忽作剡中行輸爾天都子逍遥訪赤城上巳辟疆招同邵潛夫陳其年修禊水繪園八首前年曾到湘中閣閣外天寒水方落西風颯颯猿啾啾惜別懐君芳杜若今來三月青春深浯溪窈窕桃花林爲君一曲答欵乃寫作雲山韶􅇴音碧琉璃上雙玉壺蘭橈宛轉沿春蕪未傳洛下羊酪法且醉淮南櫻筍厨射雉城中􅈣景暮流鶯喚人且須住囘頭笑謝襄陽兒詎可揺鞭背花去平山堂下五清明甲辰紅橋賦冶春句也草長鶯飛無限情不怪老顛裂風景名園上日相逢迎銀箏初彈阮初擘此夕留髠應十石春衣明􅀊杜陵逰憶汝狂歌拓金㦸西豪里中訪老友况復陳生與我􅌋辟疆園敞羅羣賢大兒小兒唱銅斗烟際鸕鶿一隻飛吴歌水調欲沾衣風光如此不成醉帽影鞭絲何處㱕陳公家近罨畫溪溪邉花草令人迷離墨山中一宵雨竹雞白鷴相應啼先生大隠隱城市萬壑千巖窗户裏花朝巳過上巳來日坐蜻蛉釣沙尾􅂞溪緑淨不可唾碧蘿隂中棹􅂳過落花㳺絲春晝閑獨許先生此髙卧劇憐風物共披襟蕭然絲竹皆清音永和三日今千載坐使清風滿竹林時出文衡山蘭亭卷同觀暮春三月爲水媐棠梨葉大山禽啼田家社酒壓缸面雪白橙香玉練槌夜聽醡頭滴春雨曉報提壺如潑乳醉郷大户百分空􅁸喚花奴自撾鼓谽谺一徑略彴紅地肺疑與朱陵通沅湘春水蒲桃綠江蘺蘭杜愁烟空主人少年登嶽麓祝融峰頭㡬逥􅀫七十二峯羅户庭日汲湘潭然湘竹再泛水繪園看月作二首林塘自幽映况復清夜月䡖舟􅃞浦溆習習凉飆發竹深禽響亂徑僻人踪滅島嶼已千尋川涂更百折月影散水木光景紛竒絶􅀌篷泊􅈣霜澄懐抱氷雪我有素心友掩􅀜事禪恱噉粥日消散觀道離言􅀃示我秋水篇邈然􅀉㵳泬逺寺傳鐘魚空山鳴蜻蛚流連印渚㳺惆悵林中別修林帶髙舘巖壑相因依水波澹瀟照雲霞收夕霏遥遥暝色來肅肅沙鳥飛永懐謝希逸望古歎知希斯人不可作乘月扣舷歸雨夜懐其年園居久客春向暮歡㳺罷不適􅀌館歇清漏卧聞春雨滴暗蛩吟幽草寒燈耿虚壁念我同心人咫尺何由覿雨聲湖上來蕭條散蘆荻此時掩􅀜卧應聴林間笛雨登湘中閣眺望曠望臨清湘椘天夜來雨合沓連江潮空􅄥􅊌洲渚野鳬溼不飛墟落逺堪􅁆漁㮄􅜲廽谿停橈飯􅀌嶼不見烟中人但聞烟中語詠史小樂府二十四首望望北邙坂黄蒿長似人夜來螢火暗失路小平津欲得卿曹拜何妨破産求蒲桃原不惡一斛博凉州長揖横刀出􅀅軍一代雄頭顱行萬里失計殺田豐祝衂復祝衂君聽羖䍽歌瓜廬方一畝漢臘此中多生女不如男􅀁論非英雄不見龎娥親殺人都亭中太息王髦劒前年殺孔融曾言赦雍齒地下愧袁公一作崩城操三軍且莫哀丹楊使君婦衰絰報讎來可憐卿慚長陳德何凉薄不及朗陵公猶有荀文若子義來江左青州名士稀丈夫死知巳枉用􅀉當歸將相江東美英風壓上流魯公最忠烈慷慨借荆州猘兒健如虎髙歩􅘳江東孝廉殊娬􅆺人􅀃􅂵髥公腹痛思前事分香惑後人二喬得佳壻不是洛川神赤壁戰堂堂綸巾繡裲襠元戎在何許顧曲有周郎濡須髙㑹日諸將在轅門醉袒貂裘看斑斑刀箭㾗龍鳯全㱕漢三分指掌中惜㢤雒城戰失此半英雄魯國真男子􅀜西社稷臣阿瞞渾自可滿寵爾何人大義辨􅀦賊吾欽趙順平寧須法孝直方可制東征􅁕堪加帝股故態笑狂奴何如朱盪㓂直捋大王鬚邴管持風節髙名合作龍何人工賣􅀦老竊博平封費公能辦賊嚴駕且圍棋賭墅東山者風流自汝師生乞􅇍兵厨死埋陶家側一時兩酒人亦􅁕張南北石馬來張掖公然大討曹可知北部尉典午啓塗髙今年賜劍履明年假黄鉞可憐青頭雞躊躇不得發吴漢分龍虎終憐石子岡何如綿竹戰父子死堂堂登天闕望金陵懷古我登牛首山天闕何厜㕒上造青雲端下瞰無端倪壯㦲六朝都佳麗誠在兹龍虎氣盤鬱將相羅雄姿緬思赤烏年爰逮太元時五馬浮渡江一馬獨權竒桓桓始興公幕府陳軍麾懿此帝王宅雙闕衛京師青山似洛陽大江環四垂智力􅊬千載興廢如奕棋江山看不殊俯仰自生悲北眺元武湖蔣山􅉛蔽之博望峙西南列戍多旌旗時清異偏安慿弔將奚為落照横江流萬里天風吹壯心不可已淚下如綆縻龍潭登舟棲霞僧相送昨朝山中雨惆悵中峯別囘望上方人雲嵐但明滅龍潭復相送江晚潮如雪瀏瀏巖際風皎皎波間月世外本忘情幽懐無㫁絶終卜僧紹鄰長兹味禪悦淮北晚行􅀉廣陵故人南風吹五兩淅淅乘潮便緑波蓮浦漲白露蘅臯逺稍看烟景夕篙師柂樓飯不見廣陵人含凄詠江練􅀉宗㝎九東原讀書處夏木紛成結江潮門外落烟岫窗中列誰言謝公埭復作零陵別懐中􅇛扇詩睠此清秋節分賦得舘娃宫送子吉編修㱕吳館娃宫中花蘂紅美人白紵嬌春風館娃宫中烟草緑蝴蝶雙飛井欄宿囘首穠華能幾時羡君一舸逐鴟􅆥五湖淼淼烟波濶何處黄金鑄范蠡又賦得甪里村笠澤􅄥􅄥水烟夕細雨丹楓浪頭白先生去後㡬千年甪里之名今尚傳玉堂晝卧萝烟水卻挂扁舟尋甪里我亦江湖舊散人􅐜鱸思逐秋風􅁸昭陽顧符稹畵棧道圖歌顧生畫學李思訓尤工棧道兼騾綱丹青金碧妙銖黍近形逺􅀔窮毫芒褒斜山色一千里子規啼處烟蒼蒼女郎祠邉人跡絶但見哀猿連臂呌嘯青崖􅅖江水如油下南鄭閣道似髪通陳倉紅氊裹背笠覆首人物結束疑唐裝車馬班班入雲際如蟻縁垤相扶將秦川渭水望不到􅁞叢直上天茫茫仰家扇子氷雪色一莖斑竹磨瀟湘如何方寸懐褏裏宛然置我蜀道青天長􅀭一益二古天險譙周鬻􅀦謀非臧阿瞞四紀作天子青騾西幸何倉皇三十年來蜀道塞况從古史論興亡因君妙蹟發遥慨如聽鈴聲替戾岡送陶季之潞州先生昔日登武夷鐡􅂳峰頭看奕棋中冠離支三百顆酒酣自劈䡖紅肌峰頭爛睡忘甲子坐笑曾孫生白髭張帆伐鼓下黄鶴欲濫三湘窮九疑披襟蘭臺發髙唱快㦲不辨風雄雌平生名岳􅄚齒遍風塵亰雒嗟衣緇投我竒文浩千頃蛟龍大澤纒躨跜謂我四海一知已譬若莊休從恵施髙齋茗飲坐清晝風爐活火分槍旗我時無事似犀首酒鱗浮動銀留犁豐臺紅藥花照眼驪駒忽告將西馳壯心猶作驥伏􅇫適志無如泥曳龜我聞上黨天下脊當年潛邸傳臨淄飛龍荒宫沒烟莽㫁碣髣髴開元詞紛紛梁晉夾河戰鵶兒萬􅀐陳軍麾錦嚢􅀒矢盛意氣歌聲慷慨留三垂時平不用弓箭手空老昭義千熊羆戰􅂣下馬問亭長􅀑燐颯颯寒飇吹君家草堂臨射陂門前五栁藏東籬何時單舸徑㱕去北窗髙枕談黄羲送朱秋厓㱕安宜兼訊陳氷壑北平太守老不封身經百戰􅀜強弓平陵岸頭爾何物李蔡為人居下中昔者應侯未入秦折脅摺齒難為容一朝西行取相印故人馬食何匆匆丈夫不遇且蓬累古來雄俊將無同愛汝朱干草堂好甓社湖北如吴淞釣􅂳春入鰕菜市柴門晝掩菰蒲藂據梧時復同恵子上冡聊爾隨龐公當年我作淮南客落帆屢及桃花紅兒童習見鵞鴨熟濁醪為我來牆東此􅀖佳士復有幾稍􅀙湖海知元龍唱于唱喁樂復樂大湖漠漠來天風自別淮南老鞍馬筆墨蕭颯如秋蓬眼明乍喜故交至劇談徃徃連晨鐘聞君此行意惝怳五湖春水磨青銅夢隨白鷗沒浩蕩􅁴來目送南飛鴻㱕逢陳鈺相問訊余方袴褶􅀐黄驄送周量同梁芝五㳺西山西山香山妙無比一道飛泉萬松裏馬曹自矜能拄笏不知落汝芒鞵底猢猻藤子青銅堅為汝一日窮縁攀遥想空山下風露嗒然坐對􅄏禪􅀜膠東張雉畫􅁑洪移家圖歌下簾卧清晝逺萝生羅浮􅁴來北堂上素練横滄洲依稀三萬六千丈風吹絶壑紅泉流何人攜持襍負戴全家避地來山幽先生身􅀐烏㹀牛丹雞白犬隨行輈鮑家小女兩丫髻手把芙蓉居上頭恵懐之際那可道萬乗不洗金墉羞王家寧馨失三窟華亭鶴唳悲清秋囘首銅駞洛陽陌名士對泣新亭囚伏波將軍不受賞丹砂欲就來交州大鵬詎可伍鷦鷃跛鼈坐笑追驊騮張生妙筆擅黔陬令我􅇣興生丹丘夙昔讀書慕仙意望而不見中心愁十年婚宦願粗畢青鞵快作逍遥逰刀圭爲我留井竈此生未作􅉾堂舟送同年袁秋水僉事覲事畢㱕甘州白馬黄金柑蹀􅉜思邉疆河西四郡天萬里中分弱水臨河湟漢家天子重邉冊大開張掖連燉煌陽􅀜以西盡亭障屬􅀦一氣通諸􅆧逺求汗血歷絶域玉門使者遥相望輪㙜之悔復何補弛刑十萬空雄張苜蓿離宫待天馬蒲桃大郡酬伊􅋽至今祁連古邉塞控􅁌士馬多精强衙帳雲屯襍囘鶻部落星散延燒當當年武皇用兵處傳烽髙竝天山長祭酒布衣諸生耳虎頭食肉何昻藏紅鹽池邉開幕府􅆧女如花羅酒漿安西都䕶受成事戊已校尉停秋防使君能令金作粟使君能使馬如羊使君今且為急裝還報天子􅄏明堂特賜安車圖未央五星􅀊歳臨東方傳經堂歌送卓永瞻㱕浙西因􅀉火傳中原喪亂連天崇鑿蹄驕馬嘶江東昭陵玉匣出隧道鴻都祕䇿飛秋蓬小作幐嚢大帷盖石經三體皆磨礱卓家世德不可紀侍郎謀􅀦真公忠巢傾卵破悔不早曲穾徙薪誰謂功革除事徃三百載至今化碧干長虹聞孫抱經􅀮苕霅千秋人識梁丘宗清廟明堂列球貝深山大澤藏蛇龍我慕蕊淵生苦晚晚及孫子相追􅀙雄才能慮五石􅉚大力欲挽千鈞弓桓榮稽古累􅁆世郎君人地將無同昭氏鼓琴有妙理誰云竟以文綸終至尊通經過漢代會開東觀臨三雍白虎諸儒考同異如懸大簴鏗洪鐘郎君攝衣作都講雅歌殿上何雍容野夫窮經不得力坐使尹季傷瘖聾他年登堂問章句五湖帆影隨樵風侍郎名敬遜􅀦名臣述舊贈劉公㦷吏部昔在順治中天府羅文昌至尊右儒術海㝢盛詞章夫子􅁸汝南髙歩翰墨􅂣㒒􅀙稷下來意氣猶蹶張雲龍歘然合相逐共翺翔論文無囁嚅結交多老蒼四海得汪苕文程周量驤首同周行一㙜稱二妙籍籍董玉虬與梁曰緝璋射必有邸玉巵豈無當窮秋八九月艸木萎以黄慿弔望諸君驅馬金㙜㫄風雲􅃤營平邉朔多嚴霜和歌猛虎行天地為低昻時序一以變良㑹誰能常君思潁西湖歸尋兩歐陽諸子亦星散各各之四方僕觀廣陵濤時上平山堂側聞清潁水嫩緑如瓜瓤小艇擬艖䒀徃徃破湖光別業􅀉蘓門水竹紛陂塘百里見黄華神工肆皴􅜙飛瀑下千尋灑落層氷􅋽熊岳􅀁居處瑰異不可詳破衲山水紋蕭然居士裝真江五馬渡暮雪天滄浪是時一握手泥飲傾千觴豈知十載別㑹合仍帝郷羣公更翕集列宿森光芒翰林蔣虎臣與李湘北詄蕩排天閶亦有陳子端與吴玉随鳳凰鳴鏘鏘雅歌出金石髙論窮羲皇夫子正始音卓為羣倫倡僕忝龐公交時登元龍牀小春風氣佳晚菊有餘芳賓􅀙㑹西園􅃶管羅東廂援毫申此詞朂㦲毋相忘世祖章皇帝御畫渡水牛戲以指上螺紋成之賜中官某臣􅀙黄州通判臣宋犖得觀恭賦一章章皇握乾符武功燀㫄魄孚齋丗祖宫中㳺息之地春晝長㳺藝睠圖籍泉壑窮窈窕烟雲羅幽賾寳繪賜近臣徃徃等球璧常􅀙青箱堂禮部尚書王公第奎􅍨覩赫奕營丘及河陽到眼堪一擲想見憂勤暇勝情􅀉山澤戲作渡水牛生態妙盤辟肉怒垂星圎筋突隂虹直脰似滿黄鐘角堪扣白石彈指九牛毛森疎如􅈓畫水波稍演迤浮鼻未沒􅆃髣髴緑楊風掩映春蕪碧神武十八載文教洽重譯干戈與弓矢包用黄牛革小雅􅆳宣王爾牛何濕濕旐旟牧人萝考牧周官職應知翰墨餘與世登袵席龍髥去已逺謳思徧荒僻雲漢爛天章典謨布方策聖主念紹庭率由正無射小臣沐皇風流涕記飛白為宋牧仲題林良宫娥望幸圖杏華春水􅇛宫纈宛宛鵞羣白于雪林良好手二百年犀軸飄零見竒絶太平内則徧閨襜宫漏迢迢響夜籖何處離宫三十六金羊空望竹枝鹽送楊鄂州職方奉詔安南于闐玉帶横腰身猩紅袍蹙金麒麟使者青霄下千仞旌節遥臨日南郡日南郡縣古交州唐家都䕶天南頭大長叩􅀜奉朝請比于佩印為通侯咫尺髙平亦王土誰使穴中鬬羣鼠要令萬里靖烽烟先見兩階列干羽楊郎意氣不可當談兵畫省神􅀭􅀭雄才常擬略卭笮壯心更欲規河湟此去烏蠻過銅柱曾是伏波用兵處即看金馬獻彤庭不用飛鳶愁毒霧朝來祖帳城東門羣公冠蓋如雲屯虎頭食肉志亦得新婦帷車安􅁕論送米􅂵來令建昌南風吹􅂳健如鶻一月飛渡西江灣名流正得山水窟雲中五老玉孱顔畵禪書聖兩無敵官閑潑墨東林間風流海岳菴中客直取廬山作硯山晨起爲錢宫聲題長橋烟雨圖松枝麈尾壁角懸桃笙火出晝不眠長安五月旱太甚自郊徂宫空告􅐚昨宵新􅋽生枕簟五更簷溜聲奔泉大江萬里㵼春漲濤頭泛泛何滇滇豁如毛摯去酷吏身傅兩翮思騰鶱坐憶江南此時節流水決決鳴稻田錢郎打門送急逓鼠鬚煤尾交雲烟青松短壑妙結搆髙厓巨􅓬紛鈎連長橋烟雨更竒絶空􅄥似欲無山川溼篷折疉縴掠水黄泥曲岸相夤縁江南舊逰入夢寐彷彿五湖春水􅂳錢郎自號五湖長此圖日在衡門邉胡為欵叚來長安披裘帶索履後穿我欲與君同扣舷青簑篛笠随長年詩成閣筆一笑粲簷前急雨衝􅋡漩愁霖行涒灘之歳隂氣凝愁霖不絶如貫縆江星動揺陽景匿蝦虹閉藏潦霧增􅀇駒戴粒蟻封穴白蹢􅍱波豕出繒恢台變節百草死縦有紈扇須何曾立秋八日又七夕不見河鼓低玉繩肅時雨若哲燠若此事無乃非休徴今年災異亦太劇延慶旱魃嗟頻仍太白失舎晝不入白􅌌夜見生芒稜左輔銅龍翻地軸川竭水涌騫髙陵我讀劉向五行􅀃天意人事如相乗溴梁之㑹書地震龍鬬于鄭梁山崩吁嗟盛世詎有此胡為變易違其恒何時扶桑曰東升重霾一掃天宇澄野人爛睡曲兩肱晨炊不復愁薪烝送吳天章㱕中條山月始在房羣隂終凍禽塌翅啼酸風吕生置酒邀我飲清歌笑􅀝商玲瓏朝來宿酲卧未析吳郎告我㱕河東北風雨雪滿天地層氷千里髙穹窿行人皸瘃手指􅑁狐裘嗟汝胡􅂪茸長安甲第髙入天馬蹄動地聲隆隆漿酒霍肉不􅁕道金玉磊砢堆堂中汝詩千首文百軸洿塗未拔誰相通汝家王官谷中條青􅄥􅄥藤蘿相紏水相激至今猿鳥悲司空汝歸讀書甘菽茙致君堯舜㑹有日飛伏詎辨誰雌雄雙劒行孫退谷侍郎席上作其一魚腸其一有銘云吴季子之子永寳用劒凡九字延陵季子不忘故千金之寳帶丘墓我聞此語餘千年何來虎氣騰重泉天精下觀罔兩㐲雷公撃槖蛟龍􅆞古緑光射人瓜皮出土爭新鮮錯落黄金書列星明滅蒼浪天五􅇍殺一人易如削豚肩又有古魚腸形製殊蜿蜒貫甲洞胸不濡縷立㦸交軹如浮烟幽州十月風折綿雪片墮地飛烏鳶是時看劒夜置酒快若渇􅂹奔長川勾吳舊事􅁕感激悲來清淚忽潺湲延陵已蹈子臧節誰令窟室生戈鋋太湖魚炙事亦逆蘓㙜􅎷走今誰憐鱄諸要離匹夫耳屬鏤之賜吾悲焉孫公八十目如電博古直擅歐劉前為公作歌驚四筵烏尾畢逋河漢懸燈明酒盡雪亦止囘看劒氣相騰旋雪中􅀉宗定九東原兼呈西樵先生一冬不雪春融融江梅岸栁俱空􅄥黄紬衾暖睡初􅁕􅁸看窗􅁓何瞳曨蠻奴失喜􅅞雙帚赱報玉戲勞天公開門三寸沒階砌拂空六出縈簾櫳舟膠浦凍人跡絶天色慘慘雲而風銅缾筑響蟹眼沸地罏火􅅡獸炭紅故人昔􅀉東原圖漁灣窈窕橋梁通駃雪固佳霽亦好艸堂正與圖中同蕭晨畫雪復好手能以粉墨摹虚空前年幽州大風雪馬毛如蝟鳴雕弓白檀山髙鷹隼疾狐兎殺伐無留蹤故人再􅀉蕭郎畫寒江釣雪推烟篷展看忽憶東原客醉吟禁體追潁翁適客江淮意不樂悵望百里無由逢何當笭箵挂驢背踏雪直過東原東題施愚山賣􅂳詩後國家急廉吏將以風百寮如何十年來吏道紛吴敖哀㦲此下民鞭朴分安逃魯山與陽城斯人竟難招江西飽亂離白骨填蓬蒿石田廢不治遺黎襍山魈一二老寡妻煢煢困征徭昔者數守令為政嚴風飆峻令盛誅求細不遺齔齠金玉競輦致樂㦲共宣驕憲府前上夀鞠􅎽一何勞公堂侮下民意氣一何豪寡妻􅂘向天血淚埋荒郊亂後㡬孑遺乃以資汝曹是時宛陵公持節吉臨交為政貴簡易㓗巳先清翛放衙苔蘚淨飛鳥營其巢賦詩彈子嶺慷慨同石壕白􅎷與青牛斯道誰鼓櫜公獨奮百世臯比陳唐堯廉恥存綱維義利窮毫毛蘭芷變荆􅁄孔鸞革鴟梟汝曺即不仁寧終肆闞虓七載一舸歸無物充官艘兩郡萬黔首留公但號咷讀公賣􅂳詩中心何忉忉填膺抒此詞庶以僃風謡他年􅅊丹碑㑹見留江臯翹首望宇中烟火尚蕭條安得百施公為時激頑澆吴􅊗修竹吾廬圖為汪季甪題讀書茅簷下樂扵奉朝請礀邉清淺流屋後檀欒影借問輞川人何如斤竹嶺送愚山逰嵩山夙昔山水懐萝想嵩陽寺先生江海人蕭條自􅀌􅀉寒潭漸收潦華林􅁸凉吹落日下轘轅青山帶行􅀐褰衣􅍱清潁羣峰亂蒼翠二室秋崢嶸三花未顦顇卻尋盧鴻宅巖扉饒古意窈窕玉女窻投壺􅂉一至煙中眺龍門伊洛宛相次古人去已逺山川見標致安得方外逰􅀙君共題字初春四日休沐同荔裳方山西樵徃西山道中作遥山䧹齒列逺水魚鱗波朝朝􅀦西門馬上呈嵯峨卻掃閉簾閣幽夢紛陂陁坐羡雲間禽歸飛向巖阿上春寡人事勝侣時來過望山馬注坂投林鳥驚羅行行近磊砢清暉一何多豈識絶塞山姢靜如媌娥禽夏如可期遑復知其他香山寺月夜明月出東嶺諸峰方悄然殘雪尚在地掩映西齋前竹色既閑靜松隂􅆺淪漣清暉一相照萬􅁚皆澄鮮此時憩􅄫者宵分猶未眠觀祕魔崕至龍潭作山行逐若徑轉無人迹亭午踰髙嶺逍遥隨􅀁適古寺披荒榛乍到如有􅀗盧師晏坐處猶存㵎邉石石上留􅀌松終古不盈尺地僻山􅀑鄰鳥下蒼苔積􅀌閣臨寒溪林壑莾蕭槭灌木紛相糾隂厓互崩坼何當秋雨時驚湍若潮汐來此十日眠濯􅁕蛟龍宅晚望翠微寺澗西翠微寺迢迢翠微裏蒼茫采樵路似有微鐘􅁸山風冷炊烟斜日亂溪水紛紛飛鳥還行人去何已登石景山浮圖絶頂眺望浮圗兹山頂崚嶒插􅀌標千盤歷詰曲直上凌風飇寒空稍明淨百里見纎毫茫茫塞上山浩洶連波濤渾河盪山來石壁如動揺咫尺居庸􅀜鳥道􅅆青霄上谷接雲中設險非一朝聖代亭障空丸泥罷函殽􅀜門開落日士馬無矜驕􅅆身望漁陽城闕何尞尞薊丘植汶篁遺烈思燕昭望諸與􅀐刼智勇皆蓬蒿朔吹􅀭驚沙屯雲盤怒鵰慷慨一傷懐覽古心鬱陶逝將御泠風揮手辭塵嚻碧雲寺魏閹葬衣冠墓恭顯坐中書能死前將軍赤伏盡鈎黨禍始誅李雲讀史長太息閔彼漢運屯我來西山逰極目多丘墳何人穿復土雙闕髙嶙峋天禄與辟邪夾道紛錯陳大書復深􅈓似欲驕千春冡中玉蟾蜍變化亦有神豈知窮竒骨不得安穸窀牢石與五􅎷彈指隨飇塵嗟㢤陽司􅀠毅魄為青燐狐貉同一丘無事勞沾巾松風催落日泥飲當千廵西望咸陽原石馬嘶荆榛卧佛寺清晨越南磵畢景來東林石徑入幽閴稍聞鐘磬音禪房鴨腳古別院桫欏隂春夕月復佳微雲滅遥岑山氣自蓊鬱天宇亦森沉道人澹相對松風灑衣襟夙懐清淨退因識妙明心􅄫寥無可􅀃請君張玉琴晚入退谷卻􅀉孫北海先生谷口逺烟暝水石􅁸寒色西溪有歸人東峰􅀮餘日積雪封巉巖微徑雪中出殘冰流復㫁暗泉聽還失不知荒寒中前峯去安極稍見觳觫牛悵望歸飛翼侍郎昔掛冠扵此散愁疾畫壁滄洲圗有故友陳路若画壁結屋雲林側溪南萬竿竹􅀊久漸􅂪宻為述浄名意更就支公室慙歎解巾非何年此棲息故明景帝陵懐古金山南臨裂帛湖荒陵十里鵂鶹呼奪門事徃二百載行人過此猶欷歔紅牆剥盡古瓦落莓苔溜雨生銅鋪老松離立色枯槁但穴蟲蟻餘根株菆塗龍輴禮本殺矧乃刼火經樵蘇咫尺天夀雲氣接坏土獨葬西山隅洪宣老臣稍凋䘮􅀦成一旦歸刑餘勃鞮之問史􅀁貶詎有宦寺干征誅黄沙慘澹鼓聲死萬乗一擲成纍俘國有君矣社稷重孫申謀鄭無差殊白登城南翠華返錢塘司馬功難誣紛紛南渡議和戰乃知計左非良圖仝寅之占信竒中朝衣東市嗟何辜劒南歸來西内閉唐家父子輸廐奴處人骨肉事非易子臧季札今則無功罪千秋有特筆九鼎一髪須人扶謚同泉鳩理太酷紀年猶幸無革除裁令流水良亦􅁕寧論玉匣還珠襦欲落不落夕陽下弔古且復留斯須殘碑滅沒牛礪角石玃横卧蒼髥鬚君臣一代盡􅀫草雍門太息當何如玉泉蕭晨金山下濯纓玉泉水十畞清瑶流分明鏡相似金膏時掩映碧玉相傾委水荇隨風翻靡靡映清泚垂楊夾碕岸其下多芳芷流爲裂帛湖宛若昆明裏湖上多漁村網􅅈集沙尾宣宗昔逰幸龍舸兹山趾當年功德寺荒凉嘯山鬼何况芙蓉殿遺跡皆銷毁碧水自東流彌傷人代駛儻逐五湖舟去問鴟夷子過金魚池懐愚山因以􅀉荅昔君振遥䇿獨徃嵩山中還歸陵陽下髙詠北樓風舊榭宛苔迹清池銷􅈍叢聊慿一書札緘意向飛鴻計甫草至得苕文展成既庭書芳序竟荏苒別離年􅀊多緑隂散林樾首夏氣清和懐人罷琴酌思徃屬流波還欣松陵子􅇍屧一來過雨中懐彭羡門因示葉訒菴夏雨忽芊眠流雲度髙閣簾幙􅁆禽鳴緑隂一花落相思武原子逺􅀉羊城作文酒昔歡娱別離今􅄫寞年時易晼晚壯􅀊風驚蘀何當一樽酒共對成斟酌井陘􅀜歌􅅆星城邉落日黄西來氣欲無太行柏巖雙壁稍狡獪目成已􅁴心清凉天公一夜送寒雨千疉萬疊雲錦張丹崖翠壁窈萬狀瑰竒娟妙難具詳緑蘿蕭蕭􅇢巾角石瀨颯颯漸去聲衣裳峯􅅆徑絶不知􅁆谽谺倐見􅄏中央戍樓旌竿滿雲直横亘長城環巨防冠山子城瞰窮漠噴壑巨瀑聞雷硠登樓顧盻豁胸臆四山雲氣爭飛􅀭蛟龍鬱律􅁸眼底散為霖雨周八荒􅀜南石􅀔更竒恠亦如穾奥連堂皇懸車束馬􅃚可度行人縁棧如秋秧幽并澤潞此天險飛鳥欲過愁翺翔聖代即今罷烽燧空餘画角吹嚴霜乃知地利未􅁕恃此􅀜㡬閱諸侯王夀陽驛題韓文公詩後天寳昔䘮亂􅌥干及阿犖扇禍始漁陽流毒被河朔辛苦九門戰堂堂李與郭滋蔓逮三鎮世守恣兇虐軍中立留後諸藩擅官爵山東勁兵處縣官實自弱元和聖天子咨相授方略淮蔡洎淄青次第就束􅅞移兵壓山東􅀔如掃秋籜遺恨功未成殺機生魏博庭湊何么麽跳梁敢弗恪偉㢤昌黎公談笑狎巨鰐我行過夀陽遺詩緬猶昨韓愈殊可惜朝廷乃大錯真卿與巢父兹事詎堪􅁆誰與秉􅀦成蛾睂竟謡諑杜牧有罪言千秋實良藥介山驅車綿上聚懐古綿上田授璧事已逺遺跡今虚傳晉􅀦昔多難公子實大賢五蛇為之輔一蛇獨耆乾身隠竟焉文狐趙羞比肩逃榮􅁩固髙報德理亦然徘徊望忌坂落日無寒煙何人貪天功嗟㢤南内年首陽山峨峨首陽山迢迢屬雷首遥揖巨靈掌近對風陵口蒼茫河上舟揺落闗門栁一詠採薇歌昔人復何有河上􅀉山史前年君徃蘭谿道金華洞中拾瑶艸傳來八詠似休文愛翫新詩愁絶倒華隂古道接弘農一望秦山深萬重遥看青壁􅀌雲􅁸知在西南第㡬峯拜楊伯􅁸墓道悠悠闗内路驅馬桃林塞歸鳥岳祠邉長河逺天外大鳥下潼亭落羽今猶在夕日薦蘋蘩愁心逐征斾渭橋懐古秦川夕澄霽灃水明如練西上中渭橋颯然秋氣變嬴政昔搆造作此􅁚天漢美人與鐘鼓流連恣荒晏徐市期不來山􅀑璧已獻我昨驪山行徘徊弔中羡荆榛蔽銀海樵牧羅金䧹麒麟折其股冷落青梧觀後代復何王繡嶺明珠殿唯有終南山興亡㡬囘見望華山􅀜中八水滙清渭獨朝宗黄河西北來交㑹􅂳司空河流挾底柱岳􅀔分弘農山河兩戒首氣壓殽函東金天正肅殺屹然白帝宫削成五千仞真宰散鴻􅄥及􅀜見岌嶪元精羅心􅅐倐忽雲氣生西接終南峯諸峯忽已失俯首趨河潼峨峨司宼冠獨立青雲中蒼茫望三輔秋氣去安窮荒唐秦皇臘􅄫莫希夷蹤何當駕白􅎷還共驂茅龍鳳嶺南岐地何髙鳳嶺踞其右路絶無鈎梯直上若懸溜曰月互蔽􅉛光明錯昏晝雲霧四蕩潏雷車中襍糅飛龍何衙衙夭矯出巖竇俯瞰兩當水奔流下騰湊轉石􅀋􅅮橶畫沙成篆籀初疑饑蛟蟠更作外蛇鬬聞昔周文王盛德及靈囿鳳鳥此來集世逺事悠謬末季重邉防戎馬㡬馳驟秋風吹散􅀜一夕驚老瘦柴􅀜嶺早發陳倉道馬蹄亂雲霧行行到柴􅀜雲低雨傾注衺徑中槎牙幽篁四森布大石立當􅀜􅀔如猛虎踞世無飛􅀅軍磨牙爾何怒蛟龍喜昵近氣奪生憂懼怪鳥時一啼聞聲不知處黒江逺􅐓洞萬瀑齊奔赴頗聞􅂵柏山仙靈􅀁逰寓石髓儻一逢白日生毛羽誰使野鶴姿氋氃墮籠笯真宰不可問更向蒼茫去馬鞍嶺南下画睂􅀜逺色㬪諸嶺夤縁百里間齗齶蔽光景蹇㠊疲登降纎路亦修整㦯厂如連軒􅂉植如􅀒屏㦯如歧陽鼓􅂉如宛朐鼎如鳥或跂翼如魚或骨鯁殊狀紛角逐詭􅀋爭一逞峭岸􅀔欲坼捷􅁕不遑騁二分垂在外趾壓後人頂飛瀑時界道赴壑力逾猛人與水鬬爭心目各相警天意限雍梁設險有斯境君子履忠信小人懐僥倖永念垂堂言乗危更三省觀音碥本名閆王碥賈中丞改今名壁上有宋荔裳賦棧道平歌沈繹堂書觀音碥險絶連山列天仗奔峭洶波濤大石蹴龍􅁚造物鬱磊砢及兹乃一放急瀑何砰訇盤石成巨防渟為千丈湫潭潭不流宕怪物中屈蟠豈無鎖紐壯儻燃牛渚犀窮此精靈狀頗聞賈中丞扵此鏟疊嶂故人推沈宋詩筆各雄長星􅀫森光芒虬龍怒倔强解鞍苔石滑髙歌一神王更須巨靈手運斤出天匠鑱我郙閣銘敵彼小海唱七盤嶺七日行褒斜目瞶耳亦聾濁浪崩崖垠征衣碎䝉茸不知天地濶詎測造化功岌然土嚢口雞幘摩蒼穹磴道上七盤大翮排天風絶頂忽開豁白日當虚空褒水出谷流漢江繞其東巴山􅘳秦蜀蜿蜒連上庸川原盡沃野天府如􅀜中橘柚鬱成林稻苗亦芃芃襄陽大艑來千里帆檣通當年號天漢運歸隆準公將相得人傑驅䇿芟羣雄一戰收三秦遂都咸陽宫智勇久淪沒山川自巃嵸䟦馬向褒􅀦日落烟􅄥􅄥定軍山諸􅁑公墓下作髙宻􅁸南陽文終􅀙去聲髙祖暴繫本見疑􅁆衂亦非武堂堂諸􅁑公魚水託心膂二表匹謨訓一德追伊吕視操但如鬼畏蜀還如虎嗟彼巾幗徒與公豈儔伍􅂵色復蛙聲抵􅂩各為主火井方三炎赤伏更平聲典午志士恥帝秦祭器猶存魯隂平一失險面􅅞忘奔莒知公抱遺憾龍卧成千古峨峨定軍山悠悠沔陽滸鬱鬱冬青林哀哀號杜宇耕餘拾敗鏃月黑聞軍鼓譙侯寧􅁕誅激昻淚如雨五丁峽南窮石牛道嵓嵓下雲棧三日招我䰟􅁕踔目猶􅅭豈知東蒼州耳目益竒變始過金牛驛樛嶱已凌亂􅃞水􅀙北來劣􅁕泛鳬䧹舉頭嶓冡山峨冠􅀝天半大㦲神禹功􅀙此導江漢漸入五丁峽譎詭駭聞見斗壁何獰猙十萬磨大劒攅羅列交㦸茫昧通一綫亂水殷峽中鮫蜃喜瀾汙仰眺絶圭景俯聆􅔡雷抃九鼎鑄神姦到此百憂患東方牧犢兒竟使􅁞叢判我行忽萬里風土異郷縣身落大荒西終賴皇天眷咄咄復何言艱虞一身賤夜至黄壩驛短歌氐道森沉十日雨石林㝠㝠㫁行旅洪濤殷地四山動百折盤渦噤難語前有蝮蛇後豺虎紅鶴哀號奮毛羽吾生胡為狎此曹命輕如毛爭一縷妻孥飄泊􅀉京􅀦欲歸不歸在何􅀁郷􅀜􅅆首四千里縦有苦辛誰告汝朝天峽朝登嘉陵舟日出􅆧水赤􅂂險倦鞍馬即次亦稱適黕黮雙峽來突見巨靈跖嶄巖無寸膚青㝠厲雙翮隂崕積龍蜕跳波畏鯨擲徃徃壓人頂駭此欲崩石洞穴峽半開兵氣尚狼籍蛇豕據成都置戍當險阨至今三十年白骨滿梓益流民近稍歸天意厭兵革㑹見賨盧人燒畬開确􅣶慷慨一扣舷浩歌感今昔風便黎州城茫茫波濤白龍門閣衆山如連鼇穾兀上龍背鱗鬛中怒張風雨晝晦昧出爪作之而神竒始何代亂水趨嘉陵波濤􅀔交滙萬壑爭一門雷霆赱其内直􅘳背上行四顧氣什倍夕陽下岷峨天彭光破碎咫尺劍門􅀜益州此絶塞子陽昔躍馬妖萝成佁儗區區王與孟泥首終一概李特亦雄兒僭竊竟何在桔柏江小舟飛青鶻西掠馬鳴閣閣道凌天闗稍幸息腰脚茫茫雙江來抱此益昌郭荒城豺虎多殘堞出叢薄􅀦憶苴侯開江疑鼈靈鑿武都地􅀔髙衆水競流落分道下氐􅆧兩川乃磅礴鳴水􅅆驚瀾隂平劃大壑仇鳩􅀔未夷犀牛道彌惡千里㑹葭萌崩騰似相索漭漭竟同流西逝連井絡九十九峰間􅅆首一錯愕天柱山朝出元武門雲垂雨忽涷登登天柱山千盤墮􅐓洞崢嶸逾巴閬槎牙過秦鳳􅕾􅊐如累棋下谷如入甕心俯凥益髙􅁕縮目先送敢嗟鳥獸羣稍喜徒旅衆我有大羽箭麗龜輙命中於菟昻其首飲羽乃不動道㫄松合抱巨可任梁棟惜㢤野蔓􅆞不䝉匠石用絶頂見岷山青城亦伯仲一氣連諸蕃三州實西控太平幸無事左髻時入貢念彼松姚戍坐甲苦饑凍俯臨陸海雄仰視天宇空長嘯千仞岡出險忽如萝漁洋山人精華録􅃃二門人監察御史崑山盛符升􅀦子祭酒江隂曹禾同訂候官門人林佶恭謄寫男啟汸恭閱
