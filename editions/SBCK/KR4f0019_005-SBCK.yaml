front:
  text: 漁洋山人精華録卷五門人候官林佶編
  hash: sha256:59e9347a23cc98fe2ad828f2ec5f3538940488862202fd6a32da3a0aea4c30a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_005-1a}
body:
  text: 今體詩清明後三日鄒平西郭賦詩雨歇西原上鶯花事事妍青山環縣郭白鳥破溪烟墟落明流外園林霽景前永懐蘭渚客行悵暮春天􅁞詞四首青青桑葉映廻塘三月紅􅁞欲暖房相約明朝南陌去背人先祭馬頭娘戴勝初來水染藍女桑濃葉滿江南誰家少婦青絲籠知向香閨飼女􅁞玉蛾飛飛金繭酥􅁞時幾日閉門樞白葦與儂作璘藉黄金與儂作踟躇鳩鳴屋角桑葉低三眠四眠􅁞始齊小姑嬌小好閒事簇􅁞學罷學添梯山􅁞詞四首清溪槲葉始􅄥􅄥樹底春􅁞葉葉通曾說􅁞叢蜀道險誰知齊道亦􅁞叢􅃚問􅁞奩更火箱春山到䖏是􅁞房槲林正緑􅎛園碧閑却猗猗陌上桑春繭秋絲各自諳一年三熟勝江南柘􅁞成後寒􅁞續不道吴王八蠒􅁞尺五竿頭絡色絲龍梭玉鑷動妍姿紅閨小女生來慣中婦流黄㝎未知雨止碧漢歇微雨美人横素琴窗前明月影洞口緑蘿隂丘壑結遥想茅茨清道心稍聞西澗水寂歷響空林阮亭秋霽有懐西山􅀉徐五􅀌亭新霽後藤竹夜凉生忽憶西峰寺曾經采藥行夕陽雲木秀秋雨石泉清不見烟霞侶相思空復情南唐宫詞六首細雪霏霏落院門金鋪鴛甃早黄昏宫中玉女隨君側􅅮得春氷帶爪㾗曾邀醉舞􅆺君王鬢朶珠翹別様妝紅燭當筵新破就更將金㞕譜霓裳簟錦鸞綾萬卷殊澄心堂裏皁羅㕑保儀玉貌空傾􅀦妙􅃟深宫但掌書御溝桃葉水潺潺姊妺承恩并玉顔花底自成金葉格宫中齊唱念家山花下投籖漏滴壺秦淮宫殿浸虚無􅀙兹明月無顔色御閣新懸照夜珠重午龍舟嵗嵗陳䡖鳬飛燕各如雲瓦官閣下黄花漲別有凌波水上軍聞雁縹緲凉天􅁆䧹鳴㡬家砧杵􅁸秋聲懐人江上楓初落卧病空堂雨易成尺素經時常北望暮雲無際且南征沅湘一帶多兵甲莫動髙樓少婦情蠡勺亭觀海二首和家兄西樵春浪䕶魚龍驚濤與漢通石華秋􅊌雪海扇夜乗風徐市荒唐後秦臺滅沒中扶桑試晞髪朝日萬山紅吾廬臨少海及此更空蒼飛觀圖雲氣靈槎著日􅅖十洲真浩􅄅六博􅁕翺翔乘蹻何年去重來覽下方秋暮與家兄禮吉叔子小飲有懐蕭瑟秋為氣凋蘦始欲愁酒人方落魄名士半離憂桂樹猶招􅀮雲旗未逺逰吾曹如野鶴偃蹇待浮丘秋栁四首秋來何處㝡消魂殘照西風白下門他日差池春燕影祗今憔悴晚烟痕愁生陌上黄驄曲夢逺江南烏夜邨莫聴臨風三弄笛玉􅀜哀怨總難論姢娟凉露欲為霜萬縷千條拂玉塘浦裏青荷中婦鏡江干黄竹女兒箱空憐板渚隋堤水不見琅琊大道王若過洛陽風景地含情重問永豐坊東風作絮糝春衣太息蕭條景物非扶荔宫中花事盡靈和殿裏昔人稀相逢南雁皆愁侣好語西烏莫夜飛徃日風流問枚􅅩梁園囘首素心違桃根桃葉鎮相憐眺盡平蕪欲化烟秋色向人猶旖旎春閨曾與致􅆞綿新愁帝子悲今日舊事公孫憶徃年記否青門珠絡鼓松枝相映夕陽邉息齋夜宿即事懐故園夜來微雨歇河漢在西堂螢火出深碧池荷聞暗香開窗鄰竹樹髙枕憶滄浪此夕南枝鳥無因到故郷采􅐜曲四首湘湖雉尾蓴郅支馬肝石采蓴作蓴羹底用作方伯不食上湖荇但采下湖蓴縁流棹歌去西風愁殺人采蓴臨淺流采蓮在深渚歡似蓴心滑􅃚識蓮心苦蓴絲何􅆞綿柔白勝玉臂持作千里羹朝朝下鹽豉即事作二首草堂殘雪後不出系南邨暮鳥常穿屋寒家少候門讀書慕終古養疾樂丘園顧巳慚通􅀮浮沉莫更論二十偶通籍三年歸舊林聊知返初服豈敢謝朝􅆪遯跡思壺口忘機憶漢隂終當與嘯父天路試相尋讀史襍感八首王謝烏衣六代同名家龍虎盛江東可憐東邸鑾輿出僕射終當愧侍中過江名義共推􅀽宋室􅀌臣念愍孫千古消䰟石城曲司徒家世本陽源鑿地蓮花映雉頭卻忘鼙鼓下荆州白門一决須臾事枉向宫中拜蔣侯結髪􅀙戎老戰爭揮鞭立就十三城凉風堂側桃枝戲絶勝平陽九道兵江陵士馬控西疆坐使吹脣沸建康湘土尋戈同氣盡卻教􅅊粲死青塘殿中擁槊唱無愁江左重開南豫州十萬敵軍齊北􅂘至今淝水不曾流汾上軍書夜刺閨天池較獵未言歸不愁粉鏡匆匆去更語官家殺一圍芳華苑裏奏名倡積翠池邉舎利裝衍得魚龍新散樂大家恩賜學曹王雪後荅東癡見憶之作昨夜東􅆏雪慿誰問􅀮居不知髙卧者􅀊杪意何如井邑頻憂稅溪山早著書因垂椘蘭咏吟望一愁予雪後懐家兄西樵竹林上斜照陋巷無車轍千里暮相思獨對空庭雪別萬大屏楊勝林別鶴念湖海離羣秋夜心風聲鄖口暮江色禦亭深去路分吴椘相思各滯􅁋闗門今夕雨蕭颯動寒砧法慶寺閣上望雲門山祗園有珠閣髙出碧林端落日眺平椘青山生暮寒㱕雲天際去逺樹坐中看今夕雲門月無人照戒壇即目蒼蒼逺烟起槭槭疎林響落日􅀮西山人耕古原上滸山道中㫁靄望沉沉闗河􅀊暮心蒼山連凍浦雪屋入寒林鳬䧹荒陂晚雞豚古社深墨王亭畔路載酒憶登臨南園池上清言不􅁴暑纎月生西林苔徑少塵色夜猿清道心漁樵晚多侣風壑靜同音㑹學涓髙術隂潭鳴玉琴阻雨望醴泉寺用徐昌榖韻誌公飛􅃬處巖壑至今深􅄅􅄅青山路蒼蒼修竹林法雲懸瀑影幽鳥亂泉音自歎塵中駕空勞出世心題廸功集昭代嬋娟子徐卿雅好文稱詩如典午譚藝似參軍􅇴落雲霞質飄揺鸞鶴羣祗應禹洞裏靈蹟待夫君􅀉董樵聞卜崑嵛宅棲遲嵗㡬更人烟分蜃影海嶠出秋晴島屋閑垂釣山田晚罷耕多君離亂日白社獨逃名題公㦷蘇門圖卷曾學如鸞㫖心懐汲縣逰秋清嘯臺月竹映百泉流小􅀮何年卜名山一卷收聊當共嵇阮把臂向林丘紀事天夀蒼凉石獸陳荒原驚見翠華春君王淚灑思陵樹玉盌金鳬感侍臣髙郵雨泊寒雨秦郵夜泊􅂳南湖新漲水連天風流不見秦淮海􅄫寞人間五百年淮安新城有感二首澤􅀦隂多暑氣微一城烟靄晝霏霏春風逺岸江蘺長暮雨空堤燕子飛四鎮蟲沙成底事五王龍種竟無歸行人淚墮官橋栁披拂長條已十圍開府當年據上㳺建牙賜爵冠通侯即看別院連雲􅁸更引長淮作帶流荒徑人稀鼪鼬嘯野塘風急荻蘆秋永嘉南渡須臾事􅃘向新亭問椘囚江上􅀉程崑崙二首白浪金山寺主山鐡甕城故人今不見楊栁作秋聲江北望江南祗隔江津水日暮寒潮生愁心滿揚子余澹心􅀉金陵詠懐古跡詩卻􅀉二首千古秦淮水東流遶舊京江南戎馬後愁殺庾蘭成鍾阜蔣侯祠青溪江令宅傳得石城詩腸㫁蕪城客再過露筋祠翠羽明璫尚儼然湖雲祠樹碧扵烟行人繫䌫月初墮門外野風開白蓮青山晨雨過青山漠漠寒烟織不見秣陵城坐愛秋江色江上吴頭椘尾路如何烟雨秋深暗白波晚趁寒潮渡江去滿林黄葉雁聲多即目蕭條秋雨夕蒼茫椘江晦時見一舟行􅄥􅄥水雲外皇厰河鳬雁被沙洲沿􅋡一徑幽萍花紛曲岸竹色壓廽流晚鼓滄江戍人家白板樓好乗瓜蔓水溪上問漁舟雨後觀音門渡江飽挂䡖帆趁暮晴寒江依約落潮平吴山帶雨參差沒椘火沿流次第生名士尚傳揮扇渡踏歌終怨石頭城南朝無限傷心史惆悵秦淮玉笛聲曉雨復登燕子磯絶頂岷濤萬里望中收振䇿危磯最上頭吴椘青蒼分極浦江山平逺入新秋永嘉南渡人皆盡建業西風水自流灑酒重悲天塹險浴鳬飛鷺滿汀洲􅀉一靈道人即翁山聞師江海去㡬日剡中還昨朝逢越客知下沃洲山題徐半山山居圖先生竟學道自製水田衣獨卧寒林靜故人相見稀晚凉松鼠落曉日竹雞飛亂葉千峯裏行歌何處㱕登金山二首振衣直上江天閣懐古仍登海嶽樓三椘風濤盃底合九江雲物坐中收石簰落照翻􅀌影玉帶山門訪舊逰我醉吟詩最髙頂蛟龍驚􅁸暮潮秋三山縹􅄅望如何有客褰裳俛逝波絶頂髙秋盤鸛鶴大江白日踏黿鼉泠泠鐘梵雲間出歷歷帆檣檻外過京口由來開府地不堪東望尚干戈丹陽二首夜火丹陽郭移舟暫解維川塗紛雨雪彌望逺凄其戌鼓蘭陵鎭荒烟􅁑令祠五湖行漸近杳杳欲何之曲阿後湖路百里望南徐解䌫􅀙漁父臨風誦卜居庱亭朝射虎練水暮觀魚如此堪終老窮愁悔著書潤州懐古二首椘雲直下大江流鐡甕城髙落木秋宋帝南徐猶作鎮蕭公北顧更名樓江山勝蹟畱三􅀦海道烽烟動五州見􅀃孫盧西犯日青燐白浪使人愁興亡六代已銷沉對此茫􅃼思不禁黄鵠山頭寒雨暝佛貍帳外暮濤深兵聞北府千年勁雲入西津一片隂興劇且傾京口酒三山披豁􅁕開襟焦山曉送崑崙還京口山堂振法鼓江月挂寒樹遥送江南人雞鳴峭帆去海嶽菴拜蘇米二公像前輩風流地為菴易研山淨名猶故蹟磨衲識清顔江月長如此髙人去不還惟應餘翰墨終古照人間瓜洲渡江二首昨上京江北固樓微茫風日見瓜洲層層逺樹浮青薺葉葉䡖帆􅁸白鷗􅀭子橋頭雞未鳴瓜洲城外日東生風波不憚西津渡一見金焦雙眼明吕城雪霽二首雞鳴吕城鎮日出市橋東雪屋􅅆汀口􅈣檣野竹中鳥飛皆貼水舟泛若乘空古蹟成荒壘行行慨阿䝉午夜雲陽道扁舟狎老漁神亭雪㡬許直瀆路何如烟水懐前侶江湖未㝎居㫁橋叢樹裏何䖏卜吾廬舟暮向晚金牛道林寒響宿禽雪晴烟樹小日夕竹園深川路通蕭港扁舟動越吟蘭陵今夜酒無􅃚故郷心滸墅舟中眺陽山殘雪日出陽山外參差見㡬峰依稀露烟靄窈窕明雲松忽憶梅花發清溪深萬重扁舟欲乘興杳杳暮天鐘虎丘闔廬霸業夕陽沉鐘梵空山自古今劍去虎丘青嶂在水枯鶴㵎碧苔侵吴宫歌􅊌聲猶苦越絶書成怨不任惟有生公臺畔石年年白月照禪心闔廬墓劍池春日水清虚石壁臨風弔􅛶廬於越行成誰狡獪夫椒徃事重欷歔飄零王氣傳金虎􅄫寞空山葬玉魚太息恩讐竟何在荒臺青草認姑胥姑蘇懐古三首爭長黄池未濟師餘皇舟已徙熊夷山川終古迷商魯花草千年怨種蠡故􅀦魂銷吳苑水行人腸㫁越溪絲竹枝聲裏春將盡破椘門東暮雨時斜日停橈喚奈何横塘聲􅊌采蓮歌青山古道通閶􅛶綠黛春風憶苧蘿廢苑愔愔花欲暮長洲淼淼水空波千金枉鑄鴟夷像鳥自髙飛避網羅山徑何時葬玉鳬興亡轉瞬日西徂越人已自籌三䇿秋祭當年竟五湖雨過麋城空碧草春深鶴市半青蕪傷心更有南陽宰不獨寒潮泣子胥文種歎曰南陽之宰而為越王之禽夜雨題寒山寺􅀉西樵禮吉二首日暮東塘正落潮􅀌篷泊䖏雨瀟瀟疎鐘夜火寒山寺記過吴楓第㡬橋楓葉蕭條水驛空離居千里悵難同十年舊約江南夢獨聽寒山半夜鐘虎山擅勝閣眺光福以雨阻不得徃虎山橋畔盡層松掩映寒流古寺紅卻上重樓看鄧尉太湖西去雨􅄥􅄥雨夜宿聖恩寺還元閣梅樹初花石㵎流滿山香雪送行舟三更蕭瑟湖邉雨百尺髙寒水上樓師子窟中嵐翠合法華山外暝烟收霜天欲曉鯨音􅁸萬壑聲􅀙何處求山中􅀉叔子時阻雨滸墅平生兄弟逺逰心世外􅀇棲約共尋澗道名花任開落湖天春水半晴隂何山徃事思求􅀧五嶽前期􅀒向禽遥憶􅀌篷宿烟雨青芝南望白雲深鄧尉竹枝詞六首二月梅花爛熳開逰人多自虎山來新安塢畔重重樹畫舫青油日㡬廻鄧尉山頭片雨晴司徒廟下晚潮生卻登七十二峰閣玉柱銀房相向明西施洞望米堆山夕翠朝烟擁髻鬟不道鴟夷曾載去至今人在五湖間西來銅井又銅坑山􅀔髙低有二名試上龜峯光福塔白波翠巘兩邉生楓橋估客入山來艓子多􅀙木瀆開瑪瑙氷盤堆萬顆西林五月熟楊梅緑黛遥浮玉鏡間峰巒千叠水彎環居人卻厭真山好􅀽墓南頭看假山題春申澗桃夏遺宫廢章華蔓草深但餘流水意如聽女環琴春申澗上望澗亭邉野望新明流秀嶂碧粼粼青山終古連秦隖珠􅂂何年問椘人氷雪倒懸三峽水風烟遥接五湖濱李園已事成荒草太息空祠一愴神恵山下鄒流綺過訪雨後明