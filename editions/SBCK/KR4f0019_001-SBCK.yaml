front:
  text: 漁洋山人精華録卷一門人􅃸官林佶編
  hash: sha256:bae2c5268a8f383f0388547c46d9c5b1f2ed9441240907055557b4cd08293dbf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0019_SBCK_001-1a}
body:
  text: 古體詩對酒對酒歌慨慷自我屬有生共得睹太平皇帝陛下惟樂康宫府治丞相無私人諸諌官彈射姦慝咸有直聲自中丞刺史良二千石各各有廉名日南交趾皆我郡縣蠻夷君長以時稽首殿庭屬􅀦具為令文笥生翠来王京幸太學三老而五更遂賜民爵一級存問長老遣都吏循行大酺十日除宫刑美人曼夀百室豐盈慕容垂歌三解慕容初入鄴已有虎狼志前驅丁零部後面鮮卑􅀐燕燕尾涎涎飛飛啄塘蒲三原隔五􅉄緩急當奈何慕容在何許已度凉馬㙜饑鷹掣鞲縧一逝不復歸白紵詞三首江南煙水多白鳬羣飛啞啞烟際呼美人窈窕為君娱蜀羅吴縠曵華裾修睂星的妍且都明鐙遥映丹脣朱清歌錯落大小珠折腰流盻意態殊乍進欲退心躊躇芙蕖灼灼􅅆雙趺仙珮丁丁鳴六銖燭殘月暗漏滴壺宛轉為君開繡襦青春遥夜開華堂綺羅絃管東西廂阿誰公子淮南王美人家本邯鄲倡合蟬墮馬耀明粧􅁸舞為君陳樂方翠曾參差烟際翔鸞驚龍婉相頡頏西城北里各擅􅂣羅褏文巾紛御香明眸善睐含流光舞罷雲中􅀌月凉若耶溪水勝瀟湘越川佚女春浣香織成白紵氷雪光上爲舞衣下舞裳大秦珍珠明月璫崑山玉撥映金梁齊琴趙瑟聲鏘鏘七鞶妙舞紛相當須臾璧月沉西方汝南鳴雞啼曉霜今我不樂去日長裴囘念此摧中腸翡幬翠幄陳髙堂請君安坐樂未央擬美女篇洛濱風日好美女出相望瑶􅁚飾香轂玉􅋴鳴鏘鏘采春蘭阪上弭葢衡臯􅅖龍輔節纎􅇍鶯珠結明璫借問女誰氏少小生平陽大姊入後宫次姊瑯琊王小妹雖不貴夫婿直東箱出入冠鵔鸃天子侍中郎檻衣萬錦費騕褭千金裝容華誠自惜貴盛寧易詳洛水正微波明瀾一何長川路西南永扁舟不可方􅀉語盛年子顧義慎自防擬白馬篇駿馬生代北少年出幽并結束各光采􅃌顧風雲生朝逰屬玉觀夕􅀫衞承明身逐􅀌兒隊名􅀠羽林兵行行南山獵意氣何縦横蒼隼决雲來飛矢逆風鳴大澤鸘鵠遒深雪狐兎驚􅅆瞻鸛雀門突兀與雲平鞍馬倐来㱕􅀔若浮烟䡖昨夜羽書至貳師出邉庭上馬別妻子鳴鏑追前旌舊随冠軍伍復此河源行大漠少行人深谷多鼯鼪朝飲沙上泉夕戍雲間城左頋疏勒服右盻伊吾清無令都䕶將􅀜外獨聲名自石槗尋黛溪遂至摩訶峯下日落山氣凉清流自􅅆轉窮源不知勞漸忘溪路逺幽石各奔峭修樹亦婉孌遥睇徑難測􅅆矚途屢變􅄫歷衆山響蕭條晚風善微徑暮樵出懸崖歸鳥見須臾夕霏收殘陽四山徧新月忽清􅀭餘霞自舒卷稍覺􅁑衣輕幸藉􅀌笻健平生丘壑人兹言庶能踐由栁菴踰西山最高頂至醴泉寺拜范祠清境難久留申旦戒徒御引領睎前峯抗策辭東路􅁆武即嶇􅋂危蹊少安􅇍顧盻見百里雲日􅆺烟樹慿髙俯澄湖風帆競􅀌鶩晴旭移峯巔明晦變已屢褰衣入空翠溪流􅄅南注槮疎曠逰眺蒼􅃼失昏曙東山清風来西澗凉雨度澄潭益蕭瑟㳺鱗紛散聚前賢跡已逺山川緬猶故夙昔思古人三歎讀書處醴泉謁誌公像觀唐碑碑開元三年乙卯立早讀神僧傳緬希誌公迹劍水蹤已遥鍾山事成昔豈知常白峯留此千年石鳥爪帶銅緑鏡面􅉷蘚碧磨滅開元碑蟲鳥紛難譯披蘿究遺文剥苔理殘畫斷闕發聞見樵牧增歎惜陸銘圯寒冡王碑委荒僻廬陵傲珠犀東武比博奕淪棄多名珍何憚窮鉤索一勺醴泉氷供此風雨夕神價傳誌公面􅉷徹如鏡手􅁕皆鳥􅀲碑有云陸倕製銘于冡内王筠勒碑于寺門皆與傳合醴泉寺髙閣瞻眺有懷范文正公風雨湖上来蕭條灑飛閣殷雷􅁸睂際極目窮寥廓遥天壓煙水空濛氣磅礴大澤盤蛟龍斜風偃鵰鶚郤眺鴻濛中日光逺􅅆錯草木暗四山急淙鳴萬壑悵然思古人大雅何時作書堂絶澗已千仞磴道仍九盤􅀡上若懸溜繦屬􅀔難安右顧踐􅎷跡左顧憑鳥翰日落空山中蕭然風氣寒精舍壁間出洞門天際看竒石壓巖户􅀌立何㠝岏突兀抜㵎底窈窕凌雲端入門度飛梁􅅖夕聞驚湍幽軒宛初搆几榻皆峯巒頗意雷雨時雲氣生户間諸天發鐘磬星斗方䦨干惆悵此靈境睪然懐懶殘復雨花枝濛濛日將暮䬃䬃凉飇􅁸庭樹雨腳射地晝隂晦急溜鳴簷不知􅁆連年左輔嗟大無有蜚多麋仍屢書良民重累背郷縣奸民攻剽成􅍉苻天南干戈未寧息男罷農耕女廢織長沙江中多戰􅂳祝融峰頭尚兵革羽書日曰下山東秸秷轉輸動千億苦竹黄楓猿晝啼舟子征人少顔色掘冡鑄幣既不能展轉呼天猶力穡今年稍稍宜雨􅊙黍稷撲撲稻葉長長官鞭朴那敢避努力公家輸酒漿和窟室畫松歌黄門園中有窟室背枕亞禄山名臨滄溟石壁磊砢一千丈入眼髣髴生精靈横壁老松誰􅀁作海風怒攫山欲傾盛隂五月凛霜雪怒姿萬變盤雷霆疑是溟渤含日氣不然天上来星精我来盛夏變冬序白晝慘淡生晦㝠顚毛亂􅃌舌上撟寒肌􅁸粟心骨驚上下蒼茫有神鬼左右騰跳飛鼯鼪江南吴生昔為此一一下茟皆龍形昔者吴道子畫壁天宫寺將軍劍舞何蔚跂興酣筆落氣磅礴萬夫動色嗟神異吳生畫松已百載鐡榦霜皮終不改南榮􅤱背亦吾儔偃蹇龍鱗好相待蠡勺亭觀海登髙丘而望逺海坐見萬里之波濤長天寥廓雲景異春隂偃蹇魚龍髙怒潮乘風立千丈虎蛟水兕紛騰逃羣靈潛結萬蜃氣一痕未沒三山􅎛須臾􅀔盡潮亦止波淡天清靜如綺菱苔沉緑紛塘􅉾螺蚌揺光散沙汭參差島嶼羅殊􅏾紛如星宿秋天裏擊我劒聽君歌有酒不飲當奈何日主祠前水蕭瑟仙人臺上雲嵯峨羡門髙誓不可見秦皇漢武􅆰經過祗今􅃌顧傷懐抱黄腄㡉缾盡荒草人生快意無㡬時明鏡朱顔豈長好吾將避世女姑山不然垂釣蜉蝣島周文矩莊子􅀃劒圖後有董宗伯書說劍篇古今人物畫手誰第一晉有衛協吴曹興南唐周生更竒雋行筆瘦掣姿崚嶒此圖在世踰千載墨光黯淡生光晶君王隠逸各有態􅁞絲烟篆交􅅆縈目瞋鬢穾五劒客短後之衣曼胡纓二人㫄立目左顧劒如星日光縦横昻首右顧者三士二人按鐔神欲生一人㧞劒作虎􅇍怒如截兕吞長鯨使筆如劒劒氣出此公無乃􅀎鐡兵莊生􅀃劒固豪快十􅇍千里無留行千年竒論佐竒筆揮毫潑墨皆飛鳴雲間墨妙更遒絶鍾王腕底紛鬬爭自云昔見吳興書􅀃劒恨不作圖雙妙并今逢此卷信神物又恨作書非趙卿徘徊三歎出金石煥然妙蹟如神明我聞周生妙得後主作字法秋胡謝女風格清秦淮花月汴京土感此傷人今古情宣和御藏文矩有秋胡故實謝女冩真等圖冬日偶然作四首太史下􅁞室坎􅇄誰見知發憤傳貨殖千古同悲噫郭縦出鑄冶翁伯􅁸販脂灑削既鼎食胃脯亦連􅀐志士守蓬蘿不如交馬醫索帶披敝裘不如規魚陂我愛灌仲孺意氣薄雲天長嘯入吴軍􅃌顧堅壁穿長㦸鬱龍蟠怒􅀐如風旋聲名冠諸侯皆曰夫夫賢魏其􅀔既落田氏寵益専朝請考工地夕奪城南田丞相故賓客顧盻忽屢遷笑罵顧四筵殊不􅀡一錢當時膝席子岌岌皆危冠鄭季有孽子少小為人奴騎􅀙平陽主給事建章居朝拜大將軍封矦詫鉗徒遂復還尚主賜第耀通衢隴西老飛將猿臂雄萬夫白首不得侯心折幕府書誰能對刀筆臨風自􅂢軀天道有如此千古同欷歔吾家有方平雅志託林壑拂衣早歸耕貂裘行採藥卜築沃川墅垂釣上虞郭􅊬矣孔阮儔遐㦲箕潁樂瑯琊多龍鸞羡此雲中鶴春不雨西亭石竹新作芽逰絲已􅇢櫻桃花鳴鳩乳燕春欲晚杖藜時復經田家田家父老向我􅀃榖雨久過三月節春田龜坼苗不滋猶賴立春三日雪我聞此語重嘆息􅇤土年年事耕織暮聞窮巷叱牛㱕曉見公家催賦入去年􅊙雨幸無愆稍稍三農􅀗晏食春来榖賤復傷農不見饑烏啄遺粒即今土亢不可耕布榖飛飛朝暮鳴舂莩作飯藜作羹吁嗟荆益方用兵􅁞租行十解丁酉夏有民家養􅁞質衣釧鬻桑而催租急遂縊死其夫歸見之亦縊王子感焉作是詩也陽春三月時􅁞子何蠕蠕三日出奩中五日徧籧篨一解東鄰有少婦養􅁞方一塸夜夜伴􅁞眠桑葉恐不周二解朝出南陌頭猗猗望桑柔亦不見桑柔椹子醉鳲鳩三解㱕来見􅁞饑徘徊當奈何脫我耳邉􅁫鬻我嫁時襦四解阿夫持襦去里正持符来漢中索軍租不得還顧私五解里正且上坐黽勉具晨炊但緩一月餘􅁞成賣新絲六解新絲亦難賣新榖亦難􅀵不見馬上郎雉尾紅錦裘七解再拜謝里正丈人且旋歸鬻我嫁時襦脫我耳邉􅁫八觧􅁞應黑瘦盡軍租持底當痛􅂘視􅀌兒畢命朱絲繩九觧阿夫還入門不復見故妻生既為同衾死當携手㱕十解懐古詩三篇魯仲連陂七雄既龍鬬陳寳㱕嬴秦師出函谷闗六􅀦咸逡廵邯鄲日夜急咄嗟誰解紛蕩隂師既頓新衍謀豈倫先生畫竒䇿長揖平原君僕妾愧萬乗大義明君臣縦横􅁆千言顧卻虎狼軍功成不受賞飄然㱕海垠蹈海既髙義肆志寧辱身至今齊趙士倜儻希清塵我来古陂上遺祠蔓荒榛甓道竄蒼鼠天風吹白蘋緬懐田巴語景行跂千春顔斶墓末世寡尚志薄俗希乗軒豈不貴纁帛形役神不全吾髙顔夫子抗節藐齊宣鐘簴寧􅁕論殿上呼王前晚食與安􅇍詎以榮利遷監門良自賤趨士理亦賢俯仰二千載弔古悲荒阡墟墓絶樵採清風激頽頑古道􅊬難作悲㦲東逝川轅固里漢初尚黄老儒術闇不章齊魯誕諸儒五經如載陽遐㦲清河􅀓卓爲羣倫倡抵掌論湯武大義非荒唐曲學誡孫弘微言詒后蒼訓詞列學官星日同琅琅我生暌千載桑梓寧異郷寤寐思哲人流風一何長生慙齊魯學私淑附師􅋌苦寒行逺逰漁陽城飲馬滹沱􅎠河朔恒苦寒日夕風鳴悲悲風􅁸廣塗霜霰凋人衣欲渡川無梁層氷何壘壘鴟梟鳴枯楊豺虎交路衢深谷多猿猱得食歡相追我行􅀊既晏十􅇍八九迷他郷少親故相逢知是誰憂愁鑠肌骨自顧顔鬢衰俛眎飛蓬根随風時轉移我獨久伊鬱嵗暮􅆰徘􅆦􅀉語後来人逺逰不如歸梁曰緝為言輞川雪中之㳺少志愛山水夢想懐藍田終南西峯下水石餘清妍憶昔維摩詰于此曾挂冠揮手謝時輩草堂常晏眠輞水遶舍下湖光明雲端繩牀間藥鐺清齋日蕭然春鷗漸矯翼夏木紛綿芊時尋名僧㑹自泛湖中􅂳嘆息古人沒風物随變遷仙令妙文筆慨然追昔賢積雪曜巖阪秀色曖林巒􅁆里入谷口石流已濺濺水鳥相哀鳴雙垞􅄅人烟却登華子岡輞水猶淪漣花竹散巳久亭舘供諸天王裴杳千載丘壑亦凋殘来者復為誰斯言良􅁕歎慈仁寺雙松歌贈許天玉我昔登泰山舉手攀秦松東南雲海幾千里夜懸日氣開鴻濛山人出山已三載復見金元雙樹在玃髯石骨青銅姿古貌荒唐閱人代長夏蒼蒼秋氣深風来絶磵蛟龍吟仙人五粒不可見但有􅀇鶴来徃飛隂森蚴蟉詰屈宛相向千曲盤拏氣初放一任支離㧞地生那須夭矯排雲上我來髙枕石壇邉耳畔徃徃聞驚泉白日沉沉不到地颯然雷雨生􅆰天煙色欲暝鐘復􅁸雄談岸幘波濤駛千秋萬􅀊知者誰閩海竒人許夫子洗􅁚行水􅀜蒼蒼栁隂碧寳馬流􅂫紛絡繹日中傳呼洗􅁚来玉河波射􅃢瑚赤須臾鉦鼓干雲霄萬夫聲寂如秋宵虎毛蠻奴踞􅁚頂丘山不動何岧嶤岸邉突兀二十四􅀡下波濤若崩墜縦横欲蹴黿鼉宅騰踏還成鵞鸛隊乍如昆明習鬬戰萬乗旌旗眼中見又如列陣昆陽城雷雨行天神􅀑驚奴子胡旋氣遒壯忽沒中流狎巨浪撇波一躍萬人呼幡然卻出層霄上今年丞相收夜郎扶南盤况求王章逺随方物貢天闕屹然立仗金階㫄聖朝自不貴異物致此亦足威遐荒黄門鼓吹暮復動海立山移浩呼洶大秦師子多威神山林豈是天家珍題趙澄仿王右丞羣峰飛雪圖寒色㝠㝠下巖壑千峰萬峰雪初落瀑布無聲溪澗凍紅樹微茫敞􅀌閣閣中有客方緼􅂁當盃氣與蒼山髙遥看飛鳥落何䖏如聞落木鳴東臯崖横路㫁少人跡稍見老樵下巖􅂩髙低逺近一溪通晦明合沓千重隔右丞昔日居藍田山水落筆窮自然雪岡漁市盡髙妙欒瀨欹湖紛眼前此圗曾入宣和譜董巨荆􅀜焉􅁕􅁆兵火相尋六百年玉躞金題幾更主雪江老筆妙入神臨摹古本幾亂眞即教唐宋多􅀎手未必常逢如此人􅀓侯天馬歌􅀓侯天馬身八尺風鬃卓立雙瞳方赤毛朱翼信龍種神姿磊落形昻藏来􅀙流沙􅍱西極玉山之禾偶棲息意氣生能䡖虎兕驍騰未屑循羈勒四蹄鳥爪如鋼鈎經過千里風颼颼虎身壯士控不得仰眎閶􅛶浮雲愁昔日湖南始征戰軍中驊騮號百萬此馬振鬛始一鳴歘如天上驚雷電一􅀙罷戰歸中原三年不復􅀙櫜鞬漁陽落日下白草壯心更欲窮河源安得此馬飛上天不須萬里遮窮邉即看郊祀陳天馬何減登歌太乙年抱琴歌為鄺露作嶧陽之桐何牂牂緯以五絃發清商一彈再鼓儀鳯皇鳳凰不来􅀆我心悲抱琴而死兮當告誰吁嗟琴􅀆當知之宣和御墨枇杷圖歌盧橘蒼蒼横幹􅁸故印依稀識天水風枝雨葉不􅀜愁慘淡如披靖康史宣和文物劇風流繡褫錦贉窮千秋畫學嵗收五嶽觀圖書盡識太清樓盛衰轉􅕿如飛電牟駝岡上紛刀箭􅂵筠花木摧為薪西風落日青城殿此本流離出禁庭過江千載歎飄零昔日興亡如在眼還同麥飯哭冬青夜經古城作我行牛山下寒墟帶平楚不見齊王宫􅆰城半禾黍踈星耿不明白楊夜深語南園二首曉􅁸思園林昨夜西堂雨􅀒杖眺前山初陽􅊌平楚渌池萍始合芳樹禽交語庭户寂無人慨然念終古夜雨襍花落衡門緑苔生誰􅀎捉坐席共作林下行圎荷舒午景茂林含夕清歸禽赴斜照税駕此山楹雨夜與禮吉叔子髙舘多梧桐微雨飛向夕清談不􅀎寐入夜轉蕭索餘香歇幽幌暗蟲響堦石夢破忽沉吟悵然越郷客與周量過訪苕文夜雨共􅀫故人千里別春草萋已緑相思南雲端目盡東海曲復作帝城逰乘暇慰幽獨入門凉蟬鳴中庭多嘉木石徑生積隂蒼苔宛山谷坐久微風来雨聲襍深竹共有滄浪興復縦青山目良㑹誰能常今宵得同􅀫贈勞山隠者何許藏名地秦山海上深半夜白日出風雨蒼龍吟靜侣行道䖏不聞樵採音清冷魚山梵寂莫成連琴曉就諸天食暝棲薝蔔林因知安居法一契無生心我亦山中客悠悠悔陸沉夜登燕子磯渡江訪名山層巔到曛黑大江森欲動浩浩千里色把炬石燕飛燃犀濳蛟匿北望靈巖塔知是専諸邑悲慨下沾襟此意誰當識􅀫弘濟寺曉登觀音巖眺望擊楫凌滄洲投􅀫招提境入門優曇香聞鐘夜方永髙枕􅃪濤聲層軒抱江影曉来微雨過紅葉滿髙嶺慿䦨見萬里雲物殊清㢠長山去蜿蜒上流壓江郢海門控金焦蒼烟翳朝景信美睇山川霸圖逓烟冷何如學無生抗跡雲峯頂􅀉彭十羡門蕭寺鐘殘時燕山霜落夜對牀語清夕流連不知罷落葉一紛飛離鴻遂南下澉浦近青山依稀見君舍半山愛予寒江落潮之句為作圖愚山題詩其上和荅一首我昨訪竒登燕磯潑墨深更遍巖壁捫蘿附􅁑不知險夜踏空江欲崩石掀髥作畫􅎷裘翁長歗題詩宛陵客何當結屋圖中居卧看江天落潮白吴季子祠下作我行延陵城懐古心菀結讓徳􅊬已逺流風緬曩􅈒州来季當立髙懐寧詎㞕躬畊表遐志亮㦲子臧節慕義永無窮穹碑字難滅􅀁悲於潛役􅀦亂相更迭伍胥進勇士専諸踐王血遜位固髙義復命忍臣列春秋不名賢書札理當晰嗚呼三代後斯風久淪絶廉節􅁸頑懦尚論義常竊縞紵思古人空祠颯寒雪毘陵歸舟泊􅂳西蠡河解䌫東城路凉月淡􅀌舟遥村隠紅樹杳杳暮㱕人悠悠渡江去招隱寺筍輿越黄鶴連岡帶平椘􅊗歷南朝松風吹落寒雨石楠紅始垂沙泉碧方吐遂造戴公山風氣何清古山門映殘照雙泉咽寒嶼玉蕊不復見空亭閉荒塢戴公昔通隱風流照巖户潄泉彈名琴東廵動人主清風一銷歇初地留空宇金碧漸凋殘林壑自清舉蕭條黄葉落寂歷幽禽語􅅆澗􅁸凉吹經堂罷齋鼓緬想剡中人蒼茫久延佇自招隱登夾山入竹林寺籃輿俯髙嶺石磴轉幽谷諸峯亂􅆰翠澄江疉䡖縠􅅆望戴公宅秋氣益蒼肅紺壁隠竒杉危亭蔽荒竹􅀌僧逺獨歸山鳥暮相逐樹杪見古寺松栝散林􅅢絶壁尚千尋紆逕非一曲初蠟阮公􅄚逝將訪金粟暝坐竹林深山山靜寒緑竹林寺迢迢夾山道幽幽竹林寺林公闢山處泉澗饒古意鐘磬聞諸天花藥覆平地森梢萬竿竹烟景滿空翠慈鳥識禪心清猿􅁸愁思平生江海情蕭然但髙􅀉囘首禮白雲何時謝塵累林臯和尚塔院觀林公泉祖堂白雲裏岧嶤俯林樾昔人不可見巖桂花猶發惟有林公泉涓㳙􅃞明月海門歌岷峨東下江水長逺􅀙井絡来吴郷奔濤萬里始一曲古之天塹維朱方北界中原壯南紀魚龍日月相􅅆翔中流一島號浮玉登髙眺逺何茫􅃼長􅆰飛鳥去不盡江海一氣同青蒼山外兩峯逺竒絶雙闕屹立天中央左江右海辨雲氣如為八裔分紀疆江流到此一􅅞束早潮晚汐無披猖燭龍曉日出雲海山光照曜連扶桑年来海戍未停罷峩舸大艦来汪洋胡豆洲前􅁸烽火徒兒浦上披裲襠古聞京口兵可用􅀉奴一去天蒼凉我願此山障江海七閩百粤為隄防作歌大醉卧巖石􅁸看江月流清光上方寺訪東坡先生石􅈓詩次韻昔出蜀岡道黄葉鳴秋蟬今来上方寺緑萼破春烟坦􅇍寳帶側延眺隋城巔古刹龍􅁚寂殘碣蛛絲懸緬思峩􅖭人文采真神仙贈詩日南使賓佐皆豪賢􅊬然竟終古潄墨留春泉老筆欲飛動妙態殊便姢空堂響人語怖鴿飛聮翩後逰慨今昔慿弔當同然寺有泉名第一京江夜雪􅀭子津邉􅀭片席暮角聲傳京口驛北風一夜江上寒鴻鶴山頭雪幾尺去年曾上春秋樓蘆花楓葉當清秋何當踏雪三山頂第一江山萬里流甘露寺有宋吴琚題㮄曰天下第一江山丹徒行弔宋武帝曲阿之北京口東􅀉奴王者真英雄新洲伐荻殺龍子大業遂建丹徒宫桓家小兒亂天紀投袂勤王夜中􅁸摴蒲百萬皆人豪龍行虎􅇍非凡理􅀙兹大運屬彭城中原趙魏歸經營硤口千軍五龍涸藍田一戰二崤平南北推移幾千載太息雄圖竟何在􅀫麥寒原少昔人神鴉社鼓成空塞王氣銷殘帝宅荒悠悠江水不勝長忠臣徒歎􅀽開府天命還歸蕭建康五人墓流連虎阜逰宛轉山塘路石門映􅅆波英靈此中聚滿壇松桂隂落日青楓樹生􅅖伍胥潮死近要離墓千秋忠介墳鬼雄誓相赴酹酒拂蒼碑寒鴉自来去自光福里入太湖口徃聖恩寺扁舟下西崦淼淼入湖口逶迤鄧尉山蒼茫具區藪南来仙靈窟袁墓號稱首銅井連青芝雲錦張左右七十有二峯遥矚皆培塿貝闕敞魚龍金庭開户牖仙壇毛公蛻古笈靈威守名境祕聞見勝逰信非偶巘崿時合沓龍氣殊蚴蟉撃楫泝空明濯纓逺塵垢􅀅来萬峰寺半偈持苕帚還元閣聴雨懐太湖㝠㝠遥峯雨黯黯重湖雲萬壑急懸溜颯沓聴難分山中梅信發香色方氤氲已蠟阮生􅄚將墊林宗巾身卧百尺樓心憶五湖濱笠澤􅄅千里漁邨襍鷗羣園綺緬匪遥逝當返吾真雨中尋米堆山僧樓鳴鐘罷徘􅆦向山路逺眺米堆山蒼蒼積烟霧溪澗窅然深岡巒緬非故千重修竹林一徑江梅樹花香上寒衲石流溼芒􅋰山靄接湖雲日夕自来去迢迢五雲洞欲問誅茅處自米堆山下行至上陽村錢家磡望湖中漁洋法華諸山杖䇿信忘疲行行畵圖裏﨑嶇下雲壑蒼茫望烟水石徑何盤紆踈籬照梅蕋寥落重湖濱柴門􅁆家市居人太古風但解􅁆雞豕語我種植法敦樸有竒理雖非甪里儔頗謂桃源比逶迤到湖漘浩􅄅歎觀止震澤控三江波瀾此方始法華表東陲漁洋正相似烟雨春空􅄥峰巒暮俶詭昨朝梵天閣逺眺如隠几豈知方丈山忽落芒鞵底欲乞五湖長垂釣將已矣晚坐雨花槗看梅寒湖望已逺迢迢暮歸寺修竹􅀮山門金碧眩空翠清溪枕飛梁花氣增明􅆺緑蕚紛競發翠羽時一至拈花悟禪心作賦識仙意髙低垂繁條明滅見湖次縹緲吹笙人消揺布金地微微蓮華漏蕭然逺塵思登光福塔望穹窿靈巖諸山懐古昨登擅勝閣遥遥見湖濱聚沙矚髙妙珠露髙由旬山趾理歸棹中流望嶙峋鈴鐸天際語獅􅁚雲中蹲攬衣造峯頂大千俯微塵悟彼解脫義得此清浄身名山繚四隅出沒􅆺烟晨眺逺跡方遐懐古情彌辛采香已荒徑菱歌尚含顰舘娃一片石千載為沾巾􅅆身望胥口落日悲􅀌臣第二泉和涪翁韻春山細雨三人俱藤笈親携桑苧書􅅞亭甃石㡬年事至今浣沼噴明珠山人形癯味道􅃾九隖不老將焉如軍持銅鉢此生畢買田即􅅖芙蓉湖木末亭作曉登木末亭南望新林浦烟嵐紛四圍三山􅄅何許旭日麗飛甍雲物􅆺晴溆風景在江山離宫半禾黍顧瞻金川門悲来不能語惟餘博士祠正氣留終古守風燕子磯刁騷夜雨打吴㮄三日南風燕子磯安得滄波如匹練便乗䡖舸去翻飛長江巨石想飛動漁燈戍鼓相因依栖霞咫尺不􅀎到白下古城春又歸憶虎丘鶴澗清逺道士養鶴處人去亭空鶴不飛千古清泠一勺水至今猶浸白蓮磯昔逰曾記仙靈語竒絶白雲蓊欲歸白雲蓊欲㱕青松忽消半清逺道士詩也和吴淵穎題錢舜舉張麗華侍女汲井圖景陽樓上鐘聲止結綺閣中美人􅁸百花溼露啼宫鴉􅎷盧曉汲銀河水黄奴慵􅁸􅀝隠囊瓊枝璧月交輝光貴人夾坐詩先就狎客擘牋歡未央玉樹歌䦨方競􅆺桃葉山前陳鐡􅀐青龍飛出建陽門羣鳥空呼奈何帝可憐拂檻曉粧時入井倉皇􅃚得知千載畫圖猶省識石欄紅淚黦胭脂和吴淵穎題􅀽子仁巴􅂳出峽圖桃花夜汎三川水蜀中估􅂳日千里錦官城外􅃌東吴萬里行當自兹始金牛玉壘向天開朝雲突兀瞿唐堆飛流一瞬下萬仞長年屏息顔如􅁅峽中無人但煙霧杜宇聲悲客行處巴巫迎神歌竹枝忽見雲安郭邉樹上峽懸橦下安流東風吹送江陵舟卻􅀙一幅鵞溪上髣髴三刀夢益州葉訒菴自吴中􅀉予長歌兼示金山見憶之作奉荅昔者我登浮玉山大江駭浪流潺湲岷峨萬里在眼底荆門郢樹浮盃間彭城蘭陵一朝盡令我慨歎愁心顔此時側望天北極漁陽莾蕩連雄􅀜玉堂美人侍帝側兩年不見飛鴻翼海内慿誰論素心萝裏思君見顔色蒼梧慘淡雲氣深九疑緜􅊬瀟湘隂重瞳南廵忽􅄫莫園花陵草俱沾襟聞道髙陵變深谷即看碧海飛黄塵雲霄侍􅀙㡬人在飛蓬落葉愁春心夫子盛年何婉孌日夕含香玉皇殿衆中獻賦欲凌雲御前􅀐馬如飛電即今蕉萃百不如落拓江湖復相見吁嗟㦲人生遇合亦偶然雄飛雌伏皆可憐不見東方曼倩號大隠金門據地歌向天又不見開元天子盛文􅍨隴西王孫稱謫仙調羹未罷夜郎謫至今青山采石垂千年君家况近崑山麓二陸臺邉結茅屋放鶴朝􅀙西􅎷歸采蓴夜向南湖􅀫感遇終懐􅀦士恩憂時莫效長沙哭三山圖畫一江分何日題詩共夕曛妙髙臺上江如練南望姑􅂫是白雲秋日題閔園水亭南人習烟水結屋如舫居真州水水多城市通樵漁一溪納三江潮汐相盈虚茆亭碧溪上浦溆臨前除曉風㫁蒲響夜露幽花舒􅀌雲散天末好鳥鳴午餘緬懐華林歎持此謝簮裾同楊西印副使蔡馠若秀才夜登觀音山眺曲阿後湖我昨南渡登金焦鯨魚䟦浪生風濤更上君山俯震澤長江萬里窮秋毫五日探竒興不盡曲阿城畔来登髙觀音山髙髙百丈星辰羅列捫層霄懸崖絶磴挂猿臂崇巒疊嶂森松毛山巔作亭瞰飛鳥湖光山色相週遭練湖一萬六千頃􅀔與江海爭迢遥淵注渟著古􅀁歎滄桑磨滅非前朝風景不異謝郎死我来慿眺凌寒宵長嘯空山荅山鬼驚飛鵰鶻求其曹滄波混茫接元氣有如盂水浮堂坳氷夷擊鼓百靈集金支翠羽光飄揺是時月黑風怒號萬弩突射錢塘潮蛟龍屭贔時隠現靈胥慘澹天吴驕髙麗長山互鈎帶六州一氣􅅆斗杓楊公蘄黄昔開府坐清江漢真人豪蔡生白晢美無度頗􅀎飲酒歌離騷東吴菰蘆有君輩力鞭巨石驅神鼇練塘一勺好栖托結隣未卜心空勞酒䦨歌罷意惆悵烟江明日横䡖舠九日與方爾止黄心甫鄒訏士盛珍示集平山堂送方黄二子赴青州謁周侍郎西風蕭蕭天雨霜秋髙木落當重陽鶗鴂先鳴􅈍芳歇䧹門鴻雁来何方今我不樂出行邁西城近對平山堂歐公風流已黄土舊逰􅄫莫風烟蒼喬木修竹無復在荒蕪㫁隴棲牛羊劉原父蘇到日已陳跡况復清淺論滄桑京江南望流湯湯北固山髙枕鐡甕蕭公旌斾何飛􅀭雲龍直北雲茫茫彭城戲馬啓髙宴至今邉朔傳名章􅀌蓬驚沙振叢薄哀螢蔓草􅆞雷塘􅀙来王霸已如此牛山何必霑衣裳與君並坐但鼓瑟醉倒聊復呼􅁑彊樽前聚散况難必羽聲變徴何激昻明朝送汝望諸澤欲趁桓公作急裝登文㳺臺玻瓈江上謫仙人東來萬里辭峨岷熈寧元豐不得意翩然戯弄淮南春龍圖學士孫莘老忤權要祥符宰相餘王孫王㝎􅀦黄樓一賦軼屈宋無雙􅀦士推髯秦少㳺四公相逢向淮海酒酣耳􅀬氣益振珠湖三十六陂澤髙臺下瞰何嶙峋錦繡詩篇照天地與臺光景長鮮新雲烟過眼一飛鳥黄河曲注江東奔人民城郭半遷改此㙜屹立當湖濱恵州儋耳垂萬死後生望古傷吟䰟何人請籍元祐黨至今泚顙慙安民豈如此臺好名字永絶狐鼠芟荆榛我来逰眺嵗㡬度溪毛明信古􅀁敦逺帆如鳥樹如薺湖光雲霧相摩吞嚴冬沆瀣但一氣大雪片片鋪龍鱗酹公一語公莫嗔作詩一笑君應聞末即坡公題太白像語過汜光湖懐古嗚呼正德中嬖豎隳皇綱華容既遐謫劉謝咸髙翔談笑誅刑餘臺閣資文襄逆濠睨神器弄兵下鄱陽􅀔異北平順跡同吴濞狂桓桓文成公將帥皆龍驤義旗出章貢狡童旋已亾如何萬乗尊南廵来建康羅綺照江水姝麗傾淮􅀭誰􅆳白雲謡載詠黄竹章兹湖兩駐蹕名因翠華長龍舸與鳳艒樂㦲方未央膠舟古􅀁戒遺恨憐昭王事徃二百年寒波但菰蔣月暗津鼓急楓落漁燈􅋽緬懐豫且歎弔古重悲傷至今泰陵樹松柏無斧斨夜遇陳伯璣即別聞君返西江﨑嶇􅀊將暮不知秋浦歸復此吴陵遇煙暝失漁邨雪消􅁆江樹惆悵聞荒雞別君立前渡蘇門行􅀉劉公㦷兼呈孫鍾元先生劉生俠氣老不除腰間玉具纓曼胡目送飛鴻卧西省晝萝秋水思菰蒲掉頭一竿清潁尾琉璃萬頃堆西湖憶昨􅃪爾御風撡山泉抉溜松風呼黄鵠山頭一握手戴公徃蹟今有無山中舊約息壤在相看一笑言非疎舊在京師􅃪公㦷彈御風操贈詩有與君更作他年約黄鵠山頭訪戴行之句壬寅果相遇黄鵠山下此事甚竒濤頭如山五馬渡酒酣夜別黄公壚平山堂上望汝潁恨無好句􅇷歐蘇昔與汪琬程可則共槃礴看君寫作蘇門圖恠石槎枒樹蕭瑟醉墨絶似雲林迂嘯臺鸞鳳儼在耳安知嵇阮非吾徒聞君近散萬金盡便衣掃塔辭妻孥山中有鄰德不􅀌蘇門先生今大儒夏峯邨邉看秋􅓬雲中髣髴開精廬尋源采藥去不返空留鳥跡巖間書廣陵西望連孟諸倘逢樵叟一相訊山中服食今何如甓湖舟夜讀渭南集偶題長句少陵不作昌黎死大峨仙人落儋耳渭南老子来堂堂鬱律蛟龍蟠筆底半世功名梁益間拓􅁌横矟劒門關白頭鏡水江湖萝夜夜山南射虎還陸放翁心太平菴硯歌為畢通州賦娬􅆺散花峽艱危道士磯放翁過此留清辭何年片石堕㵳泬龍堂荒忽蟠蛟螭先生當年西入蜀迎風十丈搴黄旗下牢䕫門波浪惡白鹽赤甲天下竒轉入興元瞰河渭山南射虎黄雲垂大散􅀜頭見烽火賦詩草檄如星馳此硯爾時伴戎幕賢於十萬熊羆師鶯花海中九年住春江醉捲千玻瓈錦官城裏蘋風閣百觴萬首爭淋漓此硯爾時厠髙讌飽霜千兎相追飛先生老矣竟東下鏡湖支枕看風漪但餘此硯共幽獨猶能􅁸賦􅀙軍詩紹興淳熈一片石流傳異代誰使之曾窮梁益掠吴椘放翁金崖硯銘中語吾曹想像空嗟咨畢侯家近黌堂側草生書帶紛葳㽔劍南一卷不離手興来春日吟茅茨携渠歸去坐懐古㝎有雲霞生墨池卞忠貞公墓下作松柏何蕭蕭云是卞公墓背踞冶城顛前臨大桁路緬昔氷嘉時流人競南渡舉􅀦扇清言作逹相矜慕惟公執鄙吝巗巗畏峰距一朝荒傖来旌飛歷陽樹􅂑節慚王公種薤笑諸􅁃堂堂卞將軍授命青溪渡父子忠孝俱大節光􅀦􅇍快意温平南屨及雷池戌一戰翦長鯨鐘簴仍如故握爪識忠貞死綏表風素英爽載雲旗陟降神靈雨咫尺􅀽司徒異代同金鑄􅀫長干寺支公邀我􅀫清夜開南軒龕燈照維摩跏趺寂無言下簾啓北牖山夕烟景昏中夜微風作凉雨灑林園􅀫鳥稍驚􅁸時聞嘉樹喧枕簟生夕凉罏香歇微温勞生疲津梁聊息應對煩六朝松石歌贈鄧簡討夀陽太史好竒古邀我来觀六朝之松石不辭重墊一角巾此生當著㡬兩􅄚入門大呌走欲顛袍笏淋漓狂太劇蟠根近連瓦官寺吹香正鄰虎頭宅蒼皮黛色磨青銅老幹樛枝拓金㦸蕭梢上摩白日暗輪囷下瞰蒼烟積千年為䃜誰得見已有脂香化靈珀石􅀔嶙峋不相讓元氣盤盤絶繩尺蒼苔剝盡南宋字刼火不受陳宫厄陳􅅩寳三品石終南太華若在眼咫尺壺中苦崩廹誰遣史書宋星隕將無神受秦鞭斥晦㝠豈非􅀑物庭風雨當防巨靈擘王謝衣冠失江左齊梁人代成今昔建康宫殿㡬青燐此石此松閱朝夕一物亦荷皇天慈懐古茫茫百憂集擊琴欲罷且髙吟謖謖寒風灑巾幘金陵曉發月落驃􅀐航潮生鎮西宅􅄥􅄥逺林樹烟景紛如積煙際下漁舟樹杪帶行客何處金陵思秋江葦花白陳生行戲送其年歸陽羡陳生陳生爾既不􅀎入淵斬長蛟又不能登山射猛虎復不能亡賴作横苦郷里十載哦詩守環堵徒抱輪囷一片心藜藋鼪鼬相枝拄昨日渡江来今復渡江歸運租􅂳上苦憔悴風髙浪湧横江磯朝来􅀉我新詞句明月無情蟬鬢去五湖歸去伴漁竿楓岸蘆汀不知處季鷹鱸鱠思江東我亦年年嘆轉蓬期汝扁舟同射鴨銅官山下竹枝弓江上讀韋詩彈琴向空江夜靜見江月水波正遥裔河漢坐超忽五􅃶泛波濤餘音散林樾沙邉鶴唳逺烟中人語歇何處椘山青􅀌帆逺將沒獨有韋公詩依依伴清絶蕭尺木楚詞圖畫歌大江秋老歌離騷江波瑟瑟風刁刁恠石巃嵸壓崩濤猩猩歗雨悲猿猱楚纍一去二千載使我後死心勞忉齧桑敗盟西帝驕商扵六百横相要武􅀜一入不復返章華㙜殿生蓬蒿江潭憔悴子蘭怒蛾睂謡諑􅆧安逃長楸龍門望不見木蘭桂樹棲鴟梟騏驥不御愁跼跳菉葹蕠糅申椒呵壁荒唐罷天問沅湘西逝䰟難招蕭梁王孫筆佹僪攀挈顧陸提僧繇丹黮粉黕寫此夲墨花怒捲湘江潮湘君夫人降荒忽􅀦殤山鬼来蕭颾青楓斑竹染啼血靈風神雨紛飃颻酒䦨歌罷老蛟泣星辰迸落江天髙􅀫弘濟寺名藍敞積翠遥夜開禪闗山半聞清鐘夢􅁴心亦閑飛雨灑江介流雲滿空山五載復投止塵勞慙昔顔黄子久王叔明合作山水圖有客示我七尺練云是黄王之合作粉墨駮蝕神淋漓巖谷髙深氣盤礴長林巨壑來畏佳飛鳥流雲去寥廓空堂白晝生風霆飛瀑千尋競噴薄老松撐突夜乂臂恠石縦横鵞鸛啄石稜松鬛若無路忽向青冥得樓閣峭壁無梯猿臂絶天外􅀌茅誰􅀁􅅞滿堂動色神悄然題字依稀辨黄鶴吳興清逺鷗波亭家法賢甥宛如昨意匠慘澹經營成范緩倪迂大張拓富春老人年九十煙雲供養窮三樂扁舟訪舊霅川来偶􅀙縑素論丘壑為添樵徑螺髻旋逺峰一角空中落逺人無目樹無枝妙解通靈失糟粕吴興富春幾百年此意天然殊斧鑿山人癖如阮宣子蠟􅄚猶堪代芒屫惜無劉尹買山錢苦向畫圖躭寂寞此中三日容坐卧便擬拂衣永棲託明年借汝春晝閑梅老無花竹生籜漁洋山人精華録卷一門人監察御史崑山盛符升􅀦子祭酒江隂曹禾同訂康熈三十九年五月十五日門人林佶謹書男啟涑恭閱
