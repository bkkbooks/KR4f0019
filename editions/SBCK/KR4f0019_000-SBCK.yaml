front:
  text: 萬曆􅏤戍之􅀊偕余舉南宫者􅀜西文太青新城王季木竟陵鍾伯敬皆雄駿君子掉鞅詞壇太青博而奥季木贍而肆踔厲風發大放厥詞太青贈季木曰元美吾兼愛空同爾獨師盖其宗法如此而伯敬以幽閒􅀮秀之致標􅆀詩歸竄易時人之耳目迄扵今輇材諷􅀃􅉫弄研削莫不援引鍾譚與王李徐袁分茅設蕝而􅀜西新城之集􅀌行秦齊間江表之士莫有過而問者三子之才力伯仲之間耳而身後之名飛沈迥絶殆亦有幸不幸焉千秋萬􅀊古人􅀁以深歎扵􅄫寞也季木殁三十餘年􅀙孫貽上復以詩名鵲􅁸閩人林古度論次其集推季木為先河謂家學門風淵源有自新城之壇墠大振扵聲銷􅁅燼之餘而竟陵之光燄熸矣余盖為之撫􅃃太息知文苑之乗除有刼運㕘錯其間殆亦可以觀天咫也嗟乎詩道淪胥浮偽並作其大端有二學古而􅎓者影掠滄溟弇山之賸語尺寸比儗此屈􅇍之蟲尋條失枝者也師心而妄者懲創品彚詩歸之流􅁦􅅭運掉舉此牛羊之眼但見方隅者也之二人者其持論區以別矣不知古學之繇來而勇扵自是䡖扵侮昔則亦同歸扵狂易而巳貽上之詩文繁理富銜華佩實感時之作惻愴扵杜陵縁情之什纏綿扵義山其談藝四言曰典曰逺曰諧曰則沿波討源平原之遺則也截㫁衆流杼山之微言也別裁偽體轉益多師草堂之金丹大藥也平心易氣耽思㫄訊深知古學之繇來而扵前二人者之為皆􅀎洮汰其癥結祓除其嘈囋思深㦲小雅之復作也微斯人其誰與歸貽上以余為􅀌竹之老馬過而問道于余余遂趣舉其質言以為叙徃余嘗與太青季木論文東闕下勸其􅇷溯古學母沿􅋡扵今學而不知返太青喟然謂季木曰虞山之言是也顧我老不能用耳今二子墓木已拱聲塵蔑如余八十昏忘值貽上代興之日向之鏃礪知已用古學勸勉者今得扵身親見之豈不有厚幸㢤書之以慶余之遭也虞山䝉叟錢謙益序
